name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Inject API base into index.html
        env:
          API_BASE: ${{ secrets.API_BASE }}
        run: |
          if [ -n "$API_BASE" ]; then
            python3 -c "
import os, re, pathlib
p = pathlib.Path('src/web/index.html')
s = p.read_text(encoding='utf-8')
tag = f'<meta name=\"api-base\" content=\"{os.environ[\"API_BASE\"]}\">'
if 'name=\"api-base\"' in s:
  s = re.sub(r'<meta name=\"api-base\"[^>]*>', tag, s)
else:
  s = s.replace('<head>', '<head>\n    ' + tag, 1)
p.write_text(s, encoding='utf-8')
print('injected:', tag)
"
          else
            echo 'API_BASE secret empty; skipping'
          fi
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/web
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
