0\u7d20\u53ef\u4fc3\u8fdb\u9aba\u677f\u8f6f\u9aa8\u7ec6\u80de\u7684\u751f\u957f\uff0c\u4fc3\u8fdb\u8f6f\u9aa8\u66ff\u6362\u4e3a\u9aa8\u3002\u82e5\u751f\u957f\u53d1\u80b2\u671f\u8fd9\u4e24\u79cd\u6fc0\u7d20\u5206\u6ccc\u8fc7\u5c11\uff0c\u53ef\u5206\u522b\u5bfc\u81f4\u4f8f\u5112\u75c7\u548c\u5446\u5c0f\u75c5\uff1b\u513f\u7ae5\u671f\u751f\u957f\u6fc0\u7d20\u5206\u6ccc\u8fc7\u591a\uff0c\u53ef\u5bfc\u81f4\u5de8\u4eba\u75c7\uff0c\u6210\u5e74\u671f\u5219\u53ef\u81f4\u80a2\u7aef\u80a5\u5927\u75c7\u3002\u7532\u72b6\u65c1\u817a\u6fc0\u7d20\u6fc0\u6d3b\u9aa8\u7ec6\u80de\u548c\u7834\u9aa8\u7ec6\u80de\u7684\u6eb6\u9aa8\u4f5c\u7528\uff0c\u91ca\u653e\u9aa8\u9499\u5165\u8840\uff0c\u4f7f\u8840\u9499\u5347\u9ad8\uff1b\u964d\u9499\u7d20\u53ef\u6291\u5236\u9aa8\u76d0\u6eb6\u89e3\uff0c\u5e76\u523a\u6fc0\u9aa8\u7956\u7ec6\u80de\u5206\u5316\u4e3a\u6210\u9aa8\u7ec6\u80de\uff0c\u4fc3\u8fdb\u6210\u9aa8\u800c\u4f7f\u8840\u9499\u5165\u9aa8\u3002\u96cc\u6fc0\u7d20\u548c\u96c4\u6fc0\u7d20\u90fd\u80fd\u4fc3\u8fdb\u6210\u9aa8\u7ec6\u80de\u7684\u6d3b\u52a8\uff0c\u6709\u5229\u4e8e\u9aa8\u7684\u751f\u957f\u548c\u6210\u719f\u3002\u96cc\u6fc0\u7d20\u4e0d\u8db3\u53ef\u81f4\u6210\u9aa8\u7ec6\u80de\u6d3b\u8dc3\u5ea6\u964d\u4f4e\u3001\u7834\u9aa8\u7ec6\u80de\u6d3b\u52a8\u76f8\u5bf9\u589e\u5f3a\uff0c\u6545\u53ef\u5bfc\u81f4\u9aa8\u9499\u6d41\u5931\uff0c\u5f62\u6210\u9aa8\u8d28\u758f\u677e\u3002\u7cd6\u76ae\u8d28\u6fc0\u7d20\u53ef\u6291\u5236\u5c0f\u80a0\u5bf9\u9499\u7684\u5438\u6536\u548c\u80be\u5c0f\u7ba1\u5bf9\u9499\u7684\u91cd\u5438\u6536\uff0c\u5bf9\u9aa8\u751f\u957f\u53d1\u80b2\u4e5f\u6709\u5f71\u54cd\u3002\n3. \u7ec6\u80de\u56e0\u5b50\u662f\u7531\u7ec6\u80de\u5206\u6ccc\u7684\u4e00\u7c7b\u4f4e\u5206\u5b50\u91cf\u53ef\u6eb6\u6027\u86cb\u767d\u6216\u591a\u80bd\uff0c\u5177\u6709\u5e7f\u6cdb\u7684\u751f\u7269\u5b66\u6d3b\u6027\u3002\u9aa8\u5185\u5b58\u5728\u7684\u751f\u7269\u6d3b\u6027\u7269\u8d28\uff0c\u5982\u751f\u957f\u56e0\u5b50\u548c\u7ec6\u80de\u56e0\u5b50\u7b49\uff0c\u4e00\u822c\u8ba4\u4e3a\u6765\u81ea\u6210\u9aa8\u7ec6\u80de\u7684\u5206\u6ccc\uff0c\u4f46\u4e5f\u53ef\u6765\u81ea\u9aa8\u5916\u7ec4\u7ec7\u3002\u8fd9\u4e9b\u7ec6\u80de\u56e0\u5b50\u53ef\u6fc0\u6d3b\u6216\u6291\u5236\u6210\u9aa8\u7ec6\u80de\u4e0e\u7834\u9aa8\u7ec6\u80de\uff0c\u4e0e\u9aa8\u7684\u53d1\u751f\u3001\u751f\u957f\u548c\u91cd\u5efa\u5bc6\u5207\u76f8\u5173\u3002\n4. \u5e94\u529b\u4f5c\u7528 \u5e94\u529b\u662f\u7ed3\u6784\u5bf9\u5916\u90e8\u52a0\u8f7d\u7684\u8d1f\u8377\u6240\u4ea7\u751f\u7684\u5185\u90e8\u62b5\u6297\u529b\uff0c\u4f7f\u7269\u4f53\u56e0\u8d1f\u8377\u9020\u6210\u7684\u53d8\u5f62\u5f97\u4ee5\u6062\u590d\u5230\u53d8\u5f62\u524d\u7684\u72b6\u6001\u3002\u9aa8\u7684\u751f\u957f\u548c\u91cd\u5efa\u7686\u4e0e\u9aa8\u7684\u53d7\u529b\u72b6\u6001\u5bc6\u5207\u76f8\u5173\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u9aa8\u5904\u4e8e\u751f\u7406\u8303\u56f4\u5185\u7684\u9ad8\u5e94\u529b\u4f5c\u7528\u4e0b\uff0c\u4ee5\u9aa8\u5f62\u6210\u4e3a\u4e3b\uff1b\u4f4e\u5e94\u529b\u6761\u4ef6\u4e0b\u4ee5\u9aa8\u5438\u6536\u4e3a\u4e3b\uff0c\u957f\u671f\u7684\u4f4e\u5e94\u529b\u53ef\u9020\u6210\u9aa8\u8d28\u758f\u677e\uff0c\u5982\n\n\u4f5c\u7528\u3002\n\n\u4e94\u3001\u2002 \u5173\u8282\n\n\u5173\u8282\u5206\u4e3a\u52a8\u5173\u8282\u548c\u4e0d\u52a8\u5173\u8282\u3002\u52a8\u5173\u8282\u4e3b\u8981\u662f\u6ed1\u819c\u5173\u8282\uff0c\u5373\u4e00\u822c\u6240\u79f0\u7684\u5173\u8282\uff0c\u5206\u5e03\u5e7f\u6cdb\uff0c\u6d3b\u52a8\u5ea6\u5927\uff0c\u5176\u57fa\u672c\u6784\u6210\u5305\u62ec\u5173\u8282\u8f6f\u9aa8\u3001\u5173\u8282\u56ca\u548c\u5173\u8282\u8154\u3002\n\n1. \u5173\u8282\u8f6f\u9aa8\uff08articular cartilage\uff09 \u4e3a\u88ab\u8986\u4e8e\u9aa8\u7aef\u5173\u8282\u9762\u7684\u8584\u5c42\u900f\u660e\u8f6f\u9aa8\uff0c\u5177\u6709\u4e00\u5b9a\u7684\u5f39\u6027\uff0c\u8868\u9762\u5149\u6ed1\uff0c\u6709\u5229\u4e8e\u5173\u8282\u8fd0\u52a8\u3002\u5173\u8282\u8f6f\u9aa8\u4e0e\u4e00\u822c\u7684\u900f\u660e\u8f6f\u9aa8\u6709\u4e00\u5b9a\u7684\u5dee\u5f02\u3002\u4e00\u662f\u540c\u6e90\u7ec6\u80de\u7fa4\u5448\u5355 efa\u8ddf\u4e0d\u4e0a\u9aa8\u7684\u5f62\u6210\uff0c\u5f15\u8d77\u9aa8\u7684\u7578\u5f62\u53d1\u80b2\uff0c\u4e5f\u53ef\u5f71\u54cd\u9aba\u677f\u8f6f\u9aa8\u7ec6\u80de\u7684\u53d1\u80b2\uff0c\u5bfc\u81f4\u957f\u9aa8\u751f\u957f\u8fdf\u7f13\u3002\u7ef4\u751f\u7d20C \u53ef\u5f71\u54cd\u9aa8\u7956\u7ec6\u80de\u7684\u5206\u88c2\u589e\u6b96\uff0c\u5e76\u53ef\u5f71\u54cd\u6210\u9aa8\u7ec6\u80de\u5408\u6210\u80f6\u539f\u7ea4\u7ef4\u4e0e\u57fa\u8d28\uff0c\u4e25\u91cd\u7f3a\u4e4f\u53ef\u5bfc\u81f4\u9aa8\u5e72\u5bc6\u8d28\u9aa8\u53d8\u8584\u53d8\u8106\uff0c\u9aa8\u6298\u540e\u6108\u5408\u7f13\u6162\u3002\n2. \u6fc0\u7d20 \u751f\u957f\u6fc0\u7d20\u548c\u7532\u72b6\u817a\u6fc0\u7d20\u53ef\u4fc3\u8fdb\u9aba\u677f\u8f6f\u9aa8\u7ec6\u80de\u7684\u751f\u957f\uff0c\u4fc3\u8fdb\u8f6f\u9aa8\u66ff\u6362\u4e3a\u9aa8\u3002\u82e5\u751f\u957f\u53d1\u80b2\u671f\u8fd9\u4e24\u79cd\u6fc0\u7d20\u5206\u6ccc\u8fc7\u5c11\uff0c\u53ef\u5206\u522b\u5bfc\u81f4\u4f8f\u5112\u75c7\u548c\u5446\u5c0f\u75c5\uff1b\u513f\u7ae5\u671f\u751f\u957f\u6fc0\u7d20\u5206\u6ccc\u8fc7\u591a\uff0c\u53ef\u5bfc\u81f4\u5de8\u4eba\u75c7\uff0c\u6210\u5e74\u671f\u5219\u53ef\u81f4\u80a2\u7aef\u80a5\u5927\u75c7\u3002\u7532\u72b6\u65c1\u817a\u6fc0\u7d20\u6fc0\u6d3b\u9aa8\u7ec6\u80de\u548c\u7834\u9aa8\u7ec6\u80de\u7684\u6eb6\u9aa8\u4f5c\u7528\uff0c\u91ca\u653e\u9aa8\u9499\u5165\u8840\uff0c\u4f7f\u8840\u9499\u5347\u9ad8\uff1b\u964d\u9499\u7d20\u53ef\u6291\u5236\u9aa8\u76d0\u6eb6\u89e3\uff0c\u5e76\u523a\u6fc0\u9aa8\u7956\u7ec6\u80de\u5206\u5316\u4e3a\u6210\u9aa8\u7ec6\u80de\uff0c\u4fc3\u8fdb\u6210\u9aa8\u800c\u4f7f\u8840\u9499\u5165\u9aa8\u3002\u96cc\u6fc0\u7d20\u548c\u96c4\u6fc0\u7d20\u90fd\u80fd\u4fc3\u8fdb\u6210\u9aa8\u7ec6\u80de\u7684\u6d3b\u52a8\uff0c\u6709\u5229\u4e8e\u9aa8\u7684\u751f\u957f\u548c\u6210\u719f\u3002\u96cc\u6fc0\u7d20\u4e0d\u8db3\u53ef\u81f4\u6210\u9aa8\u7ec6\u80de\u6d3b\u8dc3\u5ea6\u964d\u4f4e\u3001\u7834\u9aa8\u7ec6\u80de\u6d3b\u52a8\u76f8\u5bf9\u589e\u5f3a\uff0c\u6545\u53ef\u5bfc\u81f4\u9aa8\u9499\u6d41\u5931\uff0c\u5f62\u6210\u9aa8\u8d28\u758f\u677e\u3002\u7cd6\u76ae\u8d28\u6fc0\u7d20\u53ef\u6291\u5236\u5c0f\u80a0\u5bf9\u9499\u7684\u5438\u6536\u548c\u80be\u5c0f\u7ba1\u5bf9\u9499\u7684\u91cd\u5438\u6536\uff0c\u5bf9\u9aa8\u751f\u957f\u53d1\u80b2\u4e5f\u6709\u5f71\u54cd\u3002\n3. \u7ec6\u80de\u56e0\u5b50\u662f\u7531\u7ec6\u80de\u5206\u6ccc\u7684\u4e00\u7c7b\u4f4e\u5206\u5b50\u91cf\u53ef\u6eb6\u6027\u86cb\u767d\u6216\u591a\u80bd\uff0c\u5177\u6709\u5e7f\u6cdb\u7684\u751f\u7269\u5b66\u6d3b\u6027\u3002\u9aa8\u5185\u5b58\u5728\u7684\u751f\u7269\u6d3b\u6027\u7269\u8d28\uff0c\u5982\u751f\u957f\u56e0\u5b50\u548c\u7ec6\u80de\u56e0\u5b50\u7b49\uff0c\u4e00\u822c\u8ba4\u4e3a\u6765\u81ea\u6210\u9aa8\u7ec6\u80de\u7684\u5206\u6ccc\uff0c\u4f46\u4e5f\u53ef\u6765\u81ea\u9aa8\u5916\u7ec4\u7ec7\u3002\u8fd9\u4e9b\u7ec6\u80de\u56e0\u5b50\u53ef\u6fc0\u6d3b\u6216\u6291\u5236\u6210\u9aa8\u7ec6\u80de\u4e0e\u7834\u9aa8\u7ec6\u80de\uff0c\u4e0e\u9aa8\u7684\u53d1\u751f\u3001\u751f\u957f\u548c\u91cd\u5efa\u5bc6\u5207\u76f8\u5173\u3002\n4. \u5e94\u529b\u4f5c\u7528 \u5e94\u529b\u662f\u7ed3\u6784\u5bf9\u5916\u90e8\u52a0\u8f7d\u7684\u8d1f\u8377\u6240\u4ea7\u751f\u7684\u5185\u90e8\u62b5\u6297\u529b\uff0c\u4f7f\u7269\u4f53\u56e0\u8d1f\u8377\u9020\u6210\u7684\u53d8\u5f62\u5f97\u4ee5\u6062\u590d\u5230\u53d8\u5f62\u524d\u7684\u72b6\u6001\u3002\u9aa8\u7684\u751f\u957f\u548c\u91cd\u5efa\u7686\u4e0e\u9aa8\u7684\u53d7\u529b\u72b6\u6001\u5bc6\u5207\u76f8\u5173\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u9aa8\u5904\u4e8e\u751f\u7406\u8303\u56f4\u5185\u7684\u9ad8\u5e94\u529b\u4f5c\u7528\u4e0b\uff0c\u4ee5\u9aa8\u5f62\u6210\u4e3a\u4e3b\uff1b\u4f4e\u5e94\u529b\u6761\u4ef6\u4e0b\u4ee5\u9aa8\u5438\u6536\u4e3a\u4e3b\uff0c\u957f\u671f\u7684\u4f4e\u5e94\u529b\u53ef\u9020\u6210\u9aa8\u8d28\u758f\u677e\uff0c\u5982\n\n\u4f5c\u7528\u3002\n\n\u4e94\u3001\u2002 \u5173\u8282\n\n\u5173\u8282\u5206\u4e3a\u52a8\u5173\u8282\u548c\u4e0d\u52a8\u5173\u8282\u3002\u52a8\u5173\u8282\u4e3b\u8981\u662f\u6ed1\u819c\u5173\u8282\uff0c\u5373\u4e00\u822c\u624 timulating hormone\uff0cTSH\uff09\u7684\u5206\u6ccc\uff0c\u4f7f\u7532\u72b6\u817a\u6fc0\u7d20\u7684\u5206\u6ccc\u91cf\u964d\u81f3\u6b63\u5e38\u6c34\u5e73\uff0c\u53cd\u4e4b\u4ea6\u7136\u3002\u5f53\u9057\u4f20\u6027\u7532\u72b6\u817a\u6fc0\u7d20\u5408\u6210\u9176\u7f3a\u9677\u4f7f\u7532\u72b6\u817a\u6fc0\u7d20\u7684\u5408\u6210\u4e0d\u8db3\u65f6\uff0c\u4e0a\u8ff0\u53cd\u9988\u673a\u5236\u4e0d\u80fd\u53d1\u6325\u4f5c\u7528\uff08\u5185\u7a33\u6001\u5931\u8861\uff09\uff0cTSH \u7684\u8fc7\u5ea6\u5206\u6ccc\u5c06\u4f9d\u6b21\u5f15\u8d77\u7532\u72b6\u817a\u5b9e\u8d28\u7ec6\u80de\u5927\u91cf\u589e\u751f\uff0c\u7532\u72b6\u817a\u80bf\uff0cT3\u3001T4 \u5206\u6ccc\u8fc7\u591a\uff0c\u7532\u72b6\u817a\u529f\u80fd\u4ea2\u8fdb\u3002\u518d\u5982\uff0c\u4f53\u5185\u6c27\u7684\u5e73\u8861\u4e3b\u8981\u4f9d\u9760\u547c\u5438\u7cfb\u7edf\u6765\u7ef4\u6301\uff0c\u800c\u547c\u5438\u7cfb\u7edf\u6b63\u5e38\u529f\u80fd\u7684\u7ef4\u6301\u53c8\u4e0e\u795e\u7ecf\u3001\u5faa\u73af\u3001\u8840\u6db2\u7b49\u7cfb\u7edf\u5bc6\u5207\u76f8\u5173\u3002\u6025\u6027\u7f3a\u6c27\u901a\u8fc7\u795e\u7ecf\u53cd\u5c04\u4f5c\u7528\u53ef\u4f7f\u547c\u5438\u52a0\u5f3a\u3001\u5fc3\u7387\u52a0\u5feb\uff0c\u4ece\u800c\u589e\u52a0\u6c27\u7684\u6444\u5165\u548c\u8fd0\u8f93\u3002\u5982\u679c\u673a\u4f53\u957f\u671f\u5904\u4e8e\u7f3a\u6c27\u72b6\u6001\uff0c\u5219\u53ef\u523a\u6fc0\u80be\u76ae\u8d28\u80be\u5c0f\u7ba1\u5468\u56f4\u95f4\u8d28\u7ec6\u80de\u5206\u6ccc\u4fc3\u7ea2\u7ec6\u80de\u751f\u6210\u7d20\uff08erythropoietin\uff0cEPO\uff09\uff0c\u540e\u8005\u80fd\u591f\u4fc3\u8fdb\u9aa8\u9ad3\u5185\u7ea2\u7cfb\u5b9a\u5411\u5e72\u7ec6\u80de\u5206\u5316\u4e3a\u7ea2\u7cfb\u7956\u7ec6\u80de\u3001\u6709\u6838\u7ea2\u7ec6\u80de\u7684\u8840\u7ea2\u86cb\u767d\u5408\u6210\u4ee5\u53ca\u9aa8\u9ad3\u5185\u7f51\u7ec7\u7ea2\u7ec6\u80de\u548c\u7ea2\u7ec6\u80de\u7684\u91ca\u653e\uff0c\u8fd9\u6709\u5229\u4e8e\u6c27\u7684\u7ed3\u5408\u4e0e\u643a\u5e26\uff1b\u7136\u800c\uff0c\u5982\u679cEPO \u8868\u8fbe\u6301\u7eed\u589e\u5f3a\uff0c\u5219\u53c8\u4f1a\u9020\u6210\u7ea2\u7ec6\u80de\u751f\u6210\u8fc7\u591a\uff0c\u8840\u6db2\u9ecf\u6ede\u5ea6\u589e\u5927\uff0c\u8fd9\u5c06\u5bfc\u81f4\u8840\u7ba1\u5185\u8840\u6813\u5f62\u6210\u4ee5\u53ca\u91cd\u8981\u5668\u5b98\u7684\u7f3a\u8840\u6027\u635f\u5bb3\u3002\n\n\uff08\u4e8c\uff09\u2002 \u635f\u4f24\u4e0e\u6297\u635f\u4f24\n\n\u5bf9\u635f\u4f24\u505a\u51fa\u6297\u635f\u4f24\u53cd\u5e94\u662f\u751f\u7269\u673a\u4f53\u7684\u91cd\u8981\u7279\u5f81\uff0c\u4e5f\u662f\u751f\u7269\u673a\u4f53\u7ef4\u6301\u751f\u5b58\u7684\u5fc5\u8981\u6761\u4ef6\u3002\u75be\u75c5\u53d1\u751f\u53d1\u5c55\u7684\u6574\u4e2a\u8fc7\u7a0b\u90fd\u4ea4\u7ec7\u8d2f\u7a7f\u7740\u635f\u4f24\u4e0e\u6297\u635f\u4f24\u53cd\u5e94\u3002\u635f\u4f24\u4e0e\u6297\u635f\u4f24\u53cd\u5e94\u7684\u6597\u4e89\u53ca\u5176\u529b\u91cf\u5bf9\u6bd4\u5e38\u5e38\u5f71\u54cd\u75be\u75c5\u7684\u53d1\u5c55\u65b9\u5411\u548c\u8f6c\u5f52\u3002\u5f53\u635f\u4f24\u53cd\u5e94\u5927\u4e8e\u6297\u635f\u4f24\u53cd\u5e94\uff0c\u75be\u75c5\u5411\u4e25\u91cd\u548c\u6076\u5316\u65b9\u5411\u53d1\u5c55\uff1b\u5f53\u6297\u635f\u4f24\u53cd\u5e94\u5927\u4e8e\u635f\u4f24\u53cd\u5e94\uff0c\u75be\u75c5\u5411\u597d\u8f6c\u3001\u5eb7\u590d\u548c\u75ca\u6108\u7684\u65b9\u5411\u53d1\u5c55\u3002\u4ee5\u70e7\u4f24\u4e3a\u4f8b\uff0c\u9ad8\u6e29\u5f15\u8d77\u76ae\u80a4\u3001\u7ec4\u7ec7\u574f\u6b7b\uff0c\u5927\u91cf\u6e17\u51fa\u53ef\u5bfc\u81f4\u5faa\u73af\u8840\u91cf\u51cf\u5c11\u3001\u8840\u538b\u4e0b\u964d\u7b49\u635f\u4f24\u6027\u53d8\u5316\uff1b\u4e0e\u6b64\u540c\u65f6\uff0c\u673a\u4f53\u542f\u52a8\u6297\u635f\u4f24\u53cd\u5e94\uff0c\u5982\u767d\u7ec6\u80de\u589e\u52a0\u3001\u5fae\u52a8\u8109\u6536\u7f29\u3001\u5fc3\u7387\u52a0\u5feb\u3001\u5fc3\u6392\u8840\u91cf\u589e\u52a0\u7b49\u3002\u5982\u679c\u635f\u4f24\u8f83\u8f7b\uff0c\u5219\u901a\u8fc7\u5404\u79cd\u6297\u635f\u4f24\u53cd\u5e94\u548c\u9002\u5f53\u7684\u6cbb\u7597\uff0c\u673a\u4f53\u5373\u53ef\u6062\u590d\u5065\u5eb7\uff1b\u53cd\u4e4b\uff0c\u82e5\u635f\u4f24\u8f83\u91cd\uff0c\u53c8\u65e0\u9002\u5f53\u3001\u53ca\u65f6\u7684\u6cbb\u7597\uff0c\u5219\u75c5\u60c5\u6076\u5316\u3002\u518d\u5982\uff0c\u75c5\u539f\u4f53\u4fb5\u5165\u4eba\u4f53\u540e\uff0c\u611f\u67d3\u6240\u81f4\u7684\u708e\u75c7\u53cd\u5e94\u5373\u4e3a\u4f53\u5185\u4ea7\u751f\u7684\u6297\u635f\u4f24\u53cd\u5e94\uff0c\u5f53\u708e\u75c7\u53cd\u5e94\u4e2d\u767d\u7ec6\u80de\u6e05\u9664\u4e86\u75c5\u539f\u4f53\u548c\u574f\u6b7b\u7ec4\u7ec7\uff0c\u611f\u67d3\u6027\u75be\u75c5\u9010\u6b65\u6d88\u9000\uff1b\u800c\u5f53\u708e\u75c7\u53cd\u5e94\u4e0d\u8db3\u4ee5\u62b5\u5fa1\u75c5\u539f\u4f53\u6bd2\u7d20\u7684\u4fb5\u88ad\uff0c\u5219\u75be\u75c5\u52a0\u91cd\uff0c\u4e14\u6301\u7eed\u52a0\u5f3a\u7684\u708e\u75c7\u53cd\u5e94\u53c8\u4f1a\u5f15\u8d77\u7ec4\u7ec7\u6c34\u80bf\u548c\u5668\u5b98\u529f\u80fd\u969c\u788d\u3002\u635f\u4f24\u4e0e\u6297\u635f\u4f24\u53cd\u5e94\u540c\u6837\u53d1\u751f\u5728\u7ec6\u80de\u6c34\u5e73\u4e0a\u3002\u4f8b\u5982\uff0c\u9002\u5b9c\u7684\u5185\u8d28\u7f51\u5e94\u6fc0\u6709\u5229\u4e8e\u7ec6\u80de\u5185\u7a33\u6001\u7684\u7ef4\u6301\uff0c\u7136\u800c\uff0c\u5f53\u7ec6\u80de\u906d\u9047\u635f\u4f24\u540e\u5f15\u53d1\u8fc7\u5ea6\u7684\u5185\u8d28\u7f51\u5e94\u6fc0\uff0c\u5219\u53ef\u5bfc\u81f4\u7ec6\u80de\u4ee3\u8c22\u969c\u788d\uff1b\u76ee\u524d\u5df2\u77e5\u5185\u8d28\u7f51\u5e94\u6fc0\u4ecb\u5bfc\u7684\u708e\u75c7\u901a\u8def\u53ca...\n\n### \u7532\u72b6\u817a \u2014 \u9009\u81ea\u300a\u5c40\u90e8\u89e3\u5256\u5b66\u300b\n\n...\u7684\u6df1\u7b4b\u819c\uff0c\u5305\u7ed5\u9888\u3001\u9879\u90e8\u7684\u808c\u548c\u5668\u5b98\u3002\u9888\u7b4b\u819c\u53ef\u5206\u4e3a\u6d45\u3001\u4e2d\u3001\u6df1\u4e09\u5c42\uff0c\u5404\u5c42\u4e4b\u95f4\u7684\u758f\u677e\u7ed3\u7f14\u7ec4\u7ec7\u6784\u6210\u7b4b\u819c\u95f4\u9699\uff08\u56fe 2 - 6\uff0c\u56fe 2 - 7\uff09\u3002\u6709\u5173\u9888\u90e8\u7b4b\u819c\u53ca\u5176\u95f4\n\n\u56fe\u20052\u200a-\u200a5\u2003 \u9888\u90e8\u6dcb\u5df4\u7ed3\n\n\u56fe\u20052\u200a-\u200a6\u2003 \u9888\u7b4b\u819c\u4e0e\u7b4b\u819c\u95f4\u9699\uff08\u6a2a\u65ad\u9762\uff09\n\n\uff08\u4e00\uff09\u2002 \u9888\u7b4b\u819c\n\n1. \u6d45\u5c42\u2003 \u5373\u5c01\u5957\u7b4b\u819cinvesting fascia\u3002\u5411\u4e0a\u9644\u4e8e\u5934\u9888\u4ea4\u754c\u7ebf\uff0c\u5411\u4e0b\u9644\u4e8e\u9888\u3001\u80f8\u548c\u4e0a\u80a2\u4ea4\u754c\u7ebf\uff0c\u5411\u524d\u5728\u9888\u524d\u6b63\u4e2d\u7ebf\u5904\u5de6\u3001\u53f3\u76f8\u5ef6\u7eed\uff0c\u5411\u4e24\u4fa7\u5305\u7ed5\u659c\u65b9\u808c\u548c\u80f8\u9501\u4e73\u7a81\u808c\u5e76\u5f62\u6210\u4e24\u808c\u7684\u9798\uff0c\u5411\u540e\u9644\u4e8e\u9879\u97e7\u5e26\u548c\u7b2c7 \u9888\u690e\u68d8\u7a81\uff0c\u5f62\u6210\u5b8c\u6574\u7684\u5c01\u5957\u7ed3\u6784\u3002\u5728\u820c\u9aa8\u4e0a\u90e8\uff0c\u6b64\u7b4b\u819c\u5206\u4e3a\u6d45\u6df1\u4e24\u5c42\uff0c\u5305\u88f9\u4e8c\u8179\u808c\u524d\u8179\u548c\u4e0b\u988c\u4e0b\u817a\uff1b\u5728\u9762\u540e\u90e8\uff0c\u6d45\u6df1\u4e24\u5c42\u5305\u88f9\u816e\u817a\u3002\u5728\u9888\u9759\u8109\u5207\u8ff9\u4e0a\u65b9\uff0c\u4e5f\u5206\u4e3a\u6d45\u6df1\u4e24\u5c42\uff0c\u5411\u4e0b\u5206\u522b\u9644\u7740\u4e8e\u9888\u9759\u8109\u5207\u8ff9\n\n\u56fe\u20052\u200a-\u200a7\u2003 \u9888\u7b4b\u819c\u4e0e\u7b4b\u819c\u95f4\u9699\uff08\u6b63\u4e2d\u77e2\u72b6\u9762\uff09\n\n2. \u4e2d\u5c42\u2003 \u53c8\u79f0\u810f\u5668\u7b4b\u819cvisceral fascia\uff0c\u4f4d\u4e8e\u820c\u9aa8\u4e0b\u808c\u7fa4\u6df1\u9762\uff0c\u5305\u88f9\u7740\u54bd\u3001\u98df\u7ba1\u9888\u90e8\u3001\u5589\u3001\u6c14\u7ba1\u9888\u90e8\u3001\u7532\u72b6\u817a\u548c\u7532\u72b6\u65c1\u817a\u7b49\u5668\u5b98\uff0c\u5e76\u5f62\u6210\u7532\u72b6\u817a\u9798\u3002\u5728\u7532\u72b6\u817a\u4e0e\u6c14\u7ba1\u3001\u98df\u7ba1\u4e0a\u7aef\u90bb\u63a5\u5904\uff0c\u817a\u9798\u540e\u5c42\u589e\u539a\u5f62\u6210\u7532\u72b6\u817a\u60ac\u97e7\u5e26\u3002\u524d\u4e0b\u90e8\u8986\u76d6\u4e8e\u6c14\u7ba1\u8005\u79f0\u4e3a\u6c14\u7ba1\u524d\u7b4b\u819cpretracheal fascia\uff1b\u540e\u4e0a\u90e8\u8986\u76d6\u988a\u808c\u548c\u54bd\u7f29\u808c\u8005\u79f0\u4e3a\u988a\u54bd\u7b4b\u819cbuccopharyngeal fascia\uff1b\u5411\u4e24\u4fa7\u5305\u7ed5\u9888\u603b\u52a8\u8109\u3001\u9888\u5185\u52a8\u8109\u3001\u9888\u5185\u9759\u8109\u548c\u8ff7\u8d70\u795e\u7ecf\u7b49\u5f62\u6210\u9888\u52a8\u8109\u9798carotid sheath\u3002\u6c14\u7ba1\u524d\u7b4b\u819c\u5411\u4e0a\u9644\u4e8e\u73af\u72b6\u8f6f\u9aa8\u5f13\u3001\u7532\u72b6\u8f6f\u9aa8\u659c\u7ebf\u53ca\u820c\u9aa8\uff0c\u5411\u4e0b\u7ecf\u6c14\u7ba1\u524d\u65b9\u53ca\u4e24\u4fa7\u5165\u80f8\u8154\uff0c\u4e0e\u5fc3\u5305\u4e0a\u90e8\u76f8\u7eed\u3002\n3. \u6df1\u5c42\u2003 \u53c8\u79f0\u690e\u524d\u7b4b\u819cprevertebral fascia\uff0c\u4f4d\u4e8e\u9888\u6df1\u808c\u7fa4\u6d45\u9762\uff0c\u5411\u4e0a\u9644\u7740\u4e8e\u9885\u5e95\uff0c\u5411\u4e0b\u7eed\u4e8e\u524d\u7eb5\u97e7\u5e26\u53ca\u80f8\u5185\u7b4b\u819c\uff0c\u4e24\u4fa7\u8986\u76d6\u81c2\u4e1b\u3001\u9888\u4ea4\u611f\u5e72\u3001\u8188\u795e\u7ecf\u3001\u9501\u9aa8\u4e0b\u52a8\u8109\u53ca\u9501\u9aa8\u4e0b\u9759\u8109\u3002\u6b64\u7b4b\u819c\u5411\u4e0b\u5916\u65b9\uff0c\u7531\u659c\u89d2\u808c\u95f4\u9699\u5f00\u59cb\u5305\u88f9\u9501\u9aa8\u4e0b\u52a8\u8109\u3001\u9501\u9aa8\u4e0b\u9759\u8109\u53ca\u81c2\u4e1b\uff0c\u5e76\u5411\u814b\u7a9d\u8d70\u884c\uff0c\u5f62\u6210\u814b\u9798\u3002\n\n\uff08\u4e8c\uff09\u2002 \u9888\u7b4b\u819c\u95f4\u9699\n\n1. \u80f8\u9aa8\u4e0a\u95f4\u9699suprasternal space \u5c01\u5957\u7b4b\u819c\u5728\u8ddd\u80f8\u9aa8\u67c4\u4e0a\u7f183 ~ 4cm \u5904\u5206\u4e3a\u6d45\u6df1\u4e24\u5c42\uff0c\u5411\u4e0b\u5206\u522b\u9644\u4e8e\u80f8\u9aa8\u67c4\u524d\u3001\u540e\u7f18\uff0c\u4e24\u5c42\u4e4b\u95f4\u4e3a\u80f8\u9aa8\u4e0a\u95f4\u9699\u3002\u5185\u6709\u9888\u9759\u8109\u5f13\u3001\u9888\u524d\u9759\u8109\u4e0b\u6bb5\u3001\u80f8\u9501\u4e73\u7a81\u808c\u80f8\u9aa8\u5934\u3001\u6dcb\u5df4\u7ed3\u53ca\u8102\u80aa\u7ec4\u7ec7\u7b49\u3002\n2. \u6c14\u7ba1\u524d\u95f4\u9699pretracheal space \u4f4d\u4e8e\u6c14\u7ba1\u524d\u7b4b\u819c\u4e0e\u6c14\u7ba1\u9888\u90e8\u4e4b\u95f4\u3002\u5185\u6709\u7532\u72b6\u817a\u6700\u4e0b\u52a8\u8109\u3001\u7532\u72b6\u817a\u4e0b\u9759\u8109\u548c\u7532\u72b6\u817a\u5947\u9759\u8109\u4e1b\u7b49\u3002\u5c0f\u513f\u8fd8\u6709\u80f8\u817a\u4e0a\u90e8\u3001\u5de6\u5934\u81c2\u9759\u8109\u548c\u4e3b\u52a8\u8109\u5f13\u7b49\u3002\n3. \u54bd\u540e\u95f4\u9699retropharyngeal space \u4f4d\u4e8e\u690e\u524d\u7b4b\u819c\u4e0e\u988a\u54bd\u7b4b\u819c\u4e4b\u95f4\uff0c\u5176\u5ef6\u4f38\u81f3\u54bd\u5916\u4fa7\u58c1\u7684\u90e8\u5206\u4e3a4.\u2002 \u690e\u524d\u95f4\u9699prevertebral space \u4f4d\u4e8e\u9888\u690e\u3001\u9888\u6df1\u808c\u7fa4\u4e0e\u690e\u524d\u7b4b\u819c\u4e4b\u95f4\u3002\u9888\u690e\u7ed3\u6838\u8113\u80bf\u591a\u79ef\u4e8e\u6b64\u95f4\u9699\uff0c\u5e76\u7ecf\u814b\u9798\u6269\u6563\u81f3\u814b\u7a9d\u3002\u5f53\u8113\u80bf\u6e83\u7834\u540e\uff0c\u53ef\u7ecf\u54bd\u540e\u95f4\u9699\u5411\u4e0b\u81f3\u540e\u7eb5\u9694\uff08\u56fe 2 - 6\uff0c\u56fe 2 - 7\uff09\u3002\n\n\u7b2c\u4e09\u8282\u2002 |\u2002 \u9888\u524d\u533a\n\n\u9888\u524d\u533a\u4ee5\u820c\u9aa8\u4e3a\u754c\u5206\u4e3a\u820c\u9aa8\u4e0a\u533a\u548c\u820c\u9aa8\u4e0b\u533a\u3002\n\n\u4e00\u3001\u2002 \u820c\u9aa8\u4e0a\u533a\n\n\u988f\u4e0b\u4e09\u89d2submental triang...\n\n---\n\n# \u75c5\u7406\u57fa\u7840\n\n\u672c\u7ae0\u6db5\u76d6\u7ec6\u80de\u51cb\u4ea1\u3001DIC\u3001\u7ebf\u7c92\u4f53\u3001\u75c5\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66\u3001\u75c5\u56e0\u7b49\u6838\u5fc3\u77e5\u8bc6\u70b9\uff0c\u6574\u5408\u81ea7\u672c\u6559\u6750\u76f8\u5173\u5185\u5bb9\u3002\n\n## \u6838\u5fc3\u6982\u5ff5\u4e0e\u5b9a\u4e49\n\n**\u7ec6\u80de\u51cb\u4ea1**\uff1a\u7ec6\u80de\u51cb\u4ea1\u5728HIV\u611f\u67d3\u4e2d\u5177\u6709\u6709\u9650\u7684\u4fdd\u62a4\u4f5c\u7528\uff0c\u53ef\u7ec8\u6b62\u75c5\u6bd2DNA\u590d\u5236\u548c\u8868\u8fbe\uff0c\u4f46\u4e0d\u8db3\u4ee5\u5f25\u8865\u5bf9\u514d\u75ab\u7cfb\u7edf\u7684\u6253\u51fb\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66\u3001\u4f20\u67d3\u75c5\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**DIC**\uff1aDIC \u4e0d\u662f\u4e00\u4e2a\u72ec\u7acb\u7684\u75be\u75c5\uff0c\u800c\u662f\u7ee7\u53d1\u4e8e\u591a\u79cd\u57fa\u7840\u75be\u75c5\uff0c\u7531\u611f\u67d3\u6027\u6216\u975e\u611f\u67d3\u6027\u56e0\u7d20\u5f15\u8d77\uff0c\u5e38\u89c1\u75c5\u56e0\u5305\u62ec\u4e25\u91cd\u611f\u67d3\u3001\u5e7f\u6cdb\u7ec4\u7ec7\u635f\u4f24\u3001\u6076\u6027\u80bf\u7624\u548c\u4ea7\u79d1\u610f\u5916\u7b49\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u7ebf\u7c92\u4f53**\uff1a\u91cd\u8981\u7684\u80de\u5185\u7ec6\u80de\u5668\uff0c\u5728\u80fd\u91cf\u4f9b\u5e94\u3001\u9499\u7a33\u6001\u3001\u51cb\u4ea1\u8c03\u8282\u3001\u547c\u5438\u94fe\u590d\u5408\u7269\u5408\u6210\u7b49\u591a\u79cd\u7ec6\u80de\u6d3b\u52a8\u4e2d\u53d1\u6325\u91cd\u8981\u4f5c\u7528\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u75c5\u7406\u5b66**\uff1a\u7814\u7a76\u548c\u660e\u786e\u75be\u75c5\u7684\u75c5\u56e0\u3001\u53d1\u75c5\u673a\u5236\u3001\u75c5\u7406\u53d8\u5316\u3001\u7ed3\u5c40\u548c\u8f6c\u5f52\u7684\u533b\u5b66\u5b66\u79d1\uff0c\u517c\u5177\u57fa\u7840\u533b\u5b66\u548c\u4e34\u5e8a\u533b\u5b66\u7684\u53cc\u91cd\u5b66\u79d1\u5c5e\u6027\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66\u3001\u75c5\u7406\u5b66\u3001\u4f20\u67d3\u75c5\u5b66*\n\n**\u75c5\u7406\u751f\u7406\u5b66**\uff1a\u7814\u7a76\u75be\u75c5\u53d1\u751f\u8fc7\u7a0b\u4e2d\u529f\u80fd\u3001\u4ee3\u8c22\u548c\u7ed3\u6784\u53d8\u5316\u7684\u5b66\u79d1\uff0c\u8d77\u6e90\u4e8e18\u4e16\u7eaa\uff0c19\u4e16\u7eaa\u5f62\u6210\u72ec\u7acb\u8bfe\u7a0b\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66  \u2190 \u524d\u7f6e\uff1a\u5b9e\u9a8c\u75c5\u7406\u5b66 \u2192 \u7ec6\u80de\u75c5\u7406\u5b66*\n\n**\u75c5\u56e0**\uff1a\u5f15\u8d77\u75be\u75c5\u5fc5\u4e0d\u53ef\u5c11\u7684\u3001\u5e76\u8d4b\u4e88\u75be\u75c5\u7279\u5f81\u6027\u6216\u51b3\u5b9a\u75be\u75c5\u7279\u5f02\u6027\u7684\u56e0\u7d20\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u80bf\u7624**\uff1a\u7ec6\u80de\u51cb\u4ea1\u4e0d\u8db3\u5bfc\u81f4\u7684\u6700\u5e38\u89c1\u75be\u75c5\uff0c\u5982p53\u57fa\u56e0\u7a81\u53d8\u5bfc\u81f4\u7ec6\u80de\u51cb\u4ea1\u51cf\u5f31\uff0c\u589e\u52a0\u975e\u5c0f\u7ec6\u80de\u80ba\u764c\u53d1\u751f\u7387\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u7ec6\u80de\u574f\u6b7b**\uff1a\u5c5e\u4e8e\u975e\u7a0b\u5e8f\u6027\u7ec6\u80de\u6b7b\u4ea1\uff0c\u56e0\u7ec6\u80de\u819c\u635f\u4f24\u7834\u88c2\u540e\u91ca\u653e\u7ec6\u80de\u5185\u86cb\u767d\u9176\u5f15\u8d77\u81ea\u6211\u6d88\u5316\u6240\u5e26\u6765\u7684\u7ec6\u80de\u5feb\u901f\u6b7b\u4ea1\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66  \u2190 \u524d\u7f6e\uff1a\u7ec6\u80de\u819c\u635f\u4f24*\n\n**p53**\uff1aDNA\u635f\u4f24\u68c0\u67e5\u70b9\u7684\u4e3b\u8981\u5206\u5b50\uff0c\u662f\u4eba\u7c7b\u6076\u6027\u80bf\u7624\u7a81\u53d8\u7387\u6700\u9ad8\u7684\u57fa\u56e0\uff0c\u7f3a\u5931\u53ef\u5bfc\u81f4\u67d3\u8272\u4f53\u5f02\u5e38\u548c\u80bf\u7624\u8fdb\u5c55\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u4f4e\u9541\u8840\u75c7**\uff1a\u8840\u6e05\u9541\u6d53\u5ea6\u4f4e\u4e8e0.75mmol/L\u7684\u75c5\u7406\u72b6\u6001\uff0c\u53c8\u79f0hypomagnesemia\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u5206\u5b50\u75c5\u7406\u5b66**\uff1a\u75c5\u7406\u5b66\u5206\u652f\u5b66\u79d1\uff0c\u7531\u5206\u5b50\u751f\u7269\u5b66\u7b49\u7406\u8bba\u4e0e\u6280\u672f\u6e17\u900f\u5f62\u6210\uff0c\u4f7f\u75be\u75c5\u7814\u7a76\u6df1\u5165\u5230\u5206\u5b50\u6c34\u5e73\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66  \u2190 \u524d\u7f6e\uff1a\u8d85\u5fae\u7ed3\u6784\u75c5\u7406\u5b66*\n\n**\u7ebf\u7c92\u4f53\u635f\u4f24**\uff1a\u7ebf\u7c92\u4f53\u53d1\u751f\u80bf\u80c0\u3001\u7a7a\u6ce1\u5316\u3001\u5d74\u53d8\u77ed\u7a00\u758f\u751a\u81f3\u6d88\u5931\uff0c\u57fa\u8d28\u5185\u51fa\u73b0\u542b\u9499\u65e0\u5b9a\u5f62\u81f4\u5bc6\u4f53\uff0cATP\u751f\u6210\u4e0b\u964d\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66  \u2190 \u524d\u7f6e\uff1a\u9499\u8d85\u8f7d*\n\n**\u9499\u8d85\u8f7d**\uff1a\u7ec6\u80de\u5185Ca2+\u8fc7\u591a\uff0c\u6fc0\u6d3b\u9499\u4f9d\u8d56\u86cb\u767d\u9176\uff0c\u635f\u4f24\u7ebf\u7c92\u4f53\uff0c\u6291\u5236ATP\u5408\u6210\uff0c\u8bf1\u53d1\u7ec6\u80de\u6b7b\u4ea1\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**AIDS**\uff1a\u83b7\u5f97\u6027\u514d\u75ab\u7f3a\u9677\u7efc\u5408\u5f81\uff0c\u7531HIV\u611f\u67d3\u5f15\u8d77\uff0c\u8868\u73b0\u4e3a\u4e25\u91cd\u514d\u75ab\u7f3a\u9677\u548c\u591a\u79cd\u673a\u4f1a\u6027\u611f\u67d3\u4e0e\u80bf\u7624\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u840e\u7f29**\uff1a\u5df2\u53d1\u80b2\u6b63\u5e38\u7684\u7ec6\u80de\u3001\u7ec4\u7ec7\u6216\u5668\u5b98\u7684\u4f53\u79ef\u7f29\u5c0f\uff0c\u53ef\u4f34\u6709\u5b9e\u8d28\u7ec6\u80de\u6570\u91cf\u51cf\u5c11\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66*\n\n**SASP**\uff1a\u8870\u8001\u76f8\u5173\u5206\u6ccc\u8868\u578b\uff0c\u5305\u62ec\u8d8b\u5316\u56e0\u5b50\u3001\u5f39\u6027\u86cb\u767d\u9176\u548c\u57fa\u8d28\u91d1\u5c5e\u86cb\u767d\u9176\u7b49\uff0c\u53ef\u4fc3\u8fdb\u708e\u75c7\u548c\u6591\u5757\u4e0d\u7a33\u5b9a\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u574f\u6b7b\u6027\u51cb\u4ea1**\uff1a\u4e00\u79cd\u7c7b\u4f3c\u4e8e\u7ec6\u80de\u574f\u6b7b\u7684\u7a0b\u5e8f\u6027\u708e\u6027\u7ec6\u80de\u6b7b\u4ea1\u5f62\u5f0f\uff0c\u7531\u6b7b\u4ea1\u53d7\u4f53\u4ecb\u5bfc\u3001\u7ec6\u80de\u5185\u4fe1\u53f7\u56e0\u5b50\u4e25\u5bc6\u8c03\u63a7\u7684\u4e3b\u52a8\u6b7b\u4ea1\u8fc7\u7a0b\u3002\n*\u6765\u6e90\uff1a\u533b\u5b66\u5fae\u751f\u7269\u5b66\u3001\u75c5\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u52a8\u7269\u5b9e\u9a8c**\uff1a\u8fd0\u7528\u52a8\u7269\u5b9e\u9a8c\u7684\u65b9\u6cd5\uff0c\u5728\u9002\u5b9c\u52a8\u7269\u8eab\u4e0a\u590d\u5236\u51fa\u67d0\u4e9b\u4eba\u7c7b\u75be\u75c5\u7684\u52a8\u7269\u6a21\u578b\uff0c\u4ee5\u7814\u7a76\u75be\u75c5\u7684\u75c5\u56e0\u5b66\u3001\u53d1\u75c5\u5b66\u3001\u75c5\u7406\u53d8\u5316\u53ca\u8f6c\u5f52\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66\u3001\u75c5\u7406\u5b66*\n\n**\u8d8b\u5316\u56e0\u5b50**\uff1a\u8870\u8001\u76f8\u5173\u5206\u6ccc\u8868\u578b\u4e2d\u5206\u6ccc\u7684\u53ef\u6eb6\u6027\u56e0\u5b50\u4e4b\u4e00\uff0c\u53c2\u4e0e\u708e\u75c7\u53cd\u5e94\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u5b9e\u9a8c\u75c5\u7406\u5b66**\uff1a\u75c5\u7406\u751f\u7406\u5b66\u7684\u524d\u8eab\uff0c\u5229\u7528\u52a8\u7269\u590d\u5236\u4eba\u7c7b\u75be\u75c5\u6a21\u578b\uff0c\u7814\u7a76\u75be\u75c5\u53d1\u751f\u8fc7\u7a0b\u4e2d\u529f\u80fd\u3001\u4ee3\u8c22\u548c\u7ed3\u6784\u7684\u53d8\u5316\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u7ec6\u80de\u75c5\u7406\u5b66**\uff1a\u7531Virchow\u521b\u7acb\uff0c\u5e94\u7528\u5149\u5b66\u663e\u5fae\u955c\u7814\u7a76\u6b63\u5e38\u548c\u75c5\u53d8\u7ec6\u80de\u7684\u5f62\u6001\u53d8\u5316\uff0c\u5176\u7406\u8bba\u548c\u6280\u672f\u81f3\u4eca\u5f71\u54cd\u533b\u5b66\u79d1\u5b66\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66  \u2190 \u524d\u7f6e\uff1a\u5668\u5b98\u75c5\u7406\u5b66*\n\n**ROS**\uff1a\u7ec6\u80de\u5185\u751f\u6210\u7684\u6d3b\u6027\u6c27\uff0c\u6b63\u5e38\u65f6\u88ab\u6297\u6c27\u5316\u5242\u6e05\u9664\uff0c\u589e\u591a\u65f6\u901a\u8fc7\u591a\u4e2a\u9776\u70b9\u635f\u4f24\u7ec6\u80de\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u80a5\u5927**\uff1a\u7531\u4e8e\u529f\u80fd\u589e\u52a0\u3001\u5408\u6210\u4ee3\u8c22\u65fa\u76db\uff0c\u7ec6\u80de\u3001\u7ec4\u7ec7\u6216\u5668\u5b98\u4f53\u79ef\u589e\u5927\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66*\n\n**\u5316\u751f**\uff1a\u4e00\u79cd\u5df2\u5206\u5316\u7ec4\u7ec7\u8f6c\u53d8\u4e3a\u53e6\u4e00\u79cd\u5206\u5316\u7ec4\u7ec7\u7684\u8fc7\u7a0b\uff0c\u5229\u5f0a\u517c\u6709\uff0c\u67d0\u4 u3001\u795e\u7ecf\u708e\u75c7\u7b49\u5168\u8eab\u75c7\u72b6\u53ca\u5c40\u90e8\u75c5\u7406\u8868\u578b\uff0c\u4e5f\u79f0\u708e\u6027\u8870\u8001\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66  \u2190 \u524d\u7f6e\uff1a\u708e\u75c7*\n\n**\u708e\u6027\u8870\u8001**\uff1a\u4e0e\u8870\u8001\u76f8\u5173\u7684\u6162\u6027\u4f4e\u5ea6\u708e\u75c7\u72b6\u6001\uff0c\u7531\u514d\u75ab\u529f\u80fd\u4e0b\u964d\u3001DNA\u635f\u4f24\u7b49\u591a\u79cd\u4fc3\u8870\u8001\u673a\u5236\u5171\u540c\u4f5c\u7528\u5bfc\u81f4\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u75c5\u7406\u6027\u6297\u51dd\u7269\u8d28**\uff1a\u5faa\u73af\u4e2d\u51fa\u73b0\u7684\u83b7\u5f97\u6027\u6297\u51dd\u7269\u8d28\uff0c\u5305\u62ec\u6297\u51dd\u8840\u56e0\u5b50\u6297\u4f53\u3001\u809d\u7d20\u6837\u6297\u51dd\u7269\u8d28\u548cF(g)DP\u7b49\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u5411\u5fc3\u6027\u80a5\u5927**\uff1a\u5411\u5fc3\u6027\u80a5\u5927\u662f\u5fc3\u808c\u7ec6\u80de\u808c\u8282\u5e76\u8054\u6027\u589e\u751f\u3001\u5fc3\u808c\u7ec6\u80de\u589e\u7c97\uff0c\u5fc3\u5ba4\u58c1\u663e\u8457\u589e\u539a\u800c\u5fc3\u8154\u5bb9\u79ef\u6b63\u5e38\u6216\u51cf\u5c0f\u7684\u80a5\u5927\u7c7b\u578b\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n## \u539f\u6587\u7cbe\u8bfb\n\n### \u7ec6\u80de\u51cb\u4ea1 \u2014 \u9009\u81ea\u300a\u75c5\u7406\u5b66\u300b\n\n...nnervation\uff09\uff1a\u56e0\u8fd0\u52a8\u795e\u7ecf\u5143\u6216\u8f74\u7a81\u635f\u5bb3\u5f15\u8d77\u6548\u5e94\u5668\u840e\u7f29\uff0c\u5982\u8111\u6216\u810a\u9ad3\u795e\u7ecf\u635f\u4f24\u53ef\u81f4\u808c\u8089\u840e\u7f29\u3002\u5176\u673a\u5236\u662f\u795e\u7ecf\u5bf9\u808c\u8089\u7684\u8fd0\u52a8\u8c03\u8282\u4e27\u5931\uff0c\u52a0\u4e4b\u6d3b\u52a8\u51cf\u5c11\u548c\u9aa8\u9abc\u808c\u7ec6\u80de\u5206\u89e3\u4ee3\u8c22\u52a0\u901f\u3002\n\n\uff085\uff09\u2002 \u5185\u5206\u6ccc\u6027\u840e\u7f29\uff08atrophy due to loss of endocrine stimulation\uff09\uff1a\u5185\u5206\u6ccc\u817a\u529f\u80fd\u4e0b\u964d\u5f15\u8d77\u9776\u5668\u5b98\u7ec6\u80de\u840e\u7f29\uff0c\u5982\u4e0b\u4e18\u8111- \u817a\u5782\u4f53\u7f3a\u8840\u574f\u6b7b\u7b49\uff0c\u53ef\u5f15\u8d77\u4fc3\u80be\u4e0a\u817a\u76ae\u8d28\u6fc0\u7d20\u91ca\u653e\u51cf\u5c11\uff0c\u5bfc\u81f4\u80be\u4e0a\u817a\u76ae\u8d28\u840e\u7f29\uff1b\u5782\u4f53\u524d\u53f6\u529f\u80fd\u51cf\u9000\u65f6\uff0c\u7532\u72b6\u817a\u3001\u80be\u4e0a\u817a\u548c\u6027\u817a\u7b49\u90fd\u53ef\u840e\u7f29\u3002\u6b64\u5916\uff0c\u80bf\u7624\u7ec6\u80de\u4e5f\u4f1a\u53d1\u751f\u840e\u7f29\uff0c\u5982\u7ed9\u4e88\u96cc\u6fc0\u7d20\u6cbb\u7597\uff0c\u524d\u5217\u817a\u764c\u7ec6\u80de\u53ef\u4ee5\u840e\u7f29\u3002\n\n\uff086\uff09\u2002 \u8001\u5316\u548c\u635f\u4f24\u6027\u840e\u7f29\uff08atrophy due to aging and injury\uff09\uff1a\u795e\u7ecf\u7ec6\u80de\u548c\u5fc3\u808c\u7ec6\u80de\u7684\u840e\u7f29\uff0c\u662f\u5927\u8111\u548c\u5fc3\u810f\u53d1\u751f\u8001\u5316\u7684\u4e3b\u8981\u6539\u53d8\u3002\u6b64\u5916\uff0c\u75c5\u6bd2\u548c\u7ec6\u83cc\u5f15\u8d77\u7684\u6162\u6027\u708e\u75c7\uff0c\u4e5f\u662f\u7ec6\u80de\u3001\u7ec4\u7ec7\u6216\u5668\u5b98\u840e\u7f29\u7684\u5e38\u89c1\u539f\u56e0\uff0c\u5982\u6162\u6027\u80c3\u708e\u65f6\u80c3\u9ecf\u819c\u840e\u7f29\u548c\u6162\u6027\u80a0\u708e\u65f6\u5c0f\u80a0\u9ecf\u819c\u7ed2\u6bdb\u840e\u7f29\u3002\u7ec6\u80de\u51cb\u4ea1\u4e5f\u53ef\u5f15\u8d77\u7ec4\u7ec7\u3001\u5668\u5b98\u840e\u7f29\uff0c\u5982\u963f\u5c14\u8328\u6d77\u9ed8\u75c5\uff08Alzheimer disease\uff0cAD\uff09\u7684\u5927\u8111\u840e\u7f29\uff0c\u5c31\u662f\u5927\u91cf\u795e\u7ecf\u7ec6\u80de\u51cb\u4ea1\u6240\u81f4\u3002\n\n\u4e34\u5e8a\u4e0a\uff0c\u67d0\u79cd\u840e\u7f29\u53ef\u7531\u591a\u79cd\u56e0\u7d20\u6240\u81f4\u3002\u5982\u9aa8\u6298\u540e\u808c\u8089\u7684\u840e\u7f29\uff0c\u5c31\u53ef\u80fd\u662f\u795e\u7ecf\u6027\u3001\u8425\u517b\u6027\u3001\u5931\u7528\u6027\uff0c\u751a\u81f3\u662f\u538b\u8feb\u6027\uff08\u5728\u7528\u77f3\u818f\u56fa\u5b9a\u8fc7\u7d27\u65f6\uff09\u7b49\u8bf8\u56e0\u7d20\u5171\u540c\u4f5c\u7528\u7684\u7ed3\u679c\uff1b\u800c\u5fc3\u3001\u8111\u7b49\u7684\u8001\u5e74\u6027\u840e\u7f29\uff0c\u5219\u517c\u6709\u751f\u7406\u6027\u840e\u7f29\u548c\u75c5\u7406\u6027\u840e\u7f29\u6027\u8d28\u3002\n\n\uff08\u4e8c\uff09\u2002 \u840e\u7f29\u7684\u75c5\u7406\u53d8\u5316\n\n\u840e\u7f29\u7684\u7ec6\u80de\u3001\u7ec4\u7ec7\u548c\u5668\u5b98\u4f53\u79ef\u51cf\u5c0f\uff0c\u91cd\u91cf\u51cf\u8f7b\uff0c\u8272\u6cfd\u53d8\u6df1\u3002\u5fc3\u808c\u7ec6\u80de\u548c\u809d\u7ec6\u80de\u7b49\u840e\u7f29\u7ec6\u80de\u80de\u8d28\u5185\u53ef\u51fa\u73b0\u8102\u8910\u7d20\u9897\u7c92\u3002\u8102\u8910\u7d20\u662f\u7ec6\u80de\u5185\u672a\u88ab\u5f7b\u5e95\u6d88\u5316\u7684\u3001\u5bcc\u542b\u78f7\u8102\u7684\u819c\u5305\u88ab\u7684\u7ec6\u80de\u5668\u6b8b\u4f53\u3002\u840e\u7f29\u7ec6\u80de\u86cb\u767d\u8d28\u5408\u6210\u51cf\u5c11\u3001\u5206\u89e3\u589e\u52a0\uff0c\u7ec6\u80de\u5668\u5927\u91cf\u9000\u5316\u3002\u840e\u7f29\u7ec6\u80de\u3001\u7ec4\u7ec7\u548c\u5668\u5b98\u7684\u529f\u80fd\u5927\u591a\u4e0b\u964d\uff0c\u5e76\u901a\u8fc7\u51cf\u5c11\u7ec6\u80de\u4f53\u79ef\u3001\u6570\u91cf\u548c\u964d\u4f4e\u529f\u80fd\u4ee3\u8c22\uff0c\u4f7f\u4e4b\u4e0e\u8425\u517b\u3001\u6fc0\u7d20\u3001\u751f\u957f\u56e0\u5b50\u7684\u523a\u6fc0\u53ca\u795e\u7ecf\u9012\u8d28\u7684\u8c03\u8282\u4e4b\u95f4\u8fbe\u6210\u65b0\u7684\u5e73\u8861\u3002\u53bb\u9664\u75c5\u56e0\u540e\uff0c\u8f7b\u5ea6\u75c5\u7406\u6027\u840e\u7f29\u7684\u7ec6\u80de\u6709\u53ef\u80fd\u6062\u590d\u5e38\u6001\uff0c\u4f46\u6301\u7eed\u6027\u840e\u7f29\u7684\u7ec6\u80de\u6700\u7ec8\u53ef\u6b7b\u4ea1\uff08\u51cb\u4ea1\uff09\u3002\n\n\u4e8c\u3001\u2002 \u80a5\u5927\n\n\u7531\u4e8e\u529f\u80fd\u589e\u52a0\u3001\u5408\u6210\u4ee3\u8c22\u65fa\u76db\uff0c\u7ec6\u80de\u3001\u7ec4\u7ec7\u6216\u5668\u5b98\u4f53\u79ef\u589e\u5927\uff0c\u79f0\u4e3a\u80a5\u5927\uff08hypertrophy\uff09\u3002\u7ec4\u7ec7\u548c\u5668\u5b98\u7684\u80a5\u5927\u901a\u5e38\u662f\u7531\u5b9e\u8d28\u7ec6\u80de\u7684\u4f53\u79ef\u589e\u5927\u6240\u81f4\uff0c\u4f46\u4e5f\u53ef\u4f34\u6709\u5b9e\u8d28\u7ec6\u80de\u6570\u91cf\u7684\u589e\u52a0\u3002\n\n\u4f9d\u636e\u6027\u8d28\uff0c\u80a5\u5927\u53ef\u5206\u4e3a\u751f\u7406\u6027\u80a5\u5927\u548c\u75c5\u7406\u6027\u80a5\u5927\u4e24\u79cd\u3002\u4f9d\u636e\u539f\u56e0\uff0c\u80a5\u5927\u82e5\u7531\u5668\u5b98\u548c\u7ec4\u7ec7\u529f\u80fd\u8d1f\u8377\u8fc7\u91cd\u6240\u81f4\uff0c\u79f0\u4e3a\u4ee3\u507f\u6027\u80a5\u5927\uff08compensatory hypertrophy\uff09\u6216\u529f\u80fd\u6027\u80a5\u5927\uff1b\u82e5\u7531\u5185\u5206\u6ccc\u6fc0\u7d20\u8fc7\u591a\u4f5c\u7528\u4e8e\u6548\u5e94\u5668\u6240\u81f4\uff0c\u79f0\u4e3a\u5185\u5206\u6ccc\u6027\u80a5\u5927\uff08endocrine hypertrophy\uff09\u6216\u6fc0\u7d20\u6027\u80a5\u5927\u3002\n\n\uff081\uff09\u2002 \u4ee3\u507f\u6027\u80a5\u5927\uff1a\u5982\u751f\u7406\u72b6\u6001\u4e0b\uff0c\u4e3e\u91cd\u8fd0\u52a8\u5458\u4e0a\u80a2\u9aa8\u9abc\u808c\u7684\u589e\u7c97\u80a5\u5927\u3002\u9700\u6c42\u65fa\u76db\u3001\u8d1f\u8377\u589e\u52a0\u662f\u6700\uff082\uff09\u2002 \u5185\u5206\u6ccc\u6027\u80a5\u5927\uff1a\u598a\u5a20\u671f\u7531\u4e8e\u96cc\u3001\u5b55\u6fc0\u7d20\u53ca\u5176\u53d7\u4f53\u4f5c\u7528\uff0c\u5b50\u5bab\u5e73\u6ed1\u808c\u7ec6\u80de\u80a5\u5927\uff0c\u540c\u65f6\u4f34\u7ec6\u80de\u6570\u91cf\u589e\u591a\uff0c\u5b50\u5bab\u4ece\u5e73\u65f6\u58c1\u539a0.4cm\u3001\u91cd\u91cf100g\uff0c\u53ef\u80a5\u5927\u81f3\u58c1\u539a5cm\u3001\u91cd\u91cf1\u2005000g\u3002\n\n\uff081\uff09\u2002 \u4ee3\u507f\u6027\u80a5\u5927\uff1a\u9ad8\u8840\u538b\u65f6\u5fc3\u810f\u540e\u8d1f\u8377\u589e...\n\n### DIC \u2014 \u9009\u81ea\u300a\u75c5\u7406\u751f\u7406\u5b66\u300b\n\n...4.\u2002 \u575a\u6301\u6559\u6750\u201c\u4e09\u57fa\u201d\u201c\u4e94\u6027\u201d\u7f16\u5199\u539f\u5219\u2003 \u6559\u6750\u7f16\u5199\u7acb\u8db3\u4e34\u5e8a\u533b\u5b66\u4e13\u4e1a\u4e94\u5e74\u5236\u672c\u79d1\u6559\u80b2\uff0c\u7262\u7262\u575a\u6301\u6559\u6750\u201c\u4e09\u57fa\u201d\uff08\u57fa\u7840\u7406\u8bba\u3001\u57fa\u672c\u77e5\u8bc6\u3001\u57fa\u672c\u6280\u80fd\uff09\u548c\u201c\u4e94\u6027\u201d\uff08\u601d\u60f3\u6027\u3001\u79d1\u5b66\u6027\u3001\u5148\u8fdb\u6027\u3001\u542f\u53d1\u6027\u3001\u9002\u7528\u6027\uff09\u7f16\u5199\u539f\u5219\u3002\u4e25\u683c\u63a7\u5236\u7eb8\u8d28\u6559\u6750\u7f16\u5199\u5b57\u6570\uff0c\u4e3b\u52a8\u54cd\u5e94\u5e7f\u5927\u5e08\u751f\u575a\u51b3\u53cd\u5bf9\u6559\u6750\u201c\u8d8a\u7f16\u8d8a\u539a\u201d\u7684\u5f3a\u70c8\u547c\u58f0\uff1b\u63d0\u5347\u5168\u5957\u6559\u6750\u5370\u5237\u8d28\u91cf\uff0c\u5728\u53cc\u8272\u5370\u5236\u57fa\u7840\u4e0a\uff0c\u5168\u5f69\u6559\u6750\u8c03\u6574\u7eb8\u5f20\u7c7b\u578b\uff0c\u4fbf\u4e8e\u4e66\u5199\u3001\u4e0d\u53cd\u5149\u3002\u52aa\u529b\u4e3a\u9662\u6821\u63d0\u4f9b\u6700\u4f18\u8d28\u7684\u5185\u5bb9\u3001\u6700\u51c6\u786e\u7684\u77e5\u8bc6\u3001\u6700\u751f\u52a8\u7684\u8f7d\u4f53\u3001\u6700\u6ee1\u610f\u7684\u4f53\u9a8c\u30025.\u2002 \u575a\u6301\u6559\u6750\u6570\u5b57\u8d4b\u80fd\u5f00\u8f9f\u65b0\u8d5b\u9053\u2003 \u4e3a\u4e86\u8fdb\u4e00\u6b65\u6ee1\u8db3\u6559\u80b2\u6570\u5b57\u5316\u9700\u6c42\uff0c\u5b9e\u73b0\u6559\u6750\u7cfb\u7edf\u5316\u3001\u7acb\u4f53\u5316\u5efa\u8bbe\uff0c\u540c\u6b65\u5efa\u8bbe\u4e86\u4e0e\u7eb8\u8d28\u6559\u6750\u914d\u5957\u7684\u7535\u5b50\u6559\u6750\u3001\u6570\u5b57\u8d44\u6e90\u53ca\u5728\u7ebf\u8bfe\u7a0b\u3002\u6570\u5b57\u8d44\u6e90\u5728\u5ef6\u7eed\u7b2c\u4e5d\u8f6e\u6559\u6750\u7684\u6559\u5b66\u8bfe\u4ef6\u3001\u6848\u4f8b\u3001\u89c6\u9891\u3001\u52a8\u753b\u3001\u82f1\u6587\u7d22\u5f15\u8bcd\u8bfb\u97f3\u3001AR \u4e92\u52a8\u7b49\u5185\u5bb9\u57fa\u7840\u4e0a\uff0c\u521b\u65b0\u63d0\u4f9b\u57fa\u4e8e\u865a\u62df\u73b0\u5b9e\u548c\u4eba\u5de5\u667a\u80fd\u7b49\u6280\u672f\u6253\u9020\u7684\u6570\u5b57\u4eba\u6848\u4f8b\u548c\u4e09\u7ef4\u6a21\u578b\uff0c\u5e76\u5728\u6559\u6750\u4e2d\u878d\u5165\u601d\u7ef4\u5bfc\u56fe\u3001\u76ee\u6807\u6d4b\u8bd5\u3001\u601d\u8003\u9898\u89e3\u9898\u601d\u8def\uff0c\u62d3\u5c55\u6570\u5b57\u5207\u7247\u3001DICOM \u7b49\u56fe\u50cf\u5185\u5bb9\u3002\u529b\u4e89\u4ee5\u6559\u6750\u7684\u6570\u5b57\u5316\u5f00\u53d1\u4e0e\u4f7f\u7528\uff0c\u5168\u65b9\u4f4d\u670d\u52a1\u9662\u6821\u6559\u5b66\uff0c\u6301\u7eed\u63a8\u52a8\u6559\u80b2\u6570\u5b57\u5316\u8f6c\u578b\u3002\n\n\u7b2c\u5341\u8f6e\u6559\u6750\u5171\u670956 \u79cd\uff0c\u5747\u4e3a\u56fd\u5bb6\u536b\u751f\u5065\u5eb7\u59d4\u5458\u4f1a\u201c\u5341\u56db\u4e94\u201d\u89c4\u5212\u6559\u6750\u3002\u5168\u5957\u6559\u6750\u5c06\u4e8e2024 \u5e74\u79cb\u5b63\u51fa\u7248\u53d1\u884c\uff0c\u6570\u5b57\u5185\u5bb9\u548c\u7535\u5b50\u6559\u6750\u4e5f\u5c06\u540c\u6b65\u4e0a\u7ebf\u3002\u5e0c\u671b\u5168\u56fd\u5e7f\u5927\u9662\u6821\u5728\u4f7f\u7528\u8fc7\u7a0b\u4e2d\u80fd\u591f\u591a\u63d0\u4f9b\u5b9d\u8d35\u610f\u89c1\uff0c\u53cd\u9988\u4f7f\u7528\u4fe1\u606f\uff0c\u4ee5\u9010\u6b65\u4fee\u6539\u548c\u5b8c\u5584\u6559\u6750\u5185\u5bb9\uff0c\u63d0\u9ad8\u6559\u6750\u8d28\u91cf\uff0c\u4e3a\u7b2c\u5341\u4e00\u8f6e\u6559\u6750\u7684\u4fee\u8ba2\u5de5\u4f5c\u5efa\u8a00\u732e\u7b56\u3002\n\n\u9648\u56fd\u5f3a\n\n\u7537\uff0c1963 \u5e7411 \u6708\u751f\u4e8e\u6e56\u5357\u7701\u3002\u6559\u6388\uff0c\u4e2d\u56fd\u79d1\u5b66\u9662\u9662\u58eb\u3002\u73b0\u4efb\u6d77\u5357\u533b\u79d1\u5927\u5b66\u6821\u957f\uff0c\u80bf\u7624\u7cfb\u7edf\u533b\u5b66\u5168\u56fd\u91cd\u70b9\u5b9e\u9a8c\u5ba4\u4e3b\u4efb\u3002\n\n\u4ece\u4e8b\u6559\u80b2\u5de5\u4f5c30 \u4f59\u5e74\uff0c\u66fe\u4e8e2010\u20142021 \u5e74\uff0c\u62c5\u4efb\u4e0a\u6d77\u4ea4\u901a\u5927\u5b66\u533b\u5b66\u9662\u9662\u957f\u3001\u4e0a\u6d77\u4ea4\u901a\u5927\u5b66\u526f\u6821\u957f\uff0c\u59cb\u7ec8\u9075\u5faa\u89c4\u5f8b\uff0c\u7387\u5148\u5782\u8303\uff0c\u79c9\u627f\u201c\u5343\u6559\u4e07\u6559\u6559\u4eba\u6c42\u771f\uff0c\u5343\u5b66\u4e07\u5b66\u5b66\u505a\u771f\u4eba\u201d\u7684\u7406\u5ff5\uff0c\u9510\u610f\u5b88\u6b63\u6539\u9769\uff0c\u81f4\u529b\u4e8e\u6709\u7075\u9b42\u7684\u5353\u8d8a\u533b\u5b66\u521b\u65b0\u4eba\u624d\u57f9\u517b\u5de5\u4f5c\uff0c\u52a9\u529b\u4e0a\u6d77\u4ea4\u901a\u5927\u5b66\u533b\u5b66\u9662\u5b9e\u73b0\u9ad8\u8d28\u91cf\u5feb\u901f\u53d1\u5c55\uff0c\u5e76\u4e3b\u7f16\u56fd\u5bb6\u7ea7\u89c4\u5212\u6559\u6750\u300a\u75be\u75c5\u5b66\u57fa\u7840\u300b\u300a\u80bf\u7624\u5b66\u300b\u548c\u300a\u75c5\u7406\u751f\u7406\u5b66\u300b\u7b49\u3002\u4f5c\u4e3a\u79d1\u6280\u5de5\u4f5c\u8005\uff0c\u591a\u6b21\u627f\u62c5\u56fd\u5bb6\u91cd\u5927\u79d1\u5b66\u7814\u7a76\u8ba1\u5212\u3001\u56fd\u5bb6\u81ea\u7136\u79d1\u5b66\u57fa\u91d1\u59d4\u5458\u4f1a\u91cd\u5927\u548c\u91cd\u70b9\u9879\u76ee\u53ca\u521b\u65b0\u7814\u7a76\u7fa4\u4f53\u9879\u76ee\uff0c\u5e26\u9886\u7814\u7a76\u56e2\u961f\uff0c\u81f4\u529b\u4e8e\u80bf\u7624\u75c5\u7406\u751f\u7406\u5b66\u57fa\u7840\u7814\u7a76\uff0c\u5728Cancer Cell, Cell Metabo, Nature, Nat Cell Biol, Nat Chem Biol, Blood \u7b49\u671f\u520a\u53d1\u8868\u8bba\u6587230 \u4f59\u7bc7\uff0c\u4ed6\u5f15\u8fd115 000 \u6b21, \u5e76\u5148\u540e\u591a\u6b21\u83b7\u56fd\u5bb6\u81ea\u7136\u79d1\u5b66\u5956\u4e8c\u7b49\u5956\u3001\u56fd\u5bb6\u79d1\u5b66\u6280\u672f\u8fdb\u6b65\u5956\u4e8c\u7b49\u5956\u3001\u4e0a\u6d77\u5e02\u81ea\u7136\u79d1\u5b66\u5956\u4e00\u7b49\u5956\u3001\u4e2d\u534e\u533b\u5b66\u79d1\u6280\u5956\u4e00\u7b49\u5956\u7b49\uff0c\u5e76\u83b7\u56fd\u5bb6\u6770\u51fa\u9752\u5e74\u79d1\u5b66\u57fa\u91d1\uff081997 \u5e74\uff09\u3001\u56fd\u5bb6\u9ad8\u5c42\u6b21\u4eba\u624d\u7279\u6b8a\u652f\u6301\u8ba1\u5212\uff08\u56fd\u5bb6\u201c\u4e07\u4eba\u8ba1\u5212\u201d\uff09\u9886\u519b\u4eba\u624d\u3001\u4e0a\u6d77\u201c\u5341\u5927\u6770\u51fa\u9752\u5e74\u201d\uff082002 \u5e74\uff09\u3001\u4e0a\u6d77\u5e02\u52b3\u52a8\u6a21\u8303\uff082004 \u5e74\uff09\u3001\u6559\u80b2\u90e8\u957f\u6c5f\u5b66\u8005\uff082005\u5e74\uff09\u3001\u5168\u56fd\u5148\u8fdb\u5de5\u4f5c\u8005\uff082005 \u5e74\uff09\u3001\u4f55\u6881\u4f55\u5229\u57fa\u91d1\u79d1\u5b66\u4e0e\u6280\u672f\u8fdb\u6b65\u5956\uff082012 \u5e74\uff09\u7b49\u8363\u8a89\u3002\n\n\u94b1\u777f\u54f2\n\n\u5973\uff0c1963 \u5e74...\n\n### \u7ebf\u7c92\u4f53 \u2014 \u9009\u81ea\u300a\u75c5\u7406\u5b66\u300b\n\n...\u91cd\u91cf1\u2005000g\u3002\n\n\uff081\uff09\u2002 \u4ee3\u507f\u6027\u80a5\u5927\uff1a\u9ad8\u8840\u538b\u65f6\u5fc3\u810f\u540e\u8d1f\u8377\u589e\u52a0\uff0c\u6216\u5de6\u5fc3\u5ba4\u90e8\u5206\u5fc3\u808c\u574f\u6b7b\u540e\u5065\u5eb7\u5fc3\u808c\u529f\u80fd\u4ee3\u507f\uff0c\u90fd\u53ef\u5f15\u8d77\u5de6\u5fc3\u5ba4\u5fc3\u808c\u7b49\u80a5\u5927\uff08\u56fe1-3\u3001\u56fe1-4\uff09\u3002\u5668\u5b98\u80a5\u5927\u4e5f\u53ef\u4ee5\u662f\u540c\u7c7b\u5668\u5b98\u7f3a\u5982\u6216\u529f\u80fd\u4e27\u5931\u540e\u7684\u53cd\u5e94\uff0c\u5982\u4e00\u4fa7\u80be\u810f\u5207\u9664\u6216\u4e00\u4fa7\u80be\u52a8\u8109\u95ed\u585e\u5931\u53bb\u80be\u529f\u80fd\uff0c\u5bf9\u4fa7\u80be\u810f\u901a\u8fc7\u80a5\u5927\u6765\u5b9e\u73b0\u4ee3\u507f\u3002\n\n\u56fe1-3\u2003 \u5fc3\u810f\u5411\u5fc3\u6027\u80a5\u5927\u5fc3\u810f\u6a2a\u65ad\u9762\uff0c\u793a\u5de6\u5fc3\u5ba4\u58c1\u53ca\u5ba4\u95f4\u9694\u589e\u539a\uff0c\u4e73\u5934\u808c\u663e\u8457\n\n\u56fe1-4\u2003 \u5fc3\u808c\u80a5\u5927\u90e8\u5206\u5fc3\u808c\u7ec6\u80de\u53d8\u7c97\uff0c\u7ec6\u80de\u6838\u4e0d\u89c4\u5219\u4e14\u6df1\u67d3\uff0c\u5448\u4ee3\u507f\u6027\u589e\u7c97\uff0c\u5de6\u5fc3\u5ba4\u8154\u76f8\u5bf9\u8f83\u5c0f\u3002\n\n\u80a5\u5927\u72b6\u6001\u3002\n\n\uff082\uff09\u2002 \u5185\u5206\u6ccc\u6027\u80a5\u5927\uff1a\u7532\u72b6\u817a\u529f\u80fd\u4ea2\u8fdb\u65f6\uff0c\u7532\u72b6\u817a\u7d20\u5206\u6ccc\u589e\u591a\uff0c\u5f15\u8d77\u7532\u72b6\u817a\u6ee4\u6ce1\u4e0a\u76ae\u7ec6\u80de\u80a5\u5927\uff1b\u5782\u4f53\u55dc\u78b1\u6027\u7ec6\u80de\u817a\u7624\u65f6\uff0c\u4fc3\u80be\u4e0a\u817a\u76ae\u8d28\u6fc0\u7d20\u5206\u6ccc\u589e\u591a\uff0c\u5bfc\u81f4\u80be\u4e0a\u817a\u76ae\u8d28\u7ec6\u80de\u80a5\u5927\u3002\n\n\uff08\u4e8c\uff09\u2002 \u80a5\u5927\u7684\u75c5\u7406\u53d8\u5316\n\n\u80a5\u5927\u7684\u7ec6\u80de\u4f53\u79ef\u589e\u5927\uff0c\u7ec6\u80de\u6838\u80a5\u5927\u6df1\u67d3\uff0c\u80a5\u5927\u7ec4\u7ec7\u4e0e\u5668\u5b98\u4f53\u79ef\u5747\u5300\u589e\u5927\u3002\u80a5\u5927\u7684\u7ec6\u80de\u5185\u8bb8\u591a\u7ec6\u80de\u539f\u764c\u57fa\u56e0\u6d3b\u5316\uff0c\u5bfc\u81f4\u8131\u6c27\u6838\u7cd6\u6838\u9178\uff08DNA\uff09\u542b\u91cf\u548c\u7ec6\u80de\u5668\uff08\u5982\u5fae\u4e1d\u3001\u7ebf\u7c92\u4f53\u3001\u5185\u8d28\u7f51\u3001\u9ad8\u5c14\u57fa\u590d\u5408\u4f53\u53ca\u6eb6\u9176\u4f53\u7b49\uff09\u6570\u91cf\u589e\u591a\uff0c\u7ed3\u6784\u86cb\u767d\u5408\u6210\u6d3b\u8dc3\uff0c\u7ec6\u80de\u529f\u80fd\u589e\u5f3a\u3002\u4f46\u7ec6\u80de\u80a5\u5927\u4ea7\u751f\u7684\u529f\u80fd\u4ee3\u507f\u4f5c\u7528\u662f\u6709\u9650\u5ea6\u7684\u3002\u5982\u5fc3\u808c\u8fc7\u5ea6\u80a5\u5927\u65f6\uff0c\u5fc3\u808c\u7ec6\u80de\u7684\u8840\u6db2\u4f9b\u5e94\u76f8\u5bf9\u7f3a\u4e4f\uff1b\u5fc3\u808c\u7ec6\u80de\u4e2d\u4ea7\u751f\u7684\u6b63\u5e38\u6536\u7f29\u86cb\u767d\uff0c\u4e5f\u4f1a\u56e0\u80da\u80ce\u6027\u57fa\u56e0\u7684\u6fc0\u6d3b\uff0c\u8f6c\u53d8\u4e3a\u4ea7\u751f\u6536\u7f29\u6548\u7387\u8f83\u5dee\u7684\u5e7c\u7a1a\u6536\u7f29\u86cb\u767d\uff1b\u90e8\u5206\u5fc3\u808c\u7ea4\u7ef4\u6536\u7f29\u6210\u5206\u751a\u81f3\u4f1a\u6eb6\u89e3\u548c\u6d88\u5931\uff0c\u5f62\u6210\u53ef\u9006\u6027\u635f\u4f24\uff1b\u6700\u7ec8\u5bfc\u81f4\u5fc3\u808c\u6574\u4f53\u8d1f\u8377\u8fc7\u91cd\uff0c\u8bf1\u53d1\u529f\u80fd\u4e0d\u5168\uff08\u5931\u4ee3\u507f\uff09\u3002\n\n\u67d0\u4e9b\u75c5\u7406\u60c5\u51b5\u4e0b\uff0c\u5728\u5b9e\u8d28\u7ec6\u80de\u840e\u7f29\u7684\u540c\u65f6\uff0c\u95f4\u8d28\u8102\u80aa\u7ec6\u80de\u5374\u53ef\u4ee5\u589e\u751f\uff0c\u4ee5\u7ef4\u6301\u7ec4\u7ec7\u3001\u5668\u5b98\u7684\u539f\u6709\u4f53\u79ef\uff0c\u751a\u81f3\u9020\u6210\u7ec4\u7ec7\u548c\u5668\u5b98\u7684\u4f53\u79ef\u589e\u5927\uff0c\u6b64\u65f6\u79f0\u4e3a\u5047\u6027\u80a5\u5927\u3002\n\n\u4e09\u3001\u2002 \u589e\u751f\n\n\u7ec6\u80de\u6709\u4e1d\u5206\u88c2\u6d3b\u8dc3\u800c\u81f4\u7ec4\u7ec7\u6216\u5668\u5b98\u5185\u7ec6\u80de\u6570\u76ee\u589e\u591a\u7684\u73b0\u8c61\uff0c\u79f0\u4e3a\u589e\u751f\uff08hyperplasia\uff09\uff0c\u5e38\u5bfc\u81f4\u7ec4\u7ec7\u6216\u5668\u5b98\u7684\u4f53\u79ef\u589e\u5927\u548c\u529f\u80fd\u6d3b\u8dc3\u3002\u589e\u751f\u591a\u7531\u7ec6\u80de\u53d7\u5230\u8fc7\u591a\u6fc0\u7d20\u523a\u6fc0\u4ee5\u53ca\u751f\u957f\u56e0\u5b50\u4e0e\u53d7\u4f53\u8fc7\u5ea6\u8868\u8fbe\u6240\u81f4\uff0c\u4e5f\u4e0e\u7ec6\u80de\u51cb\u4ea1\u88ab\u6291\u5236\u6709\u5173\uff0c\u901a\u5e38\u53d7\u5230\u589e\u6b96\u57fa\u56e0\u3001\u51cb\u4ea1\u57fa\u56e0\u3001\u6fc0\u7d20\u548c\u5404\u79cd\u80bd\u7c7b\u751f\u957f\u56e0\u5b50\u53ca\u5176\u53d7\u4f53\u7684\u7cbe\u7ec6\u8c03\u63a7\u3002\u589e\u751f\u6839\u636e\u6027\u8d28\uff0c\u53ef\u5206\u4e3a\u751f\u7406\u6027\u589e\u751f\u548c\u75c5\u7406\u6027\u589e\u751f\u4e24\u79cd\u3002\u6839\u636e\u5176\u539f\u56e0\uff0c\u53ef\u5206\u4e3a\u4ee3\u507f\u6027\u589e\u751f\uff08compen\u00ad satory hyperplasia\uff09 \u2009\uff08\u6216\u79f0\u529f\u80fd\u6027\u589e\u751f\uff09\u548c\u5185\u5206\u6ccc\u6027\u589e\u751f\uff08endocrine hyperplasia\uff09 \u2009\uff08\u6216\u79f0\u6fc0\u7d20\u6027\u589e\u751f\uff09\u4e24\u79cd\u3002\uff081\uff09\u2002 \u4ee3\u507f\u6027\u589e\u751f\uff1a\u5982\u90e8\u5206\u809d\u810f\u88ab\u5207\u9664\u540e\u6b8b\u5b58\u809d\u7ec6\u80de\u7684\u589e\u751f\uff1b\u9ad8\u6d77\u62d4\u5730\u533a\u7a7a\u6c14\u6c27\u542b\u91cf\u4f4e\uff0c\u673a\u4f53\u9aa8\u9ad3\u7ea2\u7ec6\u80de\u524d\u4f53\u7ec6\u80de\u548c\u5916\u5468\u8840\u7ea2\u7ec6\u80de\u4ee3\u507f\u589e\u591a\u3002\n\n\uff082\uff09\u2002 \u5185\u5206\u6ccc\u6027\u589e\u751f\uff1a\u5982\u6b63\u5e38\u5973\u6027\u9752\u6625\u671f\u4e73\u623f\u5c0f\u53f6\u817a\u4e0a\u76ae\u4ee5\u53ca\u6708\u7ecf\u5468\u671f\u4e2d\u5b50\u5bab\u5185\u819c\u817a\u4f53\u7684\u589e\u751f\u3002\n2.\u2002 \u75c5\u7406\u6027\u589e\u751f\n\n\uff081\uff09\u2002 \u4ee3\u507f\u6027\u589e\u751f\uff1a\u5728\u7ec4\u7ec7\u635f\u4f24\u540e\u7684\u521b\u4f24\u6108\u5408\u8fc7\u7a0b\u4e2d\uff0c\u6210\u7ea4\u7ef4\u7ec6\u80de\u548c\u6bdb\u7ec6\u8840\u7ba1\u5185\u76ae\u7ec6\u80de\u56e0\u53d7\u5230\u635f\u4f24\u5904\u589e\u591a\u7684\u751f\u957f\u56e0\u5b50\u523a\u6fc0\u800c\u53d1\u751f\u589e\u751f\uff1b\u6162\u6027\u708e\u75c7\u6216\u957f\u671f\u66b4\u9732\u4e8e\u7406\u5316\u56e0\u7d20\uff0c\u4e5f\u5e38\u5f15\u8d77\u7ec4\u7ec7\u7ec6\u80de\uff0c\u7279\u522b\u662f\u76ae\u80a4\u548c\u67d0\u4e9b\u810f\u5668\u88ab\u8986\u7ec6\u80de\u7684\u589e\u751f\u3002\n\n\uff082\uff09\u2002 \u5185\u5206\u6ccc\u6027\u589e\u751f\uff1a\u75c5\u7406\u6027\u589e\u751f\u6700\u5e38\u89c1\u7684\u539f\u56e0\u662f\u6fc0\u7d20\u8fc7\u591a\u6216\u751f\u957f\u56e0\u5b50\u8fc7\u591a\u3002\u5982\u96cc\u6fc0\u7d20\u7edd\u5bf9\u6216\u76f8\u5bf9\u589e\u52a0\uff0c\u4f1a...\n\n### \u75c5\u7406\u5b66 \u2014 \u9009\u81ea\u300a\u751f\u7406\u5b66\u300b\n\n...\u3001\u690d\u7269\u751f\u7406\u5b66\u3001\u4eba\u4f53\u751f\u7406\u5b66\u7b49\u3002\u6309\u7814\u7a76\u5bf9\u8c61\u6240\u5904\u7684\u73af\u5883\u72b6\u6001\u4e0d\u540c\uff0c\u53c8\u53ef\u5206\u4e3a\u592a\u7a7a\u751f\u7406\u5b66\u3001\u6f5c\u6c34\u751f\u7406\u5b66\u3001\u9ad8\u539f\u751f\u7406\u5b66\u7b49\u3002\u6309\u7814\u7a76\u7684\u5668\u5b98\u3001\u7cfb\u7edf\u6765\u5212\u5206\uff0c\u53c8\u4ea7\u751f\u4e86\u795e\u7ecf\u751f\u7406\u5b66\u3001\u5fc3\u8840\u7ba1\u751f\u7406\u5b66\u3001\u6d88\u5316\u751f\u7406\u5b66\u3001\u80be\u810f\u751f\u7406\u5b66\u7b49\u3002\u968f\u7740\u7814\u7a76\u624b\u6bb5\u7684\u4e0d\u65ad\u53d1\u5c55\u548c\u7814\u7a76\u5185\u5bb9\u7684\u4e0d\u65ad\u6df1\u5165\uff0c\u53c8\u6d3e\u751f\u51fa\u7535\u751f\u7406\u5b66\u3001\u751f\u7406\u5fc3\u7406\u5b66\u3001\u795e\u7ecf\u751f\u7269\u5b66\u548c\u795e\u7ecf\u79d1\u5b66\u7b49\u3002\n\n\u4e8c\u3001\u2002 \u751f\u7406\u5b66\u7684\u7814\u7a76\u4efb\u52a1\n\n\u4eba\u4f53\u751f\u7406\u5b66\uff08human physiology\uff09\u662f\u7814\u7a76\u4eba\u4f53\u529f\u80fd\u6d3b\u52a8\u53ca\u5176\u89c4\u5f8b\u7684\u79d1\u5b66\u3002\u4eba\u4f53\u662f\u4e00\u4e2a\u7ed3\u6784\u529f\u80fd\u6781\u5176\u590d\u6742\u7684\u7edf\u4e00\u6574\u4f53\uff0c\u5728\u4eba\u4f53\u751f\u7406\u5b66\u7684\u7814\u7a76\u4efb\u52a1\u4e2d\uff0c\u65e2\u8981\u7814\u7a76\u4eba\u4f53\u4e0d\u540c\u7ec6\u80de\u3001\u5668\u5b98\u3001\u7cfb\u7edf\u7684\u6b63\u5e38\u529f\u80fd\u6d3b\u52a8\u73b0\u8c61\u548c\u89c4\u5f8b\uff0c\u5e76\u9610\u660e\u5176\u5185\u5728\u673a\u5236\uff0c\u53c8\u8981\u7814\u7a76\u5728\u6574\u4f53\u6c34\u5e73\u4e0a\u5404\u7cfb\u7edf\u3001\u5668\u5b98\u3001\u7ec6\u80de\u4e43\u81f3\u5206\u5b50\u4e4b\u95f4\u7684\u76f8\u4e92\u8054\u7cfb\uff0c\u56e0\u4e3a\u751f\u547d\u6d3b\u52a8\u5b9e\u9645\u4e0a\u662f\u673a\u4f53\u5404\u4e2a\u7ec6\u80de\u4e43\u81f3\u751f\u7269\u5206\u5b50\u3001\u5668\u5b98\u3001\u7cfb\u7edf\u6240\u6709\u529f\u80fd\u6d3b\u52a8\u4e92\u76f8\u4f5c\u7528\u3001\u7edf\u4e00\u6574\u5408\u7684\u603b\u548c\u3002\u968f\u7740\u5206\u5b50\u751f\u7269\u5b66\u7814\u7a76\u7684\u4e0d\u65ad\u6df1\u5165\uff0c\u7ec6\u80de\u751f\u7406\u5b66\u7684\u7814\u7a76\u4e5f\u4e0d\u65ad\u5411\u7eb5\u6df1\u53d1\u5c55\u3002\u8f6c\u5316\u533b\u5b66\u7684\u95ee\u4e16\u4f7f\u751f\u7406\u5b66\u7684\u7814\u7a76\u4e0e\u751f\u7269\u5316\u5b66\u3001\u75c5\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66\u3001\u836f\u7406\u5b66\u548c\u5404\u4e34\u5e8a\u5b66\u79d1\u4ea7\u751f\u5bc6\u5207\u7684\u4e92\u76f8\u8054\u7cfb\u3002\u751f\u7406\u5b66\u4e5f\u4e0d\u65ad\u4ece\u7814\u7a76\u6b63\u5e38\u7684\u751f\u547d\u6d3b\u52a8\u89c4\u5f8b\u548c\u529f\u80fd\u6d3b\u52a8\u7684\u5185\u5728\u673a\u5236\uff0c\u8de8\u8d8a\u5230\u7814\u7a76\u8fd9\u79cd\u6d3b\u52a8\u4e0e\u75be\u75c5\u53d1\u751f\u53d1\u5c55\u3001\u6cbb\u7597\u5e72\u9884\u6548\u679c\u7684\u5185\u5728\u5173\u7cfb\uff0c\u6210\u4e3a\u5404\u4e34\u5e8a\u5b66\u79d1\u5f00\u5c55\u9884\u9632\u3001\u8bca\u65ad\u3001\u6cbb\u7597\u3001\u5eb7\u590d\u548c\u4e34\u5e8a\u79d1\u5b66\u7814\u7a76\u7684\u91cd\u8981\u57fa\u77f3\uff0c\u6210\u4e3a\u8fde\u63a5\u57fa\u7840\u548c\u4e34\u5e8a\u5b66\u79d1\u7684\u91cd\u8981\u6865\u6881\u5b66\u79d1\u3002\u73b0\u4ee3\u751f\u7406\u5b66\u7684\u7814\u7a76\u6280\u672f\u548c\u5b9e\u9a8c\u624b\u6bb5\u4e5f\u662f\u73b0\u4ee3\u533b\u5b66\u79d1\u5b66\u7814\u7a76\u4e2d\u6700\u4e3b\u8981\u7684\u65b9\u6cd5\u4e4b\u4e00\u3002\n\n\u4e09\u3001\u2002 \u751f\u7406\u5b66\u4e0e\u533b\u5b66\u7684\u5173\u7cfb\n\n\u751f\u7406\u5b66\u4e0e\u533b\u5b66\u6709\u7740\u5bc6\u5207\u7684\u8054\u7cfb\u3002\u6b63\u5e38\u7684\u751f\u7406\u529f\u80fd\u6d3b\u52a8\u662f\u7406\u89e3\u75be\u75c5\u72b6\u6001\u4e0b\u673a\u4f53\u529f\u80fd\u5f02\u5e38\u53d8\u5316\u7684\u57fa\u7840\u3002\u5728\u57fa\u7840\u533b\u5b66\u4e2d\uff0c\u75c5\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66\u3001\u836f\u7406\u5b66\u7684\u7814\u7a76\u90fd\u5efa\u7acb\u5728\u751f\u7406\u5b66\u7684\u7814\u7a76\u57fa\u7840\u4e0a\uff0c\u5982\u5bf9\u4e8e\u5f3a\u5fc3\u836f\u7269\u7684\u836f\u6548\u8bc4\u4ef7\uff0c\u5e38\u91c7\u7528\u6b63\u5e38\u5fc3\u529f\u80fd\u66f2\u7ebf\u4f5c\u4e3a\u53c2\u7167\u3002\u6b64\u5916\uff0c\u57fa\u7840\u533b\u5b66\u4e2d\u7684\u5f88\u591a\u7814\u7a76\u65b9\u6cd5\u4e5f\u662f\u4ece\u751f\u7406\u5b66\u7684\u7814\u7a76\u65b9\u6cd5\u53d1\u5c55\u800c\u6765\u7684\u3002\u5982\u5668\u5b98\u704c\u6d41\u3001\u7535\u751f\u7406\u6280\u672f\u7b49\u5747\u88ab\u5e7f\u6cdb\u5e94\u7528\u4e8e\u533b\u5b66\u76f8\u5173\u9886\u57df\u7684\u7814\u7a76\u4e2d\u3002\u5728\u4e34\u5e8a\u533b\u5b66\u4e2d\uff0c\u4eba\u4eec\u901a\u8fc7\u89c2\u5bdf\u3001\u4f53\u9a8c\u548c\u603b\u7ed3\u79ef\u7d2f\u4e86\u5f88\u591a\u5173\u4e8e\u4eba\u4f53\u6b63\u5e38\u529f\u80fd\u7684\u77e5\u8bc6\uff0c\u5e76\u5f62\u6210\u4e86\u4e00\u4e9b$\u751f\u7406\u5b66\u7684\u6982\u5ff5\u3002\u5982\u7f8e\u56fd\u5916\u79d1\u533b\u751f\u5a01\u5ec9\u00b7\u535a\u8499\u7279\uff08William Beaumont\uff09\u57281822 \u5e74\u901a\u8fc7\u89c2\u5bdf\u56e0\u730e\u67aa\u8d70\u706b\u5bfc$\u81f4\u80c3\u7618\u7684\u60a3\u8005\uff0c\u53d1\u73b0\u4e86\u80c3\u4f53\u8fd0\u52a8\u548c\u80c3\u9178\u5206\u6ccc\u89c4\u5f8b\u3002\u4e00\u4e9b\u57fa\u672c\u751f\u7406\u6d3b\u52a8\u7684\u53cd\u6620\uff0c\u5982\u4f53\u6e29\u3001\u5fc3\u7387\u3001\u547c\u5438\u548c\u8840\n\n\u6cbb\u7597\u3001\u5eb7\u590d\u7b49\u73af\u8282\u90fd\u79bb\u4e0d\u5f00\u751f\u7406\u5b66\u63d0\u4f9b\u7684\u6b63\u5e38\u5bf9\u7167\u3002\u540c\u6837\uff0c\u8ba4\u8bc6\u4e86\u4eba\u4f53\u6b63\u5e38\u751f\u7406\u529f\u80fd\u4e4b\u540e\uff0c\u4eba\u4eec\u4fbf\u53ef\u4ee5\u66f4\u597d\u5730\u8ba4\u8bc6\u75be\u75c5\u53d1\u5c55\u7684\u89c4\u5f8b\u548c\u75c5\u7406\u53d8\u5316\u7279\u70b9\uff0c\u4ece\u800c\u4fc3\u8fdb\u4e34\u5e8a\u8bca\u7597\u6c34\u5e73\u7684\u8fdb\u6b65\u3002\u5982\u5fc3\u7535\u751f\u7406\u7684\u7814\u7a76\u4fc3\u6210\u4e86\u7ecf\u5bfc\u7ba1\u5c04\u9891\u6d88\u878d\u6280\u672f\u5728\u6cbb\u7597\u5fc3\u5f8b\u5931\u5e38\u4e2d\u7684\u5e94\u7528\u3002\n\n\u7531\u6b64\u53ef\u89c1\uff0c\u751f\u7406\u5b66\u7684\u7814\u7a76\u4e3a\u73b0\u4ee3\u533b\u5b66\u63d0\u4f9b\u4e86\u91cd\u8981\u7684\u79d1\u5b66\u57fa\u7840\uff0c\u800c\u5bf9\u4e34\u5e8a\u6cbb\u7597\u548c\u75be\u75c5\u8fc7\u7a0b\u7684\u7814\u7a76\u53c8\u6709\u52a9\u4e8e\u6211\u4eec\u5bf9\u6b63\u5e38\u751f\u7406\u529f\u80fd\u7684\u7406\u89e3\u3002\u751f\u7406\u5b66\u548c\u533b\u5b66\u7684\u8fd9\u79cd\u8054\u7cfb\u5df2\u88ab\u793e\u4f1a\u5e7f\u6cdb\u8ba4\u53ef\uff0c\u8bfa\u8d1d\u5c14\u57fa\u91d1\u4f1a\u4e5f\u4e13\u95e8\u4e3a\u6b64\u8bbe\u7acb\u4e86\u8bfa\u8d1d\u5c14\u751f\u7406\u5b66\u6216\u533b\u5b66\u5956\uff0c\u8db3\u89c1\u751f\u7406\u5b66\u5728\u533b\u5b66\u9886\u57df\u4e2d\u7684\u91cd\u8981\u6027\u3002\n\n\u56db\u3001\u2002 \u751f\u7406\u5b66\u7684\u8ba4\u8bc6\u5c42\u6b21\n\n\u7ec6\u80de\uff08cell\uff09\u662f\u6784\u6210\u4eba\u4f53\u6700\u57fa\u672c\u7684\u7ed3\u6784\u548c\u529f\u80fd\u5355\u4f4d\uff0c\u5355\u7ec6\u80de\u751f\u7269\u4f53\u7684\u5168\u90e8\u751f\u547d\u6d3b\u52a8\u90fd\u53d1\u751f\u5728\u4e00\u4e2a\u7ec6...\n\n### \u75c5\u7406\u751f\u7406\u5b66 \u2014 \u9009\u81ea\u300a\u751f\u7406\u5b66\u300b\n\n...\u5458\u4f1a\u91cd\u5927\u7814\u7a76\u8ba1\u5212\u3001\u91cd\u5927\u9879\u76ee\u3001\u91cd\u70b9\u57fa\u91d1\uff0c\u79d1\u6280\u90e8973\u8ba1\u5212\u548c\u91cd\u5927\u7814\u7a76\u4e13\u9879\u7b49\u9879\u76ee\u7684\u8d44\u52a9\u3002\n\n\u6b66\u5b87\u660e\n\n\u5973\uff0c1971 \u5e747 \u6708\u751f\u4e8e\u6cb3\u5317\u7701\u90a2\u53f0\u5e02\u3002\u6cb3\u5317\u533b\u79d1\u5927\u5b66\u515a\u59d4\u5e38\u59d4\u3001\u526f\u6821\u957f\u3002\u6559\u6388\uff0c\u533b\u5b66\u535a\u58eb\uff0c\u535a\u58eb\u7814\u7a76\u751f\u5bfc\u5e08\uff0c\u5168\u56fd\u4f18\u79c0\u79d1\u6280\u5de5\u4f5c\u8005\u3002\u6559\u80b2\u90e8\u65b0\u4e16\u7eaa\u4f18\u79c0\u4eba\u624d\uff0c\u6559\u80b2\u90e8\u9ad8\u7b49\u5b66\u6821\u4e34\u5e8a\u5b9e\u8df5\u6559\u5b66\u6307\u5bfc\u5206\u59d4\u5458\u4f1a\u59d4\u5458\uff0c\u6559\u80b2\u90e8\u4e34\u5e8a\u533b\u5b66\u4e13\u4e1a\u8ba4\u8bc1\u5de5\u4f5c\u59d4\u5458\u4f1a\u59d4\u5458\u3002\u6559\u80b2\u90e8\u751f\u7406\u8bfe\u7a0b\u865a\u62df\u6559\u7814\u5ba4\u8d1f\u8d23\u4eba\uff0c\u56fd\u5bb6\u4e00\u6d41\u5728\u7ebf\u8bfe\u7a0b\u548c\u4e00\u6d41\u7ebf\u4e0a\u7ebf\u4e0b\u6df7\u5408\u8bfe\u7a0b\u201c\u751f\u7406\u5b66\u201d\u8d1f\u8d23\u4eba\u3002\u517c\u4efb\u6cb3\u5317\u7701\u751f\u7406\u79d1\u5b66\u4f1a\u7406\u4e8b\u957f\u3002\n\n\u4ece\u4e8b\u6559\u5b66\u5de5\u4f5c30 \u5e74\uff0c\u4e3b\u6301\u56fd\u5bb6\u81ea\u7136\u79d1\u5b66\u57fa\u91d1\u91cd\u5927\u7814\u7a76\u8ba1\u5212\u3001\u9762\u4e0a\u9879\u76ee\u7b4910 \u4f59\u9879\u8bfe\u9898\u3002\u53d1\u8868SCI \u8bba\u658750 \u4f59\u7bc7\u3002\u4e3b\u7f16\u3001\u526f\u4e3b\u7f16\u56fd\u5bb6\u7ea7\u89c4\u5212\u6559\u67505 \u90e8\u3002\u526f\u4e3b\u7f16\u6559\u6750\u83b7\u9996\u5c4a\u5168\u56fd\u6559\u6750\u5efa\u8bbe\u5956\u5168\u56fd\u4f18\u79c0\u6559\u6750\u4e00\u7b49\u5956\u3002\u83b7\u56fd\u5bb6\u7ea7\u6559\u5b66\u6210\u679c\u4e8c\u7b49\u59561 \u9879\u3001\u6cb3\u5317\u7701\u6559\u5b66\u6210\u679c\u4e00\u7b49\u59562 \u9879\u3002\n\n\u6731\u4f9d\u7eaf\n\n\u7537\uff0c1963 \u5e749 \u6708\u751f\u4e8e\u4e0a\u6d77\u5e02\u3002\u73b0\u4efb\u590d\u65e6\u5927\u5b66\u5c0f\u5206\u5b50\u6d3b\u6027\u7269\u8d28\u4e0a\u6d77\u5e02\u9ad8\u6821\u91cd\u70b9\u5b9e\u9a8c\u5ba4\u4e3b\u4efb\u3001\u751f\u7406\u4e0e\u75c5\u7406\u751f\u7406\u5b66\u7cfb\u4e3b\u4efb\u3002\n\n\u4ece\u4e8b\u6559\u5b66\u5de5\u4f5c\u81f3\u4eca29 \u5e74\u30022008 \u5e74\u83b7\u5f97\u56fd\u5bb6\u6770\u51fa\u9752\u5e74\u79d1\u5b66\u57fa\u91d1\u8d44\u52a9\uff0c2009 \u5e74\u53d7\u8058\u4e3a\u6559\u80b2\u90e8\u957f\u6c5f\u5b66\u8005\u7279\u8058\u6559\u6388\uff0c2013 \u5e74\u5165\u9009\u56fd\u5bb6\u767e\u5343\u4e07\u4eba\u624d\u5de5\u7a0b\uff0c\u5e76\u88ab\u6388\u4e88\u201c\u6709\u7a81\u51fa\u8d21\u732e\u7684\u4e2d\u9752\u5e74\u4e13\u5bb6\u201d\u8363\u8a89\u79f0\u53f7\u3002\u4e3b\u8981\u4ece\u4e8b\u5fc3\u8840\u7ba1\u75be\u75c5\u7684\u53d1\u75c5\u673a\u5236\u53ca\u6cbb\u7597\u65b0\u9014\u5f84\u7684\u7814\u7a76\uff0c\u5c24\u5176\u5bf9\u201c\u6c14\u4f53\u5206\u5b50\u786b\u5316\u6c22\u7684\u751f\u7406\u6548\u5e94\u53ca\u5176\u9776\u70b9\u8c03\u8282\u673a\u5236\u201d\u4f5c\u4e86\u7cfb\u7edf\u6df1\u5165\u7684\u7814\u7a76\u3002\u9886\u8854\u7684\u201c\u4e2d\u836f\u6765\u6e90\u5c0f\u5206\u5b50\u6d3b\u6027\u7269\u8d28\u7684\u57fa\u7840\u4e0e\u8f6c\u5316\u533b\u5b66\u201d\u7814\u7a76\u56e2\u961f\u4e24\u5ea6\u5165\u9009\u4e0a\u6d77\u5e02\u9ad8\u6c34\u5e73\u5730\u65b9\u9ad8\u6821\u521b\u65b0\u56e2\u961f\u3002\n\n\u6797\u9ed8\u541b\n\n\u7537\uff0c1964 \u5e743 \u6708\u751f\u4e8e\u798f\u5efa\u7701\u798f\u5dde\u5e02\u3002\u535a\u58eb\uff0c\u6559\u6388\uff0c\u535a\u58eb\u7814\u7a76\u751f\u5bfc\u5e08\uff0c\u73b0\u4efb\u798f\u5efa\u533b\u79d1\u5927\u5b66\u7814\u7a76\u751f\u9662\u9662\u957f\uff0c\u4e2d\u56fd\u751f\u7406\u5b66\u4f1a\u526f\u7406\u4e8b\u957f\uff0c\u4e2d\u56fd\u751f\u7406\u5b66\u4f1a\u6559\u80b2\u5de5\u4f5c\u59d4\u5458\u4f1a\u4e3b\u4efb\u59d4\u5458\uff0c\u300a\u751f\u7406\u5b66\u62a5\u300b\u5e38\u52a1\u7f16\u59d4\uff0c\u798f\u5efa\u7701\u9ad8\u6821\u91cd\u70b9\u5b9e\u9a8c\u5ba4\u4e3b\u4efb\u3001\u7701\u751f\u7406\u5b66\u79d1\u5b66\u4f1a\u540d\u8a89\u7406\u4e8b\u957f\u3002\n\n\u4ece\u4e8b\u751f\u7406\u5b66\u6559\u5b66\u5de5\u4f5c40 \u5e74\uff0c\u662f\u7701\u672c\u79d1\u751f\u7cbe\u54c1\u8bfe\u7a0b\u201c\u751f\u7406\u5b66\u201d\u548c\u7814\u7a76\u751f\u7cbe\u54c1\u8bfe\u7 5\u5bb9\u548c\u7535\u5b50\u6559\u6750\u4e5f\u5c06\u540c\u6b65\u4e0a\u7ebf\u3002\u5e0c\u671b\u5168\u56fd\u5e7f\u5927\u9662\u6821\u5728\u4f7f\u7528\u8fc7\u7a0b\u4e2d\u80fd\u591f\u591a\u63d0\u4f9b\u5b9d\u8d35\u610f\u89c1\uff0c\u53cd\u9988\u4f7f\u7528\u4fe1\u606f\uff0c\u4ee5\u9010\u6b65\u4fee\u6539\u548c\u5b8c\u5584\u6559\u6750\u5185\u5bb9\uff0c\u63d0\u9ad8\u6559\u6750\u8d28\u91cf\uff0c\u4e3a\u7b2c\u5341\u4e00\u8f6e\u6559\u6750\u7684\u4fee\u8ba2\u5de5\u4f5c\u5efa\u8a00\u732e\u7b56\u3002\n\n\u9648\u56fd\u5f3a\n\n\u7537\uff0c1963 \u5e7411 \u6708\u751f\u4e8e\u6e56\u5357\u7701\u3002\u6559\u6388\uff0c\u4e2d\u56fd\u79d1\u5b66\u9662\u9662\u58eb\u3002\u73b0\u4efb\u6d77\u5357\u533b\u79d1\u5927\u5b66\u6821\u957f\uff0c\u80bf\u7624\u7cfb\u7edf\u533b\u5b66\u5168\u56fd\u91cd\u70b9\u5b9e\u9a8c\u5ba4\u4e3b\u4efb\u3002\n\n\u4ece\u4e8b\u6559\u80b2\u5de5\u4f5c30 \u4f59\u5e74\uff0c\u66fe\u4e8e2010\u20142021 \u5e74\uff0c\u62c5\u4efb\u4e0a\u6d77\u4ea4\u901a\u5927\u5b66\u533b\u5b66\u9662\u9662\u957f\u3001\u4e0a\u6d77\u4ea4\u901a\u5927\u5b66\u526f\u6821\u957f\uff0c\u59cb\u7ec8\u9075\u5faa\u89c4\u5f8b\uff0c\u7387\u5148\u5782\u8303\uff0c\u79c9\u627f\u201c\u5343\u6559\u4e07\u6559\u6559\u4eba\u6c42\u771f\uff0c\u5343\u5b66\u4e07\u5b66\u5b66\u505a\u771f\u4eba\u201d\u7684\u7406\u5ff5\uff0c\u9510\u610f\u5b88\u6b63\u6539\u9769\uff0c\u81f4\u529b\u4e8e\u6709\u7075\u9b42\u7684\u5353\u8d8a\u533b\u5b66\u521b\u65b0\u4eba\u624d\u57f9\u517b\u5de5\u4f5c\uff0c\u52a9\u529b\u4e0a\u6d77\u4ea4\u901a\u5927\u5b66\u533b\u5b66\u9662\u5b9e\u73b0\u9ad8\u8d28\u91cf\u5feb\u901f\u53d1\u5c55\uff0c\u5e76\u4e3b\u7f16\u56fd\u5bb6\u7ea7\u89c4\u5212\u6559\u6750\u300a\u75be\u75c5\u5b66\u57fa\u7840\u300b\u300a\u80bf\u7624\u5b66\u300b\u548c\u300a\u75c5\u7406\u751f\u7406\u5b66\u300b\u7b49\u3002\u4f5c\u4e3a\u79d1\u6280\u5de5\u4f5c\u8005\uff0c\u591a\u6b21\u627f\u62c5\u56fd\u5bb6\u91cd\u5927\u79d1\u5b66\u7814\u7a76\u8ba1\u5212\u3001\u56fd\u5bb6\u81ea\u7136\u79d1\u5b66\u57fa\u91d1\u59d4\u5458\u4f1a\u91cd\u5927\u548c\u91cd\u70b9\u9879\u76ee\u53ca\u521b\u65b0\u7814\u7a76\u7fa4\u4f53\u9879\u76ee\uff0c\u5e26\u9886\u7814\u7a76\u56e2\u961f\uff0c\u81f4\u529b\u4e8e\u80bf\u7624\u75c5\u7406\u751f\u7406\u5b66\u57fa\u7840\u7814\u7a76\uff0c\u5728Cancer Cell, Cell Metabo, Nature, Nat Cell Biol, Nat Chem Biol, Blood \u7b49\u671f\u520a\u53d1\u8868\u8bba\u6587230 \u4f59\u7bc7\uff0c\u4ed6\u5f15\u8fd115 000 \u6b21, \u5e76\u5148\u540e\u591a\u6b21\u83b7\u56fd\u5bb6\u81ea\u7136\u79d1\u5b66\u5956\u4e8c\u7b49\u5956\u3001\u56fd\u5bb6\u79d1\u5b66\u6280\u672f\u8fdb\u6b65\u5956\u4e8c\u7b49\u5956\u3001\u4e0a\u6d77\u5e02\u81ea\u7136\u79d1\u5b66\u5956\u4e00\u7b49\u5956\u3001\u4e2d\u534e\u533b\u5b66\u79d1\u6280\u5956\u4e00\u7b49\u5956\u7b49\uff0c\u5e76\u83b7\u56fd\u5bb6\u6770\u51fa\u9752\u5e74\u79d1\u5b66\u57fa\u91d1\uff081997 \u5e74\uff09\u3001\u56fd\u5bb6\u9ad8\u5c42\u6b21\u4eba\u624d\u7279\u6b8a\u652f\u6301\u8ba1\u5212\uff08\u56fd\u5bb6\u201c\u4e07\u4eba\u8ba1\u5212\u201d\uff09\u9886\u519b\u4eba\u624d\u3001\u4e0a\u6d77\u201c\u5341\u5927\u6770\u51fa\u9752\u5e74\u201d\uff082002 \u5e74\uff09\u3001\u4e0a\u6d77\u5e02\u52b3\u52a8\u6a21\u8303\uff082004 \u5e74\uff09\u3001\u6559\u80b2\u90e8\u957f\u6c5f\u5b66\u8005\uff082005\u5e74\uff09\u3001\u5168\u56fd\u5148\u8fdb\u5de5\u4f5c\u8005\uff082005 \u5e74\uff09\u3001\u4f55\u6881\u4f55\u5229\u57fa\u91d1\u79d1\u5b66\u4e0e\u6280\u672f\u8fdb\u6b65\u5956\uff082012 \u5e74\uff09\u7b49\u8363\u8a89\u3002\n\n\u94b1\u777f\u54f2\n\n\u5973\uff0c1963 \u5e749 \u6708\u751f\u4e8e\u4e0a\u6d77\u5e02\u3002\u6559\u6388\uff0c\u535a\u58eb\u7814\u7a76\u751f\u5bfc\u5e08\uff0c\u73b0\u4efb\u590d\u65e6\u5927\u5b66\u533b\u5b66\u6559\u80b2\u7814\u7a76\u6240\u526f\u6240\u957f\u3001\u57fa\u7840\u533b\u5b66\u56fd\u5bb6\u7ea7\u5b9e\u9a8c\u6559\u5b66\u793a\u8303\u4e2d\u5fc3\u4e3b\u4efb\uff1b\u4e9a\u592a\u5065\u5eb7\u79d1\u5b66PBL \u534f\u4f1a\u524d\u4efb\u4e3b\u5e2d\u3001\u4e2d\u56fd\u9ad8\u7b49\u6559\u80b2\u5b66\u4f1a\u533b\u5b66\u6559\u80b2\u4e13\u4e1a\u59d4\u5458\u4f1a\u57fa\u7840\u533b\u5b66\u5206\u4f1a\u526f\u7406\u4e8b\u957f\u3001\u4e2d\u56fd\u533b\u5b66\u6574\u5408\u5f0f\u8bfe\u7a0b\u8054\u76df\u526f\u7406\u4e8b\u957f\u3001\u201c\u5341\u4e8c\u4e94\u201d\u201c\u5341\u4e09\u4e94\u201d\u89c4\u5212\u6559\u6750\u5efa\u8bbe\u4e13\u5bb6\u6307\u5bfc\u59d4\u5458\u4f1a\u59d4\u5458\u3001\u5168\u56fd\u9ad8\u7b49\u9662\u6821\u533b\u5b66\u6559\u80b2\u7814\u7a76\u8054\u76df\u5e38\u52a1\u7406\u4e8b\u3001\u5168\u56fd\u533b\u5b66\u9662\u6821\u6559\u5e08\u6559\u5b66\u53d1\u5c55\u8054\u76df\u5e38\u52a1\u7406\u4e8b\u3001\u6559\u80b2\u90e8\u4e34\u5e8a\u533b\u5b66\u4e13\u4e1a\u8ba4\u8bc1\u4e13\u5bb6\u7b49\u3002\u6bd5\u4e1a\u4e8e\u4e0a\u6d77\u533b\u79d1\u5927\u5b66\u533b\u5b66\u7cfb\u4e34\u5e8a\u533b\u5b66\u4e13\u4e1a\uff0c\u65e5\u672c\u662d\u548c\u5927\u5b66\u533b\u5b66\u535a\u58eb\u3002\n\n\u4ece\u4e8b\u6559\u5b66\u5de5\u4f5c3...\n\n### \u7ec6\u80de\u574f\u6b7b \u2014 \u9009\u81ea\u300a\u75c5\u7406\u5b66\u300b\n\n...\u533b\u6e90\u6027\u7b49\u793e\u4f1a\u5fc3\u7406\u56e0\u7d20\u7b49\u82e5\u5e72\u5927\u7c7b\u3002\n\n\uff08\u4e00\uff09\u2002 \u7f3a\u6c27\n\n\u7f3a\u8840\u3001\u7f3a\u6c27\u662f\u5bfc\u81f4\u7ec6\u80de\u548c\u7ec4\u7ec7\u635f\u4f24\u7684\u5e38\u89c1\u539f\u56e0\u4e4b\u4e00\u3002\u5fc3\u80ba\u529f\u80fd\u8870\u7aed\u4f7f\u52a8\u8109\u8840\u6c27\u5408\u4e0d\u8db3\uff0c\u6216\u8d2b\u8840\u548c\u4e00\u6c27\u5316\u78b3\u4e2d\u6bd2\u4f7f\u8840\u6db2\u643a\u6c27\u80fd\u529b\u4e0b\u964d\uff0c\u6216\u8840\u7ba1\u963b\u585e\u4f7f\u8840\u6db2\u4f9b\u5e94\u91cf\u4e0b\u964d\uff0c\u5747\u53ef\u5bfc\u81f4\u7ec6\u80de\u548c\u7ec4\u7ec7\u5185\u6c27\u6c14\u53ca\u8425\u517b\u4f9b\u7ed9\u51cf\u5c11\uff0c\u5f15\u8d77\u7ec6\u80de\u548c\u7ec4\u7ec7\u7ed3\u6784\u7834\u574f\u53ca\u529f\u80fd\u4e27\u5931\u3002\n\n\u751f\u7269\u6027\u56e0\u7d20\u662f\u7ec6\u80de\u635f\u4f24\u7684\u6700\u5e38\u89c1\u539f\u56e0\uff0c\u5305\u62ec\u5404\u79cd\u75c5\u539f\u751f\u7269\uff0c\u5982\u7ec6\u83cc\u3001\u75c5\u6bd2\u3001\u7acb\u514b\u6b21\u4f53\u3001\u652f\u539f\u4f53\u3001\u87ba\u65cb\u4f53\u3001\u771f\u83cc\u3001\u539f\u866b\u548c\u8815\u866b\u7b49\u3002\u75c5\u539f\u751f\u7269\u4fb5\u5165\u673a\u4f53\u751f\u957f\u7e41\u6b96\uff0c\u9020\u6210\u673a\u68b0\u6027\u635f\u4f24\uff0c\u8bf1\u53d1\u8d85\u654f\u53cd\u5e94\uff0c\u91ca\u653e\u5185\u3001\u5916\u6bd2\u7d20\u6216\u5206\u6ccc\u67d0\u4e9b\u9176\uff0c\u90fd\u53ef\u80fd\u635f\u5bb3\u7ec6\u80de\u548c\u7ec4\u7ec7\u7684\u7ed3\u6784\u4e0e\u529f\u80fd\u3002\n\n\u5f53\u73af\u5883\u4e2d\u5404\u79cd\u7269\u7406\u6027\u56e0\u7d20\u8d85\u8fc7\u673a\u4f53\u751f\u7406\u8010\u53d7\u65f6\uff0c\u4fbf\u53ef\u81f4\u7ec6\u80de\u635f\u4f24\u3002\u4f8b\u5982\u9ad8\u6e29\u3001\u9ad8\u8f90\u5c04\u53ef\u5bfc\u81f4\u4e2d\u6691\u3001\u70eb\u4f24\u6216\u8f90\u5c04\u635f\u4f24\uff0c\u5bd2\u51b7\u5bfc\u81f4\u51bb\u4f24\uff0c\u5f3a\u5927\u7535\u6d41\u51b2\u51fb\u9020\u6210\u7535\u51fb\u4f24\uff0c\u673a\u68b0\u529b\u7834\u574f\u53ef\u5f15\u8d77\u521b\u4f24\u3001\u9aa8\u6298\u7b49\u3002\u5316\u5b66\u6027\u56e0\u7d20\u5305\u62ec\u5916\u6e90\u6027\u7269\u8d28\uff0c\u5982\u5f3a\u9178\u3001\u5f3a\u78b1\u3001\u94c5\u3001\u6c5e\u7b49\u65e0\u673a\u6bd2\u7269\uff0c\u6709\u673a\u78f7\u3001\u6c30\u5316\u7269\u7b49\u6709\u673a\u6bd2\u7269\uff0c\u86c7\u6bd2\u3001\u8548\u6bd2\u7b49\u751f\u7269\u6bd2\u7d20\uff1b\u5185\u6e90\u6027\u7269\u8d28\uff0c\u5982\u7ec6\u80de\u574f\u6b7b\u7684\u5206\u89e3\u4ea7\u7269\uff0c\u5c3f\u7d20\u3001\u81ea\u7531\u57fa\u7b49\u67d0\u4e9b\u4ee3\u8c22\u4ea7\u7269\u7b49\uff0c\u90fd\u53ef\u4ee5\u5f15\u8d77\u7ec6\u80de\u7684\u635f\u4f24\u6027\u53d8\u5316\u3002\u836f\u7269\u3001\u536b\u751f\u5236\u5242\u7b49\u5728\u7528\u4e8e\u6cbb\u7597\u548c\u9884\u9632\u67d0\u4e9b\u7ec6\u80de\u635f\u4f24\u65f6\uff0c\u4e5f\u53ef\u5bf9\u7ec6\u80de\u4ea7\u751f\u6bd2\u526f\u4f5c\u7528\u3002\n\n\u8425\u517b\u7269\u8d28\u6444\u5165\u4e0d\u8db3\u6216\u8fc7\u591a\uff0c\u90fd\u53ef\u81f4\u673a\u4f53\u4ea7\u751f\u76f8\u5e94\u75c5\u53d8\u3002\u5982\u7ef4\u751f\u7d20D\u3001\u86cb\u767d\u8d28\u548c\u7898\u7684\u7f3a\u4e4f\uff0c\u5206\u522b\u5bfc\u81f4\u4f5d\u507b\u75c5\u3001\u8425\u517b\u4e0d\u826f\u548c\u5730\u65b9\u6027\u7532\u72b6\u817a\u80bf\uff1b\u94c1\u3001\u950c\u3001\u7852\u7b49\u5fae\u91cf\u5143\u7d20\u7684\u7f3a\u4e4f\uff0c\u5f15\u8d77\u7ea2\u7ec6\u80de\u548c\u8111\u7ec6\u80de\u53d1\u80b2\u969c\u788d\uff1b\u957f\u671f\u6444\u5165\u9ad8\u70ed\u91cf\u3001\u9ad8\u8102\u80aa\uff0c\u5219\u662f\u80a5\u80d6\u3001\u809d\u8102\u80aa\u53d8\u548c\u52a8\u8109\u7ca5\u6837\u786c\u5316\u7684\u91cd\u8981\u539f\u56e0\u3002\n\n\u539f\u53d1\u6027\u9ad8\u8840\u538b\u548c\u6e83\u75a1\u75c5\u7684\u53d1\u751f\u4e0e\u8ff7\u8d70\u795e\u7ecf\u957f\u671f\u8fc7\u5ea6\u5174\u594b\u6709\u5173\uff1b\u7532\u72b6\u817a\u529f\u80fd\u4ea2\u8fdb\u65f6\uff0c\u673a\u4f53\u7ec6\u80de\u548c\u7ec4\u7ec7\u5bf9\u611f\u67d3\u3001\u4e2d\u6bd2\u7684\u654f\u611f\u6027\u589e\u52a0\uff1b\u7cd6\u5c3f\u75c5\u80f0\u5c9b\u7d20\u5206\u6ccc\u4e0d\u8db3\uff0c\u4f7f\u5168\u8eab\u5c24\u5176\u662f\u76ae\u4e0b\u7ec4\u7ec7\u6613\u4f34\u53d1\u7ec6\u83cc\u611f\u67d3\u3002\u673a\u4f53\u7ec4\u7ec7\u7ec6\u80de\u5bf9\u67d0\u4e9b\u6297\u539f\u523a\u6fc0\u53cd\u5e94\u8fc7\u5ea6\u65f6\uff0c\u53ef\u5f15\u8d77\u8d85\u654f\u53cd\u5e94\uff0c\u5982\u652f\u6c14\u7ba1\u54ee\u5598\u548c\u8fc7\u654f\u6027\u4f11\u514b\uff1b\u81ea\u8eab\u6297\u539f\u53ef\u5f15\u8d77\u7ec4\u7ec7\u635f\u4f24\uff0c\u5982\u7cfb\u7edf\u6027\u7ea2\u6591\u72fc\u75ae\u3001\u7c7b\u98ce\u6e7f\u5173\u8282\u708e\u7b49\uff1b\u514d\u75ab\u7f3a\u9677\u75c5\u5982\u827e\u6ecb\u75c5\uff0c\u53ef\u5f15\u8d77\u6dcb\u5df4\u7ec6\u80de\u7834\n\n\u9057\u4f20\u5728\u635f\u4f24\u4e2d\u7684\u4f5c\u7528\u4e3b\u8981\u4f53\u73b0\u5728\u4e24\u65b9\u9762\uff1a\u4e00\u662f\u57fa\u56e0\u7a81\u53d8\u6216\u67d3\u8272\u4f53\u7578\u53d8\uff0c\u76f4\u63a5\u5f15\u8d77\u5b50\u4ee3\u9057\u4f20\u75c5\uff0c\u5982\u5510\u6c0f\u7efc\u5408\u5f81\u3001\u8840\u53cb\u75c5\u3001\u6025\u6027\u6eb6\u8840\u6027\u8d2b\u8840\uff08\u8695\u8c46\u75c5\uff09\u7b49\uff1b\u4e8c\u662f\u9057\u4f20\u7269\u8d28\u7f3a\u9677\uff0c\u4f7f\u5b50\u4ee3\u4ea7\u751f\u5bb9\u6613\u8bf1\u53d1\u67d0\u4e9b\u75be\n\n\u51a0\u72b6\u52a8\u8109\u7ca5\u6837\u786c\u5316\u6027\u5fc3\u810f\u75c5\u3001\u539f\u53d1\u6027\u9ad8\u8840\u538b\u3001\u6d88\u5316\u6027\u6e83\u75a1\u751a\u81f3\u67d0\u4e9b\u80bf\u7624\uff0c\u90fd\u4e0e\u793e\u4f1a\u5fc3\u7406\u56e0\u7d20\u6709\u6781\u5176\u5bc6\u5207\u7684\u5173\u7cfb\uff0c\u79f0\u4e3a\u5fc3\u8eab\u75be\u75c5\uff08psychosomatic disease\uff09\u3002\u5bf9\u533b\u52a1\u5de5\u4f5c\u8005\u6765\u8bf4\uff0c\u8fd8\u8981\u9632\u6b62\u56e0\u536b\u751f\u670d\u52a1\u4e0d\u5f53\u5f15\u8d77\u7684\u533b\u6e90\u6027\u4f24\u5bb3\uff0c\u5982\u533b\u9662\u83b7\u5f97\u6027\u611f\u67d3\u3001\u836f\u6e90\u6027\u635f\u4f24\u7b49\u3002\n\n\u4e8c\u3001\u2002 \u7ec6\u80de\u548c\u7ec4\u7ec7\u635f\u4f24\u7684\u673a\u5236\n\n\u7ec6\u80de\u635f\u4f24\u7684\u53d1\u751f\u673a\u5236\uff0c\u4e3b\u8981\u4f53\u73b0\u5728\u7ec6\u80de\u819c\u548c\u7ebf\u7c92\u4f53\u7684\u635f\u4f24\u3001\u6d3b\u6027\u6c27\u7c7b\u7269\u8d28\u548c\u80de\u8d28\u5185\u6e38\u79bb\u9499\u7684\u589e\u591a\u3001\u7f3a\u8840\u7f3a\u6c27\u3001\u5316\u5b66\u6bd2\u5bb3\u548c\u9057\u4f20\u7269\u8d28\u53d8\u5f02\u7b49\u51e0\u65b9\u9762\u3002\u5b83\u4eec\u4e92\u76f8\u4f5c\u7528\u6216\u4e92\u4e3a\u56e0\u679c\uff0c\u5bfc\u81f4\u7ec6\u80de\u635f\u4f24\u7684\u53d1\u751f\u4e0e\u53d1\u5c55\u3002\uff08\u4e00\uff09\u2002 \u7ec6\u80de\u819c\u7684\u635f\u4f24\n\n\u673a\u68b0\u529b\u7684\u76f4\u63a5\u4f5c\u7528\u3001\u9176\u6027\u6eb6\u89e3\u3001\u7f3a\u8840\u7f3a\u6c27\u3001\u6d3b\u6027\u6c27\u7c7b\u7269\u8d28\u3001\u7ec6\u83cc\u6bd2\u7d20\u3001\u8865\u4f53\u6210\u5206\u3001\u79bb\u5b50\u6cf5\u548c\u79bb\u5b50\u901a\u9053\u7684\u5316\u5b66\u635f\u4f24\u7b49\uff0c\u90fd\u53ef\u7834\u574f\u7ec6\u80de\u819c\u6027\u7ed3\u6784\u7684\u901a\u900f\u6027\u548c\u5b8c\u6574\u6027\uff0c\u5f71\u54cd\u7ec6\u80de\u819c\u7684\u4fe1\u606f\u548c\u7269\u8d28\u4ea4\u6362\u3001\u514d\u75ab\u5e94\u7b54\u3001\u7ec6\u80de\u5206...\n\n---\n\n# \u75c5\u7406\u751f\u7406\u4e0e\u75be\u75c5\n\n\u672c\u7ae0\u6db5\u76d6\u53d1\u70ed\u3001\u5e94\u6fc0\u3001\u9ad8\u8102\u8840\u75c7\u3001\u4f4e\u94be\u8840\u75c7\u3001HCO3-\u3001\u9178\u4e2d\u6bd2\u7b49\u6838\u5fc3\u77e5\u8bc6\u70b9\uff0c\u6574\u5408\u81ea6\u672c\u6559\u6750\u76f8\u5173\u5185\u5bb9\u3002\n\n## \u6838\u5fc3\u6982\u5ff5\u4e0e\u5b9a\u4e49\n\n**\u53d1\u70ed**\uff1a\u53d1\u70ed\u7531\u53d1\u70ed\u6fc0\u6d3b\u7269\u4f5c\u7528\u4e8e\u673a\u4f53\uff0c\u6fc0\u6d3b\u4ea7\u5185\u751f\u81f4\u70ed\u539f\u7ec6\u80de\uff0c\u4f7f\u5176\u4ea7\u751f\u548c\u91ca\u653e\u5185\u751f\u81f4\u70ed\u539f\uff0c\u518d\u7ecf\u4e00\u4e9b\u540e\u7eed\u73af\u8282\u5f15\u8d77\u4f53\u6e29\u5347\u9ad8\u3002\n*\u6765\u6e90\uff1a\u4f20\u67d3\u75c5\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66  \u2190 \u524d\u7f6e\uff1a\u53d1\u70ed\u6fc0\u6d3b\u7269 \u2192 \u5185\u751f\u81f4\u70ed\u539f*\n\n**\u5e94\u6fc0**\uff1a\u4e2a\u4f53\u5904\u4e8e\u632b\u6298\u4e0e\u51b2\u7a81\u7684\u5e94\u6fc0\u60c5\u5883\u65f6\uff0c\u53d1\u751f\u7684\u4e00\u79cd\u81ea\u89c9\u6216\u4e0d\u81ea\u89c9\u7684\u9002\u5e94\u6027\u5fc3\u7406\u503e\u5411\u4e0e\u5fc3\u7406\u6d3b\u52a8\uff0c\u4ee5\u7a33\u5b9a\u60c5\u7eea\u3001\u6062\u590d\u5fc3\u7406\u5e73\u8861\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66  \u2190 \u524d\u7f6e\uff1a\u7a33\u6001 \u2192 \u5e94\u6fc0\u539f*\n\n**\u9ad8\u8102\u8840\u75c7**\uff1a\u8840\u8102\u6c34\u5e73\u9ad8\u4e8e\u6b63\u5e38\u4e0a\u9650\uff0c\u6211\u56fd\u4ee5\u6210\u4eba\u7a7a\u8179\u8840TC\u22656.2mmol/L\u548c/\u6216TG\u22652.3mmol/L\u4e3a\u8bca\u65ad\u6807\u51c6\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u4f4e\u94be\u8840\u75c7**\uff1a\u8840\u94be\u6d53\u5ea6\u4f4e\u4e8e\u6b63\u5e38\u6c34\u5e73\uff0c\u5bf9\u673a\u4f53\u5f71\u54cd\u53d6\u51b3\u4e8e\u8840\u94be\u964d\u4f4e\u7684\u901f\u5ea6\u548c\u7a0b\u5ea6\uff0c\u53ef\u5bfc\u81f4\u819c\u7535\u4f4d\u5f02\u5e38\u3001\u7ec6\u80de\u4ee3\u8c22\u969c\u788d\u53ca\u9178\u78b1\u5e73\u8861\u5f02\u5e38\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**HCO3-**\uff1a\u78b3\u9178\u6c22\u6839\u79bb\u5b50\uff0c\u662f\u8840\u6d46\u4e2d\u4e3b\u8981\u7684\u78b1\u6027\u7f13\u51b2\u7269\u8d28\uff0c\u6c34\u6eb6\u6027\uff0c\u901a\u8fc7\u8840\u8111\u5c4f\u969c\u7f13\u6162\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66  \u2190 \u524d\u7f6e\uff1apH \u2192 H2CO3*\n\n**\u9178\u4e2d\u6bd2**\uff1a\u673a\u4f53\u53d1\u751f\u9178\u4e2d\u6bd2\u65f6\uff0c\u5c0f\u7ba1\u5206\u6cccH+\u6d53\u5ea6\u589e\u52a0\uff0cH+-Na+\u4ea4\u6362\u52a0\u5f3a\uff0cK+-Na+\u4ea4\u6362\u6291\u5236\uff0c\u9020\u6210\u8840\u4e2dK+\u6d53\u5ea6\u589e\u9ad8\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u7ed3\u6838\u5206\u679d\u6746\u83cc**\uff1a\u5206\u679d\u6746\u83cc\u7684\u5178\u578b\u83cc\u7fa4\uff0c\u53ef\u5f15\u8d77\u7ed3\u6838\u75c5\u5e76\u4f34\u6709\u53d1\u70ed\n*\u6765\u6e90\uff1a\u533b\u5b66\u5fae\u751f\u7269\u5b66\u3001\u4f20\u67d3\u75c5\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66  \u2190 \u524d\u7f6e\uff1a\u7ed3\u6838\u75c5*\n\n**\u6c34\u80bf**\uff1a\u8fc7\u591a\u7684\u6db2\u4f53\u5728\u7ec4\u7ec7\u95f4\u9699\u6216\u4f53\u8154\u5185\u79ef\u805a\u79f0\u4e3a\u6c34\u80bf\uff0c\u4e0d\u662f\u72ec\u7acb\u7684\u75be\u75c5\uff0c\u800c\u662f\u591a\u79cd\u75be\u75c5\u4e2d\u5e38\u89c1\u7684\u75c5\u7406\u8fc7\u7a0b\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u9ad8\u94be\u8840\u75c7**\uff1a\u8840\u6e05\u94be\u6d53\u5ea6\u5f02\u5e38\u589e\u9ad8\uff0c\u5bf9\u673a\u4f53\u5f71\u54cd\u4e3b\u8981\u8868\u73b0\u4e3a\u819c\u7535\u4f4d\u5f02\u5e38\u5f15\u53d1\u7684\u4e00\u7cfb\u5217\u969c\u788d\u53ca\u9178\u78b1\u5e73\u8861\u5f02\u5e38\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u5185\u751f\u81f4\u70ed\u539f**\uff1a\u7531\u4ea7EP\u7ec6\u80de\u4ea7\u751f\u548c\u91ca\u653e\u7684\u80fd\u5f15\u8d77\u53d1\u70ed\u7684\u7269\u8d28\uff0c\u5305\u62ecIL-1\u3001TNF\u3001IL-6\u7b49\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66  \u2190 \u524d\u7f6e\uff1a\u53d1\u70ed\u6fc0\u6d3b\u7269 \u2192 \u5916\u81f4\u70ed\u539f*\n\n**\u51dd\u8840\u9176**\uff1a\u51dd\u8840\u7cfb\u7edf\u \u6e90\uff1a\u4f20\u67d3\u75c5\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u7f3a\u8840\u7f3a\u6c27**\uff1a\u5bfc\u81f4\u7ec6\u80de\u635f\u4f24\u7684\u5e38\u89c1\u539f\u56e0\uff0c\u53ef\u7834\u574f\u7ec6\u80de\u819c\u548c\u7ebf\u7c92\u4f53\uff0c\u5f15\u8d77\u7ec6\u80de\u529f\u80fd\u969c\u788d\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66*\n\n**\u524d\u9a71\u671f**\uff1a\u4ece\u8d77\u75c5\u81f3\u75c7\u72b6\u660e\u663e\u5f00\u59cb\u4e3a\u6b62\u7684\u65f6\u671f\uff0c\u4e34\u5e8a\u8868\u73b0\u975e\u7279\u5f02\u6027\uff0c\u5982\u5934\u75db\u3001\u53d1\u70ed\u7b49\uff0c\u4e00\u822c\u6301\u7eed1\uff5e3\u5929\u3002\n*\u6765\u6e90\uff1a\u4f20\u67d3\u75c5\u5b66*\n\n**\u7329\u7ea2\u70ed**\uff1a\u524d\u9a71\u671f\u53d1\u70ed\u4f34\u660e\u663e\u54bd\u75db\uff0c\u53d1\u75c51\uff5e2\u5929\u5168\u8eab\u51fa\u73b0\u9488\u5c16\u5927\u5c0f\u7ea2\u8272\u4e18\u75b9\uff0c\u75b9\u95f4\u76ae\u80a4\u5145\u8840\uff0c\u53ef\u6709\u5927\u7247\u8131\u76ae\u3002\n*\u6765\u6e90\uff1a\u4f20\u67d3\u75c5\u5b66*\n\n**\u4e9a\u5065\u5eb7**\uff1a\u4ecb\u4e8e\u5065\u5eb7\u4e0e\u75be\u75c5\u4e4b\u95f4\u7684\u751f\u7406\u529f\u80fd\u4f4e\u4e0b\u72b6\u6001\uff0c\u8868\u73b0\u4e3a\u8eaf\u4f53\u3001\u5fc3\u7406\u548c\u793e\u4f1a\u9002\u5e94\u65b9\u9762\u7684\u975e\u5b8c\u7f8e\u72b6\u6001\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u5371\u9669\u56e0\u7d20**\uff1a\u4e0e\u75be\u75c5\u53d1\u751f\u6709\u4e00\u5b9a\u56e0\u679c\u5173\u7cfb\u4f46\u5c1a\u65e0\u53ef\u9760\u8bc1\u636e\u8bc1\u660e\u81f4\u75c5\u6548\u5e94\u7684\u56e0\u7d20\uff0c\u6d88\u9664\u65f6\u75be\u75c5\u53d1\u751f\u6982\u7387\u4e0b\u964d\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u5fc3\u6e90\u6027\u4f11\u514b**\uff1a\u7531\u5fc3\u810f\u6cf5\u8840\u529f\u80fd\u8870\u7aed\u5bfc\u81f4\u7684\u5fc3\u8f93\u51fa\u91cf\u6025\u5267\u51cf\u5c11\u5f15\u8d77\u7684\u4f11\u514b\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u8fc7\u654f\u6027\u4f11\u514b**\uff1a\u7531\u8fc7\u654f\u53cd\u5e94\u5f15\u8d77\u7684\ 3d1\u5c55\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u53d1\u75c5\u673a\u5236**\uff1a\u75be\u75c5\u53d1\u751f\u548c\u53d1\u5c55\u7684\u5185\u5728\u673a\u7406\u548c\u8fc7\u7a0b\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u5316\u5b66\u56e0\u7d20**\uff1a\u4e3b\u8981\u5305\u62ec\u5404\u79cd\u6709\u5bb3\u5316\u5b66\u7269\u8d28\uff0c\u5982\u5f3a\u9178\u3001\u5f3a\u78b1\u3001\u6bd2\u7269\u3001\u5316\u5b66\u81f4\u764c\u7269\u7b49\uff0c\u5176\u81f4\u75c5\u5177\u6709\u9009\u62e9\u6027\u3001\u6f5c\u4f0f\u671f\u77ed\u7b49\u7279\u70b9\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u4e9a\u6025\u6027\u75be\u75c5**\uff1a\u4ecb\u4e8e\u6025\u6027\u548c\u6162\u6027\u4e4b\u95f4\u7684\u75be\u75c5\uff0c\u539f\u6587\u672a\u660e\u786e\u5b9a\u4e49\uff0c\u4f46\u4f5c\u4e3a\u75be\u75c5\u5206\u7c7b\u51fa\u73b0\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u53d1\u75c5\u5b66**\uff1a\u4ece\u72ed\u4e49\u4e0a\u7814\u7a76\u81f4\u75c5\u56e0\u5b50\u5982\u4f55\u5f15\u53d1\u75be\u75c5\u53ca\u75be\u75c5\u6f14\u53d8\u4e0e\u53d1\u5c55\u7684\u89c4\u5f8b\u4e0e\u5185\u5728\u673a\u5236\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u5355\u57fa\u56e0\u75c5**\uff1a\u7531\u5355\u4e2a\u81f4\u75c5\u57fa\u56e0\u53d8\u5f02\u5f15\u8d77\u7684\u75be\u75c5\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u6025\u6027\u7f3a\u6c27**\uff1a\u77ed\u65f6\u95f4\u5185\u53d1\u751f\u7684\u7f3a\u6c27\uff0c\u53ef\u5f15\u8d77\u5934\u75db\u3001\u601d\u7ef4\u80fd\u529b\u964d\u4f4e\u3001\u60ca\u53a5\u6216\u610f\u8bc6\u4e27\u5931\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u6b7b\u4ea1**\uff1a\u751f\u547d\u6d3b\u52a8\u8fc7\u7a0b\u7684\u5fc5\u7136\u7ed3\u5c40\uff0c\u5305\u62ec\u6fd2\u6b7b\u671f\u3001\u4e34\u5e8a\u6b7b\u4ea1\u671f\u548c\u751f\u7269\u5b66\u6b7b\u4ea1\u671f\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u8bd5\u9a8c\u6027\u7814\u7a76**\uff1a\u53c8\u79f0\u5e72\u9884\u6027\u7814\u7a76\uff0c\u5c5e\u4e8
