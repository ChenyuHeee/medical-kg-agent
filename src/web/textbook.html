06\u751f\u7406\u5b66*\n\n**\u5fc3\u5ba4\u50f5\u786c\u5ea6**\uff1a\u5fc3\u5ba4\u987a\u5e94\u6027\u7684\u5012\u6570\uff08dp/dV\uff09\uff0c\u8868\u793a\u5fc3\u5ba4\u62b5\u6297\u6269\u5f20\u7684\u80fd\u529b\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u6025\u6027\u80ba\u6c34\u80bf**\uff1a\u80ba\u90e8\u75be\u75c5\u548c\u6025\u6027\u5de6\u5fc3\u8870\u7aed\u7b49\u5f15\u8d77\u80ba\u9759\u8109\u548c\u6bdb\u7ec6\u8840\u7ba1\u538b\u529b\u6025\u5267\u5347\u9ad8\uff0c\u901a\u900f\u6027\u589e\u5927\uff0c\u8840\u6d46\u6e17\u51fa\u5230\u80ba\u95f4\u8d28\u4e0e\u80ba\u6ce1\u6240\u81f4\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u82ef\u4e19\u6c28\u9178**\uff1a\u98df\u7269\u86cb\u767d\u6c34\u89e3\u4ea7\u751f\u7684\u82b3\u9999\u65cf\u6c28\u57fa\u9178\u4e4b\u4e00\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u5668\u8d28\u6027\u6025\u6027\u80be\u8870\u7aed**\uff1a\u7531ATN\u7b49\u5f15\u8d77\u7684\u80be\u5c0f\u7ba1\u7ed3\u6784\u635f\u4f24\u5bfc\u81f4\u7684\u6025\u6027\u80be\u8870\u7aed\uff0c\u4f34\u6709\u4e25\u91cd\u80be\u5c0f\u7ba1\u529f\u80fd\u969c\u788d\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n## \u539f\u6587\u7cbe\u8bfb\n\n### \u53d1\u70ed \u2014 \u9009\u81ea\u300a\u4f20\u67d3\u75c5\u5b66\u300b\n\n...\u8d23\u4eba\uff0c\u91cd\u70b9\u7814\u53d1\u9879\u76ee\u8d1f\u8d23\u4eba\uff0c\u6559\u80b2\u90e8\u957f\u6c5f\u5b66\u8005\u7279\u8058\u6559\u6388\u3001\u201c\u957f\u6c5f\u5b66\u8005\u548c\u521b\u65b0\u56e2\u961f\u53d1\u5c55\u8ba1\u5212\u201d\u521b\u65b0\u56e2\u961f\u7275\u5934\u4eba\u3002\u73b0\u4efb\u534e\u4e2d\u79d1\u6280\u5927\u5b66\u540c\u6d4e\u533b\u5b66\u9662\u9644\u5c5e\u540c\u6d4e\u533b\u9662\u4f20\u67d3\u75c5\u5b66\u6559\u7814\u5ba4\u4e3b\u4efb\u3001\u611f\u67d3\u79d1\u4e3b\u4efb\u3001\u611f\u67d3\u6027\u75be\u75c5\u7814\u7a76\u6240\u6240\u957f\u3001\u4eba\u755c\u5171\u60a3\u4f20\u67d3\u75c5\u91cd\u75c7\u8bca\u6cbb\u5168\u56fd\u91cd\u70b9\u5b9e\u9a8c\u5ba4\u9996\u4efb\u4e3b\u4efb\uff0c\u517c\u4efb\u4e2d\u534e\u533b\u5b66\u4f1a\u611f\u67d3\u75c5\u5b66\u5206\u4f1a\u526f\u4e3b\u4efb\u59d4\u5458\u3001\u6e56\u5317\u7701\u533b\u5b66\u4f1a\u809d\u75c5\u5b66\u5206\u4f1a\u4e3b\u4efb\u59d4\u5458\u3002\u83b7\u6e56\u5317\u7701\u81ea\u7136\u79d1\u5b66\u5956\u4e00\u7b49\u59562 \u9879\u3002\u62c5\u4efb\u56fd\u5bb6\u536b\u751f\u5065\u5eb7\u59d4\u5458\u4f1a\u5168\u56fd\u9ad8\u7b49\u5b66\u6821\u533b\u5b66\u89c4\u5212\u6559\u6750\u300a\u4f20\u67d3\u75c5\u5b66\u300b\u7b2c9 \u7248\u526f\u4e3b\u7f16\u3001\u957f\u5b66\u5236\u89c4\u5212\u6559\u6750\u300a\u611f\u67d3\u75c5\u5b66\u300b\u7b2c3 \u7248\u526f\u4e3b\u7f16\u3002\n\n\u674e\u7528\u56fd\n\n1966 \u5e745 \u6708\u751f\uff0c\u7c4d\u8d2f\u9ed1\u9f99\u6c5f\u3002\u533b\u5b66\u535a\u58eb\uff0c\u4e00\u7ea7\u4e3b\u4efb\u533b\u5e08\uff0c\u6559\u6388\uff0c\u535a\u58eb\u751f\u5bfc\u5e08\u3002\u91cd\u5e86\u533b\u79d1\u5927\u5b66\u9644\u5c5e\u7b2c\u4e00\u533b\u9662\u4f20\u67d3\u75c5\u5b66\u6559\u7814\u5ba4\u4e3b\u4efb\u3001\u611f\u67d3\u79d1\u4e3b\u4efb\uff0c\u517c\u4efb\u4e2d\u56fd\u533b\u5e08\u534f\u4f1a\u611f\u67d3\u79d1\u533b\u5e08\u5206\u4f1a\u526f\u4f1a\u957f\u3001\u4e2d\u56fd\u9632\u75e8\u534f\u4f1a\u7ed3\u6838\u75c5\u4e0e\u809d\u75c5\u4e13\u4e1a\u5206\u4f1a\u526f\u4e3b\u4efb\u59d4\u5458\u3001\u4e2d\u534e\u533b\u5b66\u4f1a\u611f\u67d3\u75c5\u5b66\u5206\u4f1a\u59d4\u5458\u3001\u91cd\u5e86\u5e02\u533b\u5e08\u534f\u4f1a\u611f\u67d3\u79d1\u533b\u5e08\u5206\u4f1a\u4f1a\u957f\u3001\u91cd\u5e86\u5e02\u9884\u9632\u533b\u5b66\u4f1a\u533b\u9662\u611f\u67d3\u9884\u9632\u4e0e\u63a7\u5236\u4e13\u4e1a\u59d4\u5458\u4f1a\u4e3b\u4efb\u59d4\u5458\u7b49\u3002\u5bf9\u53d1\u70ed\u5f85\u67e5\u548c\u611f\u67d3\u6027\u75be\u75c5\u7684\u4e34\u5e8a\u8bca\u7597\u6709\u8f83\u6df1\u5165\u7684\u7814\u7a76\u3002\u5b8c\u6210\u7701\u90e8\u7ea7\u4ee5\u4e0a\u79d1\u7814\u9879\u76ee10 \u4f59\u9879\uff0c\u53d1\u8868\u8bba\u6587\u8fd1100 \u7bc7\uff1b\u62c5\u4efb\u56fd\u5bb6\u536b\u751f\u5065\u5eb7\u59d4\u5458\u4f1a\u5168\u56fd\u9ad8\u7b49\u5b66\u6821\u533b\u5b66\u89c4\u5212\u6559\u6750\u300a\u4f20\u67d3\u75c5\u5b66\u300b\u7b2c9\n\n\u4eba\u6c11\u536b\u751f\u51fa\u7248\u793e\u4e94\u5e74\u5236\u4e34\u5e8a\u533b\u5b66\u4e13\u4e1a\u6559\u6750\u662f\u6211\u56fd\u533b\u5b66\u672c\u79d1\u751f\u6559\u80b2\u7684\u201c\u5e72\u7ec6\u80de\u201d\u6559\u6750\uff0c\u81f3\u4eca\u5df2\u5386\u7ecf9 \u8f6e\uff0c\u4e3a\u6211\u56fd\u533b\u5b66\u4eba\u624d\u7684\u57f9\u517b\u4f5c\u51fa\u4e86\u5f88\u5927\u8d21\u732e\u3002\u73b0\u4ee3\u533b\u5b66\u65e5\u65b0\u6708\u5f02\uff0c\u6559\u80b2\u6559\u5b66\u4e0d\u65ad\u6df1\u5316\uff0c\u4fe1\u606f\u6280\u672f\u98de\u901f\u53d1\u5c55\uff0c\u5168\u56fd\u9ad8\u7b49\u5b66\u6821\u4e94\u5e74\u5236\u672c\u79d1\u4e34\u5e8a\u533b\u5b66\u4e13\u4e1a\u7b2c\u5341\u8f6e\u89c4\u5212\u6559\u6750\u300a\u4f20\u67d3\u75c5\u5b66\u300b\uff08\u7b2c10 \u7248\uff09\u7684\u518d\u7248\u4fee\u8ba2\u5de5\u4f5c\u4e5f\u4e8e2023 \u5e745 \u6708\u6b63\u5f0f\u542f\u52a8\u3002\n\n\u300a\u4f20\u67d3\u75c5\u5b66\u300b\uff08\u7b2c10 \u7248\uff09\u4f20\u627f\u4e0a\u4e00\u7248\u6559\u6750\u7cbe\u9ad3\u3002\u4e00\u65b9\u9762\uff0c\u7ee7\u7eed\u5f3a\u8c03\u201c\u4e09\u4e2a\u9002\u5e94\u201d\uff1a\u9002\u5e94\u6211\u56fd\u6784\u5efa\u201c5+3\u201d\u4e3a\u4e3b\u4f53\u7684\u4e34\u5e8a\u533b\u5b66\u4eba\u624d\u57f9\u517b\u4f53\u7cfb\u7684\u9700\u8981\uff0c\u9002\u5e94\u4e94\u5e74\u5236\u672c\u79d1\u4e34\u5e8a\u533b\u5b66\u4e13\u4e1a\u5b66\u751f\u7684\u9700\u8981\uff0c\u9002\u5e94\u6211\u56fd\u4e34\u5e8a\u6267\u4e1a\u533b\u5e08\u8d44\u683c\u8003\u8bd5\u5206\u9636\u6bb5\u6539\u9769\u9700\u8981\uff1b\u53e6\u4e00\u65b9\u9762\uff0c\u7ee7\u7eed\u91c7\u7528\u5e7f\u53d7\u5b66\u751f\u6b22\u8fce\u7684\u878d\u5408\u6559\u6750\u7684\u7f16\u5199\u624b\u6cd5\uff0c\u5c06\u7eb8\u8d28\u5185\u5bb9\u4e0e\u6570\u5b57\u5185\u5bb9\u4e00\u4f53\u5316\u8bbe\u8ba1\uff0c\u4e92\u4e3a\u8865\u5145\uff0c\u5171\u540c\u6253\u9020\u7acb\u4f53\u5316\u65b0\u5f62\u6001\u6559\u6750\uff0c\u4ee5\u62d3\u5c55\u77e5\u8bc6\u7684\u5e7f\u5ea6\u548c\u4ea4\u53c9\u6027\uff0c\u63d0\u5347\u6559\u6750\u7684\u53ef\u8bfb\u6027\u3002\n\n\u300a\u4f20\u67d3\u75c5\u5b66\u300b\uff08\u7b2c10 \u7248\uff09\u5173\u6ce8\u5b66\u79d1\u8fdb\u5c55\u4ee5\u53ca\u8fd1\u5e74\u6765\u4f20\u67d3\u75c5\u75be\u75c5\u8c31\u53d8\u5316\uff1a\u8c03\u6574\u6cd5\u5b9a\u4f20\u67d3\u75c5\u5206\u7c7b\uff1b\u5c06\u201c\u65b0\u53d1\u611f\u67d3\u75c5\u201d\u5355\u72ec\u6210\u7ae0\uff1b\u589e\u8865\u65b0\u578b\u51a0\u72b6\u75c5\u6bd2\u611f\u67d3\uff1b\u5438\u6536\u6700\u65b0\u6307\u5357\u5185\u5bb9\uff0c\u5305\u62ec\u300a\u6162\u6027\u4e59\u578b\u809d\u708e\u9632\u6cbb\u6307\u5357\uff082022 \u5e74\u7248\uff09\u300b\u300a\u4e19\u578b\u809d\u708e\u9632\u6cbb\u6307\u5357\uff082022 \u5e74\u7248\uff09\u300b\u300a2022 \u620a\u578b\u809d\u708e\u9632\u6cbb\u5171\u8bc6\u300b\u300a\u4eba\u5de5\u809d\u8840\u6db2\u51c0\u5316\u7cfb\u7edf\u6cbb\u7597\u6307\u5357\uff082023 \u5e74\u7248\uff09\u300b\u300a\u6d41\u884c\u6027\u611f\u5192\u8bca\u7597\u65b9\u6848\uff082020 \u5e74\u7248\uff09\u300b\u4ee5\u53ca\u5b8f\u57fa\u56e0\u7ec4\u9ad8\u901a\u91cf\u6d4b\u5e8f\u6280\u672f\u548c\u6297\u771f\u83cc\u836f\u7269\u7b49\uff1b\u5220\u51cf\u8fd1\u5e74\u5c11\u89c1\u6216\u7f55\u89c1\u7684\u75be\u75c5\uff0c\u5982\u56de\u5f52\u70ed\u3001\u670a\u7c92\u611f\u67d3\u3001\u4e1d\u866b\u75c5\u7b49\uff0c\u4ee5\u7a81\u51fa\u5b66\u4e60\u91cd\u70b9\u3002\n\n\u300a\u4f20\u67d3\u75c5\u5b66\u300b\uff08\u7b2c10 \u7248\uff09\u5728\u7f16\u5199\u8fc7\u7a0b\u4e2d\uff0c\u878d\u5165\u533b\u5b66\u4eba\u6587\u53ca\u8bfe\u7a0b\u601d\u653f\u5185\u5bb9\uff0c\u575a\u6301\u9a6c\u514b\u601d\u4e3b\u4e49\u7684\u6307\u5bfc\u5730\u4f4d\uff0c\u4f53\u73b0\u9a6c\u514b\u601d\u4e3b\u4e49\u4e2d\u56fd\u5316\u8981\u6c42\uff0c\u4f53\u73b0\u4e2d\u56fd\u548c\u4e2d\u534e\u6c11\u65cf\u98ce\u683c\uff0c\u4f53\u73b0\u515a\u548c\u56fd\u5bb6\u5bf9\u6559\u80b2\u7684\u57fa\u672c\u8981\u6c42\uff0c\u4f53\u73b0\u56fd\u5bb6\u548c\u6c11\u65cf\u57fa\u672c\u4ef7\u503c\u89c2\uff0c\u4f53\u73b0\u4eba\u7c7b\u6587\u5316\u77e5\u8bc6\u79ef\u7d2f\u548c\u521b\u65b0\u6210\u679c\uff0c\u8c31\u5199\u65b0\u65f6\u4ee3\u4e2d\u56fd\u7279\u8272\u793e\u4f1a\u4e3b\u4e49\u7684\u7eda\u4e3d\u534e...\n\n### \u5e94\u6fc0 \u2014 \u9009\u81ea\u300a\u75c5\u7406\u751f\u7406\u5b66\u300b\n\n...\u4e3a\u9879\u76ee\u8d1f\u8d23\u4eba\u4e3b\u6301\u6559\u5b66\u7814\u7a76\u4e0e\u6539\u9769\u8bfe\u98988 \u9879\uff0c\u53d1\u8868\u6559\u6539\u76f8\u5173\u8bba\u658710 \u7bc7\uff0c\u83b7\u7701\u7ea7\u4ee5\u4e0a\u6559\u5b66\u6210\u679c\u59563 \u9879\uff0c\u5176\u4e2d\u56fd\u5bb6\u7ea7\u6559\u5b66\u6210\u679c\u5956\u4e8c\u7b49\u59561 \u9879\uff08\u6392\u540d\u7b2c4\uff09\uff1b\u4e3b\u7f16\u53ca\u53c2\u7f16\u6559\u6750\u53ca\u6559\u5b66\u53c2\u8003\u4e666 \u90e8\u3002\n\n\u5168\u56fd\u9ad8\u7b49\u5b66\u6821\u4e94\u5e74\u5236\u672c\u79d1\u4e34\u5e8a\u533b\u5b66\u4e13\u4e1a\u201c\u5341\u56db\u4e94\u201d\u89c4\u5212\u6559\u6750\u300a\u75c5\u7406\u751f\u7406\u5b66\u300b\uff08\u7b2c10 \u7248\uff09\u4ee5\u57f9\u517b\u5177\u6709\u7231\u56fd\u7231\u5c97\u3001\u521b\u65b0\u6c42\u5b9e\u548c\u4e50\u4e8e\u5949\u732e\u7684\u533b\u5b66\u4eba\u624d\u4e3a\u76ee\u6807\uff0c\u8d2f\u5f7b\u6559\u6750\u7f16\u5199\u7684\u201c\u4e09\u57fa\u201d\uff08\u57fa\u7840\u7406\u8bba\u3001\u57fa\u672c\u77e5\u8bc6\u3001\u57fa\u672c\u6280\u80fd\uff09\u3001\u201c\u4e94\u6027\u201d\uff08\u601d\u60f3\u6027\u3001\u79d1\u5b66\u6027\u3001\u5148\u8fdb\u6027\u3001\u542f\u53d1\u6027\u548c\u9002\u7528\u6027\uff09\u548c\u201c\u4e09\u7279\u5b9a\u201d\uff08\u7279\u5b9a\u5bf9\u8c61\u3001\u7279\u5b9a\u8981\u6c42\u548c\u7279\u5b9a\u9650\u5236\uff09\u539f\u5219\u3002\u901a\u8fc7\u5e7f\u6cdb\u6536\u96c6\u5e08\u751f\u610f\u89c1\u5e76\u7ec4\u7ec7\u7f16\u59d4\u4eec\u53cd\u590d\u8ba8\u8bba\uff0c\u672c\u7248\u6559\u6750\u5728\u4f20\u627f\u7b2c9 \u7248\u7684\u57fa\u7840\u4e0a\uff0c\u5bf9\u5176\u57fa\u672c\u6846\u67b6\u548c\u5185\u5bb9\u8fdb\u884c\u4e86\u4e00\u4e9b\u8c03\u6574\uff0c\u4e3b\u8981\u5305\u62ec\uff1a\u2460\u5168\u4e66\u7531\u75be\u75c5\u6982\u8bba\u3001\u57fa\u672c\u75c5\u7406\u8fc7\u7a0b\u548c\u5668\u5b98\u7cfb\u7edf\u529f\u80fd\u969c\u788d\u4e09\u90e8\u5206\u7ec4\u6210\uff0c\u5176\u4e2d\u75be\u75c5\u6982\u8bba\u90e8\u5206\u589e\u52a0\u7ec6\u80de\u5206\u5316\u4e0e\u75be\u75c5\uff0c\u5e76\u5c06\u7ec6\u80de\u51cb\u4ea1\u6539\u4e3a\u7ec6\u80de\u6b7b\u4ea1\uff0c\u5f3a\u8c03\u4ece\u7ec6\u80de\u548c\u5206\u5b50\u673a\u5236\u7684\u89d2\u5ea6\u9610\u8ff0\u75be\u75c5\u53d1\u751f\u53d1\u5c55\u7684\u673a\u5236\u3002\u65b0\u589e\u201c\u8870\u8001\u4e0e\u75be\u75c5\u201d\u4e00\u7ae0\uff0c\u4e0e\u539f\u6709\u7684\u201c\u5e94\u6fc0\u201d\u4f5c\u4e3a\u75be\u75c5\u53d1\u751f\u53d1\u5c55\u76f8\u5173\u7684\u6982\u8bba\u90e8\u5206\u3002\u2461\u52aa\u529b\u66f4\u65b0\u4e86\u57fa\u7840\u4e0e\u7cfb\u7edf\u75c5\u7406\u8fc7\u7a0b\u7684\u53d1\u75c5\u673a\u5236\u4e0e\u9632\u6cbb\u539f\u5219\u4e2d\u5df2\u8fbe\u6210\u5171\u8bc6\u7684\u65b0\u8fdb\u5c55\uff0c\u5e76\u8ba4\u771f\u52d8\u8bef\uff0c\u6700\u5927\u9650\u5ea6\u5730\u51cf\u5c11\u9519\u5b57\u3001\u907f\u514d\u53d9\u8ff0\u9519\u8bef\u3002\u2462\u5c06\u201c\u6570\u5b57\u8d44\u6e90\u201d\u878d\u5165\u7eb8\u8d28\u6559\u6750\uff0c\u901a\u8fc7\u626b\u63cf\u7ae0\u4e8c\u7ef4\u7801\uff0c\u83b7\u5f97\u201c\u77e5\u8bc6\u62d3\u5c55\u3001PPT\u3001\u5fae\u8bfe\u3001\u75c5\u4f8b\u5206\u6790\u3001\u601d\u7ef4\u5bfc\u56fe\u3001\u81ea\u6d4b\u9898\u4ee5\u53ca\u52a8\u753b\u5c0f\u89c6\u9891\u201d\u7b49\u5185\u5bb9\uff0c\u6709\u6548\u589e\u52a0\u6559\u6750\u7684\u4fe1\u606f\u91cf\uff0c\u5e76\u51cf\u5c11\u6559\u6750\u7684\u7bc7\u5e45\u3002\n\n\u672c\u6559\u6750\u5f97\u5230\u4e86\u5168\u56fd\u9ad8\u7b49\u5b66\u6821\u4e94\u5e74\u5236\u672c\u79d1\u4e34\u5e8a\u533b\u5b66\u4e13\u4e1a\u6559\u6750\u8bc4\u5ba1\u59d4\u5458\u4f1a\u7684\u7ec4\u7ec7\u6307\u5bfc\uff0c\u6765\u81ea\u5168\u56fd18 \u6240\u533b\u5b66\u9662\u6821\u768419 \u4f4d\u7f16\u59d4\u53c2\u4e0e\u7f16\u5199\u3002\u5728\u7f16\u5199\u548c\u5b9a\u7a3f\u8fc7\u7a0b\u4e2d\uff0c\u5f97\u5230\u4e86\u4e0a\u6d77\u4ea4\u901a\u5927\u5b66\u533b\u5b66\u9662\u3001\u590d\u65e6\u5927\u5b66\u4e0a\u6d77\u533b\u5b66\u9662\u548c\u6d77\u5357\u533b\u79d1\u5927\u5b66\u7684\u5927\u529b\u652f\u6301\u548c\u5e2e\u52a9\u3002\u4e0a\u6d77\u4ea4\u901a\u5927\u5b66\u533b\u5b66\u9662\u9ec4\u83ba\u6559\u6388\u505a\u4e86\u5927\u91cf\u7684\u7ec4\u7ec7\u548c\u6587\u5b57\u5904\u7406\u5de5\u4f5c\uff0c\u5728\u6b64\u4e00\u5e76\u8868\u793a\u611f\u8c22\u3002\n\n\u672c\u6559\u6750\u7ecf\u7f16\u5199\u4f1a\u786e\u5b9a\u6846\u67b6\u548c\u5185\u5bb9\u540e\uff0c\u901a\u8fc7\u521d\u7a3f\u8ba8\u8bba\u3001\u4ea4\u53c9\u5ba1\u7a3f\u3001\u7f16\u59d4\u4fee\u6539\uff0c\u4e3b\u7f16\u548c\u526f\u4e3b\u7f16\u518d\u5ba1\u7a3f\u3001\u5b9a\u7a3f\u4f1a\u8ba8\u8bba\u7b49\u73af\u8282\uff0c\u529b\u6c42\u5b88\u6b63\u521b\u65b0\u3001\u7cbe\u76ca\u6c42\u7cbe\u3002\u7136\u800c\uff0c\u4e0d\u8db3\u4e4b\u5904\u5728\u6240\u96be\u514d\u3002\u6b22\u8fce\u4f7f\u7528\u672c\u6559\u6750\u7684\u6559\u5e08\u548c\u540c\u5b66\u63d0\u51fa\u6279\u8bc4\u548c\u5efa\u8bbe\u6027\u610f\u89c1\uff0c\u4ee5\u4fbf\u518d\u7248\u65f6\u8fdb\u4e00\u6b65\u66f4\u6b63\u3002...\n\n### \u9ad8\u8102\u8840\u75c7 \u2014 \u9009\u81ea\u300a\u75c5\u7406\u751f\u7406\u5b66\u300b\n\n...\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd107\n\n\u7b2c\u4e5d\u7ae0\u3000\u7cd6\u8102\u4ee3\u8c22\u7d0a\u4e71108\n\n\u7b2c\u4e00\u8282\u7cd6\u4ee3\u8c22\u7d0a\u4e71\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd108\u4e00\u3001\t \u9ad8\u7cd6\u8840\u75c7\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\uf d\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd120\u4e00\u3001\t \u75c5\u56e0\u548c\u673a\u5236\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd120\u4e8c\u3001\t \u673a\u4f53\u529f\u80fd\u4e0e\u4ee3\u8c22\u53d8\u5316\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd121\u4e09\u3001\t \u9632\u6cbb\u7684\u75c5\u7406\u751f\u7406\u5b66\u57fa\u7840\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd122\n\n\u7b2c\u5341\u7ae0\u7f3a\u6c27123\n\n\u7b2c\u4e00\u8282\u5e38\u7528\u7684\u8840\u6c27\u6307\u6807\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd123\u4e00\u3001\t \u8840\u6c27\u5206\u538b\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd123\u4e8c\u3001\t \u8840\u6c27\u5bb9\u91cf\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd123\u4e09\u3001\t \u8840\u6c27\u542b\u91cf\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd123\u56db\u3001\t \u8840\u7ea2\u86cb\u767d\u6c27\u9971\u548c\u5ea6\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd124\u7b2c\u4e8c\u8282\u7f3a\u6c27\u7684\u539f\u56e0\u3001\u5206\u7c7b\u548c\u8840\u6c27\u53d8\u5316\u7684\u7279\u70b9\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd124\u4e00\u3001\t \u4f4e\u5f20\u6027\u7f3a\u6c27\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd124...\n\n### \u4f4e\u94be\u8840\u75c7 \u2014 \u9009\u81ea\u300a\u75c5\u7406\u751f\u7406\u5b66\u300b\n\n...\u7684\u8840\u7ba1\u5f20\u529b\u589e\u5927\uff0c\u56e0\u800c\u53ef\u5bfc\u81f4\u9759\u8109\u7834\u88c2\u800c\u51fa\u73b0\u5c40\u90e8\u8111\u51fa\u8840\u6216\u86db\u7f51\u819c\u4e0b\u8154\u51fa\u8840\u3002\n\n\uff085\uff09 \u8131\u6c34\u70ed\uff1a\u4e25\u91cd\u7684\u60a3\u8005\uff0c\u5c24\u5176\u662f\u5c0f\u513f\uff0c\u7531\u4e8e\u6c57\u817a\u7ec6\u80de\u8131\u6c34\uff0c\u6c57\u6db2\u5206\u6ccc\u51cf\u5c11\uff0c\u4ece\u76ae\u80a4\u84b8\u53d1\u7684\u6c34\u968f\u4e4b\u51cf\u5c11\uff0c\u6563\u70ed\u53d7\u5230\u5f71\u54cd\uff0c\u5bfc\u81f4\u4f53\u6e29\u5347\u9ad8\uff0c\u79f0\u4e3a\u8131\u6c34\u70ed\uff08dehydration fever\uff09\u3002\n\n\uff081\uff09 \u9632\u6cbb\u539f\u53d1\u75c5\uff0c\u53bb\u9664\u75c5\u56e0\u3002\n\n\uff082\uff09 \u8865\u5145\u6c34\u5206\uff1a\u4e0d\u80fd\u7ecf\u53e3\u8fdb\u98df\u8005\u53ef\u7531\u9759\u8109\u6ef4\u51655% ~ 10% \u8461\u8404\u7cd6\u6eb6\u6db2\uff0c\u4f46\u8981\u6ce8\u610f\uff0c\u8f93\u5165\u8fc7\u591a\u4e0d\u542b\u7535\u89e3\u8d28\u7684\u8461\u8404\u7cd6\u6eb6\u6db2\u6709\u5f15\u8d77\u6c34\u4e2d\u6bd2\u7684\u5371\u9669\uff0c\u8f93\u5165\u8fc7\u5feb\u5219\u53c8\u52a0\u91cd\u5fc3\u810f\u8d1f\u62c5\u3002\n\n\uff083\uff09 \u9002\u5f53\u8865\u94a0\uff1a\u6c34\u3001\u94a0\u5747\u6709\u4e22\u5931\u7684\u60a3\u8005\uff0c\u867d\u7136\u8840\u94a0\u5347\u9ad8\uff0c\u4f46\u4f53\u5185\u603b\u94a0\u91cf\u662f\u51cf\u5c11\u7684\u3002\u6545\u5728\u6cbb\u7597\u8fc7\u7a0b\u4e2d\uff0c\u5f85\u7f3a\u6c34\u60c5\u51b5\u5f97\u5230\u4e00\u5b9a\u7a0b\u5ea6\u7ea0\u6b63\u540e\uff0c\u5e94\u9002\u5f53\u8865\u94a0\uff0c\u53ef\u7ed9\u4e88\u751f\u7406\u76d0\u6c34\u4e0e5% ~ 10% \u8461\u8404\u7cd6\u6df7\u5408\u6db2\u3002\uff084\uff09 \u9002\u5f53\u8865\u94be\uff1a\u7531\u4e8e\u7ec6\u80de\u5185\u8131\u6c34\uff0c\u94be\u4e5f\u540c\u65f6\u4ece\u7ec6\u80de\u5185\u91ca\u51fa\uff0c\u5f15\u8d77\u8840\u94be\u5347\u9ad8\uff0c\u5c3f\u4e2d\u6392\u94be\u4e5f\u591a\u3002\u5c24\u5176\u5f53\u60a3\u8005\u919b\u56fa\u916e\u589e\u52a0\u65f6\uff0c\u8865\u6db2\u82e5\u53ea\u7ed9\u4e88\u76d0\u6c34\u548c\u8461\u8404\u7cd6\u6eb6\u6db2\uff0c\u5219\u589e\u52a0\u4e86\u94be\u5411\u7ec6\u80de\u5185\u7684\u8f6c\u8fd0\uff0c\u6613\u51fa\u73b0\u4f4e\u94be\u8840\u75c7\uff0c\n\n\u7b49\u6e17\u6027\u8131\u6c34\uff08isotonic dehydration\uff09\u7684\u7279\u70b9\u662f\u6c34\u3001\u94a0\u6210\u6bd4\u4f8b\u4e22\u5931\uff0c\u8840\u5bb9\u91cf\u51cf\u5c11\uff0c\u4f46\u8840\u6e05\u94a0\u6d53\u5ea6\u548c\u8840\u6d46\u4efb\u4f55\u7b49\u6e17\u6027\u4f53\u6db2\u7684\u5927\u91cf\u4e22\u5931\u5728\u77ed\u671f\u5185\u5747\u5c5e\u7b49\u6e17\u6027\u8131\u6c34\uff0c\u53ef\u89c1\u4e8e\u5455\u5410\u3001\u8179\u6cfb\u3001\u5927\u9762\u79ef\u70e7\u4f24\u3001\u5927\u91cf\u62bd\u653e\u80f8\uff08\u8179\uff09\u8154\u79ef\u6db2\u7b49\u3002\u7b49\u6e17\u6027\u8131\u6c34\u5982\u679c\u4e0d\u8fdb\u884c\u5904\u7406\uff0c\u53ef\u901a\u8fc7\u76ae\u80a4\u548c\u547c\u5438\u7684\u4e0d\u611f\u84b8\u53d1\uff0c\u4e0d\u65ad\u4e22\u5931\u6c34\u5206\u800c\u8f6c\u53d8\u4e3a\u9ad8\u6e17\u6027\u8131\u6c34\uff1b\u5982\u679c\u53ea\u8865\u5145\u6c34\u6216\u7ed9\u4e88\u8fc7\u591a\u4f4e\u6e17\u6eb6\u6db2\uff0c\u5219\u53ef\u8f6c\u53d8\u4e3a\u4f4e\u94a0\u8840\u75c7\u6216\u4f4e\u6e17\u6027\u8131\u6c34\u3002\u56e0\u6b64\uff0c\u5355\u7eaf\u6027\u7684\u7b49\u6e17\u6027\u8131\u6c34\u4e34\u5e8a\u4e0a\u8f83\u5c11\u89c1\u3002\n\n\u6c34\u4e2d\u6bd2\uff08water intoxication\uff09\u7684\u7279\u70b9\u662f\u6c34\u5728\u4f53\u5185\u6f74\u7559\u4f7f\u4f53\u6db2\u91cf\u660e\u663e\u589e\u591a\uff0c\u8840\u6e05\u94a0\u6d53\u5ea6 < 135mmol / L\uff0c\u8840$\u6d46\u6e17\u900f\u538b < 280mOsm/\uff08kg\u00b7H$2O\uff09\uff0c\u4f46\u4f53\u5185\u94a0\u603b\u91cf\u6b63\u5e38\u6216\u589e\u591a\uff0c\u53c8\u79f0\u4e3a\u9ad8\u5bb9\u91cf\u6027\u4f4e\u94a0\u8840\u75c7\uff08hypervolemic hyponatremia\uff09\u3002\n\n1. \u6c34\u6444\u5165\u8fc7\u591a \u5982\u7528\u65e0\u76d0\u6c34\u704c\u80a0\u5bfc\u81f4\u80a0\u9053\u5438\u6536\u6c34\u5206\u8fc7\u591a\u3001\u7cbe\u795e\u6027\u996e\u6c34\u8fc7\u91cf\u3001\u6301\u7eed\u6027\u5927\u91cf\u996e\u6c34\u7b49\u3002\u6b64\u5916\uff0c\u9759\u8109\u8f93\u5165\u542b\u76d0\u5c11\u6216\u4e0d\u542b\u76d0\u7684\u6db2\u4f53\u8fc7\u591a\u8fc7\u5feb\uff0c\u8d85\u8fc7\u80be\u810f\u7684\u6392\u6c34\u80fd\u529b\uff0c\u4e5f\u53ef\u5bfc\u81f4\u6c34\u6444\u5165\u8fc7\u591a\u3002\u7531\u4e8e\u5a74\u5e7c\u513f\u5bf9\u6c34\u3001\u7535\u89e3\u8d28\u8c03\u8282\u80fd\u529b\u5dee\uff0c\u6545\u66f4\u6613\u53d1\u751f\u6c34\u4e2d\u6bd2\u3002\n2. \u6c34\u6392\u51fa\u51cf\u5c11 \u591a\u89c1\u4e8e\u6025\u6027\u80be\u8870\u7aed\u6216ADH \u5206\u6ccc\u8fc7\u591a\uff08\u5982\u6050\u60e7\u3001\u75bc\u75db\u3001\u5931\u8840\u3001\u4f11\u514b\u6216\u5916\u4f24\u65f6\uff0c\u7531\u4e8e\u4ea4\u611f\u795e\u7ecf\u5174\u594b\uff0c\u89e3\u9664\u4e86\u526f\u4ea4\u611f\u795e\u7ecf\u5bf9ADH \u5206\u6ccc\u7684\u6291\u5236\uff09\u3002\n\n\u5728\u80be\u529f\u80fd\u826f\u597d\u7684\u60c5\u51b5\u4e0b\uff0c\u4e00\u822c\u4e0d\u6613\u53d1\u751f\u6c34\u4e2d\u6bd2\uff0c\u6545\u6c34\u4e2d\u6bd2\u6700\u5e38\u53d1\u751f\u4e8e\u6025\u6027\u80be\u529f\u80fd\u4e0d\u5168\u7684\u60a3\u8005\u800c\u53c8\u8f93\u6db2\u4e0d\u6070\u5f53\u65f6\u3002\n\n\uff08\u4e8c\uff09\u2002 \u5bf9\u673a\u4f53\u7684\u5f71\u54cd\n\n1. \u7ec6\u80de\u5185\u3001\u5916\u6db2\u5747\u589e\u591a \u8fc7\u591a\u7684\u4f4e\u6e17\u6027\u4f53\u6db2\u5728\u4f53\u5185\u6f74\u7559\uff0c\u4f7f\u7ec6\u80de\u5916\u6db2\u589e\u52a0\uff0c\u8840\u6db2\u7a00\u91ca\u3002\u56e0\u8840\u94a0\u6d53\u5ea6\u964d\u4f4e\uff0c\u7ec6\u80de\u5916\u6db2\u4f4e\u6e17\uff0c\u6c34\u81ea\u7ec6\u80de\u5916\u5411\u7ec6\u80de\u5185\u8f6c\u79fb\uff0c\u9020\u6210\u7ec6\u80de\u80bf\u80c0\u3002\u7531\u4e8e\u7ec6\u80de\u5185\u6db2\u5bb9\u91cf\u5927\u4e8e\u7ec6\u80de\u5916\u6db2\uff0c\u8fc7\u591a\u7684\u6c34\u5206\u5927\u90fd\u805a\u96c6\u5728\u7ec6\u80de\u5185\u3002\u65e9\u671f\u6f74\u7559\u5728\u7ec4\u7ec7\u95f4\u9699\u7684\u6c34\u5c1a\u4e0d\u8db3\u4ee5\u4ea7\u751f\u51f9\u9677\u6027\u6c34\u80bf\uff0c\u665a\u671f\u6216\u91cd\u75c7\u60a32.\u2002 \u4e2d\u67a2\u795e\u7ecf\u7cfb\u7edf\u75c7\u72b6 \u7ec6\u80de\u5185\u3001\u5916\u6db2\u589e\u591a\u4f1a\u5bf9\u4e2d\u67a2\u795e\u7ecf\u7cfb\u7edf\u4ea7\u751f\u4e25\u91cd\u4e0d\u a\u9178\u78b1\u7269\u8d28\u7684\u6765\u6e90\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd88\u4e00\u3001\t \u9178\u78b1\u7684\u6982\u5ff5\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd...\n\n### \u9ad8\u94be\u8840\u75c7 \u2014 \u9009\u81ea\u300a\u75c5\u7406\u751f\u7406\u5b66\u300b\n\n...\u5236\u662f\uff1a\u2460 \u7531\u4e8e\u7ec6\u80de\u5916\u6db2K + \u51cf\u5c11\uff0cK + \u4ece\u7ec6\u80de\u5185\u79fb\u51fa\u4ee5\u4ee3\u507f\uff0c\u800c\u7ec6\u80de\u5916H + \u8fdb\u5165\u7ec6\u80de\uff0c\u5f15\u8d77\u7ec6\u80de\u5916\u6db2\u78b1\u4e2d\u6bd2\uff1b\u2461 \u80be\u5c0f\u7ba1\u4e0a\u76ae\u7ec6\u80de\u4e5f\u53d1\u751f\u6b64\u79cd\u79bb\u5b50\u8f6c\u79fb\uff0c\u6545\u7ec6\u80de\u5185K + \u51cf\u5c11\u800cH +\u589e\u591a\uff0c\u9020\u6210\u80be\u5c0f\u7ba1K +\u200a-\u200aNa + \u4ea4\u6362\u51cf\u5f31\u800cH +\u200a-\u200aNa + \u4ea4\u6362\u52a0\u5f3a\uff0c\u56e0\u800c\u5c3f\u6392K + \u51cf\u5c11\uff0c\u6392H + \u589e\u591a\uff0c\u52a0\u91cd\u4ee3\u8c22\u6027\u78b1\n\n\uff081\uff09 \u9632\u6cbb\u539f\u53d1\u75c5\uff0c\u5c3d\u5feb\u6062\u590d\u996e\u98df\u548c\u80be\u529f\u80fd\u3002\n\n\uff082\uff09 \u53ca\u65f6\u8865\u94be\uff1a\u5bf9\u4e25\u91cd\u4f4e\u94be\u8840\u75c7\u6216\u51fa\u73b0\u5fc3\u5f8b\u5931\u5e38\u3001\u808c\u8089\u762b\u75ea\u7b49\u5e76\u53d1\u75c7\u8005\uff0c\u5e94\u53ca\u65f6\u8865\u94be\u3002\u6700\u597d\u53e3\u670d\uff0c\u91cd\u75c7\u6216\u4e0d\u80fd\u53e3\u670d\u8005\uff0c\u624d\u8003\u8651\u9759\u8109\u6ef4\u6ce8\u8865\u94be\u3002\u8865\u94be\u65f6\u5e94\u89c2\u5bdf\u5fc3\u7387\u3001\u5fc3\u5f8b\u548c\u5c3f\u91cf\uff0c\u5b9a\u65f6\u6d4b\u5b9a\u8840\u94be\u6d53\u5ea6\u3002\u7ec6\u80de\u5185\u7f3a\u94be\u6062\u590d\u8f83\u6162\uff0c\u56e0\u6b64\u8865\u94be\u4e0d\u53ef\u64cd\u4e4b\u8fc7\u6025\u3002\n\n\uff083\uff09 \u7ea0\u6b63\u6c34\u548c\u5176\u4ed6\u7535\u89e3\u8d28\u4ee3\u8c22\u7d0a\u4e71\uff1a\u5f15\u8d77\u4f4e\u94be\u8840\u75c7\u7684\u539f\u56e0\u5e38\u5e38\u540c\u65f6\u5f15\u8d77\u6c34\u548c\u5176\u4ed6\u7535\u89e3\u8d28\u4ee3\u8c22\u7d0a\u4e71\uff0c\u5e94\u53ca\u65f6\u68c0\u67e5\u5e76\u52a0\u4ee5\u7ea0\u6b63\u3002\u4f4e\u94be\u8840\u75c7\u6613\u4f34\u53d1\u4f4e\u9541\u8840\u75c7\uff0c\u5982\u679c\u4e24\u8005\u5e76\u5b58\uff0c\u7531\u4e8e\u7f3a\u9541\u53ef\u5f15\u8d77\u4f4e\u94be\uff0c\u6545\u8865\u94be\n\n\u8840\u6e05\u94be\u6d53\u5ea6\u9ad8\u4e8e5.3mmol / L \u79f0\u4e3a\u9ad8\u94be\u8840\u75c7\uff08hyperkalemia\uff09\u3002\u9ad8\u94be\u8840\u75c7\u65f6\u4f53\u5185\u603b\u94be\u91cf\u53ef\u589e\u591a\u3001\u6b63\u5e38\n\n\uff081\uff09 \u94be\u6444\u5165\u8fc7\u591a\uff1a\u4e3b\u8981\u89c1\u4e8e\u5904\u7406\u4e0d\u5f53\uff0c\u5982\u7ecf\u9759\u8109\u8f93\u5165\u8fc7\u591a\u94be\u76d0\u6216\u8f93\u5165\u5927\u91cf\u5e93\u5b58\u8840\u3002\n\n\uff082\uff09 \u94be\u6392\u51fa\u51cf\u5c11\uff1a\u4e3b\u8981\u662f\u80be\u810f\u6392\u94be\u51cf\u5c11\uff0c\u8fd9\u662f\u9ad8\u94be\u8840\u75c7\u6700\u4e3b\u8981\u7684\u539f\u56e0\u3002\u5e38\u89c1\u4e8e\uff1a\u2460 \u80be\u8870\u7aed\uff1a\u5728\u6025\u6027\u80be\u8870\u7aed\u5c11\u5c3f\u671f\u6216\u6162\u6027\u80be\u8870\u7aed\u665a\u671f\uff0c\u56e0\u80be\u5c0f\u7403\u6ee4\u8fc7\u7387\u51cf\u5c11\u6216\u80be\u5c0f\u7ba1\u6392\u94be\u529f\u80fd\u969c\u788d\uff0c\u5f80\u5f80\u53d1\u751f\u9ad8\u94be\u8840\u75c7\u3002\u2461 \u76d0\u76ae\u8d28\u6fc0\u7d20\u7f3a\u4e4f\uff1a\u5305\u62ec\u7edd\u5bf9\u548c\u76f8\u5bf9\u7f3a\u4e4f\u4e24\u79cd\u60c5\u51b5\u3002\u524d\u8005\u89c1\u4e8e\u80be\u4e0a\u817a\u76ae\u8d28\u529f\u80fd\u51cf\u9000\uff0c\u540e\u8005\u89c1\u4e8e\u67d0\u4e9b\u80be\u5c0f\u7ba1\u75be\u75c5\uff08\u5982\u95f4\u8d28\u6027\u80be\u708e\u3001\u72fc\u75ae\u80be\u3001\u79fb\u690d\u80be\u7b49\uff09\uff0c\u5bf9\u919b\u56fa\u916e\u7684\u53cd\u5e94\u4f4e\u4e0b\u3002\u4e24\u8005\u5747\u8868\u73b0\u4e3a\u80be\u8fdc\u66f2\u5c0f\u7ba1\u3001\u96c6\u5408\u7ba1\u6392\u94be\u969c\u788d\uff0c\u81f4\u4f7f\u8840\u94be\u5347\u9ad8\u3002\u2462 \u957f\u671f\u5e94\u7528\u6f74\u94be\u5229\u5c3f\u5242\uff1a\u87ba\u5185\u916f\u548c\u6c28\u82ef\u8776\u5576\u7b49\u80fd\u5bf9\u6297\u919b\u56fa\u916e\u4fdd\u94a0\u6392\u94be\u7684\u4f5c\u7528\uff0c\u6545\u957f\u671f\u5927\u91cf\u5e94\u7528\u53ef\u5f15\u8d77\u9ad8\u94be\u8840\u75c7\u3002\n\n\uff083\uff09 \u7ec6\u80de\u5185\u94be\u8f6c\u79fb\u5230\u7ec6\u80de\u5916\uff1a\u7ec6\u80de\u5185\u94be\u8fc5\u901f\u8f6c\u79fb\u5230\u7ec6\u80de\u5916\uff0c\u5f53\u8d85\u8fc7\u80be\u7684\u6392\u94be\u80fd\u529b\u65f6\uff0c\u8840\u94be\u6d53\u5ea6\u5347\u9ad8\u3002\u4e3b\u8981\u89c1\u4e8e\u4ee5\u4e0b\u60c5\u51b5\u3002\n\n1\uff09 \u9178\u4e2d\u6bd2\uff1a\u9178\u4e2d\u6bd2\u65f6\u6613\u4f34\u53d1\u9ad8\u94be\u8840\u75c7\uff0c\u5176\u673a\u5236\u662f\uff1a\u2460 \u9178\u4e2d\u6bd2\u65f6\u7ec6\u80de\u5916\u6db2H + \u6d53\u5ea6\u5347\u9ad8\uff0cH + \u8fdb\u5165\u7ec6\u80de\u4ee5\u7f13\u51b2\uff0c\u800c\u7ec6\u80de\u5185K + \u8f6c\u5230\u7ec6\u80de\u5916\u4ee5\u7ef4\u6301\u7535\u8377\u5e73\u8861\uff1b\u2461 \u80be\u5c0f\u7ba1\u4e0a\u76ae\u7ec6\u80de\u4e5f\u53d1\u751f\u6b64\u79cd\u79bb\u5b50\u8f6c\u79fb\uff0c\u81f4\u4f7fH +\u200a-\u200aNa + \u4ea4\u6362\u52a0\u5f3a\uff0c\u800cK +\u200a-\u200aNa + \u4ea4\u6362\u51cf\u5f31\uff0c\u5c3f\u94be\u6392\u51fa\u51cf\u5c11\u3002\n\n2\uff09 \u9ad8\u8840\u7cd6\u5408\u5e76\u80f0\u5c9b\u7d20\u4e0d\u8db3\uff1a\u89c1\u4e8e\u7cd6\u5c3f\u75c5\uff0c\u5176\u673a\u5236\u662f\uff1a\u80f0\u5c9b\u7d20\u7f3a\u4e4f\u4f7f\u94be\u8fdb\u5165\u7ec6\u80de\u51cf\u5c11\uff0c\u540c\u65f6\uff0c\u9ad8\u8840\u7cd6\u5f62\u6210\u7684\u8840\u6d46\u9ad8\u6e17\u900f\u538b\u5f15\u8d77\u7ec6\u80de\u8131\u6c34\uff0c\u7ec6\u80de\u5185\u6db2\u94be\u6d53\u5ea6\u589e\u9ad8\uff0c\u94be\u5411\u7ec6\u80de\u5916\u8f6c\u79fb\u589e\u591a\u3002\n\n$3\uff09 \u67d0\u4e9b\u836f\u7269\u7684\u4f7f\u7528\uff1a\u03b2\u53d7\u4f53\u62ee\u6297\u5242\u3001\u6d0b\u5730\u9ec4\u7c7b\u836f\u7269\u7b49\u901a\u8fc7\u5e72\u6270Na$ +\u200a-\u200aK + \u6cf5\u7684\u6d3b\u6027\u800c\u59a8\u788d\u7ec6\u80de\u6444\u94be\u3002\u808c\u8089\u677e\u5f1b\u5242\u6c2f\u5316\u7425\u73c0\u80c6\u78b1\u53ef\u589e\u5927\u9aa8\u9abc\u808c\u819c\u5bf9K + \u7684\u901a\u900f\u6027\uff0c\u4f7f\u7ec6\u80de\u5185\u94be\u5916\u79fb\uff0c\u5bfc\u81f4\u8840\u94be\u5347\u9ad8\u30024\uff09 \u7ec4\u7ec7\u5206\u89e3\uff1a\u5982\u6eb6\u8840\u3001\u6324\u538b\u7efc\u5408\u5f81\u65f6\uff0c\u7ec6\u80de\u5185\u94be\u5927\u91cf\u91ca\u51fa\u800c\u5f15\u8d77\u9ad8\u94be\u8840\u75c7\u3002\n\n5\uff09 \u7f3a\u6c27\uff1a\u7f3a\u6c27\u65f6\u7ec6\u80deATP \u751f\u6210\u4e0d\u8db3\uff0c\u7ec6\u80de\u819c\u4e0aNa +\u200a-\u200aK + \u6cf5\u8fd0\u8f6c\u969c\u788d\uff0c\u4f7fNa + \u5728\u7ec6\u80de\u5185\u6f74\u7559\uff0c\u800c\u7ec6\u80de\u5916K + \u4e0d\u6613...\n\n---\n\n# \u5fae\u751f\u7269\u4e0e\u4f20\u67d3\u75c5\n\n\u672c\u7ae0\u6db5\u76d6\u5185\u6bd2\u7d20\u3001\u80bd\u805a\u7cd6\u3001\u4f20\u67d3\u75c5\u3001\u9769\u5170\u6c0f\u9634\u6027\u83cc\u3001\u611f\u67d3\u6027\u75be\u75c5\u3001\u5916\u6bd2\u7d20\u7b49\u6838\u5fc3\u77e5\u8bc6\u70b9\uff0c\u6574\u5408\u81ea6\u672c\u6559\u6750\u76f8\u5173\u5185\u5bb9\u3002\n\n## \u6838\u5fc3\u6982\u5ff5\u4e0e\u5b9a\u4e49\n\n**\u5185\u6bd2\u7d20**\uff1a\u5185\u6bd2\u7d20\uff08ET\uff09\u662f\u9769\u5170\u6c0f\u9634\u6027\u83cc\u7ec6\u80de\u58c1\u4e2d\u7684\u4e3b\u8981\u81f4\u70ed\u6210\u5206\uff0c\u4e3b\u8981\u6210\u5206\u4e3a\u8102\u591a\u7cd6\uff08LPS\uff09\u3002\n*\u6765\u6e90\uff1a\u533b\u5b66\u5fae\u751f\u7269\u5b66\u3001\u4f20\u67d3\u75c5\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u80bd\u805a\u7cd6**\uff1a\u7ec6\u83cc\u7ec6\u80de\u58c1\u7684\u4e3b\u8981\u6210\u5206\uff0c\u5176\u805a\u7cd6\u9aa8\u67b6\u7531N-\u4e59\u9170\u8461\u8404\u7cd6\u80fa\u548cN-\u4e59\u9170\u80de\u58c1\u9178\u901a\u8fc7\u03b2-1,4\u7cd6\u82f7\u952e\u8fde\u63a5\uff0c\u4ea4\u53c9\u8054\u7ed3\u5f62\u6210\u7f51\u72b6\u7ed3\u6784\u3002\n*\u6765\u6e90\uff1a\u533b\u5b66\u5fae\u751f\u7269\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66  \u2190 \u524d\u7f6e\uff1a\u7ec6\u83ccL-\u578b*\n\n**\u4f20\u67d3\u75c5**\uff1a\u7531\u75c5\u539f\u5fae\u751f\u7269\u611f\u67d3\u673a\u4f53\u540e\u4ea7\u751f\u7684\u6709\u4f20\u67d3\u6027\u3001\u5728\u4e00\u5b9a\u6761\u4ef6\u4e0b\u53ef\u9020\u6210\u6d41\u884c\u7684\u75be\u75c5\u3002\n*\u6765\u6e90\uff1a\u533b\u5b66\u5fae\u751f\u7269\u5b66\u3001\u4f20\u67d3\u75c5\u5b66  \u2190 \u524d\u7f6e\uff1a\u611f\u67d3 \u2192 \u4f20\u67d3\u75c5\u7684\u53d1\u75c5\u673a\u5236*\n\n**\u9769\u5170\u6c0f\u9634\u6027\u83cc**\uff1a\u4e00\u7c7b\u7ec6\u83cc\uff0c\u5176\u56db\u80bd\u4fa7\u94fe\u7b2c3\u4f4d\u6c28\u57fa\u9178\u4e3a\u4e8c\u6c28\u57fa\u5e9a\u4e8c\u9178\uff0c\u4e0e\u76f8\u90bb\u56db\u80bd\u4fa7\u94fe\u76f4\u63a5\u8fde\u63a5\uff0c\u5f62\u6210\u4e8c\u7ef4\u7ed3\u6784\u3002\n*\u6765\u6e90\uff1a\u533b\u5b66\u5fae\u751f\u7269\u5b66*\n\n**\u611f\u67d3\u6027\u75be\u75c5**\uff1aDIC \u7684\u5e38\u89c1\u75c5\u56e0\u4e4b\u4e00\uff0c\u5305\u62ec\u8113\u6bd2\u75c7\u3001\u4e25\u91cd\u611f\u67d3\u3001\u5185\u6bd2\u7d20\u8840\u75c7\u7b49\u3002\n*\u6765\u6e90\uff1a\u533b\u5b66\u5fae\u751f\u7269\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u5916\u6bd2\u7d20**\uff1a\u591a\u6570\u9769\u5170\u6c0f\u9633\u6027\u83cc\u548c\u5c11\u6570\u9769\u5170\u6c0f\u9634\u6027\u83cc\u5728\u751f\u957f\u7e41\u6b96\u8fc7\u7a0b\u4e2d\u91ca\u653e\u5230\u83cc\u4f53\u5916\u7684\u86cb\u767d\u8d28\u3002\n*\u6765\u6e90\uff1a\u533b\u5b66\u5fae\u751f\u7269\u5b66\u3001\u4f20\u67d3\u75c5\u5b66*\n\n**\u7ec6\u83cc**\uff1a\u7ec6\u83cc\u57df\u7ec6\u83cc\u754c\u6210\u5458\uff0c\u5c5e\u4e8e\u539f\u6838\u7ec6\u80de\u578b\u5fae\u751f\u7269\uff0c\u7ec6\u80de\u6838\u5206\u5316\u7a0b\u5ea6\u4f4e\uff0c\u4e3a\u539f\u59cb\u6838\u8d28\uff0c\u65e0\u6838\u819c\u548c\u6838\u4ec1\uff0cDNA\u4e3a\u9057\u4f20\u7269\u8d28\uff0c\u9664\u6838\u7cd6\u4f53\u5916\u65e0\u5176\u4ed6\u7ec6\u80de\u5668\uff0c\u7edd\u5927\u591a\u6570\u5177\u6709\u80bd\u805a\u7cd6\u3002\n*\u6765\u6e90\uff1a\u533b\u5b66\u5fae\u751f\u7269\u5b66*\n\n**\u6d88\u6bd2**\uff1a\u6740\u6b7b\u7269\u4f53\u4e0a\u6216\u73af\u5883\u4e2d\u7684\u75c5\u539f\u5fae\u751f\u7269\uff0c\u4e0d\u4e00\u5b9a\u80fd\u6740\u6b7b\u7ec6\u83cc\u82bd\u80de\u6216\u975e\u75c5\u539f\u5fae\u751f\u7269\u7684\u65b9\u6cd5\u3002\n*\u6765\u6e90\uff1a\u533b\u5b66\u5fae\u751f\u7269\u5b66  \u2190 \u524d\u7f6e\uff1a\u6e05\u6d01 \u2192 \u706d\u83cc\u5242*\n\n**\u9769\u5170\u6c0f\u9633\u6027\u83cc**\uff1a\u7ec6\u80de\u58c1\u8f83\u575a\u97e7\uff0c\u80bd\u805a\u7cd6\u542b\u91cf\u591a\uff0c\u6709\u78f7\u58c1\u9178\uff0c\u8102\u7c7b\u542b\u91cf\u5c11\uff0c\u7cd6\u7c7b\u542b\u91cf\u591a\u7684\u4e00\u7c7b\u7ec6\u83cc\u3002\n*\u6765\u6e90\uff1a\u533b\u5b66\u5fae\u751f\u7269\u5b66*\n\n**\u4f20\u67d3\u75c5\u7684\u7279\u5f81**\uff1a\u4f20\u67d3\u75c5\u533a\u522b\u4e8e\u5176\u4ed6\u75be\u75c5\u7684\u7279\u6709\u8868\u73b0\n*\u6765\u6e90\uff1a\u4f20\u67d3\u75c5\u5b66*\n\n**\u751f\u957f\u56e0\u5b50**\uff1a\u8bb8\u591a\u7ec6\u83cc\u751f\u957f\u6240\u9700\u81ea\u8eab\u4e0d\u80fd\u5408\u6210\u7684\u6709\u673a\u5316\u5408\u7269\uff0c\u5982\u7ef4\u751f\u7d20\u3001\u67d0\u4e9b\u6c28\u57fa\u9178\u3001\u560c\u5464\u3001\u5627\u5576\u7b49\uff0c\u5c11\u6570\u7ec6\u83cc\u9700\u7279\u6b8a\u751f\u957f\u56e0\u5b50\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66\u3001\u533b\u5b66\u5fae\u751f\u7269\u5b66\u3001\u75c5\u7406\u5b66*\n\n**\u514d\u75ab\u5b66**\uff1a\u7814\u7a76\u611f\u67d3\u514d\u75ab\u73b0\u8c61\u672c\u8d28\u7684\u5b66\u79d1\uff0c\u5174\u8d77\u4e8e18\u4e16\u7eaa\u672b\uff0c\u4ee5\u725b\u75d8\u9884\u9632\u5929\u82b1\u4e3a\u5f00\u7aef\u3002\n*\u6765\u6e90\uff1a\u533b\u5b66\u5fae\u751f\u7269\u5b66\u3001\u75c5\u7406\u5b66\u3001\u4f20\u67d3\u75c5\u5b66  \u2190 \u524d\u7f6e\uff1a\u4f20\u67d3\u75c5\u5b66*\n\n**\u4eba\u7c7b\u514d\u75ab\u7f3a\u9677\u75c5\u6bd2**\uff1a\u4e00\u79cd\u611f\u67d3CD4+T\u6dcb\u5df4\u7ec6\u80de\u7684\u75c5\u6bd2\uff0c\u901a\u8fc7\u591a\u79cd\u673a\u5236\u8bf1\u5bfc\u7ec6\u80de\u51cb\u4ea1\u3002\n*\u6765\u6e90\uff1a\u533b\u5b66\u5fae\u751f\u7269\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u5fae\u751f\u7269\u5206\u7c7b\u5b66**\uff1a\u5fae\u751f\u7269\u5b66\u5206\u652f\u5b66\u79d1\uff0c\u9488\u5bf9\u5fae\u751f\u7269\u5b66\u57fa\u672c\u95ee\u9898\uff0c\u7814\u7a76\u5fae\u751f\u7269\u7684\u5206\u7c7b\u3002\n*\u6765\u6e90\uff1a\u533b\u5b66\u5fae\u751f\u7269\u5b66*\n\n**\u78f7\u58c1\u9178**\uff1a\u7531\u6838\u7cd6\u9187\u6216\u7518\u6cb9\u6b8b\u57fa\u7ecf\u78f7\u9178\u4e8c\u916f\u952e\u8fde\u63a5\u6210\u7684\u94fe\u72b6\u591a\u805a\u7269\uff0c\u7a7f\u63d2\u4e8e\u80bd\u805a\u7cd6\u5c42\u4e2d\uff0c\u662f\u7ec6\u83cc\u7ec6\u80de\u5e26\u8d1f\u7535\u8377\u7684\u91cd\u8981\u7269\u8d28\u57fa\u7840\u3002\n*\u6765\u6e90\uff1a\u533b\u5b66\u5fae\u751f\u7269\u5b66*\n\n**\u706d\u83cc**\uff1a\u6740\u706d\u7269\u4f53\u4e0a\u6240\u6709\u5fae\u751f\u7269\u7684\u65b9\u6cd5\uff0c\u5305\u62ec\u6740\u706d\u7ec6\u83cc\u82bd\u80de\u3001\u75c5\u6bd2\u548c\u771f\u83cc\u7b49\u5728\u5185\u7684\u5168\u90e8\u75c5\u539f\u5fae\u751f\u7269\u548c\u975e\u75c5\u539f\u5fae\u751f\u7269\u3002\n*\u6765\u6e90\uff1a\u533b\u5b66\u5fae\u751f\u7269\u5b66  \u2190 \u524d\u7f6e\uff1a\u6d88\u6bd2 \u2192 \u6e05\u6d01*\n\n**\u6d41\u884c\u6027\u611f\u5192\u75c5\u6bd2\u611f\u67d3**\uff1a\u7531\u6d41\u884c\u6027\u611f\u5192\u75c5\u6bd2\u5f15\u8d77\u7684\u6025\u6027\u547c\u5438\u9053\u4f20\u67d3\u75c5\n*\u6765\u6e90\uff1a\u4f20\u67d3\u75c5\u5b66*\n\n**\u75c5\u539f\u4f53**\uff1a\u5f15\u8d77\u611f\u67d3\u7684\u5fae\u751f\u7269\u6216\u5bc4\u751f\u866b\uff0c\u79cd\u7c7b\u8d85\u8fc7500\u79cd\uff0c\u53ef\u6765\u81ea\u5bbf\u4e3b\u4f53\u5916\u6216\u4f53\u5185\u3002\n*\u6765\u6e90\uff1a\u4f20\u67d3\u75c5\u5b66*\n\n**\u6025\u6027\u671f\u53cd\u5e94**\uff1a\u673a\u4f53\u5728\u7ec6\u83cc\u611f\u67d3\u548c\u7ec4\u7ec7\u635f\u4f24\u65f6\u51fa\u73b0\u7684\u4e00\u7cfb\u5217\u6025\u6027\u65f6\u76f8\u7684\u53cd\u5e94\uff0c\u5305\u62ec\u6025\u6027\u671f\u86cb\u767d\u5408\u6210\u589e\u591a\u7b49\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u5206\u5b50\u751f\u7269\u5b66**\uff1a\u4f20\u67d3\u75c5\u5b66\u7684\u57fa\u7840\u5b66\u79d1\u4e4b\u4e00\uff0c\u5176\u5174\u8d77\u63a8\u52a8\u4e86\u751f\u547d\u79d1\u5b66\u548c\u533b\u5b66\u7684\u53d1\u5c55\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66\u3001\u75c5\u7406\u5b66\u3001\u4f20\u67d3\u75c5\u5b66  \u2190 \u524d\u7f6e\uff1a\u4f20\u67d3\u75c5\u5b66*\n\n**\u73af\u5883\u56e0\u7d20**\uff1a\u5305\u62ec\u75c5\u6bd2\u611f\u67d3\u3001\u5316\u5b66\u635f\u4f24\u548c\u996e\u98df\u7b49\uff0c\u4ee5\u75c5\u6bd2\u611f\u67d3\u6700\u4e3a\u91cd\u8981\uff0c\u53ef\u4fc3\u53d1\u80f0\u5c9b\u03b2\u7ec6\u80de\u635f\u4f24\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u8102\u8d28\u53cc\u5c42**\uff1a\u7531\u78f7\u8102\u548c\u86cb\u767d\u8d28\u7ec4\u6210\u7684\u53cc\u5c42\u819c\uff0c\u4e3a\u5916\u819c\u7684\u5185\u5c42\uff0c\u7c7b\u4f3c\u7ec6\u83cc\u7ec6\u80de\u819c\u4f46\u51e0\u4e4e\u4e0d\u542b\u9176\u7c7b\uff0c\u9576\u5d4c\u6709\u5916\u819c\u86cb\u767d\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66\u3001\u533b\u5b66\u5fae\u751f\u7269\u5b66*\n\n**\u810a\u9ad3\u7070\u8d28\u708e\u75c5\u6bd2**\uff1a\u810a\u9ad3\u7070\u8d28\u708e\u75c5\u6bd2\u662f\u5f15\u8d77\u810a\u9ad3\u7070\u8d28\u708e\u7684\u75c5\u539f\u4f53\uff0c\u5c5e\u4e8e\u80a0\u9053\u75c5\u6bd2\u5c5e\u3002\n*\u6765\u6e90\uff1a\u533b\u5b66\u5fae\u751f\u7269\u5b66\u3001\u4f20\u67d3\u75c5\u5b66*\n\n**\u533b\u5b66\u5fae\u751f\u7269\u5b66**\uff1a\u7814\u7a76\u4e0e\u533b\u5b66\u6709\u5173\u7684\u75c5\u539f\u5fae\u751f\u7269\u7684\u751f\u7269\u5b66\u7279\u6027\u3001\u81f4\u75c5\u673a\u5236\u3001\u6297\u611f\u67d3\u514d\u75ab\u673a\u5236\u53ca\u611f\u67d3\u6027\u75be\u75c5\u8bca\u65ad\u9632\u6cbb\u7684\u5b66\u79d1\u3002\n*\u6765\u6e90\uff1a\u533b\u5b66\u5fae\u751f\u7269\u5b66\u3001\u75c5\u7406\u5b66*\n\n**\u6eb6\u83cc\u9176**\uff1a\u80fd\u88c2\u89e3\u80bd\u805a\u7cd6\u4e2dN-\u4e59\u9170\u8461\u8404\u7cd6\u80fa\u548cN-\u4e59\u9170\u80de\u58c1\u9178\u4e4b\u95f4\u7684\u03b2-1,4\u7cd6\u82 4\u4e00\u79cd\uff0c\u7531\u666e\u6c0f\u7acb\u514b\u6b21\u4f53\u5f15\u8d77\uff0c\u7ecf\u8671\u4f20\u64ad\u7684\u6025\u6027\u4f20\u67d3\u75c5\n*\u6765\u6e90\uff1a\u4f20\u67d3\u75c5\u5b66*\n\n**\u65cb\u6bdb\u866b\u75c5**\uff1a\u7531\u65cb\u6bdb\u866b\u5bc4\u751f\u4e8e\u4eba\u4f53\u808c\u8089\u7ec4\u7ec7\u5f15\u8d77\u7684\u5bc4\u751f\u866b\u75c5\n*\u6765\u6e90\uff1a\u4f20\u67d3\u75c5\u5b66*\n\n**\u56ca\u578b\u68d8\u7403\u86b4\u75c5**\uff1a\u68d8\u7403\u86b4\u75c5\u7684\u4e00\u79cd\u7c7b\u578b\uff0c\u7531\u56ca\u578b\u68d8\u7403\u86b4\u5f15\u8d77\n*\u6765\u6e90\uff1a\u4f20\u67d3\u75c5\u5b66*\n\n**\u94a9\u866b\u75c5**\uff1a\u7531\u94a9\u866b\u5bc4\u751f\u4e8e\u4eba\u4f53\u5c0f\u80a0\u5f15\u8d77\u7684\u5bc4\u751f\u866b\u75c5\n*\u6765\u6e90\uff1a\u4f20\u67d3\u75c5\u5b66*\n\n**\u611f\u67d3\u6027\u4f11\u514b**\uff1a\u7531\u75c5\u539f\u5fae\u751f\u7269\u53ca\u5176\u6bd2\u7d20\u5f15\u8d77\u7684\u4ee5\u5fae\u5faa\u73af\u969c\u788d\u4e3a\u7279\u5f81\u7684\u6025\u6027\u5faa\u73af\u8870\u7aed\n*\u6765\u6e90\uff1a\u4f20\u67d3\u75c5\u5b66*\n\n**\u6297\u83cc\u836f\u7269**\uff1a\u5177\u6709\u6740\u83cc\u6216\u6291\u83cc\u6d3b\u6027\u7684\u836f\u7269\uff0c\u7528\u4e8e\u6cbb\u7597\u7ec6\u83cc\u611f\u67d3\n*\u6765\u6e90\uff1a\u4f20\u67d3\u75c5\u5b66*\n\n**\u91cd\u53e0\u611f\u67d3**\uff1a\u5728\u5df2\u6709HBV\u611f\u67d3\u57fa\u7840\u4e0a\u7ee7\u53d1HDV\u611f\u67d3\uff0c\u75c5\u60c5\u8f83\u91cd\uff0c\u6613\u8fdb\u5c55\u4e3a\u809d\u8870\u7aed\u6216\u6162\u6027\u5316\u3002\n*\u6765\u6e90\uff1a\u4f20\u67d3\u75c5\u5b66*\n\n**\u611f\u67d3\u6027\u75be\u75c5**\uff1a\u5305\u62ec\u4f20\u67d3\u75c5\u5728\u5185\u7684\u7531\u75c5\u539f\u4f53\u5f15\u8d77\u7684\u75be\u75c5\uff0c\u5176\u4e2d\u4f20\u67d3\u75c5\u5177\u6709\u4f20\u67d3\u6027\u3002\n*\u6765\u6e90\uff1a\u4f20\u67d3\u75c5\u5b66*\n\n**\u75c5\u539f\u643a\u5e26\u72b6\u6001**\uff1a\u75c5\u539f\u4f53\u4fb5\u5165\u673a\u4f53\u540e\uff0c\u5728\u5165\u4fb5\u90e8\u4f4d\u6216\u8fdc\u5904\u5668\u5b98\u751f\u957f\u7e41\u6b96\uff0c\u4f46\u673a\u4f53\u4e0d\u51fa\u73b0\u75be\u75c5\u72b6\u6001\uff0c\u5374\u80fd\u643a\u5e26\u5e76\u6392\u51fa\u75c5\u539f\u4f53\u3002\n*\u6765\u6e90\uff1a\u4f20\u67d3\u75c5\u5b66*\n\n**\u4f20\u67d3\u671f**\uff1a\u4f20\u67d3\u75c5\u60a3\u8005\u6709\u4f20\u67d3\u6027\u7684\u65f6\u671f\uff0c\u5728\u6bcf\u79cd\u4f20\u67d3\u75c5\u4e2d\u76f8\u5bf9\u56fa\u5b9a\uff0c\u53ef\u4f5c\u4e3a\u9694\u79bb\u4f9d\u636e\u3002\n*\u6765\u6e90\uff1a\u4f20\u67d3\u75c5\u5b66  \u2190 \u524d\u7f6e\uff1a\u75c5\u539f\u4f53\u6392\u51fa\u9014\u5f84*\n\n**\u75c7\u72b6\u660e\u663e\u671f**\uff1a\u6025\u6027\u4f20\u67d3\u75c5\u60a3\u8005\u5ea6\u8fc7\u524d\u9a71\u671f\u540e\uff0c\u8be5\u4f20\u67d3\u75c5\u6240\u7279\u6709\u7684\u75c7\u72b6\u548c\u4f53\u5f81\u5145\u5206\u8868\u73b0\u7684\u65f6\u671f\n*\u6765\u6e90\uff1a\u4f20\u67d3\u75c5\u5b66*\n\n**\u7ec6\u83cc\u611f\u67d3**\uff1a\u6d41\u611f\u540e\u53ef\u80fd\u5e76\u53d1\u7684\u7ee7\u53d1\u611f\u67d3\u7c7b\u578b\uff0c\u53ef\u4e0e\u75c5\u6bd2\u5171\u540c\u5bfc\u81f4\u80ba\u708e\u3002\n*\u6765\u6e90\uff1a\u4f20\u67d3\u75c5\u5b66*\n\n**\u5e7c\u513f\u6025\u75b9**\uff1a\u5e38\u89c1\u4e8e1\u5c81\u4ee5\u5185\u5a74\u513f\u7684\u75c5\u6bd2\u611f\u67d3\uff0c\u7279\u70b9\u4e3a\u9aa4\u8d77\u9ad8\u70ed3\uff5e5\u5929\u540e\u70ed\u9000\u75b9\u51fa\uff0c\u76ae\u75b9\u4e3a\u73ab\u7470\u8272\u6591\u4e18\u75b9\u3002\n*\u6765\u6e90\uff1a\u4f20\u67d3\u75c5\u5b66*\n\n**\u5148\u5929\u6027\u98ce\u75b9\u7efc\u5408\u5f81**\uff1a\u80ce\u513f\u5728\u5bab\u5185\u611f\u67d3\u98ce\u75b9\u75c5\u6bd2\u6240\u81f4\u7684\u591a\u79cd\u5148\u5929\u7578\u5f62\u548c\u75be\u75c5\uff0c\u53ef\u8868\u73b0\u4e3a\u6b7b\u80ce\u3001\u6d41\u4ea7\u3001\u5148\u5929\u6027\u5fc3\u810f\u75c5\u3001\u809d\u813e\u5927\u7b49\u3002\n*\u6765\u6e90\uff1a\u4f20\u67d3\u75c5\u5b66*\n\n**MODS**\uff1a\u591a\u5668\u5b98\u529f\u80fd\u969c\u788d\u7efc\u5408\u5f81\uff0c\u6307\u673a\u4f53\u5728\u4e25\u91cd\u611f\u67d3\u3001\u521b\u4f24\u7b49\u6253\u51fb\u4e0b\u51fa\u73b0\u4e24\u4e2a\u6216\u4e24\u4e2a\u4ee5\u4e0a\u5668\u5b98\u529f\u80fd\u540c\u65f6\u6216\u5e8f\u8d2f\u6027\u969c\u788d\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u611f\u67d3**\uff1a\u8001\u5e74\u4eba\u60a3\u75c5\u548c\u6b7b\u4ea1\u7684\u4e3b\u8981\u539f\u56e0\uff0c\u5305\u62ec\u75c5\u6bd2\u6027\u80ba\u708e\u3001\u5c3f\u8def\u611f\u67d3\u7b49\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n## \u539f\u6587\u7cbe\u8bfb\n\n### \u5185\u6bd2\u7d20 \u2014 \u9009\u81ea\u300a\u533b\u5b66\u5fae\u751f\u7269\u5b66\u300b\n\n...\u4e3a\u8102\u591a\u7cd6\u7ed3\u6784\uff0c\u4e0e\u5bf9\u79f0\u7ed3\u6784\u7684\u7ec6\u80de\u819c\u5177\u6709\u660e\u663e\u7684\u5dee\u5f02\u3002\n\n\uff081\uff09\u2002 \u8102\u86cb\u767d\uff1a\u8102\u86cb\u767d\u4f4d\u4e8e\u80bd\u805a\u7cd6\u5c42\u548c\u8102\u8d28\u53cc\u5c42\u4e4b\u95f4\uff0c\u5176\u86cb\u767d\u8d28\u90e8\u5206\u4e0e\u80bd\u805a\u7cd6\u4fa7\u94fe\u7684DAP \u76f8\u8fde\uff0c\u5176\u8102\u8d28\u6210\u5206\u4e0e\u8102\u8d28\u53cc\u5c42\u975e\u5171\u4ef7\u7ed3\u5408\uff0c\u4f7f\u5916\u819c\u548c\u80bd\u805a\u7cd6\u5c42\u6784\u6210\u4e00\u4e2a\u6574\u4f53\u3002\n\n\uff082\uff09\u2002 \u8102\u8d28\u53cc\u5c42\uff1a\u8102\u8d28\u53cc\u5c42\u662f\u78f7\u8102\u548c\u86cb\u767d\u8d28\u7ec4\u6210\u7684\u53cc\u5c42\u819c\uff0c\u4e3a\u5916\u819c\u7684\u5185\u5c42\uff0c\u7c7b\u4f3c\u7ec6\u83cc\u7684\u7ec6\u80de\u819c\uff0c\u4f46\u51e0\u4e4e\u4e0d\u542b\u9176\u7c7b\u3002\u8102\u8d28\u53cc\u5c42\u5185\u9576\u5d4c\u7684\u86cb\u767d\u8d28\u79f0\u4e3a\u5916\u819c\u86cb\u767d\uff08outer membrane protein\uff0cOMP\uff09\uff0c\u5177\u6709\u9009\u62e9\u901a\u900f\u6027\u7b49\u91cd\u8981\u7684\u751f\u7406\u529f\u80fd\uff0c\u5176\u4e2d\u6709\u7684\u4e3a\u5b54\u86cb\u767d\uff08porin\uff09\uff0c\u5982\u5927\u80a0\u57c3\u5e0c\u83cc\u7684OmpF\u3001OmpC\uff0c\u5141\u8bb8\u6c34\u6eb6\u6027\u5206\u5b50\uff08\u5206\u5b50\u91cf$\u2264$600\uff09\u901a\u8fc7\uff1b\u6709\u7684\u4e3a\u8bf1\u5bfc\u6027\u6216\u53bb\u963b\u904f\u86cb\u767d\u8d28\uff0c\u53c2\u4e0e\u7279\u6b8a\u7269\u8d28\u7684\u6269\u6563\u8fc7\u7a0b\uff1b\u6709\u7684\u4e3a\u566c\u83cc\u4f53\u3001\u6027\u83cc\u6bdb\u6216\u7ec6\u83cc\u7d20\u7684\u53d7\u4f53\u3002\n\n\uff083\uff09\u2002 \u8102\u591a\u7cd6\uff1a\u8102\u591a\u7cd6\uff08lipopolysaccharide\uff0cLPS\uff09\u4f4d\u4e8e\u5916\u819c\u7684\u5916\u5c42\uff0c\u7531\u8102\u8d28A\u3001\u6838\u5fc3\u591a\u7cd6\u548c\u7279\u5f02\u591a\u7cd6\u6784\u6210\u3002G - \u83cc\u7684\u7ec6\u80de\u58c1\u8102\u591a\u7cd6\u5177\u6709\u6bd2\u6027\uff0c\u4e5f\u79f0\u4e3a\u5185\u6bd2\u7d20\uff08endotoxin\uff09\u3002\n\n\u8102\u8d28A\uff08lipid A\uff09\uff1a\u4f4d\u4e8eLPS \u7684\u5185\u5c42\uff0c\u662f\u4e00\u79cd\u7cd6\u78f7\u8102\uff0c\u7531\u78f7\u9178\u5316\u7684\u8461\u8404\u7cd6\u80fa\u53cc\u7cd6\u5355\u5143\u7ec4\u6210\uff0c\u5176\u4e0a\u8fde\u63a5$\u7740\u51e0\u79cd\u957f\u94fe\u8102\u80aa\u9178\uff0c\u5176\u4e2d\u03b2$-\u2009\u7f9f\u57fa\u8c46\u853b\u9178\u662f\u591a\u6570\u9769\u5170\u6c0f\u9634\u6027\u83cc\u5171\u6709\u7684\u3002\u8102\u8d28A \u662f\u5185\u6bd2\u7d20\u7684\u6bd2\u6027\u548c\u751f\u7269\u5b66\u6d3b\u6027\u7684\u4e3b\u8981\u7ec4\u5206\uff0c\u65e0\u79cd\u5c5e\u7279\u5f02\u6027\uff0c\u6545\u4e0d\u540c\u7ec6\u83cc\u4ea7\u751f\u7684\u5185\u6bd2\u7d20\u7684\u6bd2\u6027\u4f5c\u7528\u5747\u76f8\u4f3c\u3002\n\n\u6838\u5fc3\u591a\u7cd6\uff08core polysaccharide\uff09\uff1a\u4f4d\u4e8e\u8102\u8d28A \u7684\u5916\u5c42\uff0c\u7531\u5df1\u7cd6\uff08\u8461\u8404\u7cd6\u3001\u534a\u4e73\u7cd6\u7b49\uff09\u3001\u5e9a\u7cd6\u30012-\u2009\u916e\u57fa\u2009-3-\u2009\u8131\u6c27\u8f9b\u9178\uff082-keto-3-deoxyoctonic acid\uff0cKDO\uff09\u3001\u78f7\u9178\u4e59\u9187\u80fa\u7b49\u7ec4\u6210\uff0c\u7ecfKDO \u4e0e\u8102\u8d28A \u5171\u4ef7\u8fde\u63a5\u3002\u6838\u5fc3\u591a\u7cd6\u6709\u5c5e\u7279\u5f02\u6027\uff0c\u540c\u4e00\u5c5e\u7ec6\u83cc\u7684\u6838\u5fc3\u591a\u7cd6\u76f8\u540c\u3002\n\n\u7279\u5f02\u591a\u7cd6\uff08specific polysaccharide\uff09\uff1a\u5728\u8102\u591a\u7cd6\u7684\u5916\u8868\uff0c\u662f\u7531\u591a\u4e2a\u5be1\u805a\u7cd6\uff083\uff5e5 \u4e2a\u5355\u7cd6\uff09\u91cd\u590d\u5355\u4f4d\u6784\u6210\u7684\u591a\u7cd6\u94fe\uff0c\u662f\u9769\u5170\u6c0f\u9634\u6027\u83cc\u7684\u83cc\u4f53\u6297\u539f\uff08O \u6297\u539f\uff09\uff0c\u5177\u6709\u79cd\u7279\u5f02\u6027\uff0c\u56e0\u5176\u591a\u7cd6\u4e2d\u5355\u7cd6\u7684\u79cd\u7c7b\u3001\u4f4d\u7f6e\u3001\u6392\u5217\u548c\u7a7a\u95f4\u6784\u578b\u5404\u4e0d\u76f8\u540c\u6240\u81f4\u3002\u7279\u5f02\u591a\u7cd6\u5982\u679c\u4e22\u5931\uff0c\u7ec6\u83cc\u5373\u4e27\u5931O \u6297\u539f\uff0c\u540c\u65f6\u4ece\u5149\u6ed1\u578b\uff08smooth type\uff0cS\n\n\u5206\u679d\u72b6\u805a\u7cd6\uff0c\u79f0\u4e3a\u8102\u5be1\u7cd6\uff08lipooligosaccharide\uff0cLOS\uff09\uff0c\u662f\u8fd9\u7c7b\u7ec6\u83cc\u7684\u91cd\u8981\u6bd2\u529b\u56e0\u5b50\u3002LOS \u4e0e\u54fa\u4e73\u52a8\u7269\u7ec6\u80de\u819c\u7684\u9798\u7cd6\u8102\u6210\u5206\u76f8\u4f3c\uff0c\u4ece\u800c\u7ec6\u83cc\u53ef\u9003\u907f\u5bbf\u4e3b\u514d\u75ab\u7ec6\u80de\u7684\u8bc6\u522b\u3002\n\n\u5728G -\u2009\u83cc\u7ec6\u80de\u819c\u548c\u5916\u819c\u7684\u8102\u8d28\u53cc\u5c42\u4e4b\u95f4\u6709\u4e00\u7a7a\u9699\uff0c\u7ea6\u5360\u7ec6\u80de\u4f53\u79ef\u768420%\uff5e40%\uff0c\u79f0\u4e3a\u5468\u6d46\u95f4\u9699\uff08periplasmic space\uff09\u3002\u8be5\u95f4\u9699\u542b\u6709\u591a\u79cd\u6c34\u89e3\u9176\uff0c\u4f8b\u5982\u86cb\u767d\u9176\u3001\u6838\u9178\u9176\u3001\u78b3\u6c34\u5316\u5408\u7269\u964d\u89e3\u9176\u53ca\u4f5c\u4e3a\u6bd2\u529b\u56e0$\u5b50\u7684\u80f6\u539f\u9176\u3001\u900f\u660e\u8d28\u9178\u9176\u548c\u03b2$-\u2009\u5185\u9170\u80fa\u9176\u7b49\uff0c\u5728\u7ec6\u83cc\u83b7\u5f97\u8425\u517b\u3001\u89e3\u9664\u6709\u5bb3\u7269\u8d28\u6bd2\u6027\u7b49\u65b9\u9762\u6709\u91cd\u8981\u4f5c\u7528\u3002G +\u2009\u548cG -\u2009\u83cc\u7ec6\u80de\u58c1\u7ed3\u6784\u663e\u8457\u4e0d\u540c\uff08\u88681-1\uff09\uff0c\u5bfc\u81f4\u8fd9\u4e24\u7c7b\u7ec6\u83cc\u5728\u67d3\u8272\u6027\u3001\u6297\u539f\u6027\u3001\u81f4\u75c5\u6027\u53ca\u5bf9\u836f\u7269\u7684\u654f\u611f\u6027\u7b49\u65b9\u9762\u6709\u5f88\u5927\u5dee\u5f02\u3002\n\n\u88681-1\u2003 \u9769\u5170\u6c0f\u9633\u6027\u83cc\u4e0e\u9769\u5170\u6c0f\u9634\u6027\u83cc\u7ec6\u80de\u58c1\u7ed3\u6784\u6bd4\u8f83\n\n\u7ec6\u80de\u58c1\u9769\u5170\u6c0f\u9633\u6027...\n\n### \u80bd\u805a\u7cd6 \u2014 \u9009\u81ea\u300a\u533b\u5b66\u5fae\u751f\u7269\u5b66\u300b\n\n...\uff09\u6cdb\u6307\u5e7f\u6cdb\u5b58\u5728\u4e8e\u81ea\u7136\u754c\u4e2d\u7684\u3001\u4f53\u5f62\u5fae\u5c0f\u3001\u7ed3\u6784\u7b80\u5355\u3001\u8089\u773c\u76f4\u63a5\u89c2\u5bdf\u4e0d\u5230\u3001\u5fc5\u987b\u501f\u52a9\u5149\u5b66\u663e\u5fae\u955c\u6216\u7535\u5b50\u663e\u5fae\u955c\u653e\u5927\u6570\u767e\u500d\u3001\u6570\u5343\u500d\uff0c\u751a\u81f3\u6570\u4e07\u500d\u624d\u80fd\u89c2\u5bdf\u5230\u7684\u5fae\u5c0f\u751f\u7269\u3002\n\n\u4e00\u3001\u2002 \u5fae\u751f\u7269\u7684\u79cd\u7c7b\u4e0e\u7279\u70b9\n\n\u6309\u5176\u5927\u5c0f\u3001\u6709\u65e0\u7ec6\u80de\u7684\u57fa\u672c\u7ed3\u6784\u3001\u7ec6\u80de\u6838\u7684\u5206\u5316\u7a0b\u5ea6\u548c\u6838\u9178\u7ec4\u6210\u7b49\uff0c\u53ef\u5206\u4e3a\u4e09\u5927\u7c7b\u3002\n\n1. \u771f\u6838\u7ec6\u80de\u578b\u5fae\u751f\u7269\uff08eukaryotic microorganisms\uff09\u2003 \u8fd9\u662f\u6700\u5927\u7684\u4e00\u7c7b\u5fae\u751f\u7269\u3002\u6b64\u7c7b\u5fae\u751f\u7269\u6709\u5178\u578b\u7684\u7ec6\u80de\u7ed3\u6784\uff0c\u7ec6\u80de\u5668\u5b8c\u6574\uff1b\u7ec6\u80de\u6838\u5206\u5316\u7a0b\u5ea6\u9ad8\uff0c\u6709\u6838\u819c\u548c\u6838\u4ec1\uff0cDNA \u4e3a\u9057\u4f20\u7269\u8d28\u3002\u771f\u83cc\uff08Fungus\uff09\u5c5e\u4e8e\u8be5\u7c7b\u5fae\u751f\u7269\u3002\n2. \u539f\u6838\u7ec6\u80de\u578b\u5fae\u751f\u7269\uff08prokaryotic microorganisms\uff09\u2003 \u8fd9\u7c7b\u5fae\u751f\u7269\u6709\u7ec6\u80de\u7684\u57fa\u672c\u7ed3\u6784\uff0c\u7ec6\u80de\u5668\u4e0d\u5b8c\u6574\uff0c\u4ec5\u6709\u6838\u7cd6\u4f53\uff1b\u7ec6\u80de\u6838\u5206\u5316\u7a0b\u5ea6\u4f4e\uff0c\u4e3a\u539f\u59cb\u6838\u8d28\uff0c\u5448\u88f8\u9732DNA \u56e2\u5757\u7ed3\u6784\uff0c\u65e0\u6838\u819c\u548c\u6838\u4ec1\uff0cDNA \u4e3a\u9057\u4f20\u7269\u8d28\u3002\u8fd9\u7c7b\u5fae\u751f\u7269\u53ef\u5206\u4e3a\u53e4\u83cc\uff08archaea\uff09\u548c\u7ec6\u83cc\uff08bacteria\uff09\u4e24\u5927\u7c7b\u3002\u53e4\u83cc\u4e0d\u80fd\u5408\u6210\u80bd\u805a\u7cd6\u4e14\u5177\u6709\u72ec\u7279\u7684\u4ee3\u8c22\u65b9\u5f0f\uff0c\u53ef\u5728\u9ad8\u6e29\u3001\u9ad8\u76d0\u6216\u4f4e\u6e29\u7b49\u6781\u7aef\u73af\u5883\u4e0b\u751f\u5b58\uff0c\u5728\u4eba\u4f53\u5185\u4e5f\u6709\u5206\u5e03\uff0c\u4f46\u5c1a\u672a\u53d1\u73b0\u5bf9\u4eba\u7c7b\u7684\u81f4\u75c5\u6027\u3002\u7ec6\u83cc\u4e0e\u4eba\u4f53\u7684\u5065\u5eb7\u5bc6\u5207\u76f8\u5173\uff0c\u5c11\u6570\u5bf9\u4eba\u6709\u81f4\u75c5\u6027\u3002\u7ec6\u83cc\u5177\u6709\u7ec6\u80de\u58c1\uff08\u652f\u539f\u4f53\u9664\u5916\uff09\u3002\u90e8\u5206\u7ec6\u83cc\u751f\u7269\u5b66\u6027\u72b6\u6bd4\u8f83\u7279\u6b8a\uff0c\u5728\u53d1\u73b0\u548c\u8ba4\u8bc6\u8fc7\u7a0b\u4e2d\uff0c\u8d4b\u4e88\u4e86\u4e0d\u540c\u7684\u540d\u79f0\uff0c\u5982\u653e\u7ebf\u83cc\u3001\u87ba\u65cb\u4f53\u3001\u8863\u539f\u4f53\u548c\u7acb\u514b\u6b21\u4f53\u7b49\u30023.\u2002 \u975e\u7ec6\u80de\u578b\u5fae\u751f\u7269\uff08acellular microorganisms\uff09\u2003 \u8fd9\u662f\u6700\u5c0f\u7684\u4e00\u7c7b\u5fae\u751f\u7269\uff0c\u65e0\u7ec6\u80de\u7ed3\u6784\u3002\u4e5f\u65e0\u4ea7\u751f\u80fd\u91cf\u7684\u9176\u7cfb\u7edf\uff0c\u53ea\u80fd\u5bc4\u751f\u5728\u6d3b\u7ec6\u80de\u5185\u751f\u957f\u589e\u6b96\u3002\u53ea\u6709\u4e00\u79cd\u7c7b\u578b\u7684\u9057\u4f20\u7269\u8d28\uff0cDNA \u6216RNA\u3002\u75c5\u6bd2\uff08virus\uff09\u5c5e\u4e8e\u8be5\u7c7b\u5fae\u751f\u7269\u3002\n\n\u5fae\u751f\u7269\u79cd\u7c7b\u7e41\u591a\u3001\u5728\u81ea\u7136\u754c\u5e7f\u6cdb\u5206\u5e03\u3001\u6570\u91cf\u5de8\u5927\uff0c\u76ee\u524d\u5df2\u62a5\u9053\u7684\u5fae\u751f\u7269\u81f3\u5c11\u6709135\u2005000 \u79cd\u3002\u5b9a\u5c45\u5728\u5730\u7403\u8868\u9762\u7279\u5b9a\u7a7a\u95f4\u6216\u751f\u5883\u7684\u4e0d\u540c\u79cd\u7c7b\u548c\u6570\u91cf\u7684\u5fae\u751f\u7269\uff0c\u79f0\u4e3a\u5fae\u751f\u7269\u7fa4\u3002\u6c5f\u6cb3\u3001\u6e56\u6cca\u3001\u6d77\u6d0b\u3001\u571f\u58e4\u3001\u77ff\u5c42\u3001\u7a7a\u6c14\u7b49\u90fd\u6709\u6570\u91cf\u4e0d\u7b49\u3001\u79cd\u7c7b\u4e0d\u4e00\u7684\u5fae\u751f\u7269\u5b58\u5728\uff0c\u5176\u4e2d\u4ee5\u571f\u58e4\u5fae\u751f\u7269\u7fa4\u7684\u6570\u91cf\u6700\u4e3a\u5e9e\u5927\uff0c1g \u80a5\u6c83\u571f\u58e4\u53ef\u6709\u51e0\u4ebf\u5230\u51e0\u5341\u4ebf\u4e2a\u5fae\u751f\u7269\u5b58\u5728\u3002\u5728\u4eba\u7c7b\u3001\u52a8\u7269\u548c\u690d\u7269\u7684\u4f53\u8868\uff0c\u4ee5\u53ca\u4eba\u7c7b\u548c\u52a8\u7269\u4e0e\u5916\u754c\u76f8\u901a\u7684\u8154\u9053\u4e2d\uff0c\u4ea6\u6709\u5927\u91cf\u7684\u5fae\u751f\u7269\u5b58\u5728\u3002\u76f8\u6bd4\u4e8e\u52a8\u7269\u548c\u690d\u7269\uff0c\u5fae\u751f\u7269\u8fd8\u6709\u7e41\u6b96\u8fc5\u901f\u3001\u4ee3\u8c22\u6d3b\u8dc3\u3001\u5bb9\u6613\u53d8\u5f02\u7b49\u7279\u70b9\u3002\u5982\u5927\u80a0\u57c3\u5e0c$\u83cc\u7ecf\u8fc724 \u5c0f\u65f6\u540e\u7406\u8bba\u4e0a\u53ef\u4ea7\u751f4.72\u00d710$ 21 \u4e2a\u540e\u4ee3\uff0c\u6bcf\u5c0f\u65f6\u53ef\u6d88\u8017\u5176\u81ea\u8eab\u91cd\u91cf0.6\uff5e1.6 \u500d\u7684\u7cd6\u7c7b\u3002\n\n\u4e8c\u3001\u2002 \u5fae\u751f\u7269\u4e0e\u4eba\u7c7b\u7684\u5173\u7cfb\n\n\u5fae\u751f\u7269\u662f\u5730\u7403\u4e0a\u4e2a\u4f53\u6570\u91cf\u3001\u79cd\u7fa4\u6570\u91cf\u548c\u751f\u7269\u91cf\u90fd\u6700\u591a\u7684\u7269\u79cd\u3002\u76f8\u5e94\u5730\uff0c\u5fae\u751f\u7269\u5bf9\u81ea\u7136\u754c\u7684\u6f14\u5316\u3001\u4eba\u7c7b\u793e\u4f1a\u3001\u5de5\u519c\u4e1a\u7b49\u5404\u65b9\u9762\u90fd\u6709\u91cd\u8981\u5f71\u54cd\u3002\u7edd\u5927\u591a\u6570\u79cd\u7c7b\u7684\u5fae\u751f\u7269\u5bf9\u4eba\u7c7b\u3001\u52a8\u7269\u548c\u690d\u7269\u662f\u6709\u76ca\u7684\uff0c\u53ea\n\n\u5065\u5eb7\uff0c\u53c2\u4e0e\u751f\u7269\u5708\u78b3\u3001\u6c2e\u7b49\u7269\u8d28\u7684\u5faa\u73af\u7b49\u3002\u4f8b\u5982\uff0c\u571f\u58e4\u4e2d\u7684\u5fae\u751f\u7269\u80fd\u5c06\u6b7b\u4ea1\u52a8\u7269\u3001\u690d\u7269\u7684\u6709\u673a\u6c2e\u5316\u5408\u7269\u8f6c\u5316\u4e3a\u65e0\u673a\u6c2e\u5316\u5408\u7269\uff0c\u4ee5\u4f9b\u690d\u7269\u751f\u957f\u7684\u9700\u8981\uff0c\u800c\u690d\u7269\u53c8\u4e3a\u4eba\u7c7b\u548c\u52a8\u7269\u6240\u98df\u7528\uff1b\u7a7a\u6c14\u4e2d\u5927\u91cf\u7684\u6e38\u79bb\u6c2e\uff0c\u53ea\u6709\u4f9d\u9760\u56fa\u6c2e\u83cc\u7b49\u4f5c\u7528\u540e\u624d\u80fd\u88ab\u690d\u7269\u5438\u6536\u3002\u53c8\u5982\u690d\u7269\u53ef\u4ee5\u901a\u8fc7\u5149\u5408\u4f5c\u7528\u628a\u7a7a\u6c14\u4e2d\u7684\u4e8c\u6c27\u5316\u78b3\u548c\u6c34\u5408\u6210\u7ea4\u7ef4\u7d20\u548c\u6728\u8d28\u7d20\u7b49\u6709\u673a...\n\n### \u4f20\u67d3\u75c5 \u2014 \u9009\u81ea\u300a\u533b\u5b66\u5fae\u751f\u7269\u5b66\u300b\n\n...\u9655\u897f\u7701\u533b\u5b66\u4f1a\u5fae\u751f\u7269\u5b66\u4e0e\u514d\u75ab\u5b66\u5206\u4f1a\u4e3b\u4efb\u59d4\u5458\uff0c\u5168\u519b\u5fae\u751f\u7269\u5b66\u4e13\u4e1a\u59d4\u5458\u4f1a\u526f\u4e3b\u4efb\u59d4\u5458\uff0c\u4e2d\u56fd\u5fae\u751f\u7269\u5b66\u4f1a\u533b\u5b66\u5fae\u751f\u7269\u5b66\u4e0e\u514d\u75ab\u5b66\u4e13\u4e1a\u59d4\u5458\u4f1a\u5e38\u52a1\u59d4\u5458\uff0c\u9655\u897f\u7701\u5fae\u751f\u7269\u5b66\u4f1a\u5e38\u52a1\u7406\u4e8b\u3002\n\n\u4ece\u4e8b\u533b\u5b66\u5fae\u751f\u7269\u5b66\u6559\u5b66\u5de5\u4f5c33 \u5e74\u3002\u83b7\u519b\u961f\u9662\u6821\u201c\u80b2\u624d\u201d\u5956\u94f6\u5956\uff1b\u83b7\u519b\u961f\u6559\u5b66\u6210\u679c\u5956\u4e8c\u7b49\u59561 \u9879\uff1b\u4e3b\u7f16\u3001\u526f\u4e3b\u7f16\u53ca\u53c2\u7f16\u300a\u533b\u5b66\u5fae\u751f\u7269\u5b66\u300b\u76f8\u5173\u6559\u675020 \u4f59\u90e8\u3002\u957f\u671f\u4ece\u4e8b\u91cd\u8981\u75c5\u539f\u5fae\u751f\u7269\u7684\u611f\u67d3\u4e0e\u514d\u75ab\u53ca\u5176\u4fa6\u3001\u9632\u3001\u6cbb\u7684\u57fa\u7840\u7814\u7a76\u3002\u4ee5\u8d1f\u8d23\u4eba\u627f\u62c5\u56fd\u5bb6\u3001\u519b\u961f\u53ca\u7701\u90e8\u7ea7\u79d1\u7814\u8bfe\u989817 \u9879\uff1b\u53d1\u8868SCI \u548c\u4e2d\u6587\u6838\u5fc3\u671f\u520a\u6536\u5f55\u8bba\u6587\u8fd1100 \u7bc7\uff1b\u83b7\u56fd\u5bb6\u53d1\u660e\u4e13\u5229\u6388\u674311 \u9879\uff1b\u83b7\u56fd\u5bb6\u6d77\u6d0b\u5c40\u521b\u65b0\u6210\u679c\u5956\u4e00\u7b49\u59561 \u9879\uff0c\u519b\u961f\u79d1\u6280\u8fdb\u6b65\u5956\u4e8c\u7b49\u59562 \u9879\uff1b\u526f\u4e3b\u7f16\u5b66\u672f\u4e13\u8457\u300a\u80be\u7efc\u5408\u5f81\u51fa\u8840\u70ed\u300b\u3002\n\n\u8303\u96c4\u6797\n\n\u534e\u4e2d\u79d1\u6280\u5927\u5b66\u540c\u6d4e\u533b\u5b66\u9662\u57fa\u7840\u533b\u5b66\u9662\u75c5\u539f\u751f\u7269\u5b66\u7cfb\u6559\u6388\u3001\u535a\u58eb\u7814\u7a76\u751f\u5bfc\u5e08\uff0c\u57fa\u7840\u533b\u5b66\u56fd\u5bb6\u7ea7\u6559\u5b66\u793a\u8303\u4e2d\u5fc3\u5f62\u6001\u5b66\u5206\u4e2d\u5fc3\u526f\u4e3b\u4efb\u53caBSL-2 \u5b9e\u9a8c\u5ba4\u4e3b\u4efb\uff0c\u201c\u533b\u5b66\u5fae\u751f\u7269\u5b66\u201d\u6559\u5b66\u56e2\u961f\u8d23\u4efb\u6559\u6388\u53ca\u6559\u80b2\u90e8\u4e00\u6d41\u8bfe\u7a0b\u8d1f\u8d23\u4eba\uff0c\u4eba\u517d\u5171\u60a3\u4f20\u67d3\u75c5\u91cd\u75c7\u8bca\u6cbb\u5168\u56fd\u91cd\u70b9\u5b9e\u9a8c\u5ba4PI\uff0c\u6e56\u5317\u7701\u533b\u5b66\u4f1a\u5fae\u751f\u7269\u514d\u75ab\u5b66\u4e13\u4e1a\u59d4\u5458\u4f1a\u8363\u8a89\u4e3b\u4efb\u59d4\u5458\u3002\n\n\u4ece\u4e8b\u533b\u5b66\u5fae\u751f\u7269\u5b66\u6559\u5b66\u3001\u79d1\u7814\u5de5\u4f5c26 \u5e74\u3002\u4e3b\u6301863 \u8bfe\u98983 \u9879\uff0c\u56fd\u5bb6\u79d1\u6280\u91cd\u5927\u4e13\u9879\u8bfe\u98983 \u9879\uff0c\u56fd\u5bb6\u91cd\u70b9\u7814\u53d1\u8ba1\u5212\u8bfe\u98983 \u9879\uff0c\u56fd\u5bb6\u81ea\u7136\u79d1\u5b66\u57fa\u91d1\u9879\u76ee4 \u9879\u3002\u83b7\u6e56\u5317\u7701\u79d1\u5b66\u6280\u672f\u5956\uff08\u81ea\u7136\u79d1\u5b66\uff09\u4e8c\u7b49\u59561 \u9879\u3002\u4e3b\u7f16\u3001\u53c2\u7f16\u4e13\u8457\u548c\u56fd\u5bb6\u7ea7\u89c4\u5212\u6559\u6750\u517110 \u4f59\u90e8\u3002\u53d1\u8868SCI \u8bba\u845750 \u4f59\u7bc7\uff0c\u5176\u4e2d12 \u7bc7IF>10\u3002\n\n\u6839\u636e\u4eba\u6c11\u536b\u751f\u51fa\u7248\u793e\u5168\u56fd\u9ad8\u7b49\u5b66\u6821\u4e94\u5e74\u5236\u672c\u79d1\u4e34\u5e8a\u533b\u5b66\u4e13\u4e1a\u7b2c\u5341\u8f6e\u89c4\u5212\u6559\u6750\u4e3b\u7f16\u4eba\u4f1a\u8bae\u7cbe\u795e\uff0c\u4ee5\u53ca\u5168\u56fd\u9ad8\u7b49\u9662\u6821\u5e08\u751f\u4f7f\u7528\u300a\u533b\u5b66\u5fae\u751f\u7269\u5b66\u300b\uff08\u7b2c9 \u7248\uff09\u6559\u6750\u7684\u4f53\u4f1a\u548c\u610f\u89c1\u5efa\u8bae\uff0c\u9075\u5faa\u4f20\u627f\u4e0e\u53d1\u5c55\u76f8\u7ed3\u5408\u7684\u601d\u8def\uff0c\u575a\u6301\u201c\u4e09\u57fa\u3001\u4e94\u6027\u3001\u4e09\u7279\u5b9a\u201d\u7684\u539f\u5219\uff0c\u5728\u524d\u7248\u6559\u6750\u7684\u57fa\u7840\u4e0a\u6211\u4eec\u5bf9\u6559\u6750\u5185\u5bb9\u8fdb\u884c\u4e86\u8ba4\u771f\u8ba8\u8bba\u548c\u4fee\u8ba2\uff0c\u66f4\u65b0\u5e76\u4fee\u8ba2\u4e86\u90e8\u5206\u6982\u5ff5\u548c\u77e5\u8bc6\u70b9\u3001\u539f\u7406\u53ca\u5176\u5e94\u7528\uff0c\u589e\u52a0\u4e86\u4eba\u4f53\u5fae\u751f\u7269\u7fa4\u4e0e\u5065\u5eb7\uff0c\u4ee5\u53ca\u8fd1\u5e74\u51fa\u73b0\u7684\u65b0\u53d1\u4f20\u67d3\u75c5\u75c5\u539f\uff0c\u5982SARS \u51a0\u72b6\u75c5\u6bd22\u3001\u7334\u75d8\u75c5\u6bd2\u7b49\u5185\u5bb9\uff0c\u6559\u6750\u5185\u5bb9\u4e5f\u878d\u5165\u4e86\u601d\u653f\u80b2\u4eba\u5143\u7d20\uff0c\u5f3a\u5316\u4e86\u65b0\u533b\u79d1\u3001\u5168\u5065\u5eb7\u7b49\u7406\u5ff5\u5bf9\u533b\u5b66\u5fae\u751f\u7269\u5b66\u5b66\u79d1\u4f53\u7cfb\u7684\u6e17\u900f\u548c\u878d\u5408\u3002\n\n\u672c\u7248\u6559\u6750\u4ecd\u6cbf\u7528\u4e0a\u4e00\u7248\u7684\u57fa\u672c\u6846\u67b6\uff0c\u5728\u7eea\u8bba\u3001\u7ec6\u83cc\u7bc7\u3001\u75c5\u6bd2\u7bc7\u3001\u771f\u83cc\u7bc7\u53ca\u9644\u5f55\u7684\u57fa\u7840\u4e0a\uff0c\u589e\u52a0\u4eba\u4f53\u5fae\u751f\u7269\u7fa4\u7bc7\u3002\u517c\u987e\u77e5\u8bc6\u7684\u57fa\u7840\u6027\u4e0e\u5148\u8fdb\u6027\uff0c\u5728\u6df1\u5ea6\u548c\u96be\u5ea6\u4e0a\u603b\u4f53\u4e0e\u76ee\u524d\u533b\u5b66\u5fae\u751f\u7269\u5b66\u9886\u57df\u7684\u53d1\u5c55\u53ca\u6559\u6750\u5b9a\u4f4d\u76f8\u7b26\u3002\u91cd\u8981\u6982\u5ff5\u3001\u539f\u7406\u53ca\u91cd\u70b9\u5185\u5bb9\u5ef6\u7eed\u4e86\u7b2c9 \u7248\u6559\u6750\u7684\u7279\u70b9\uff0c\u4ee5\u9ed1\u4f53\u5b57\u52a0\u7c97\u663e\u793a\u3002\u672c\u6559\u6750\u4e3a\u65b0\u5f62\u6001\u6559\u6750\uff0c\u5b66\u751f\u53ef\u626b\u63cf\u4e8c\u7ef4\u7801\u9605\u8bfb\u7ebf\u4e0a\u6570\u5b57\u5185\u5bb9\u3002\u672c\u6559\u6750\u8fd8\u914d\u6709\u300a\u533b\u5b66\u5fae\u751f\u7269\u5b66\u5b66\u4e60\u6307\u5bfc\u4e0e\u4e60\u9898\u96c6\u300b\uff08\u7b2c3 \u7248\uff09\u3002\u529b\u4e89\u6210\u4e3a\u4e00\u672c\u8d28\u91cf\u7b2c\u4e00\u3001\u7eb8\u6570\u878d\u5408\uff0c\u7b26\u5408\u65b0\u533b\u79d1\u7cbe\u795e\u7684\u65b0\u65f6\u4ee3\u9ad8\u8d28\u91cf\u6559\u6750\u3002\n\n\u672c\u7248\u300a\u533b\u5b66\u5fae\u751f\u7269\u5b66\u300b\u6559\u6750\u4fee\u8ba2\u7684\u987a\u5229\u5b8c\u6210\u662f\u5168\u56fd\u9ad8\u7b49\u533b\u5b66\u9662\u6821\u4ea4\u6d41\u4e0e\u5408\u4f5c\u7684\u7ed3\u6676\uff0c\u5f97\u5230\u4e86\u4eba\u6c11\u536b\u751f\u51fa\u7248\u793e\u7684\u6307\u5bfc\u548c\u79ef\u6781\u652f\u6301\uff0c\u7f16\u8005\u961f\u4f0d\u8001\u4e2d\u9752\u7ed3\u5408\u3001\u8986\u76d6\u9762\u5e7f\uff0c\u540c\u65f6\u4e3b\u5ba1\u674e\u51e1\u6559\u6388\u3001\u5f90\u5fd7\u51ef\u6559\u6388\u7ed9\u4e88\u4e86\u70ed\u5fc3\u6307\u5bfc\uff0c\u8d75\u56fd\u5c4f\u9662\u58eb\u3001\u5f90\u5efa\u56fd\u9662\u58eb\u7b49\u5fae\u751f\u7269\u754c\u524d\u8f88\u4e5f\u63d0\u4f9b\u4e86\u8bb8\u591a\u5b9d\u8d35\u5efa\u8bae\u3002\u5468\u7231\u840d/ \u8881\u6587\u5e38\uff08\u6dcb\u75c5\u5948\u745f\u83cc\uff09...\n\n### \u9769\u5170\u6c0f\u9634\u6027\u83cc \u2014 \u9009\u81ea\u300a\u533b\u5b66\u5fae\u751f\u7269\u5b66\u300b\n\n...\u7ecf\u78f7\u9178\u4e8c\u916f\u952e\u8fde\u63a5\u6210\u7684\u94fe\u72b6\u591a\u805a\u7269\uff0c\u7a7f\u63d2\u4e8e\u80bd\u805a\u7cd6\u5c42\u4e2d\uff0c\u5176\u7ed3\u6784\u4e2d\u5c11\u6570\u57fa\u56e2\u88ab\u6c28\u57fa\u9178\u6216\u7cd6\u6240\u53d6\u4ee3\uff0c\u591a\u4e2a\u78f7\u58c1\u9178\u5206\u5b50\u7ec4\u6210\u957f\u94fe\u7a7f\u63d2\u4e8e\u80bd\u805a\u7cd6\u5c42\u4e2d\uff0c\u8fd9\u662f\u7ec6\u83cc\u7ec6\u80de\u5e26\u8d1f\u7535\u8377\u7684\u91cd\u8981\u7269\u8d28\u57fa\u7840\u3002\u78f7\u58c1\u9178\u6309\u5176\u7ed3\u5408\u90e8\u4f4d\u4e0d\u540c\uff0c\u5206\u4e3a\u58c1\u78f7\u58c1\u9178\uff08wall teichoic acid\uff0cWTA\uff09\u548c\u819c\u78f7\u58c1\u9178\uff08membrane teichoic acid\uff09\u6216\u79f0\u8102\u78f7\u58c1\u9178\uff08lipoteichoic acid\uff0cLTA\uff09\u4e24\u79cd\u3002\u524d\u8005\u7684\u4e00\u7aef\u901a\u8fc7\u78f7\u8102\u4e0e\u80bd\u805a\u7cd6\u4e0a\u7684\u80de\u58c1\u9178\u5171\u4ef7\u7ed3\u5408\uff0c\u53e6\u4e00\u7aef\u4f38\u51fa\u7ec6\u80de\u58c1\u6e38\u79bb\u4e8e\u5916\u3002\u819c\u78f7\u58c1\u9178\u4e00\u7aef\u4e0e\u7ec6\u80de\u819c\u5916\u5c42\u7684\u7cd6\u8102\u5171\u4ef7\u7ed3\u5408\uff0c\u53e6\u4e00\u7aef\u7a7f\u8fc7\u80bd\u805a\u7cd6\u5c42\u4f38\u51fa\u7ec6\u80de\u58c1\u8868\u9762\u5448\u6e38\u79bb\u72b6\u6001\u3002\u78f7\u58c1\u919b\u9178\u4e0e\u78f7\u58c1\u9178\u76f8\u4f3c\uff0c\u4ec5\u5176\u7ed3\u6784\u4e2d\u4ee5\u7cd6\u919b\u9178\u4ee3\u66ff\u78f7\u9178\u3002\u58c1\u78f7\u58c1\u9178\u4e0e\u8102\u78f7\u58c1\u9178\u5171\u540c\u7ec4\u6210\u5e26\u8d1f\u7535\u8377\u7684\u7f51\u72b6\u591a\u805a\u7269\u6216\u57fa\u8d28\uff0c\u4f7f\u5f97G + \u83cc\u7684\u7ec6\u80de\u58c1\u5177\u6709\u826f\u597d\u7684\u575a\n\n\u56fe1-4\u2003 \u7ec6\u80de\u58c1\u80bd\u805a\u7cd6\u7ed3\u6784\u6a21\u5f0f\u56fe\n\n\u56fe1-5\u2003 \u9769\u5170\u6c0f\u9633\u6027\u83cc\u7ec6\u80de\u58c1\u7ed3\u6784\u6a21\u5f0f\u56fe\n\n\u767d\u7b49\uff0c\u8fd9\u4e9b\u86cb\u767d\u4e0e\u7ec6\u83cc\u7684\u81f4\u75c5\u6027\u548c\u6297\u539f\u6027\u76f8\u5173\u3002\n\n3. \u9769\u5170\u6c0f\u9634\u6027\u83cc\u7ec6\u80de\u58c1\u7279\u6b8a\u7ec4\u5206\u2003 G -\u2009\u83cc\u7ec6\u80de\u58c1\u8f83\u8584\uff0810\uff5e15nm\uff09\uff0c\u4f46\u7ed3\u6784\u8f83\u590d\u6742\u3002\u9664\u542b\u67091\uff5e2\u5c42\u7684\u80bd\u805a\u7cd6\u5916\uff0c\u8fd8\u5177\u6709\u8986\u76d6\u5728\u80bd\u805a\u7cd6\u5c42\u8868\u9762\u7684\u5916\u819c\uff08outer membrane\uff09\uff0c\u7ea6\u5360\u7ec6\u80de\u58c1\u5e72\u91cd\u768480%\uff08\u56fe1-6\uff09\u3002\n\n\u56fe1-6\u2003 \u9769\u5170\u6c0f\u9634\u6027\u83cc\u7ec6\u80de\u58c1\u7ed3\u6784\u6a21\u5f0f\u56fe\n\n\u5916\u819c\u7531\u8102\u86cb\u767d\u3001\u8102\u8d28\u53cc\u5c42\u548c\u8102\u591a\u7cd6\u4e09\u90e8\u5206\u7ec4\u6210\uff0c\u662f\u4e00\u4e2a\u4e0d\u5bf9\u79f0\u7684\u53cc\u5c42\u819c\u7ed3\u6784\u3002\u5916\u819c\u5185\u5c42\u4e0e\u7ec6\u80de\u819c\u7684\u7ed3\u6784\u76f8\u4f3c\uff0c\u4f46\u5176\u5916\u5c42\u5219\u4e3a\u8102\u591a\u7cd6\u7ed3\u6784\uff0c\u4e0e\u5bf9\u79f0\u7ed3\u6784\u7684\u7ec6\u80de\u819c\u5177\u6709\u660e\u663e\u7684\u5dee\u5f02\u3002\n\n\uff081\uff09\u2002 \u8102\u86cb\u767d\uff1a\u8102\u86cb\u767d\u4f4d\u4e8e\u80bd\u805a\u7cd6\u5c42\u548c\u8102\u8d28\u53cc\u5c42\u4e4b\u95f4\uff0c\u5176\u86cb\u767d\u8d28\u90e8\u5206\u4e0e\u80bd\u805a\u7cd6\u4fa7\u94fe\u7684DAP \u76f8\u8fde\uff0c\u5176\u8102\u8d28\u6210\u5206\u4e0e\u8102\u8d28\u53cc\u5c42\u975e\u5171\u4ef7\u7ed3\u5408\uff0c\u4f7f\u5916\u819c\u548c\u80bd\u805a\u7cd6\u5c42\u6784\u6210\u4e00\u4e2a\u6574\u4f53\u3002\n\n\uff082\uff09\u2002 \u8102\u8d28\u53cc\u5c42\uff1a\u8102\u8d28\u53cc\u5c42\u662f\u78f7\u8102\u548c\u86cb\u767d\u8d28\u7ec4\u6210\u7684\u53cc\u5c42\u819c\uff0c\u4e3a\u5916\u819c\u7684\u5185\u5c42\uff0c\u7c7b\u4f3c\u7ec6\u83cc\u7684\u7ec6\u80de\u819c\uff0c\u4f46\u51e0\u4e4e\u4e0d\u542b\u9176\u7c7b\u3002\u8102\u8d28\u53cc\u5c42\u5185\u9576\u5d4c\u7684\u86cb\u767d\u8d28\u79f0\u4e3a\u5916\u819c\u86cb\u767d\uff08outer membrane protein\uff0cOMP\uff09\uff0c\u5177\u6709\u9009\u62e9\u901a\u900f\u6027\u7b49\u91cd\u8981\u7684\u751f\u7406\u529f\u80fd\uff0c\u5176\u4e2d\u6709\u7684\u4e3a\u5b54\u86cb\u767d\uff08porin\uff09\uff0c\u5982\u5927\u80a0\u57c3\u5e0c\u83cc\u7684OmpF\u3001OmpC\uff0c\u5141\u8bb8\u6c34\u6eb6\u6027\u5206\u5b50\uff08\u5206\u5b50\u91cf$\u2264$600\uff09\u901a\u8fc7\uff1b\u6709\u7684\u4e3a\u8bf1\u5bfc\u6027\u6216\u53bb\u963b\u904f\u86cb\u767d\u8d28\uff0c\u53c2\u4e0e\u7279\u6b8a\u7269\u8d28\u7684\u6269\u6563\u8fc7\u7a0b\uff1b\u6709\u7684\u4e3a\u566c\u83cc\u4f53\u3 44\u5f552\u3000\u5c40\u90e8\u548c\u7cfb\u7edf\u611f\u67d3\u5fae\u751f\u7269\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd359\u96442-1\u2003 \u6d88\u5316\u7cfb\u7edf\u611f\u67d3\u6027\u75be\u75c5\u53ca\u5176\u75c5\u539f\u5fae\u751f\u7269.. . . . . . . . . . . . . . . . . . . . . . . 359\u96442-2\u2003 \u547c\u5438\u7cfb\u7edf\u611f\u67d3\u6027\u75be\u75c5\u53ca\u5176\u75c5\u539f\u5fae\u751f\u7269.. . . . . . . . . . . . . . . . . . . . . . . 359\u9644...\n\n### \u5916\u6bd2\u7d20 \u2014 \u9009\u81ea\u300a\u533b\u5b66\u5fae\u751f\u7269\u5b66\u300b\n\n...\u4e2d\u95f4\u4ee3\u8c22\n\n\u4ea7\u7269\uff1b\u4f46\u5206\u88c2\u8fdf\u7f13\uff0c\u7e41\u6b96\u6781\u5c11\u3002\u8fdf\u7f13\u671f\u957f\u77ed\u4e0d\u4e00\uff0c\u6309\n\n\u2463\uff5e\u2464\uff1a\u8870\u4ea1\u671f\u3002\n\n\u83cc\u79cd\u3001\u63a5\u79cd\u83cc\u7684\u83cc\u9f84\u548c\u83cc\u91cf\uff0c\u4ee5\u53ca\u8425\u517b\u7269\u7b49\u4e0d\u540c\u800c\n\n\u5f02\uff0c\u4e00\u822c\u4e3a1\uff5e4 \u5c0f\u65f6\u3002\n\n2. \u5bf9\u6570\u671f\uff08logarithmic phase\uff09\u2003 \u53c8\u79f0\u6307\u6570\u671f\uff08exponential phase\uff09\u3002\u7ec6\u83cc\u5728\u8be5\u671f\u751f\u957f\u8fc5\u901f\uff0c\u6d3b\u83cc\u6570\u4ee5\u6052\u5b9a\u7684\u51e0\u4f55\u7ea7\u6570\u589e\u957f\uff0c\u751f\u957f\u66f2\u7ebf\u56fe\u4e0a\u7ec6\u83cc\u6570\u7684\u5bf9\u6570\u5448\u76f4\u7ebf\u4e0a\u5347\uff0c\u8fbe\u5230\u9876\u5cf0\u72b6\u6001\u3002\u6b64\u671f\u7ec6\u83cc\u7684\u5f62\u6001\u3001\u67d3\u8272\u6027\u3001\u751f\u7406\u6d3b\u6027\u7b49\u90fd\u8f83\u5178\u578b\uff0c\u5bf9\u5916\u754c\u73af\u5883\u56e0\u7d20\u7684\u4f5c\u7528\u654f\u611f\u3002\u56e0\u6b64\uff0c\u7814\u7a76\u7ec6\u83cc\u7684\u751f\u7269\u5b66\u6027\u72b6\uff08\u5f62\u6001\u67d3\u8272\u3001\u751f\u5316\u53cd\u5e94\u3001\u836f\u7269\u654f\u611f\u8bd5\u9a8c\u7b49\uff09\u5e94\u9009\u7528\u8be5\u671f\u7684\u7ec6\u83cc\u3002\u4e00\u822c\u7ec6\u83cc\u5bf9\u6570\u671f\u5728\u57f9\u517b\u540e\u76848\uff5e18 \u5c0f\u65f6\u30023.\u2002 \u7a33\u5b9a\u671f\uff08stationary phase\uff09\u2003 \u7531\u4e8e\u57f9\u517b\u57fa\u4e2d\u8425\u517b\u7269\u8d28\u6d88\u8017\uff0c\u6709\u5bb3\u4ee3\u8c22\u4ea7\u7269\u79ef\u805a\uff0c\u8be5\u671f\u7ec6\u83cc\u7e41\u6b96\u901f\u5ea6\u6e10\u51cf\uff0c\u6b7b\u4ea1\u6570\u9010\u6e10\u589e\u52a0\uff0c\u4e24\u8005\u5927\u81f4\u5e73\u8861\uff0c\u56e0\u6b64\u8be5\u671f\u7684\u6d3b\u83cc\u6570\u5927\u81f4\u6052\u5b9a\uff0c\u603b\u7684\u7ec6\u83cc\u6570\u7f13\u6162\u589e\u52a0\uff0c\u7ec6\u83cc\u5f62\u6001\u3001\u67d3\u8272\u6027\u548c\u751f\u7406\u6027\u72b6\u5e38\u6709\u6539\u53d8\u3002\u4e00\u4e9b\u7ec6\u83cc\u7684\u82bd\u80de\u3001\u5916\u6bd2\u7d20\u548c\u6297\u751f\u7d20\u7b49\u4ee3\u8c22\u4ea7\u7269\u5927\u591a\u5728\u7a33\u5b9a\u671f\u4ea7\u751f\u30024.\u2002 \u8870\u4ea1\u671f\uff08decline phase\uff09\u2003 \u7a33\u5b9a\u671f\u540e\u7ec6\u83cc\u7e41\u6b96\u8d8a\u6765\u8d8a\u6162\uff0c\u6b7b\u4ea1\u6570\u8d8a\u6765\u8d8a\u591a\uff0c\u5e76\u8d85\u8fc7\u6d3b\u83cc\u6570\u3002\u8be5\u671f\n\n\u7ec6\u83cc\u751f\u957f\u66f2\u7ebf\u53ea\u6709\u5728\u4f53\u5916\u4eba\u5de5\u57f9\u517b\u7684\u6761\u4ef6\u4e0b\u624d\u80fd\u89c2\u5bdf\u5230\u3002\u5728\u81ea\u7136\u754c\u6216\u4eba\u7c7b\u3001\u52a8\u7269\u4f53\u5185\u7e41\u6b96\u65f6\uff0c\u53d7\u591a\u79cd\u73af\u5883\u56e0\u7d20\u548c\u673a\u4f53\u514d\u75ab\u56e0\u7d20\u7684\u591a\u65b9\u9762\u5f71\u54cd\uff0c\u4e0d\u53ef\u80fd\u51fa\u73b0\u5728\u57f9\u517b\u57fa\u4e2d\u5178\u578b\u7684\u751f\u957f\u66f2\u7ebf\u3002\n\n\u7ec6\u83cc\u7684\u751f\u957f\u66f2\u7ebf\u5728\u7814\u7a76\u5de5\u4f5c\u548c\u751f\u4ea7\u5b9e\u8df5\u4e2d\u90fd\u6709\u6307\u5bfc\u610f\u4e49\u3002\u638c\u63e1\u7ec6\u83cc\u751f\u957f\u89c4\u5f8b\uff0c\u53ef\u4ee5\u4eba\u4e3a\u5730\u6539\u53d8\u57f9\u517b\u6761\u4ef6\uff0c\u8c03\u6574\u7ec6\u83cc\u7684\u751f\u957f\u7e41\u6b96\u9636\u6bb5\uff0c\u66f4\u4e3a\u6709\u6548\u5730\u5229\u7528\u5bf9\u4eba\u7c7b\u6709\u76ca\u7684\u7ec6\u83cc\u3002\u4f8b\u5982\u5728\u57f9\u517b\u8fc7\u7a0b\u4e2d\uff0c\u4e0d\u65ad\u5730\u66f4\u65b0\u57f9\u517b\u6db2\u548c\u5bf9\u9700\u6c27\u83cc\u8fdb\u884c\u901a\u6c14\uff0c\u4f7f\u7ec6\u83cc\u957f\u65f6\u95f4\u5730\u5904\u4e8e\u751f\u957f\u65fa\u76db\u7684\u5bf9\u6570\u671f\uff0c\u8fd9\u79cd\u57f9\u517b\u79f0\u4e3a\u8fde\u7eed\u57f9\u517b\u3002\n\n\u7b2c\u4e09\u8282\u2002 |\u2002 \u7ec6\u83cc\u7684\u65b0\u9648\u4ee3\u8c22\n\n\u7ec6\u83cc\u7684\u65b0\u9648\u4ee3\u8c22\u5305\u62ec\u5206\u89e3\u4ee3\u8c22\u548c\u5408\u6210\u4ee3\u8c22\u3002\u7ec6\u83cc\u7684\u4ee3\u8c22\u8fc7\u7a0b\u4ee5\u80de\u5916\u9176\u6c34\u89e3\u5916\u73af\u5883\u4e2d\u7684\u8425\u517b\u7269\u8d28\u5f00\u59cb\uff0c\u4ea7\u751f\u5c0f\u7684\u5355\u4f53\u6784\u4ef6\u5206\u5b50\uff08\u4e5f\u79f0\u5355\u4f53\u4e9a\u57fa\uff09\uff0c\u4f8b\u5982\u6c28\u57fa\u9178\u3001\u8461\u8404\u7cd6\u548c\u8102\u80aa\u9178\u7b49\uff0c\u7ecf\u4e3b\u52a8\u6216\u88ab\u52a8\u8f6c\u8fd0\u673a\u5236\u8fdb\u5165\u80de\u8d28\u5185\u3002\u8fd9\u4e9b\u5206\u5b50\u5728\u4e00\u7cfb\u5217\u9176\u7684\u50ac\u5316\u4f5c\u7528\u4e0b\uff0c\u7ecf\u8fc7\u4e00\u79cd\u6216\u591a\u79cd\u9014\u5f84\u8f6c\u53d8\u4e3a\u901a\u7528\u7684\u4e2d\u95f4\u4ea7\u7269\u4e19\u916e\u9178\uff1b\u518d\u4ece\u4e19\u916e\u9178\u8fdb\u4e00\u6b65\u5206\u89e3\u4ea7\u751f\u80fd\u91cf\u6216\u5408\u6210\u65b0\u7684\u78b3\u6c34\u5316\u5408\u7269\u3001\u6c28\u57fa\u9178\u3001\u8102\u7c7b\u548c\u6838\u9178\u3002\u5728\u4e0a\u8ff0\u8fc7\u7a0b\u4e2d\uff0c\u5e95\u7269\u5206\u89e3\u548c\u8f6c\u5316\u4e3a\u80fd\u91cf\u7684\u8fc7\u7a0b\u79f0\u4e3a\u5206\u89e3\u4ee3\u8c22\uff1b\u6240\u4ea7\u751f\u7684\u80fd\u91cf\u548c\u5c11\u6570\u51e0\u79cd\u7b80\u5355\u7684\u524d\u4f53\u7528\u4e8e\u7ec6\u80de\u7ec4\u5206\u7684\u5408\u6210\u79f0\u4e3a\u5408\u6210\u4ee3\u8c22\u3002\u4f34\u968f\u4ee3\u8c22\u8fc7\u7a0b\u7ec6\u83cc\u8fd8\u4ea7\u751f\u8bb8\u591a\u5728\u533b\u5b66\u4e0a\u6709\u91cd\u8981\u610f\u4e49\u7684\u4ee3\u8c22\u4ea7\u7269\u3002\n\n\u4e00\u3001\u2002 \u7ec6\u83cc\u7684\u80fd\u91cf\u4ee3\u8c22\n\n\u7ec6\u83cc\u80fd\u91cf\u4ee3\u8c22\u6d3b\u52a8\u4e2d\u4e3b\u8981\u6d89\u53caATP \u5f62\u5f0f\u7684\u5316\u5b66\u80fd\u3002\u7ec6\u83cc\u7684\u6709\u673a\u7269\u5206\u89e3\u6216\u65e0\u673a\u7269\u6c27\u5316\u8fc7\u7a0b\u4e2d\u91ca\u653e\u7684\u80fd\u91cf\u901a\u8fc7\u5e95\u7269\u78f7\u9178\u5316\u6216\u6c27\u5316\u78f7\u9178\u5316\u5408\u6210ATP\u3002\n\n\u751f\u7269\u4f53\u80fd\u91cf\u4ee3\u8c22\u7684\u57fa\u672c\u751f\u5316\u53cd\u5e94\u662f\u751f\u7269\u6c27\u5316\u3002\u751f\u7269\u6c27\u5316\u7684\u65b9\u5f0f\u5305\u62ec\u52a0\u6c27\u3001\u8131\u6c22\u548c\u8131\u7535\u5b50\u53cd\u5e94\uff0c\u7ec6\u83cc\u5219\u4ee5\u8131\u6c22\u6216\u6c22\u7684\u4f20\u9012\u66f4\u4e3a\u5e38\u89c1\u3002\u5728\u6709\u6c27\u6216\u65e0\u6c27\u73af\u5883\u4e2d\uff0c\u5404\u79cd\u7ec6\u83cc\u7684\u751f\u7269\u6c27\u5316\u8fc7\u7a0b\u3001\u4ee3\u8c22\u4ea7\u7269\u548c\u4ea7\u751f\u80fd\u91cf\u7684\u591a\u5c11\u5747\u6709\u6240\u4e0d\u540c\u3002\u4ee5\u6709\u673a\u7269\u4e3a\u53d7\u6c22\u4f53\u7684\u751f\u7269\u6c27\u5316\u79f0\u4e3a\u53d1\u9175\uff1b\u4ee5\u65e0\u673a\u7269\u4e3a\u53d7\u6c22\u4f53\u7684\u79f0\u4e3a\u547c\u5438\uff0c\u5176\u4e2d\u4ee5\u6c27\u5206\u5b50\u4e3a\u53d7\u6c22\u4f53\u7684\u662f\u9700\u6c27\u547c\u5438\uff0c\u4ee5\u5176\u4ed6\u65e0\u673a\u7269\uff08\u785d\u9178...\n\n### \u7ec6\u83cc \u2014 \u9009\u81ea\u300a\u533b\u5b66\u5fae\u751f\u7269\u5b66\u300b\n\n...863 \u8bfe\u98983 \u9879\uff0c\u56fd\u5bb6\u79d1\u6280\u91cd\u5927\u4e13\u9879\u8bfe\u98983 \u9879\uff0c\u56fd\u5bb6\u91cd\u70b9\u7814\u53d1\u8ba1\u5212\u8bfe\u98983 \u9879\uff0c\u56fd\u5bb6\u81ea\u7136\u79d1\u5b66\u57fa\u91d1\u9879\u76ee4 \u9879\u3002\u83b7\u6e56\u5317\u7701\u79d1\u5b66\u6280\u672f\u5956\uff08\u81ea\u7136\u79d1\u5b66\uff09\u4e8c\u7b49\u59561 \u9879\u3002\u4e3b\u7f16\u3001\u53c2\u7f16\u4e13\u8457\u548c\u56fd\u5bb6\u7ea7\u89c4\u5212\u6559\u6750\u517110 \u4f59\u90e8\u3002\u53d1\u8868SCI \u8bba\u845750 \u4f59\u7bc7\uff0c\u5176\u4e2d12 \u7bc7IF>10\u3002\n\n\u6839\u636e\u4eba\u6c11\u536b\u751f\u51fa\u7248\u793e\u5168\u56fd\u9ad8\u7b49\u5b66\u6821\u4e94\u5e74\u5236\u672c\u79d1\u4e34\u5e8a\u533b\u5b66\u4e13\u4e1a\u7b2c\u5341\u8f6e\u89c4\u5212\u6559\u6750\u4e3b\u7f16\u4eba\u4f1a\u8bae\u7cbe\u795e\uff0c\u4ee5\u53ca\u5168\u56fd\u9ad8\u7b49\u9662\u6821\u5e08\u751f\u4f7f\u7528\u300a\u533b\u5b66\u5fae\u751f\u7269\u5b66\u300b\uff08\u7b2c9 \u7248\uff09\u6559\u6750\u7684\u4f53\u4f1a\u548c\u610f\u89c1\u5efa\u8bae\uff0c\u9075\u5faa\u4f20\u627f\u4e0e\u53d1\u5c55\u76f8\u7ed3\u5408\u7684\u601d\u8def\uff0c\u575a\u6301\u201c\u4e09\u57fa\u3001\u4e94\u6027\u3001\u4e09\u7279\u5b9a\u201d\u7684\u539f\u5219\uff0c\u5728\u524d\u7248\u6559\u6750\u7684\u57fa\u7840\u4e0a\u6211\u4eec\u5bf9\u6559\u6750\u5185\u5bb9\u8fdb\u884c\u4e86\u8ba4\u771f\u8ba8\u8bba\u548c\u4fee\u8ba2\uff0c\u66f4\u65b0\u5e76\u4fee\u8ba2\u4e86\u90e8\u5206\u6982\u5ff5\u548c\u77e5\u8bc6\u70b9\u3001\u539f\u7406\u53ca\u5176\u5e94\u7528\uff0c\u589e\u52a0\u4e86\u4eba\u4f53\u5fae\u751f\u7269\u7fa4\u4e0e\u5065\u5eb7\uff0c\u4ee5\u53ca\u8fd1\u5e74\u51fa\u73b0\u7684\u65b0\u53d1\u4f20\u67d3\u75c5\u75c5\u539f\uff0c\u5982SARS \u51a0\u72b6\u75c5\u6bd22\u3001\u7334\u75d8\u75c5\u6bd2\u7b49\u5185\u5bb9\uff0c\u6559\u6750\u5185\u5bb9\u4e5f\u878d\u5165\u4e86\u601d\u653f\u80b2\u4eba\u5143\u7d20\uff0c\u5f3a\u5316\u4e86\u65b0\u533b\u79d1\u3001\u5168\u5065\u5eb7\u7b49\u7406\u5ff5\u5bf9\u533b\u5b66\u5fae\u751f\u7269\u5b66\u5b66\u79d1\u4f53\u7cfb\u7684\u6e17\u900f\u548c\u878d\u5408\u3002\n\n\u672c\u7248\u6559\u6750\u4ecd\u6cbf\u7528\u4e0a\u4e00\u7248\u7684\u57fa\u672c\u6846\u67b6\uff0c\u5728\u7eea\u8bba\u3001\u7ec6\u83cc\u7bc7\u3001\u75c5\u6bd2\u7bc7\u3001\u771f\u83cc\u7bc7\u53ca\u9644\u5f55\u7684\u57fa\u7840\u4e0a\uff0c\u589e\u52a0\u4eba\u4f53\u5fae\u751f\u7269\u7fa4\u7bc7\u3002\u517c\u987e\u77e5\u8bc6\u7684\u57fa\u7840\u6027\u4e0e\u5148\u8fdb\u6027\uff0c\u5728\u6df1\u5ea6\u548c\u96be\u5ea6\u4e0a\u603b\u4f53\u4e0e\u76ee\u524d\u533b\u5
