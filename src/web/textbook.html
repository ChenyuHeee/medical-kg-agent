8\u6570\u4e00\u4f53\u5316\u8bbe\u8ba1\u3002\u6570\u5b57\u5185\u5bb9\u5efa\u8bbe\u4e0e\u6559\u6750\u77e5\u8bc6\u5185\u5bb9\u5951\u5408\uff0c\u6709\u6548\u670d\u52a1\u4e8e\u6559\u5b66\u5e94\u7528\uff0c\u62d3\u5c55\u6559\u5b66\u5185\u5bb9\u548c\u5b66\u4e60\u8fc7\u7a0b\uff1b\u5145\u5206\u4f53\u73b0\u201c\u4eba\u5de5\u667a\u80fd+\u201d\u5728\u6211\u56fd\u533b\u5b66\u6559\u80b2\u6570\u5b57\u5316\u8f6c\u578b\u5347\u7ea7\u3001\u878d\u5408\u53d1\u5c55\u4e2d\u7684\u4fc3\u8fdb\u548c\u5f15\u9886\u4f5c\u7528\u3002\u6253\u9020\u878d\u5408\u65b0\u6280\u672f\u3001\u65b0\u5f62\u5f0f\u548c\u4f18\u8d28\u8d44\u6e90\u7684\u65b0\u5f62\u6001\u6559\u6750\uff0c\u63a8\u52a8\u91cd\u5851\u533b\u5b66\u6559\u80b2\u6559\u5b66\u65b0\u751f\u6001\u3002\n5. \u79ef\u6781\u9002\u5e94\u793e\u4f1a\u53d1\u5c55\uff0c\u589e\u8bbe\u4e00\u6279\u65b0\u6559\u6750\u3002\u5305\u62ec\uff1a\u805a\u7126\u8001\u5e74\u533b\u7597\u3001\u5065\u5eb7\u670d\u52a1\u9700\u6c42\uff0c\u65b0\u589e\u300a\u8001\u5e74\u533b\u5b66\u300b\uff0c\u7ef4\u62a4\u8001\u5e74\u5065\u5eb7\u548c\u751f\u547d\u5c0a\u4e25\uff0c\u4e0e\u539f\u6709\u7684\u300a\u5987\u4ea7\u79d1\u5b66\u300b\u300a\u513f\u79d1\u5b66\u300b\u7b49\u5f62\u6210\u8f83\u4e3a\u5b8c\u6574\u7684\u91cd\u70b9\u4eba\u7fa4\u533b\u5b66\u6559\u6750\u4f53\u7cfb\uff1b\u91cd\u89c6\u8425\u517b\u7684\u57fa\u7840\u4e0e\u4e00\u7ebf\u6cbb\u7597\u4f5c\u7528\uff0c\u65b0\u589e\u300a\u4e34\u5e8a\u8425\u517b\u5b66\u300b\uff0c\u66f4\u65b0\u8425\u517b\u6cbb\u7597\u7406\u5ff5\uff0c\u89c4\u8303\u8425\u517b\u6cbb\u7597\u8def\u5f84\uff0c\u63d0\u5347\u8425\u517b\u6cbb\u7597\u6280\u80fd\u548c\u5168\u6c11\u8425\u517b\u7d20\u517b\uff1b\u4ee5\u6ee1\u8db3\u91cd\u5927\u75be\u75c5\u4e34\u5e8a\u9700\u6c42\u4e3a\u5bfc\u5411\uff0c\u65b0\u589e\u300a\u91cd\u75c7\u533b\u5b66\u300b\uff0c\u5f3a\u5316\u91cd\u75c7\u533b\u5b66\u4eba\u624d\u7684\u89c4\u8303\u5316\u57f9\u517b\uff0c\u63a8\u8fdb\u5b9e\u73b0\u91cd\u75c7\u7ba1\u7406\u5173\u53e3\u524d\u79fb\uff0c\u63d0\u5347\u5e94\u5bf9\u7a81\u53d1\u91cd\u5927\u516c\u5171\u536b\u751f\u4e8b\u4ef6\u7684\u80fd\u529b\u3002\n\n\u6211\u76f8\u4fe1\uff0c\u7b2c\u5341\u8f6e\u6559\u6750\u7684\u4fee\u8ba2\uff0c\u80fd\u591f\u4f20\u627f\u8001\u4e00\u8f88\u533b\u5b66\u6559\u80b2\u5bb6\u3001\u533b\u5b66\u79d1\u5b66\u5bb6\u80f8\u6000\u7956\u56fd\u3001\u670d\u52a1\u4eba\u6c11\u7684\u7231\u56fd\u7cbe\u795e\uff0c\u52c7\u6500\u9ad8\u5cf0\u3001\u6562\u4e3a\u4eba\u5148\u7684\u521b\u65b0\u7cbe\u795e\uff0c\u8ffd\u6c42\u771f\u7406\u3001\u4e25\u8c28\u6cbb\u5b66\u7684\u6c42\u5b9e\u7cbe\u795e\uff0c\u6de1\u6cca\u540d\u5229\u3001\u6f5c\u5fc3\u7814\u7a76\u7684\u5949\u732e\u7cbe\u795e\uff0c\u96c6\u667a\u653b\u5173\u3001\u56e2\u7ed3\u534f\u4f5c\u7684\u534f\u540c\u7cbe\u795e\u3002\u5728\u4eba\u6c11\u536b\u751f\u51fa\u7248\u793e\u4e0e\u5168\u4f53\u7f16\u8005\u7684\u5171\u540c\u52aa\u529b\u4e0b\uff0c\u65b0\u4fee\u8ba2\u6559\u6750\u5c06\u5168\u9762\u4f53\u73b0\u6559\u6750\u7684\u601d\u60f3\u6027\u3001\u79d1\u5b66\u6027\u3001\u5148\u8fdb\u6027\u3001\u542f\u53d1\u6027\u548c\u9002\u7528\u6027\uff0c\u4ee5\u5168\u5957\u65b0\u5f62\u6001\u6559\u6750\u7684\u5d2d\u65b0\u9762\u8c8c\uff0c\u4ee5\u6570\u5b57\u8d4b\u80fd\u533b\u5b66\u6559\u80b2\u73b0\u4ee3\u5316\u3001\u57f9\u517b\u533b\u5b66\u9886\u57df\u65f6\u4ee3\u65b0\u4eba\u7684\u5f3a\u52b2\u52a8\u529b\uff0c\u4e3a\u63a8\u52a8\u5065\u5eb7\u4e2d\u56fd\u5efa\u8bbe\u4f5c\u51fa\u79ef\u6781\u8d21\u732e\u3002\n\n\u6559\u80b2\u90e8\u533b\u5b66\u6559\u80b2\u4e13\u5bb6\u59d4\u5458\u4f1a\u4e3b\u4efb\u59d4\u5458\u6559\u80b2\u90e8\u539f\u526f\u90e8\u957f\n\n2024 \u5e745 \u6708\n\n\u5168\u56fd\u9ad8\u7b49\u5b66\u6821\u4e94\u5e74\u5236\u672c\u79d1\u4e34\u5e8a\u533b\u5b66\u4e13\u4e1a\u56fd\u5bb6\u536b\u751f\u5065\u5eb7\u59d4\u5458\u4f1a\u89c4\u5212\u6559\u6750\u81ea1978 \u5e74\u7b2c\u4e00\u8f6e\u51fa\u7248\u81f3\u4eca\u5df2\u670946 \u5e74\u7684\u5386\u53f2\u3002\u8fd1\u534a\u4e2a\u4e16\u7eaa\u4ee5\u6765\uff0c\u5728\u6559\u80b2\u90e8\u3001\u56fd\u5bb6\u536b\u751f\u5065\u5eb7\u59d4\u5458\u4f1a\u7684\u9886\u5bfc\u548c\u652f\u6301\u4e0b\uff0c\u4ee5\u5434\u9636\u5e73\u3001\u88d8\u6cd5\u7956\u3001\u5434\u5b5f\u8d85\u3001\u9648\u704f\u73e0\u7b49\u9662\u58eb\u4e3a\u4ee3\u8868\u7684\u51e0\u4ee3\u5fb7\u9ad8\u671b\u91cd\u3001\u6709\u4e30\u5bcc\u7684\u4e34\u5e8a\u548c\u6559\u5b66\u7ecf\u9a8c\u3001\u6709\u9ad8\u5ea6\u8d23\u4efb\u611f\u548c\u656c\u4e1a\u7cbe\u795e\u7684\u56fd\u5185\u5916\u8457\u540d\u9662\u58eb\u3001\u4e13\u5bb6\u3001\u533b\u5b66\u5bb6\u3001\u6559\u80b2\u5bb6\u53c2\u4e0e\u4e86\u672c\u5957\u6559\u6750\u7684\u521b\u5efa\u548c\u6bcf\u4e00\u8f6e\u6559\u6750\u7684\u4fee\u8ba2\u5de5\u4f5c\uff0c\u4f7f\u6211\u56fd\u7684\u4e94\u5e74\u5236\u672c\u79d1\u4e34\u5e8a\u533b\u5b66\u6559\u6750\u4ece\u65e0\u5230\u6709\u3001\u4ece\u5c11\u5230\u591a\u3001\u4ece\u591a\u5230\u7cbe\uff0c\u4e0d\u65ad\u4e30\u5bcc\u3001\u5b8c\u5584\u4e0e\u521b\u65b0\uff0c\u5f62\u6210\u4e86\u8bfe\u7a0b\u95e8\u7c7b\u9f50\u5168\u3001\u5b66\u79d1\u7cfb\u7edf\u4f18\u5316\u3001\u5185\u5bb9\u8854\u63a5\u5408\u7406\u3001\u7ed3\u6784\u4f53\u7cfb\u79d1\u5b66\u7684\u7531\u7eb8\u8d28\u6559\u6750\u4e0e\u6570\u5b57\u6559\u6750\u3001\u5728\u7ebf\u8bfe\u7a0b\u3001\u4e13\u4e1a\u9898\u5e93\u3001\u865a\u62df\u4eff\u771f\u548c\u4eba\u5de5\u667a\u80fd\u7b49\u6df1\u5ea6\u878d\u5408\u7684\u7acb\u4f53\u5316\u6559\u6750\u683c\u5c40\u3002\u8fd9\u5957\u6559\u6750\u4e3a\u6211\u56fd\u5343\u767e\u4e07\u533b\u5b66\u751f\u7684\u57f9\u517b\u548c\u6210\u624d\u63d0\u4f9b\u4e86\u6839\u672c\u4fdd\u969c\uff0c\u4e3a\u6211\u56fd\u57f9\u517b\u4e86\u4e00\u4ee3\u53c8\u4e00\u4ee3\u9ad8\u6c34\u5e73\u3001\u9ad8\u7d20\u8d28\u7684\u5408\u683c\u533b\u5b66\u4eba\u624d\uff0c\u4e3a\u63a8\u52a8\u6211\u56fd\u533b\u7597\u536b\u751f\u4e8b\u4e1a\u7684\u6539\u9769\u548c\u53d1\u5c55\u4f5c\u51fa\u4e86\u5386\u53f2\u6027\u5de8\u5927\u8d21\u732e\uff0c\u5e76\u901a\u8fc7\u6559\u6750\u7684\u521b\u65b0\u5efa\u8bbe\u548c\u9ad8\u8d28\u91cf\u53d1\u5c55\uff0c\u63a8\u52a8\u4e86\u6211\u56fd\u9ad8\u7b49\u533b\u5b66\u672c\u79d1\u6559\u80b2\u7684\u6539\u9769\u548c\u53d1\u5c55\uff0c\u4fc3\u8fdb\u4e86\u6211\u56fd\u533b\u836f\u5b  . . . . . . . . . . . . ...\n\n---\n\n# \u6ccc\u5c3f\u7cfb\u7edf\n\n\u672c\u7ae0\u6db5\u76d6\u7cd6\u5c3f\u75c5\u3001\u80be\u30012\u578b\u7cd6\u5c3f\u75c5\u3001\u6297\u5229\u5c3f\u6fc0\u7d20\u3001\u4ea4\u611f-\u80be\u4e0a\u817a\u9ad3\u8d28\u7cfb\u7edf\u3001ADH\u7b49\u6838\u5fc3\u77e5\u8bc6\u70b9\uff0c\u6574\u5408\u81ea7\u672c\u6559\u6750\u76f8\u5173\u5185\u5bb9\u3002\n\n## \u6838\u5fc3\u6982\u5ff5\u4e0e\u5b9a\u4e49\n\n**\u7cd6\u5c3f\u75c5**\uff1a\u7cd6\u5c3f\u75c5\u60a3\u8005\u5c24\u5176\u662f\u8840\u7cd6\u6c34\u5e73\u63a7\u5236\u4e0d\u826f\u8005\u5e38\u6709\u9ad8\u7518\u6cb9\u4e09\u916f\u8840\u75c7\uff0c1\u578b\u7cd6\u5c3f\u75c5\u56e0\u80f0\u5c9b\u7d20\u7f3a\u4e4f\u81f4LPL\u6d3b\u6027\u6291\u5236\uff0c2\u578b\u7cd6\u5c3f\u75c5\u56e0\u80f0\u5c9b\u7d20\u62b5\u6297\u81f4\u9ad8\u80f0\u5c9b\u7d20\u8840\u75c7\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66\u3001\u75c5\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u80be**\uff1a\u4f4d\u4e8e\u810a\u67f1\u4e24\u4fa7\uff0c\u8d34\u9644\u4e8e\u8179\u540e\u58c1\uff0c\u53f3\u80be\u4f4e\u4e8e\u5de6\u80be1~2cm\uff0c\u5176\u957f\u8f74\u659c\u5411\u4e0b\u5916\uff0c\u4e24\u80be\u80be\u95e8\u76f8\u5bf9\u3002\n*\u6765\u6e90\uff1a\u5c40\u90e8\u89e3\u5256\u5b66\u3001\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**2\u578b\u7cd6\u5c3f\u75c5**\uff1a\u5e38\u6709\u80f0\u5c9b\u7d20\u62b5\u6297\uff0c\u5185\u6e90\u6027\u80f0\u5c9b\u7d20\u5206\u6ccc\u8fc7\u591a\uff0c\u5f15\u8d77\u9ad8\u80f0\u5c9b\u7d20\u8840\u75c7\uff0c\u7ee7\u800c\u51cf\u5f31\u80f0\u5c9b\u7d20\u5bf9LPL\u7684\u6fc0\u6d3b\u4f5c\u7528\uff0c\u5f15\u8d77\u7518\u6cb9\u4e09\u916f\u5347\u9ad8\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u6297\u5229\u5c3f\u6fc0\u7d20**\uff1aADH\uff0c\u56e0\u94a0\u91cd\u5438\u6536\u589e\u52a0\u548cAng\u2161\u523a\u6fc0\u800c\u91ca\u653e\u589e\u591a\uff0c\u4fc3\u8fdb\u8fdc\u66f2\u5c0f\u7ba1\u548c\u96c6\u5408\u7ba1\u5bf9\u6c34\u7684\u91cd\u5438\u6536\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u4ea4\u611f-\u80be\u4e0a\u817a\u9ad3\u8d28\u7cfb\u7edf**\uff1a\u6025\u6027\u5fc3\u529f\u80fd\u4e0d\u5168\u65f6\u5174\u594b\uff0c\u91ca\u653e\u513f\u8336\u915a\u80fa\uff0c\u901a\u8fc7\u03b2-\u80be\u4e0a\u817a\u7d20\u53d7\u4f53\u589e\u5f3a\u5fc3\u808c\u6536\u7f29\u529b\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**ADH**\uff1a\u6297\u5229\u5c3f\u6fc0\u7d20\uff0c\u8c03\u8282\u96c6\u5408\u7ba1\u91cd\u5438\u6536\u6c34\u800c\u6d53\u7f29\u5c3f\u6db2\uff0c\u4e0eV2R\u548cAQP2\u5173\u7cfb\u5bc6\u5207\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u5fc3\u623f\u94a0\u5c3f\u80bd**\uff1a\u7531\u5fc3\u623f\u808c\u4e3b\u8981\u5408\u6210\u548c\u5206\u6ccc\u7684\u94a0\u5c3f\u80bd\u5bb6\u65cf\u6210\u5458\uff0c\u5177\u6709\u5229\u94a0\u6392\u5c3f\u3001\u6269\u5f20\u8840\u7ba1\u548c\u6291\u5236\u80be\u7d20\u53ca\u919b\u56fa\u916e\u7684\u4f5c\u7528\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66  \u2190 \u524d\u7f6e\uff1aB\u578b\u94a0\u5c3f\u80bd\u539f*\n\n**\u6c34\u3001\u94a0\u6f74\u7559**\uff1a\u80be\u5c0f\u7403\u6ee4\u8fc7\u7387\u4e0b\u964d\u6216\u80be\u5c0f\u7ba1\u91cd\u5438\u6536\u589e\u5f3a\u5bfc\u81f4\u6c34\u548c\u94a0\u5728\u4f53\u5185\u79ef\u805a\uff0c\u5f15\u8d77\u6c34\u80bf\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66  \u2190 \u524d\u7f6e\uff1a\u80be\u5c0f\u7403\u6ee4\u8fc7\u7387\u4e0b\u964d*\n\n**\u80be\u4ee3\u507f**\uff1a\u80be\u5c0f\u7ba1\u4e0a\u76ae\u7ec6\u80de\u901a\u8fc7\u78b3\u9178\u9150\u9176\u548c\u8c37\u6c28\u9170\u80fa\u9176\u6d3b\u6027\u589e\u5f3a\uff0c\u6392\u6cccH+\u548cNH4+\uff0c\u91cd\u5438\u6536HCO3-\u7684\u8c03\u8282\u8fc7\u7a0b\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u8f93\u5c3f\u7ba1**\uff1a\u4f4d\u4e8e\u80be\u7684\u5185\u4e0b\u65b9\uff0c\u8d77\u81ea\u80be\u76c2\uff0c\u662f\u8f93\u9001\u5c3f\u6db2\u81f3\u8180\u80f1\u7684\u7ba1\u9053\uff0c\u5c5e\u4e8e\u8179\u819c\u540e\u95f4\u9699\u7ed3\u6784\u3002\n*\u6765\u6e90\uff1a\u5c40\u90e8\u89e3\u5256\u5b66\u3001\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66  \u2190 \u524d\u7f6e\uff1a\u80be*\n\n**\u80be\u7684\u8c03\u8282\u4f5c\u7528**\uff1a\u901a\u8fc7\u80be\u5c0f\u7ba1\u4e0a\u76ae\u7ec6\u80de\u6392H+\u3001\u6392\u94f5\u548c\u91cd\u5438\u6536Na+\u3001HCO3-\u7b49\u673a\u5236\u8c03\u8282pH\uff0c\u7ef4\u6301\u9178\u78b1\u5e73\u8861\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u6c34\u3001\u7535\u89e3\u8d28\u4ee3\u8c22\u7d0a\u4e71**\uff1a\u6307\u6c34\u3001\u94a0\u3001\u94be\u3001\u9541\u7b49\u7535\u89e3\u8d28\u5728\u4f53\u5185\u5206\u5e03\u3001\u6d53\u5ea6\u6216\u6392\u6cc4\u5f02\u5e38\u5bfc\u81f4\u7684\u75c5\u7406\u72b6\u6001\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u80be\u529f\u80fd\u4e0d\u5168**\uff1a\u7531\u4e8e\u80be\u5355\u4f4d\u4e27\u5931\u548c\u80be\u5c0f\u7ba1-\u95f4\u8d28\u635f\u4f24\u7b49\u539f\u56e0\u5bfc\u81f4\u80be\u810f\u529f\u80fd\u8fdb\u884c\u6027\u51cf\u9000\u7684\u75c5\u7406\u72b6\u6001\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u4e00\u7ea7\u9884\u9632**\uff1a\u901a\u8fc7\u63a7\u5236\u5371\u9669\u56e0\u7d20\u3001\u5065\u5eb7\u6559\u80b2\u3001\u5065\u5eb7\u751f\u6d3b\u65b9\u5f0f\u7b49\u9884\u9632\u7cd6\u5c3f\u75c5\u7684\u53d1\u751f\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u53bb\u7532\u80be\u4e0a\u817a\u7d20**\uff1a\u4fc3\u8fdb\u975e\u5fc3\u808c\u7ec6\u80de\u6d3b\u5316\u6216\u589e\u6b96\uff0c\u5bfc\u81f4\u5fc3\u808c\u95f4\u8d28\u589e\u751f\u548c\u91cd\u5851\u7684\u56e0\u7d20\u4e4b\u4e00\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u78b1\u4e2d\u6bd2**\uff1a\u4ee3\u8c22\u6027\u6216\u547c\u5438\u6027\u78b1\u4e2d\u6bd2\u53ef\u4fc3\u4f7fK+\u8fdb\u5165\u7ec6\u80de\u5185\uff0c\u5e76\u901a\u8fc7\u80be\u5c0f\u7ba1\u79bb\u5b50\u4ea4\u6362\u589e\u52a0\u5c3f\u94be\u6392\u51fa\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u80be\u8870\u7aed**\uff1a\u4e25\u91cd\u80be\u8870\u7aed\u65f6\u56fa\u5b9a\u9178\u4e0d\u80fd\u4ece\u5c3f\u4e2d\u6392\u6cc4\uff0c\u786b\u9178\u548c\u78f7\u9178\u5728\u4f53\u5185\u79ef\u84c4\uff0cH+\u6d53\u5ea6\u589e\u52a0\u5bfc\u81f4HCO3-\u6d53\u5ea6\u964d\u4f4e\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u9541\u5e73\u8861**\uff1a\u6b63\u5e38\u4eba\u4f53\u5185\u9541\u7684\u6444\u5165\u548c\u6392\u51fa\u5904\u4e8e\u52a8\u6001\u5e73\u8861\uff0c\u4e3b\u8981\u9760\u80be\u8c03\u8282\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**H+-Na+\u4ea4\u6362**\uff1a\u80be\u5c0f\u7ba1\u7ec6\u80de\u4e3b\u52a8\u5206\u6cccH+\u540c\u65f6\u56de\u6536Na+\u7684\u9006\u5411\u8f6c\u8fd0\u673a\u5236\uff0c\u4f34\u968fHCO3-\u7684\u91cd\u5438\u6536\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u5229\u5c3f\u5242**\uff1a\u5982\u544b\u585e\u7c73\u3001\u4f9d\u4ed6\u5c3c\u9178\u7b49\u53ef\u6291\u5236\u9ad3\u88a2\u5347\u652f\u7c97\u6bb5\u5bf9\u9541\u7684\u91cd\u5438\u6536\uff0c\u5bfc\u81f4\u80be\u6392\u9541\u589e\u591a\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**NH4+**\uff1aNH3\u4e0eH+\u7ed3\u5408\u5f62\u6210\u7684\u79bb\u5b50\uff0c\u901a\u8fc7NH4+-Na+\u4ea4\u6362\u8fdb\u5165\u7ba1\u8154\u7531\u5c3f\u6392\u51fa\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u56fa\u5b9a\u9178**\uff1a\u4e0d\u80fd\u53d8\u6210\u6c14\u4f53\u7531\u80ba\u547c\u51fa\uff0c\u53ea\u80fd\u901a\u8fc7\u80be\u7531\u5c3f\u6392\u51fa\u7684\u9178\u6027\u7269\u8d28\uff0c\u5982\u786b\u9178\u3001\u78f7\u9178\u3001\u5c3f\u9178\u7b49\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u96c6\u5408\u7ba1**\uff1a\u80be\u5c0f\u7ba1\u7684\u4e00\u90e8\u5206\uff0c\u4e3b\u7ec6\u80de\u53c2\u4e0eADH\u8c03\u8282\u7684\u6c34\u91cd\u5438\u6536\u8fc7\u7a0b\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u816e\u817a\u7ba1**\uff1a\u816e\u817a\u7684\u6392\u6cc4\u7ba1\uff0c\u5728\u54ac\u808c\u524d\u7f18\u8f6c\u5411\u5185\u4fa7\u7a7f\u988a\u808c\uff0c\u5f00\u53e3\u4e8e\u4e0e\u4e0a\u988c\u7b2c\u4e8c\u78e8\u7259\u76f8\u5bf9\u5904\u7684\u988a\u9ecf\u819c\u4e0a\u3002\n*\u6765\u6e90\uff1a\u5c40\u90e8\u89e3\u5256\u5b66*\n\n**\u8f93\u5c3f\u7ba1\u8179\u90e8**\uff1a\u8f93\u5c3f\u7ba1\u7684\u4e00\u90e8\u5206\uff0c\u4ece\u80be\u76c2\u4e0e\u8f93\u5c3f\u7ba1\u4ea4\u754c\u5904\u81f3\u8de8\u8d8a\u9ac2\u8840\u7ba1\u5904\uff0c\u957f\u7ea613~14cm\u3002\n*\u6765\u6e90\uff1a\u5c40\u90e8\u89e3\u5256\u5b66*\n\n**\u76ae\u8d28**\uff1a\u80be\u4e0a\u817a\u5916\u56f4\u90e8\u5206\uff0c\u5360\u5176\u4f53\u79ef\u7ea680%\uff0c\u7531\u7403\u72b6\u5e26\u3001\u675f\u72b6\u5e26\u548c\u7f51\u72b6\u5e26\u7ec4\u6210\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66*\n\n**\u80be\u5c0f\u7ba1\u548c\u96c6\u5408\u7ba1\u7684\u7269\u8d28\u8f6c\u8fd0\u529f\u80fd**\uff1a\u80be\u5c0f\u7ba1\u548c\u96c6\u5408\u7ba1\u5bf9\u539f\u5c3f\u4e2d\u7269\u8d28\u8fdb\u884c\u91cd\u5438\u6536\u548c\u5206\u6ccc\u7684\u529f\u80fd\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**\u5c3f\u751f\u6210\u7684\u8c03\u8282**\uff1a\u673a\u4f53\u5bf9\u5c3f\u751f\u6210\u8fc7\u7a0b\u8fdb\u884c\u7684\u8c03\u8282\uff0c\u5305\u62ec\u795e\u7ecf\u8c03\u8282\u548c\u4f53\u6db2\u8c03\u8282\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**\u80be\u76c2\u80be\u708e**\uff1a\u80be\u5c0f\u7ba1\u95f4\u8d28\u6027\u80be\u708e\u7684\u4e00\u79cd\uff0c\u4e3b\u8981\u7d2f\u53ca\u80be\u76c2\u548c\u80be\u5b9e\u8d28\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66*\n\n**\u6025\u6027\u80be\u8870\u7aed**\uff1a\u80be\u529f\u80fd\u5728\u77ed\u65f6\u95f4\u5185\u6025\u5267\u4e0b\u964d\uff0c\u5bfc\u81f4\u4ee3\u8c22\u5e9f\u7269\u84c4\u79ef\u548c\u6c34\u7535\u89e3\u8d28\u7d0a\u4e71\u7684\u7efc\u5408\u5f81\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u7cd6\u5c3f\u75c5\u80be\u75c5**\uff1a\u7cd6\u5c3f\u75c5\u5f15\u8d77\u7684\u80be\u810f\u75c5\u53d8\uff0c\u8868\u73b0\u4e3a\u80be\u5c0f\u7403\u6ee4\u8fc7\u819c\u7ec6\u80de\u635f\u4f24\u3001\u589e\u6b96\u7f3a\u9677\uff0c\u7cfb\u819c\u7ec6\u80de\u80a5\u5927\u589e\u6b96\uff0c\u6700\u7ec8\u5bfc\u81f4\u80be\u5c0f\u7403\u786c\u5316\u548c\u80be\u529f\u80fd\u51cf\u9000\u3 9669\u6027\u663e\u8457\u63d0\u9ad8\uff1b\u2461 \u96c4\u6fc0\u7d20\u4e0d\u654f\u611f\u7efc\u5408\u5f81\uff08androgen insensitivity syndrome\uff0cAIS\uff09\uff0c\u662f\u7531\u4e8e\u9057\u4f20\u6027\u7684\u96c4\u6fc0\u7d20\u53d7\u4f53\uff08androgen receptor\uff0cAR\uff09\u6570\u76ee\u51cf\u5c11\u6216\u529f\u80fd\u4f4e\u4e0b\uff0c\u5bfc\u81f4\u6027\u5206\u5316\u53d1\u80b2\u969c\u788d\u3002\u96c4\u6fc0\u7d20\u5177\u6709\u8bf1\u5bfc\u7537\u6027\u6027\u5206\u5316\u53d1\u80b2\u548c\u7ef4\u6301\u7537\u6027\u751f\u80b2\u80fd\u529b\u7b49\u4f5c\u7528\uff0cAR \u4f5c\u4e3a\u914d\u4f53\u4f9d\u8d56\u6027\u7684\u8f6c\u5f55\u8c03\u8282\u56e0\u5b50\uff0c\u4e0e\u96c4\u6fc0\u7d20\u7ed3\u5408\u540e\uff0c\u5728\u6838\u5185\u4e0e\u9776\u57fa\u56e0\u4e2d\u7684\u96c4\u6fc0\u7d20\u5e94\u7b54\u5143\u4ef6\u7ed3\u5408\uff0c\u4e4b\u540e\u901a\u8fc7\u52df\u96c6\u5171\u6fc0\u6d3b\u56e0\u5b50\uff0c\u8c03\u8282\u57fa\u56e0\u8868\u8fbe\uff0c\u4ea7\u751f\u751f\u7269\u5b66\u6548\u5e94\u3002AR \u6570\u76ee\u51cf\u5c11\u6216\u5931\u6d3b\u6027\u7a81\u53d8\u5bfc\u81f4\u7684AIS\uff0c\u8868\u73b0\u4e3a\u7537\u6027\u5047\u4e24\u6027\u7578\u5f62\uff0c\u7279\u53d1\u6027\u65e0\u7cbe\u75c7\u6216\u5c11\u7cbe\u75c7\uff0c\u810a\u9ad3\u5ef6\u9ad3\u6027\u808c\u840e\u7f29\u7b49\uff1b\u6b64\u5916\uff0c\u5bb6\u65cf\u6027\u80be\u6027\u5c3f\u5d29\u75c7\u4e0e\u6297\u5229\u5c3f\u6fc0\u7d20\uff08antidiuretic hormone\uff0cADH\uff09\u7684V2 \u578b\u53d7\u4f53\u6570\u91cf\u51cf\u5c11\u6216\u529f\u80fd\u7f3a\u9677\u6709\u5173\uff0c\u9057\u4f20\u6027\u7684\u80f0\u5c9b\u7d20\u62b5\u6297\u6027\u7cd6\u5c3f\u75c5\u4e0e\u80f0\u5c9b\u7d20\u53d7\u4f53\u7684\u591a\u79cd\u57fa\u56e0\u7a81\u53d8\u6709\u5173\u3002\n\n\uff08\u4e8c\uff09\u2002 \u53d7\u4f53\u8fc7\u5ea6\u6fc0\u6d3b\u5bfc\u81f4\u7684\u75be\u75c5\n\n\u5f53\u53d7\u4f53\u8868\u8fbe\u4e0a\u8c03\u3001\u53d1\u751f\u529f\u80fd\u83b7\u5f97\u6027\u7a81\u53d8\u6216\u8005\u6291\u5236\u6027\u6210\u5206\u7f3a\u5931\u65f6\uff0c\u90fd\u53ef\u80fd\u5bfc\u81f4\u7ec6\u80de\u5185\u7279\u5b9a\u4fe1\u53f7\u8f6c\u5bfc\u901a\u8def\u7684\u8fc7\u5ea6\u6fc0\u6d3b\uff0c\u4ece\u800c\u8bf1\u53d1\u80bf\u7624\u7b49\u75be\u75c5\u3002\u5e38\u89c1\u7684\u53d7\u4f53\u8fc7\u5ea6\u6fc0\u6d3b\u5bfc\u81f4\u75be\u75c5\u7684\u4f8b\u5b50\u5982\u8868\u76ae\u751f\u957f\u56e0\u5b50\u53d7\u4f53\uff08epidermal growth factor receptor\uff0cEGFR\uff09\uff0c\u5c5e\u4e8eERBB \u5bb6\u65cf\uff0c\u5728\u7ec6\u80de\u751f\u957f\u3001\u53d1\u80b2\u53ca\u5206\u5316\u8fc7\u7a0b\u4e2d\u53d1\u6325\u91cd\u8981\u4f5c\u7528\u3002EGFR \u7684\u57fa\u56e0\u7a81\u53d8\u3001\u57fa\u56e0\u6269\u589e\u3001\u57fa\u56e0\u91cd\u6392\u6216\u8868\u89c2\u9057\u4f20\u6539\u53d8\u7b49\uff0c\u90fd\u53ef\u5bfc\u81f4EGFR \u86cb\u767d\u7684\u5f02\u5e38\u8868\u8fbe\u6216\u6d3b\u5316\uff0c\u4ece\u800c\u589e\u5f3aEGFR \u4fe1\u53f7\u8f6c\u5bfc\u901a\u8def\u7684\u4fe1\u53f7\u5f3a\u5ea6\uff0c\u8bf1\u5bfc\u6216\u4fc3\u8fdb\u80bf\u7624\u7684\u53d1\u751f\u53d1\u5c55\u3002\u9488\u5bf9\u53d7\u4f53\u7684\u9776\u5411\u6cbb\u7597\u5df2\u6210\u4e3a\u80bf\u7624\u6cbb\u7597\u7684\u91cd\u8981\u624b\u6bb5\u4e4b\u4e00\u3002\n\n\u4e8c\u3001\u2002 \u514d\u75ab\u6027\u53d7\u4f53\u5f02\u5e38\u4e0e\u75be\u75c5\n\n\u514d\u75ab\u6027\u53d7\u4f53\u5f02\u5e38\u662f\u673a\u4f53\u901a\u8fc7\u514d\u75ab\u5e94\u7b54\u53cd\u5e94\u4ea7\u751f\u4e86\u9488\u5bf9\u81ea\u8eab\u53d7\u4f53\u7684\u6297\u4f53\u6240\u5f15\u8d77\u7684\u75be\u75c5\u3002\u8fd9\u4e9b\u6297\u4f53\u7684\u4ea7\u751f\u673a\u5236\u4e0e\u591a\u79cd\u56e0\u7d20\u6709\u5173\uff0c\u5305\u62ec\u9057\u4f20\u3001\u611f\u67d3\u3001\u836f\u7269\u548c\u73af\u5883\u7b49\u3002\u57fa\u56e0\u7a81\u53d8\u53ef\u80fd\u5bfc\u81f4\u53d7\u4f53\u4e00\u7ea7\u7ed3\u6784\u6539\u53d8\u4f7f\u53d7\u4f53\u5177\u6709\u6297\u539f\u6027\uff1b\u6216\u53d7\u4f53\u539f\u6765\u9690\u853d\u7684\u6297\u539f\u51b3\u5b9a\u7c07\u66b4\u9732\uff0c\u5f15\u53d1\u514d\u75ab\u53cd\u5e94\uff1b\u67d0\u4e9b\u53d7\u4f53\u86cb\u767d\u4e0e\u5916\u6765\u6297\u539f\uff08\u5982\u67ef\u8428\u5947\u75c5\u6bd2\u3001\u94fe\u7403\u83cc\u7b49\u75c5\u539f\u4f53\uff09\u6709\u5171\u540c\u7684\u6297\u539f\u51b3\u5b9a\u7c07\uff0c\u4f7f\u7ec6\u80de\u5728\u5bf9\u5916\u6765\u6297\u539f\u4ea7\u751f\u6297\u4f53\u548c\u81f4\u654f\u6dcb\u5df4\u7ec6\u80de\u7684\u540c\u65f6\uff0c\u4e5f\u5bf9\u76f8\u5e94\u53d7\u4f53\u4ea7\u751f\u4ea4\u53c9\u514d\u75ab\u53cd\u5e94\u3002\u6b64\u5916\uff0c\u5f53\u673a\u4f53\u514d\u75ab\u529f\u80fd\u7d0a\u4e71\u65f6\uff0c\u53ef\u5c06\u81ea\u8eab\u5f53\u4f5c\u5f02\u5df1\uff0c\u4f53\u5185\u4ea7\u751f\u4e86\u9488\u5bf9\u81ea\u8eab\u53d7\u4f53\u7684\u6297\u4f53\uff0c\u4e0e\u76f8\u5e94\u7684\u53d7\u4f53\u7ed3\u5408\u540e\u5bfc\u81f4\u7ec6\u80de\u529f\u80fd\u7d0a\u4e71\uff0c\u4ece\u800c\u5f15\u53d1\u4e00\u7cfb\u5217\u75be\u75c5\u3002\n\n\u6297\u53d7\u4f53\u6297\u4f53\u6839\u636e\u5176\u4e0e\u76f8\u5e94\u53d7\u4f53\u7ed3\u5408\u6240\u4ea7\u751f\u7684\u6548\u5e94\u53ef\u5206\u4e3a\u523a\u6fc0\u578b\u548c\u963b\u65ad\u578b\u3002\u523a\u6fc0\u578b\u6297\u4f53\u53ef\u6a21\u62df\u4fe1\u53f7\u5206\u5b50\u6216\u914d\u4f53\u7684\u4f5c\u7528\uff0c\u6fc0\u6d3b\u7279\u5b9a\u7684\u4fe1\u53f7\u8f6c\u5bfc\u901a\u8def\uff0c\u4f7f\u9776\u7ec6\u80de\u529f\u80fd\u4ea2\u8fdb\u3002\u4f8b\u5982\u683c\u96f7\u592b\u65af\u75c5\uff08Graves disease\uff09\uff0c\u53c8\u79f0\u6bd2\u6027\u5f25\u6f2b\u6027\u7532\u72b6\u817a\u80bf\uff0c\u5c5e\u4e8e\u81ea\u8eab\u514d\u75ab\u6027\u7532\u72b6\u817a\u75c5\uff0c\u4ea7\u751f\u7684\u81ea\u8eab\u6297\u4f53\u4e3b\u8981\u662f\u4fc3\u7532\u72b6\u817a\u6fc0\u7d20\u53d7\u4f53\u523a\u6fc0\u6027\u6297\u4f53\uff08thyroid stimula...\n\n### ADH \u2014 \u9009\u81ea\u300a\u75c5\u7406\u751f\u7406\u5b66\u300b\n\n...\u4e8e\u4f4e\u5bc6\u5ea6\u8102\u86cb\u767d\uff08low density lipoprotein\uff0cLDL\uff09\u53d7\u4f53\u57fa\u56e0\u7a81\u53d8\uff0c\u5bfc\u81f4\u5176\u6570\u91cf\u548c / \u6216\u529f\u80fd\u5f02\u5e38\uff0c\u8fdb\u800c\u96be\u4ee5\u6e05\u9664\u8840\u6d46LDL\uff0c\u5bfc\u81f4\u60a3\u8005\u51fa\u751f\u540e\u8840\u6d46LDL \u542b\u91cf\u9ad8\u4e8e\u6b63\u5e38\uff0c\u53d1\u751f\u52a8\u8109\u7ca5\u6837\u786c\u5316\u7684\u5371\u9669\u6027\u663e\u8457\u63d0\u9ad8\uff1b\u2461 \u96c4\u6fc0\u7d20\u4e0d\u654f\u611f\u7efc\u5408\u5f81\uff08androgen insensitivity syndrome\uff0cAIS\uff09\uff0c\u662f\u7531\u4e8e\u9057\u4f20\u6027\u7684\u96c4\u6fc0\u7d20\u53d7\u4f53\uff08androgen receptor\uff0cAR\uff09\u6570\u76ee\u51cf\u5c11\u6216\u529f\u80fd\u4f4e\u4e0b\uff0c\u5bfc\u81f4\u6027\u5206\u5316\u53d1\u80b2\u969c\u788d\u3002\u96c4\u6fc0\u7d20\u5177\u6709\u8bf1\u5bfc\u7537\u6027\u6027\u5206\u5316\u53d1\u80b2\u548c\u7ef4\u6301\u7537\u6027\u751f\u80b2\u80fd\u529b\u7b49\u4f5c\u7528\uff0cAR \u4f5c\u4e3a\u914d\u4f53\u4f9d\u8d56\u6027\u7684\u8f6c\u5f55\u8c03\u8282\u56e0\u5b50\uff0c\u4e0e\u96c4\u6fc0\u7d20\u7ed3\u5408\u540e\uff0c\u5728\u6838\u5185\u4e0e\u9776\u57fa\u56e0\u4e2d\u7684\u96c4\u6fc0\u7d20\u5e94\u7b54\u5143\u4ef6\u7ed3\u5408\uff0c\u4e4b\u540e\u901a\u8fc7\u52df\u96c6\u5171\u6fc0\u6d3b\u56e0\u5b50\uff0c\u8c03\u8282\u57fa\u56e0\u8868\u8fbe\uff0c\u4ea7\u751f\u751f\u7269\u5b66\u6548\u5e94\u3002AR \u6570\u76ee\u51cf\u5c11\u6216\u5931\u6d3b\u6027\u7a81\u53d8\u5bfc\u81f4\u7684AIS\uff0c\u8868\u73b0\u4e3a\u7537\u6027\u5047\u4e24\u6027\u7578\u5f62\uff0c\u7279\u53d1\u6027\u65e0\u7cbe\u75c7\u6216\u5c11\u7cbe\u75c7\uff0c\u810a\u9ad3\u5ef6\u9ad3\u6027\u808c\u840e\u7f29\u7b49\uff1b\u6b64\u5916\uff0c\u5bb6\u65cf\u6027\u80be\u6027\u5c3f\u5d29\u75c7\u4e0e\u6297\u5229\u5c3f\u6fc0\u7d20\uff08antidiuretic hormone\uff0cADH\uff09\u7684V2 \u578b\u53d7\u4f53\u6570\u91cf\u51cf\u5c11\u6216\u529f\u80fd\u7f3a\u9677\u6709\u5173\uff0c\u9057\u4f20\u6027\u7684\u80f0\u5c9b\u7d20\u62b5\u6297\u6027\u7cd6\u5c3f\u75c5\u4e0e\u80f0\u5c9b\u7d20\u53d7\u4f53\u7684\u591a\u79cd\u57fa\u56e0\u7a81\u53d8\u6709\u5173\u3002\n\n\uff08\u4e8c\uff09\u2002 \u53d7\u4f53\u8fc7\u5ea6\u6fc0\u6d3b\u5bfc\u81f4\u7684\u75be\u75c5\n\n\u5f53\u53d7\u4f53\u8868\u8fbe\u4e0a\u8c03\u3001\u53d1\u751f\u529f\u80fd\u83b7\u5f97\u6027\u7a81\u53d8\u6216\u8005\u6291\u5236\u6027\u6210\u5206\u7f3a\u5931\u65f6\uff0c\u90fd\u53ef\u80fd\u5bfc\u81f4\u7ec6\u80de\u5185\u7279\u5b9a\u4fe1\u53f7\u8f6c\u5bfc\u901a\u8def\u7684\u8fc7\u5ea6\u6fc0\u6d3b\uff0c\u4ece\u800c\u8bf1\u53d1\u80bf\u7624\u7b49\u75be\u75c5\u3002\u5e38\u89c1\u7684\u53d7\u4f53\u8fc7\u5ea6\u6fc0\u6d3b\u5bfc\u81f4\u75be\u75c5\u7684\u4f8b\u5b50\u5982\u8868\u76ae\u751f\u957f\u56e0\u5b50\u53d7\u4f53\uff08epidermal growth factor receptor\uff0cEGFR\uff09\uff0c\u5c5e\u4e8eERBB \u5bb6\u65cf\uff0c\u5728\u7ec6\u80de\u751f\u957f\u3001\u53d1\u80b2\u53ca\u5206\u5316\u8fc7\u7a0b\u4e2d\u53d1\u6325\u91cd\u8981\u4f5c\u7528\u3002EGFR \u7684\u57fa\u56e0\u7a81\u53d8\u3001\u57fa\u56e0\u6269\u589e\u3001\u57fa\u56e0\u91cd\u6392\u6216\u8868\u89c2\u9057\u4f20\u6539\u53d8\u7b49\uff0c\u90fd\u53ef\u5bfc\u81f4EGFR \u86cb\u767d\u7684\u5f02\u5e38\u8868\u8fbe\u6216\u6d3b\u5316\uff0c\u4ece\u800c\u589e\u5f3aEGFR \u4fe1\u53f7\u8f6c\u5bfc\u901a\u8def\u7684\u4fe1\u53f7\u5f3a\u5ea6\uff0c\u8bf1\u5bfc\u6216\u4fc3\u8fdb\u80bf\u7624\u7684\u53d1\u751f\u53d1\u5c55\u3002\u9488\u5bf9\u53d7\u4f53\u7684\u9776\u5411\u6cbb\u7597\u5df2\u6210\u4e3a\u80bf\u7624\u6cbb\u7597\u7684\u91cd\u8981\u624b\u6bb5\u4e4b\u4e00\u3002\n\n\u4e8c\u3001\u2002 \u514d\u75ab\u6027\u53d7\u4f53\u5f02\u5e38\u4e0e\u75be\u75c5\n\n\u514d\u75ab\u6027\u53d7\u4f53\u5f02\u5e38\u662f\u673a\u4f53\u901a\u8fc7\u514d\u75ab\u5e94\u7b54\u53cd\u5e94\u4ea7\u751f\u4e86\u9488\u5bf9\u81ea\u8eab\u53d7\u4f53\u7684\u6297\u4f53\u6240\u5f15\u8d77\u7684\u75be\u75c5\u3002\u8fd9\u4e9b\u6297\u4f53\u7684\u4ea7\u751f\u673a\u5236\u4e0e\u591a\u79cd\u56e0\u7d20\u6709\u5173\uff0c\u5305\u62ec\u9057\u4f20\u3001\u611f\u67d3\u3001\u836f\u7269\u548c\u73af\u5883\u7b49\u3002\u57fa\u56e0\u7a81\u53d8\u53ef\u80fd\u5bfc\u81f4\u53d7\u4f53\u4e00\u7ea7\u7ed3\u6784\u6539\u53d8\u4f7f\u53d7\u4f53\u5177\u6709\u6297\u539f\u6027\uff1b\u6216\u53d7\u4f53\u539f\u6765\u9690\u853d\u7684\u6297\u539f\u51b3\u5b9a\u7c07\u66b4\u9732\uff0c\u5f15\u53d1\u514d\u75ab\u53cd\u5e94\uff1b\u67d0\u4e9b\u53d7\u4f53\u86cb\u767d\u4e0e\u5916\u6765\u6297\u539f\uff08\u5982\u67ef\u8428\u5947\u75c5\u6bd2\u3001\u94fe\u7403\u83cc\u7b49\u75c5\u539f\u4f53\uff09\u6709\u5171\u540c\u7684\u6297\u539f\u51b3\u5b9a\u7c07\uff0c\u4f7f\u7ec6\u80de\u5728\u5bf9\u5916\u6765\u6297\u539f\u4ea7\u751f\u6297\u4f53\u548c\u81f4\u654f\u6dcb\u5df4\u7ec6\u80de\u7684\u540c\u65f6\uff0c\u4e5f\u5bf9\u76f8\u5e94\u53d7\u4f53\u4ea7\u751f\u4ea4\u53c9\u514d\u75ab\u53cd\u5e94\u3002\u6b64\u5916\uff0c\u5f53\u673a\u4f53\u514d\u75ab\u529f\u80fd\u7d0a\u4e71\u65f6\uff0c\u53ef\u5c06\u81ea\u8eab\u5f53\u4f5c\u5f02\u5df1\uff0c\u4f53\u5185\u4ea7\u751f\u4e86\u9488\u5bf9\u81ea\u8eab\u53d7\u4f53\u7684\u6297\u4f53\uff0c\u4e0e\u76f8\u5e94\u7684\u53d7\u4f53\u7ed3\u5408\u540e\u5bfc\u81f4\u7ec6\u80de\u529f\u80fd\u7d0a\u4e71\uff0c\u4ece\u800c\u5f15\u53d1\u4e00\u7cfb\u5217\u75be\u75c5\u3002\n\n\u6297\u53d7\u4f53\u6297\u4f53\u6839\u636e\u5176\u4e0e\u76f8\u5e94\u53d7\u4f53\u7ed3\u5408\u6240\u4ea7\u751f\u7684\u6548\u5e94\u53ef\u5206\u4e3a\u523a\u6fc0\u578b\u548c\u963b\u65ad\u578b\u3002\u523a\u6fc0\u578b\u6297\u4f53\u53ef\u6a21\u62df\u4fe1\u53f7\u5206\u5b50\u6216\u914d\u4f53\u7684\u4f5c\u7528\uff0c\u6fc0\u6d3b\u7279\u5b9a\u7684\u4fe1\u53f7\u8f6c\u5bfc\u901a\u8def\uff0c\u4f7f\u9776\u7ec6\u80de\u529f\u80fd\u4ea2\u8fdb\u3002\u4f8b\u5982\u683c\u96f7\u592b\u65af\u75c5\uff08Graves disease\uff09\uff0c\u53c8\u79f0\u6bd2\u6027\u5f25\u6f2b\u6027\u7532\u72b6\u817a\u80bf\uff0c\u5c5e\u4e8e\u81ea\u8eab\u514d\u75ab\u6027\u7532\u72b6\u817a\u75c5\uff0c\u4ea7\u751f\u7684\u81ea\u8eab\u6297\u4f53\u4e3b\u8981\u662f\u4fc3\u7532\u72b6\u817a\u6fc0\u7d20\u53d7\u4f53\u523a\u6fc0\u6027\u6297\u4f53\uff08thyroid stimulating hormone receptor\u200a-\u200asti...\n\n### \u5fc3\u623f\u94a0\u5c3f\u80bd \u2014 \u9009\u81ea\u300a\u75c5\u7406\u751f\u7406\u5b66\u300b\n\n...\u4f53\u5185\u6c34\u8fc7\u591a\u6216\u6444\u76d0\u4e0d\u8db3\u800c\u4f7f\u7ec6\u80de\u5916\u6db2\u6e17\u900f\u538b\u964d\u4f4e\u65f6\uff0c\u4e00\u65b9\u9762\u901a\u8fc7\u6291\u5236ADH \u7684\u5206\u6ccc\uff0c\u51cf\u5c11\u80be\u8fdc\u66f2\u5c0f\u7ba1\u548c\u96c6\u5408\u7ba1\u5bf9\u6c34\u7684\u91cd\u5438\u6536\uff0c\u4f7f\u6c34\u6392\u51fa\u589e\u591a\uff1b\u53e6\u4e00\u65b9\u9762\u4fc3\u8fdb\u919b\u56fa\u916e\u7684\u5206\u6ccc\uff0c\u52a0\u5f3a\u80be\u5c0f\u7ba1\u5bf9Na + \u7684\u91cd\u5438\u6536\uff0c\u51cf\u5c11Na + \u7684\u6392\u51fa\uff0c\u4ece\u800c\u589e\u52a0\u7ec6\u80de\u5916\u6db2Na + \u6d53\u5ea6\uff0c\u4f7f\u964d\u4f4e\u7684\u7ec6\u80de\u5916\u6db2\u6e17\u900f\u538b\u589e\u81f3\u6b63\u5e38\u3002\u5728\u6b63\u5e38\u60c5\u51b5\u4e0b\uff0c\u5c3f\u91cf\u5177\u6709\u8f83\u5927\u7684\u53d8\u52a8\u8303\u56f4\uff08500 ~ 2 000ml\uff09\uff0c\u8bf4\u660e\u80be\u5728\u8c03\u8282\u6c34\u7684\u5e73\u8861\u4e0a\u6709\u5f88\u5927\u7684\u6f5c\u529b\u3002\u53ea\u6709\u5728\u80be\u529f\u80fd\u4e25\u91cd\u969c\u788d\u65f6\uff0c\u624d\u4f1a\u5bf9\u6c34\u7684\u5e73\u8861\u6709\u8f83\u5927\u5f71\u54cd\u3002\n\n\u5b9e\u9a8c\u8bc1\u660e\uff0c\u7ec6\u80de\u5916\u6db2\u5bb9\u91cf\u7684\u53d8\u5316\u53ef\u4ee5\u5f71\u54cd\u673a\u4f53\u5bf9\u6e17\u900f\u538b\u53d8\u5316\u7684\u654f\u611f\u6027\u3002\u5f53\u8840\u6d46\u6e17\u900f\u538b\u964d\u4f4e\u4f34\u6709\u8840\u5bb9\u91cf\u663e\u8457\u51cf\u5c11\u65f6\uff0c\u8840\u5bb9\u91cf\u663e\u8457\u51cf\u5c11\u5bf9ADH \u5206\u6ccc\u7684\u4fc3\u8fdb\u4f5c\u7528\u8fdc\u8d85\u8fc7\u8840\u6d46\u6e17\u900f\u538b\u964d\u4f4e\u5bf9ADH \u5206\u6ccc\u7684\u6291\u5236\uff0c\u8bf4\u660e\u8840\u5bb9\u91cf\u660e\u663e\u964d\u4f4e\u65f6\u673a\u4f53\u4f18\u5148\u7ef4\u6301\u8840\u5bb9\u91cf\u3002\u5176\u4ed6\u56e0\u7d20\uff0c\u5982\u7cbe\u795e\u7d27\u5f20\u3001\u75bc\u75db\u3001\u521b\u4f24\uff0c\u4ee5\u53ca\u67d0\u4e9b\u836f\u7269\u548c\u4f53\u6db2\u56e0\u5b50\uff0c\u5982\u6c2f\u78fa\u4e19\u8132\u3001\u957f\u6625\u65b0\u78b1\u3001\u73af\u78f7\u9170\u80fa\u3001\u8840\u7ba1\u7d27\u5f20\u7d20\u2161\u7b49\uff0c\u4e5f\u80fd\u4fc3\u8fdbADH \u7684\u5206\u6ccc\u6216\u589e\u5f3aADH\u7684\u4f5c\u7528\u3002\n\n\u5fc3\u623f\u94a0\u5c3f\u80bd\uff08atrial natriuretic peptide\uff0cANP\uff09\u548c\u6c34\u901a\u9053\u86cb\u767d\u4e5f\u662f\u5f71\u54cd\u6c34\u3001\u94a0\u4ee3\u8c22\u7684\u91cd\u8981\u56e0\u7d20\u3002\u5fc3\u623f\u94a0\u5c3f\u80bd\u662f\u4e00\u7ec4\u7531\u5fc3\u623f\u808c\u7ec6\u80de\u4ea7\u751f\u7684\u591a\u80bd\uff0c\u7ea6\u753121 ~ 33 \u4e2a\u6c28\u57fa\u9178\u6b8b\u57fa\u7ec4\u6210\u3002\u5fc3\u623f\u6269\u5f20\u3001\u8840\u5bb9\u91cf\u589e\u52a0\u3001\u8840\u94a0\u589e\u9ad8\u6216\u8840\u7ba1\u7d27\u5f20\u7d20\u2161\u589e\u591a\u5747\u53ef\u523a\u6fc0\u5fc3\u623f\u808c\u7ec6\u80de\u5408\u6210\u548c\u91ca\u653eANP\u3002ANP \u5177\u6709\u4fc3\u8fdb\u80be\u810f\u6392\u94a0\u3001\u6392\u6c34\u7684\n\n\u94a0\u548c\u6c34\uff1b\u2462 \u51cf\u5c11\u80be\u7d20\u3001\u919b\u56fa\u916e\u3001ADH \u7684\u5206\u6ccc\uff1b\u2463 \u62ee\u6297\u8840\u7ba1\u7d27\u5f20\u7d20\u7684\u7f29\u8840\u7ba1\u6548\u5e94\u3002\n\n\u6c34\u901a\u9053\u86cb\u767d\uff08aquaporin\uff0cAQP\uff09\u662f\u4e00\u7ec4\u6784\u6210\u6c34\u901a\u9053\u3001\u4e0e\u6c34\u901a\u900f\u6709\u5173\u7684\u7ec6\u80de\u819c\u8f6c\u8fd0\u86cb\u767d\uff0c\u5e7f\u6cdb\u5b58\u5728\u4e8e\u52a8\u7269\u3001\u690d\u7269\u53ca\u5fae\u751f\u7269\u4e2d\u3002\u76ee\u524d\u5df2\u7ecf\u53d1\u73b0\u6709200 \u4f59\u79cdAQP \u5b58\u5728\u4e8e\u4e0d\u540c\u7684\u7269\u79cd\u4e2d\uff0c\u5176\u4e2d\u81f3\u5c11\u670913 \u79cdAQP\u4e9a\u578b\u5b58\u5728\u4e8e\u54fa\u4e73\u52a8\u7269\u4f53\u5185\u3002\u6bcf\u79cdAQP \u6709\u5176\u7279\u5f02\u6027\u7684\u7ec4\u7ec7\u5206\u5e03\u3002\u4e0d\u540c\u7684AQP \u5728\u80be\u810f\u548c\u5176\u4ed6\u5668\u5b98\u5438\u6536\u548c\u5206\u6ccc\u6c34\u7684\u8fc7\u7a0b\u4e2d\u6709\u7740\u4e0d\u540c\u7684\u4f5c\u7528\u548c\u8c03\u8282\u673a\u5236\u3002\u5982AQP1 \u4f4d\u4e8e\u8fd1\u66f2\u5c0f\u7ba1\u3001\u9ad3\u88a2\u964d\u652f\u53ca\u76f4\u5c0f\u8840\u7ba1\u7684\u7ba1\u8154\u819c\u548c\u57fa\u5e95\u819c\uff0c\u5bf9\u6c34\u7684\u8fd0\u8f93\u548c\u901a\u900f\u53d1\u6325\u8c03\u8282\u4f5c\u7528\u3002AQP2 \u548cAQP3 \u4f4d\u4e8e\u96c6\u5408\u7ba1\uff0c\u5728\u5c3f\u6db2\u6d53\u7f29\u673a\u5236\u4e2d\u8d77\u91cd\u8981\u4f5c\u7528\uff0cAQP2 \u53d1\u751f\u529f\u80fd\u7f3a\u9677\u65f6\u5bfc\u81f4\u5c3f\u5d29\u75c7\uff0c\u62ee\u6297AQP3 \u53ef\u4ea7\u751f\u5229\u5c3f\u53cd\u5e94\u3002AQP4 \u4f4d\u4e8e\u96c6\u5408\u7ba1\u4e3b\u7ec6\u80de\u57fa\u5e95\u819c\uff0c\u53ef\u80fd\u63d0\u4f9b\u6c34\u6d41\u51fa\u901a\u9053\uff1b\u5728\u8111\u5185\u4e5f\u6709AQP4 \u5206\u5e03\uff0c\u4e0e\u8111\u6c34\u80bf\u7684\u53d1\u751f\u6709\u5173\u3002\u5728\u80ba\u6ce1\u4e0a\u76ae\u2160\u578b\u7ec6\u80de\u6709AQP5 \u5206\u5e03\uff0c\u5bf9\u80ba\u6c34\u80bf\u7684\u53d1\u751f\u6709\u4e00\u5b9a\u4f5c\u7528\u3002\n\nADH \u8c03\u8282\u96c6\u5408\u7ba1\u91cd\u5438\u6536\u6c34\u800c\u6d53\u7f29\u5c3f\u6db2\u7684\u8fc7\u7a0b\u4e0eADH \u53d7\u4f53V2R\uff08\u96c6\u5408\u7ba1\u6709\u591a\u79cdADH \u53d7\u4f53\uff0c\u4f46\u53c2\u4e0e\u6c34\u8f6c\u8fd0\u7684\u4e3b\u8981\u662fV2R\uff09\u548cAQP2 \u5173\u7cfb\u5bc6\u5207\u3002\u5f53ADH \u91ca\u653e\u5165\u8840\u540e\uff0c\u4e0e\u96c6\u5408\u7ba1\u4e3b\u7ec6\u80de\u57fa\u5e95\u819c\u7684V2R \u7ed3\u5408\uff0c\u5e76\u901a\u8fc7\u8026\u8054\u7684\u4e09\u78f7\u9178\u9e1f\u82f7\u7ed3\u5408\u86cb\u767d\uff08GTP\u200a-\u200abinding protein\uff09\uff0c\u6fc0\u6d3b\u817a\u82f7\u9178\u73af\u5316\u9176\uff0c\u4f7f\u7ec6\u80de\u5185cAMP \u589e\u9ad8\uff0c\u8fdb\u800c\u6fc0\u6d3bcAMP \u4f9d\u8d56\u7684\u86cb\u767d\u6fc0\u9176A\uff08protein kinase A\uff0cPKA\uff09\u3002PKA \u4f7f\u4e3b\u7ec6\u80de\u7ba1\u8154\u819c\u4e0b\u80de\u8d28\u56ca\u6ce1\u4e2d\u7684AQP2 \u53d1\u751f\u78f7\u9178\u5316\uff0c\u89e6\u53d1\u56ca\u6ce1\u5411\u7ba1\u8154\u819c\u8f6c\u79fb\u5e76\u878d\u5165\u7ba1\u8154...\n\n### \u6c34\u3001\u94a0\u6f74\u7559 \u2014 \u9009\u81ea\u300a\u75c5\u7406\u751f\u7406\u5b66\u300b\n\n...\u6ee4\u51fa\u3002\u89c1\u4e8e\u5404\u79cd\u708e\u75c7\uff0c\u5305\u62ec\u611f\u67d3\u3001\u70e7\u4f24\u3001\u51bb\u4f24\u3001\u5316\u5b66\u4f24\u4ee5\u53ca\u6606\u866b\u54ac\u4f24\u7b49\u3002\u8fd9\u4e9b\u56e0\u7d20\u53ef\u76f4\u63a5\u635f\u4f24\u5fae\u8840\u7ba1\u58c1\u6216\u901a\u8fc7\u7ec4\u80fa\u3001\u6fc0\u80bd\u7b49\u708e\u6027\u4ecb\u8d28\u7684\u4f5c\u7528\u800c\u4f7f\u5fae\u8840\u7ba1\u58c1\u7684\u901a\u900f\u6027\u589e\u9ad8\u3002\u8fd9\u7c7b\u6c34\u80bf\u6db2\u7684\u7279\u70b9\u662f\u86cb\u767d\u542b\u91cf\u8f83\u9ad8\uff0c\u53ef\u8fbe30 ~ 60g / L\u3002\n\n\uff084\uff09 \u6dcb\u5df4\u56de\u6d41\u53d7\u963b\uff1a\u6b63\u5e38\u60c5\u51b5\u4e0b\uff0c\u6dcb\u5df4\u56de\u6d41\u4e0d\u4ec5\u80fd\u628a\u751f\u6210\u7565\u591a\u7684\u7ec4\u7ec7\u6db2\u53ca\u5176\u6240\u542b\u86cb\u767d\u8fd0\u9001\u56de\u8840\u6db2\u5faa\u73af\uff0c\u8fd8\u80fd\u5728\u7ec4\u7ec7\u6db2\u751f\u6210\u589e\u591a\u65f6\u52a0\u5f3a\u56de\u6d41\u8fdb\u884c\u4ee3\u507f\uff0c\u5177\u6709\u91cd\u8981\u7684\u6297\u6c34\u80bf\u4f5c\u7528\u3002\u5728\u67d0\u4e9b\u75c5\u7406\u6761\u4ef6\u4e0b\uff0c\u6dcb\u5df4\u7ba1\u88ab\u5835\u585e\uff0c\u6dcb\u5df4\u56de\u6d41\u53d7\u963b\u6216\u4e0d\u80fd\u4ee3\u507f\u6027\u52a0\u5f3a\uff0c\u542b\u86cb\u767d\u7684\u6c34\u80bf\u6db2\u5728\u7ec4\u7ec7\u95f4\u9699\u79ef\u805a\uff0c\u5f62\u6210\u6dcb\u5df4\u6027\u6c34\u80bf\u3002\u5e38\u89c1\u7684\u539f\u56e0\u6709\uff1a\u6076\u6027\u80bf\u7624\u4fb5\u5165\u5e76\u5835\u585e\u6dcb\u5df4\u7ba1\uff1b\u4e73\u817a\u764c\u6839\u6cbb\u672f\u7b49\u6458\u9664\u6dcb\u5df4\u7ba1\u4e3b\u5e72\u901a\u8fc7\u7684\u6dcb\u5df4\u7ed3\uff0c\u53ef\u81f4\u76f8\u5e94\u90e8\u4f4d\u6c34\u80bf\uff1b\u4e1d\u866b\u75c5\u65f6\uff0c\u6dcb\u5df4\u7ba1\u88ab\u6210\u866b\u5835\u585e\uff0c\u53ef\u5f15\u8d77\u4e0b\u80a2\u7b49\u90e8\u4f4d\u7684\u6162\u6027\u6c34\u80bf\u3002\u8fd9\u7c7b\u6c34\u80bf\u6db2\u7684\u7279\u70b9\u4e5f\u662f\u86cb\u767d\u542b\u91cf\u8f83\u9ad8\uff0c\u53ef\u8fbe40 ~ 50g / L\uff0c\u5176\u539f\u56e0\u662f\u6c34\u548c\u6676\u4f53\u7269\u8d28\u900f\u8fc7\u8840\u7ba1\u58c1\u56de\u5438\u6536\u5230\u8840\u7ba1\u5185\uff0c\u5bfc\u81f4\u7ec4\u7ec7\u6db2\u86cb\u767d\u6d53\u7f29\u3002\n2.\u2002 \u4f53\u5185\u5916\u6db2\u4f53\u4ea4\u6362\u5e73\u8861\u5931\u8c03\u2014\u2014\u6c34\u3001\u94a0\u6f74\u7559 \u6b63\u5e38\u4eba\u6c34\u3001\u94a0\u7684\u6444\u5165\u91cf\u548c\u6392\u51fa\u91cf\u5904\u4e8e\u52a8\u6001\u5e73\u8861\u72b6\u6001\uff0c\u4ee5\u4fdd\u6301\u4f53\u6db2\u91cf\u7684\u76f8\u5bf9\u6052\u5b9a\u3002\u8fd9\u79cd\u5e73\u8861\u7684\u7ef4\u6301\u4f9d\u8d56\u4e8e\u6392\u6cc4\u5668\u5b98\u6b63\u5e38\u7684\u7ed3\u6784\u548c\u529f\u80fd\u4ee5\u53ca\u673a\u4f53\u7684\u5bb9\u91cf\u53ca\u6e17\u900f\u538b\u8c03\u8282\u3002\u80be\u5728\u8c03\u8282\u6c34\u3001\u94a0\u5e73\u8861\u4e2d\u8d77\u91cd\u8981\u7684\u4f5c\u7528\u3002\u6b63\u5e38\u60c5\u51b5\u4e0b\uff0c\u7ecf\u80be\u5c0f\u7403\u6ee4\u8fc7\u7684\u6c34\u548c\u94a0\u53ea\u67090.5% ~ 1% \u6392\u51fa\u4f53\u5916\uff0c99% ~ 99.5% \u88ab\u80be\u5c0f\u7ba1\u91cd\u5438\u6536\u3002\u67d0\u4e9b\u56e0\u7d20\u5bfc\u81f4\u80be\u5c0f\u7403\u6ee4\u8fc7\u7387\u4e0b\u964d\u6216 / \u548c\u80be\u5c0f\u7ba1\u91cd\u5438\u6536\u589e\u5f3a\u65f6\uff0c\u4fbf\u53ef\u5bfc\u81f4\u6c34\u3001\u94a0\u6f74\u7559\uff0c\u6210\u4e3a\u6c34\u80bf\u53d1\u751f\u7684\u91cd\u8981\u539f\u56e0\uff08\u56fe7 - 3\uff09\u3002\n\n\u56fe7\u200a-\u200a3\u2003 \u7403\u200a-\u200a\u7ba1\u5931\u8861\u57fa\u672c\u5f62\u5f0f\u793a\u610f\u56fe\n\n\uff081\uff09 \u80be\u5c0f\u7403\u6ee4\u8fc7\u7387\u4e0b\u964d\uff1a\u5f53\u80be\u5c0f\u7403\u6ee4\u8fc7\u6c34\u3001\u94a0\u51cf\u5c11\uff0c\u800c\u80be\u5c0f\u7ba1\u91cd\u5438\u6536\u6ca1\u6709\u76f8\u5e94\u51cf\u5c11\u65f6\uff0c\u5c31\u4f1a\u5bfc\u81f4\u6c34\u3001\u94a0\u6f74\u7559\u3002\u5f15\u8d77\u80be\u5c0f\u7403\u6ee4\u8fc7\u7387\u4e0b\u964d\u7684\u5e38\u89c1\u539f\u56e0\u6709\uff1a\u2460 \u5e7f\u6cdb\u7684\u80be\u5c0f\u7403\u75c5\u53d8\uff0c\u5982\u6025\u6027\u80be\u5c0f\u7403\u80be\u708e\u65f6\uff0c\u708e\u6027\u6e17\u51fa\u7269\u548c\u5185\u76ae\u7ec6\u80de\u80bf\u80c0\u4f7f\u80be\u5c0f\u7403\u6bdb\u7ec6\u8840\u7ba1\u8154\u53d8\u7a84\u6216\u95ed\u585e\uff0c\u80be\u5c0f\u7403\u8840\u6d41\u91cf\u51cf\u5c11\uff1b\u6162\u6027\u80be\u5c0f\u7403\u80be\u708e\u65f6\uff0c\u80be\u5355\u4f4d\u4e25\u91cd\u7834\u574f\uff0c\u80be\u5c0f\u7403\u6ee4\u8fc7\u9762\u79ef\u660e\u663e\u51cf\u5c11\u3002\u2461 \u6709\u6548\u5faa\u73af\u8840\u91cf\u660e\u663e\u51cf\u5c11\uff0c\u5982\u5145\u8840\u6027\u5fc3\u529b\u8870\u7aed\u3001\u80be\u75c5\u7efc\u5408\u5f81\u7b49\u4f7f\u6709\u6548\u5faa\u73af\u8840\u91cf\u51cf\u5c11\uff0c\u80be\u8840\u6d41\u91cf\u4e0b\u964d\uff0c\u7ee7\u800c\u5f15\u8d77\u4ea4\u611f\u200a-\u200a\u80be\u4e0a\u817a\u9ad3\u8d28\u7cfb\u7edf\u3001\u80be\u7d20\u200a-\u200a\u8840\u7ba1\u7d27\u5f20\u7d20\u7cfb\u7edf\u5174\u594b\uff0c\u80be\u8840\u7ba1\u6536\u7f29\uff0c\u4f7f\u80be\u8840\u6d41\u91cf\u8fdb\u4e00\u6b65\u51cf\u5c11\uff0c\u80be\u5c0f\u7403\u6ee4\u8fc7\u7387\u4e0b\u964d\u3002\n\n\uff082\uff09 \u8fd1\u66f2\u5c0f\u7ba1\u91cd\u5438\u6536\u94a0\u3001\u6c34\u589e\u591a\uff1a\u8fd1\u66f2\u5c0f\u7ba1\u7684\u91cd\u5438\u6536\u5360\u80be\u5c0f\u7403\u6ee4\u8fc7\u7387\u768460% ~ 70%\u3002\u5f53\u6709\u6548\u5faa\u73af\u8840\u91cf\u51cf\u5c11\u65f6\uff0c\u8fd1\u66f2\u5c0f\u7ba1\u5bf9\u94a0\u3001\u6c34\u7684\u91cd\u5438\u6536\u589e\u52a0\uff0c\u81f4\u4f7f\u80be\u6392\u6c34\u3001\u6392\u94a0\u51cf\u5c11\uff0c\u6210\u4e3a\u67d0\u4e9b\u5168\u8eab\u6027\u6c34\u80bf\u53d1\u751f\u7684\u91cd\u8981\u539f\u56e0\u3002\n\n1\uff09 \u5fc3\u623f\u94a0\u5c3f\u80bd\u5206\u6ccc\u51cf\u5c11\uff1a\u6b63\u5e38\u4eba\u8840\u6db2\u4e2d\u5b58\u5728\u4f4e\u6d53\u5ea6\u7684ANP\uff0c\u8868\u660e\u5e73\u65f6\u5c31\u6709ANP \u4ece\u5fc3\u808c\u7ec6\u80de\u50a8\u5b58\u7684\u9897\u7c92\u4e2d\u91ca\u653e\u51fa\u6765\u3002ANP \u7684\u5206\u6ccc\u548c\u91ca\u653e\u53d7\u8840\u5bb9\u91cf\u3001\u8840\u538b\u3001\u8840\u94a0\u542b\u91cf\u7b49\u56e0\u7d20\u5f71\u54cd\u3002\u6709\u6548\u5faa\u73af\u8840\u91cf\u660e\u663e\n\n2\uff09 \u80be\u5c0f\u7403\u6ee4\u8fc7\u5206\u6570\uff08filtration fraction\uff09\u589e\u52a0\uff1a\u80be\u5c0f\u7403\u6ee4\u8fc7\u5206\u6570= \u80be\u5c0f\u7403\u6ee4\u8fc7\u7387 / \u80be\u8840\u6d46\u6d41\u91cf\uff0c\u6b63\u5e38\u503c\u7ea6\u4e3a20%\u3002\u5145\u8840\u6027\u5fc3\u529b\u8870\u7aed\u6216\u80be\u75c5\u7efc\u5408\u5f81\u65f6\uff0c\u7531\u4e8e\u6709\u6548\u5faa\u73af\u8840\u91cf\u51cf\u5c11\u4ee5\u53ca\u80be\u8840\u7ba1\u6536\u7f29\uff0c\u80be\u8840\u6d46\u6d41\u91cf\u548c\u80be\u5c0f\u7403\u6ee4\u8fc7\u7387\u5747\u4e0b\u964d\u3002\u4f46\u7531...\n\n### \u80be\u4ee3\u507f \u2014 \u9009\u81ea\u300a\u75c5\u7406\u751f\u7406\u5b66\u300b\n\n...\u6cdb\u6027\u708e\u75c7\u3001\u80ba\u7ec4\u7ec7\u5e7f\u6cdb\u7ea4\u7ef4\u5316\u3001\u6025\u6027\u547c\u5438\u7a98\u8feb\u7efc\u5408\u5f81\u7b49\u5747\u53ef\u56e0\u901a\u6c14\u969c\u788d\u800c\u5bfc\u81f4\u547c\u5438\u6027\u9178\u4e2d\u6bd2\u3002\n\n\uff086\uff09 \u4eba\u5de5\u547c\u5438\u5668\u7ba1\u7406\u4e0d\u5f53\uff1a\u901a\u6c14\u91cf\u8fc7\u5c0f\u800c\u4f7fCO2 \u6392\u51fa\u56f0\u96be\u3002\n\n2. CO2 \u5438\u5165\u8fc7\u591a \u8f83\u4e3a\u5c11\u89c1\uff0c\u5916\u73af\u5883CO2 \u6d53\u5ea6\u8fc7\u9ad8\uff0c\u53ef\u5bfc\u81f4\u5438\u5165CO2 \u8fc7\u591a\u3002\n\n\u547c\u5438\u6027\u9178\u4e2d\u6bd2\u6309\u75c5\u7a0b\u53ef\u5206\u4e3a\u4e24\u7c7b\u3002\n\n1. \u6025\u6027\u547c\u5438\u6027\u9178\u4e2d\u6bd2 \u5e38\u89c1\u4e8e\u6025\u6027\u6c14\u9053\u963b\u585e\uff0c\u547c\u5438\u4e2d\u67a2\u6291\u5236\u6216\u547c\u5438\u808c\u9ebb\u75f9\u5f15\u8d77\u7684\u547c\u5438\u6682\u505c\u7b49\u30022.\u2002 \u6162\u6027\u547c\u5438\u6027\u9178\u4e2d\u6bd2 \u89c1\u4e8e\u6c14\u9053\u53ca\u80ba\u90e8\u6162\u6027\u708e\u75c7\u5f15\u8d77\u7684COPD \u53ca\u80ba\u5e7f\u6cdb\u6027\u7ea4\u7ef4\u5316\u6216\u80ba\u4e0d\u5f20\uff0c\u4e00\u822c\u6307CO2 \u9ad8\u6d53\u5ea6\u6f74\u7559\u6301\u7eed24 \u5c0f\u65f6\u4ee5\u4e0a\u8005\u3002\n\n\uff08\u4e09\uff09\u2002 \u673a\u4f53\u7684\u4ee3\u507f\u8c03\u8282\n\n\u5f53\u4f53\u5185CO2 \u6392\u51fa\u53d7\u963b\uff0c\u4ea7\u751f\u5927\u91cfH2CO3 \u65f6\uff0c\u7531\u4e8e\u78b3\u9178\u6c22\u76d0\u7f13\u51b2\u7cfb\u7edf\u4e0d\u80fd\u7f13\u51b2\u6325\u53d1\u9178\uff0c\u8840\u6d46\u5176\u4ed6\u7f13\u51b2\u78b1\u542b\u91cf\u8f83\u4f4e\uff0c\u7f13\u51b2H2CO3 \u7684\u80fd\u529b\u6781\u4e3a\u6709\u9650\u3002\u800c\u4e14\u547c\u5438\u6027\u9178\u4e2d\u6bd2\u53d1\u751f\u7684\u6700\u4e3b\u8981\u7684\u73af\u8282\u662f\u80ba\u901a\u6c14\u529f\u80fd\u969c\u788d\uff0c\u6240\u4ee5\u547c\u5438\u7cfb\u7edf\u5f80\u5f80\u4e0d\u80fd\u53d1\u6325\u4ee3\u507f\u4f5c\u7528\uff0c\u4e3b\u8981\u9760\u8840\u6db2\u975e\u78b3\u9178\u6c22\u76d0\u7f13\u51b2\u7cfb\u7edf\uff0c\u7ec6\u80de\u5185\u3001\u5916\u79bb\u5b50\u4ea4\u6362\u548c\u80be\u4ee3\u507f\u3002\n\n1. \u6025\u6027\u547c\u5438\u6027\u9178\u4e2d\u6bd2\u7684\u4ee3\u507f\u8c03\u8282 \u7531\u4e8e\u80be\u7684\u4ee3\u507f\u4f5c\u7528\u5341\u5206\u7f13\u6162\uff0c\u7ec6\u80de\u5185\u3001\u5916\u79bb\u5b50\u4ea4\u6362\u548c\u7ec6\u80de\u5185\u7f13\u51b2\u4f5c\u7528\u662f\u6025\u6027\u547c\u5438\u6027\u9178\u4e2d\u6bd2\u65f6\u7684\u4e3b\u8981\u4ee3\u507f\u65b9\u5f0f\u3002\u8840\u7ea2\u86cb\u767d\u7cfb\u7edf\u662f\u547c\u5438\u6027\u9178\u4e2d\u6bd2\u65f6\u8f83\u91cd\u8981\u7684\u7f13\u51b2\u4f53\u7cfb\u3002\n\n\u7f13\u51b2\u80fd\u529b\uff0c\u56e0\u800cH2CO3 \u89e3\u79bb\u4e3aH + \u548cHCO3 - \u540e\uff0cH + \u4e0e\u7ec6\u80de\u5185K + \u8fdb\u884c\u4ea4\u6362\uff0c\u8fdb\u5165\u7ec6\u80de\u5185\u7684H + \u53ef\u88ab\u7ec6\u80de\u5185\u7f13\u51b2\u7cfb\u7edf\uff08K2HPO4\u3001KPr\uff09\u7f13\u51b2\uff0c\u8840\u6d46HCO3 -\u6d53\u5ea6\u53ef\u6709\u6240\u589e\u52a0\uff0c\u6709\u5229\u4e8e\u7ef4\u6301\uff3bHCO3 -\uff3d\u4e0e\uff3bH2CO3\uff3d\u7684\u6bd4\u503c\uff0c\u540c\u65f6K + \u5916\u79fb\u53ef\u8bf1\u53d1\u9ad8\u94be\u8840\u75c7\uff1b\u6b64\u5916\uff0c\u8840\u6d46\u4e2d\u7684CO2 \u8fc5\u901f\u5f25\u6563\u5165\u7ea2\u7ec6\u80de\uff0c\u5728\u78b3\u9178\u9150\u9176\u7684\u4f5c\u7528\u4e0b\uff0c\u4e0e\u6c34\u751f\n\n\u6210H2CO3\uff0c\u518d\u89e3\u79bb\u4e3aH + \u548cHCO3 -\u3002H + \u4e3b\u8981\u88ab\u8840\u7ea2\u86cb\u767d\u548c\u6c27\u5408\u8840\u7ea2\u86cb\u767d\u7f13\u51b2\uff0cHCO3 - \u5219\u4e0e\u8840\u6d46\u4e2dCl - \u4ea4\u6362\uff0c\u7ed3\u679c\u8840\u6d46HCO3 - \u6709\u6240\u589e\u52a0\uff0c\u800cCl - \u5219\u964d\u4f4e\uff08\u56fe8\u200a-\u200a6\uff09\u3002\n\n\u56fe8\u200a-\u200a6\u2003 \u547c\u5438\u6027\u9178\u4e2d\u6bd2\u65f6\u8840\u7ea2\u86cb\u767d\u7684\u7f13\u51b2\u4f5c\u7528\u548c\u7ea2\u7ec6\u80de\u5185\u3001\u5916\u7684\u79bb\u5b50\u4ea4\u6362\n\n\u4ee5\u4e0a\u79bb\u5b50\u4ea4\u6362\u548c\u7f13\u51b2\u5341\u5206\u6709\u9650\uff0c\u5f80\u5f80PaCO2 \u6bcf\u5347\u9ad810mmHg\uff0c\u8840\u6d46HCO3 - \u4ec5\u589e\u9ad80.7 ~ 1mmol\u200a/\u200aL\uff0c\u4e0d\u8db3\u4ee5\u7ef4\u6301\uff3bHCO3 -\uff3d\u200a/\u200a\uff3bH2CO3\uff3d\u7684\u6b63\u5e38\u6bd4\u503c\uff0c\u6240\u4ee5\u6025\u6027\u547c\u5438\u6027\u9178\u4e2d\u6bd2\u65f6pH \u5f80\u5f80\u4f4e\u4e8e\u6b63\u5e38\u503c\uff0c\u5448\u5931\u4ee3\u507f\u72b6\u6001\u3002\n\n2. \u6162\u6027\u547c\u5438\u6027\u9178\u4e2d\u6bd2\u7684\u4ee3\u507f\u8c03\u8282 \u7531\u4e8e\u80be\u7684\u4ee3\u507f\u4f5c\u7528\uff0c\u6162\u6027\u547c\u5438\u6027\u9178\u4e2d\u6bd2\u53ef\u4ee5\u5448\u4ee3\u507f\u72b6\u6001\u3002\u5f53PaCO2 \u548cH + \u6d53\u5ea6\u5347\u9ad8\u6301\u7eed24 \u5c0f\u65f6\u4ee5\u4e0a\uff0c\u53ef\u523a\u6fc0\u80be\u5c0f\u7ba1\u4e0a\u76ae\u7ec6\u80de\u5185\u78b3\u9178\u9150\u9176\u548c\u7ebf\u7c92\u4f53\u4e2d\u8c37\u6c28\u9170\u80fa\u9176\n\n\u6d3b\u6027\uff0c\u4fc3\u4f7f\u80be\u5c0f\u7ba1\u4e0a\u76ae\u6392\u6cccH + \u548cNH4 +\uff0c\u4ee5\u53ca\u5bf9HCO3 - \u7684\u91cd\u5438\u6536\u589e\u52a0\u3002\u5145\u5206\u53d1\u6325\u8fd9\u79cd\u4f5c\u7528\u5e38\u97003 ~ 5 \u5929\uff0c\u56e0\u6b64\u6025\u6027\u547c\u5438\u6027\u9178\u4e2d\u6bd2\u6765\u4e0d\u53ca\u4ee3\u507f\uff0c\u800c\u5728\u6162\u6027\u547c\u5438\u6027\u9178\u4e2d\u6bd2\u65f6\uff0c\u7531\u4e8e\u80be\u7684\u4fdd\u78b1\u4f5c\u7528\u8f83\u5f3a\u5927\uff0c\u800c\u4e14\u968fPaCO2 \u5347\u9ad8\uff0cHCO3 - \u4e5f\u6210\u6bd4\u4f8b\u589e\u9ad8\uff0c\u5927\u81f4PaCO2 \u6bcf\u5347\u9ad810mmHg\uff0c\u8840\u6d46HCO3 - \u6d53\u5ea6\u589e\u9ad83.5 ~ 4.0mmol / L\uff0c\u80fd\u4f7f\uff3bHC...\n\n### \u8f93\u5c3f\u7ba1 \u2014 \u9009\u81ea\u300a\u5c40\u90e8\u89e3\u5256\u5b66\u300b\n\n...\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ \uff1a\u4f4d\u4e8e\u690e\u7ba1\u5185\uff0c\u670931\u5bf9\u810a\u795e\u7ecf\u76f8\u8fde\uff0c\u88ab\u8f6f\u810a\u819c\u3001\u810a\u9ad3\u86db\u7f51\u819c\u548c\u786c\u810a\u819c\u5305\u88f9\n*\u6765\u6e90\uff1a\u5c40\u90e8\u89e3\u5256\u5b66\u3001\u4f20\u67d3\u75c5\u5b66*\n\n**\u5316\u5b66\u4fe1\u53f7**\uff1a\u901a\u5e38\u88ab\u79f0\u4e3a\u914d\u4f53\uff0c\u4e3b\u8981\u5305\u62ec\u6fc0\u7d20\u3001\u795e\u7ecf\u9012\u8d28\u3001\u7ec6\u80de\u56e0\u5b50\u3001\u7ec6\u80de\u9ecf\u9644\u5206\u5b50\u3001\u6c14\u4f53\u5206\u5b50\u3001\u836f\u7269\u3001\u6bd2\u7269\u7b49\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u5de6\u65cb\u591a\u5df4**\uff1a\u4e00\u79cd\u591a\u5df4\u80fa\u524d\u4f53\u836f\u7269\uff0c\u53ef\u7528\u4e8e\u7ea0\u6b63\u809d\u6027\u8111\u75c5\u4e2d\u7684\u5047\u6027\u795e\u7ecf\u9012\u8d28\u5931\u8861\n*\u6765\u6e90\uff1a\u4f20\u67d3\u75c5\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u76ae\u795e\u7ecf**\uff1a\u5148\u8d70\u884c\u4e8e\u6df1\u7b4b\u819c\u6df1\u9762\uff0c\u540e\u7a7f\u51fa\u6df1\u7b4b\u819c\u8d70\u884c\u5728\u6d45\u7b4b\u819c\u5185\uff0c\u4ee5\u7ec6\u652f\u5206\u5e03\u4e8e\u76ae\u80a4\u7684\u795e\u7ecf\u3002\n*\u6765\u6e90\uff1a\u5c40\u90e8\u89e3\u5256\u5b66*\n\n**\u4e09\u53c9\u795e\u7ecf**\uff1a\u6df7\u5408\u795e\u7ecf\uff0c\u53d1\u51fa\u773c\u795e\u7ecf\u3001\u4e0a\u988c\u795e\u7ecf\u548c\u4e0b\u988c\u795e\u7ecf\u4e09\u5927\u5206\u652f\uff0c\u611f\u89c9\u652f\u5206\u5e03\u4e8e\u9762\u90e8\u76ae\u80a4\u3002\n*\u6765\u6e90\uff1a\u5c40\u90e8\u89e3\u5256\u5b66*\n\n**\u816e\u817a**\uff1a\u7565\u5448\u9525\u4f53\u5f62\uff0c\u5e95\u5411\u5916\u4fa7\uff0c\u5c16\u5411\u5185\u4fa7\u7a81\u5411\u54bd\u65c1\uff0c\u53ef\u5206\u4e3a\u6d45\u3001\u6df1\u4e24\u90e8\uff0c\u901a\u5e38\u4ee5\u4e0b\u988c\u9aa8\u540e\u7f18\u6216\u4ee5\u7a7f\u8fc7\u816e\u817a\u7684\u9762\u795e\u7ecf\u4e1b\u4f5c\u4e3a\u5206\u754c\u3002\n*\u6765\u6e90\uff1a\u5c40\u90e8\u89e3\u5256\u5b66*\n\n**\u773c\u795e\u7ecf**\uff1a\u4e09\u53c9\u795e\u7ecf\u7684\u5206\u652f\uff0c\u5206\u5e03\u4e8e\u773c\u88c2\u4ee5\u4e0a\u7684\u9762\u90e8\u533a\u57df\u3002\n*\u6765\u6e90\uff1a\u5c40\u90e8\u89e3\u5256\u5b66*\n\n**\u989e\u652f**\uff1a\u9762\u795e\u7ecf\u7684\u5206\u652f\uff0c\u51fa\u816e\u817a\u4e0a\u7f18\uff0c\u8d8a\u8fc7\u98a7\u5f13\u6d45\u9762\uff0c\u5206\u5e03\u81f3\u6795\u989d\u808c\u989d\u8179\u3001\u773c\u8f6e\u531d\u808c\u4e0a\u4efd\u53ca\u8033\u90e8\u808c\u3002\n*\u6765\u6e90\uff1a\u5c40\u90e8\u89e3\u5256\u5b66*\n\n**\u4e0b\u988c\u7f18\u652f**\uff1a\u9762\u795e\u7ecf\u7684\u5206\u652f\uff0c\u6cbf\u4e0b\u988c\u9aa8\u4e0b\u7f18\u8d70\u884c\uff0c\u652f\u914d\u4e0b\u5507\u8bf8\u808c\uff0c\u5728\u9888\u9614\u808c\u6df1\u9762\u9700\u6ce8\u610f\u4fdd\u62a4\u3002\n*\u6765\u6e90\uff1a\u5c40\u90e8\u89e3\u5256\u5b66*\n\n**\u526f\u795e\u7ecf**\uff1a\u81ea\u9888\u9759\u8109\u5b54\u51fa\u9885\uff0c\u7ecf\u80f8\u9501\u4e73\u7a81\u808c\u540e\u7f18\u8fdb\u5165\u6795\u4e09\u89d2\uff0c\u652f\u914d\u80f8\u9501\u4e73\u7a81\u808c\u548c\u659c\u65b9\u808c\u7684\u795e\u7ecf\u3002\n*\u6765\u6e90\uff1a\u5c40\u90e8\u89e3\u5256\u5b66*\n\n**\u6795\u4e09\u89d2**\uff1a\u4f4d\u4e8e\u80f8\u9501\u4e73\u7a81\u808c\u540e\u7f18\u3001\u659c\u65b9\u808c\u524d\u7f18\u548c\u80a9\u80db\u9aa8\u4e0a\u7f18\u4e4b\u95f4\u7684\u4e09\u89d2\u5f62\u533a\u57df\uff0c\u5185\u542b\u526f\u795e\u7ecf\u7b49\u7ed3\u6784\u3002\n*\u6765\u6e90\uff1a\u5c40\u90e8\u89e3\u5256\u5b66*\n\n**\u80f8\u9501\u4e73\u7a81\u808c**\uff1a\u4f4d\u4e8e\u9888\u90e8\u4e24\u4fa7\u7684\u5927\u808c\uff0c\u8d77\u81ea\u80f8\u9aa8\u548c\u9501\u9aa8\uff0c\u6b62\u4e8e\u989e\u9aa8\u4e73\u7a81\uff0c\u53c2\u4e0e\u5934\u9888\u8fd0\u52a8\u3002\n*\u6765\u6e90\uff1a\u5c40\u90e8\u89e3\u5256\u5b66*\n\n**\u98df\u7ba1\u524d\u4e1b**\uff1a\u7531\u5de6\u3001\u53f3\u8ff7\u8d70\u795e\u7ecf\u5206\u652f\u5728\u98df\u7ba1\u524d\u9762\u6784\u6210\u7684\u795e\u7ecf\u4e1b\uff0c\u5411\u4e0b\u6c47\u96c6\u6210\u8ff7\u8d70\u795e\u7ecf\u524d\u5e72\u3002\n*\u6765\u6e90\uff1a\u5c40\u90e8\u89e3\u5256\u5b66*\n\n**\u4ea4\u611f\u795e\u7ecf**\uff1a\u8d77\u4e8e\u7b2c6~10\u80f8\u8282\u6bb5\u810a\u9ad3\u7070\u8d28\u4fa7\u89d2\uff0c\u7ecf\u5185\u810f\u5927\u3001\u5c0f\u795e\u7ecf\u81f3\u8179\u8154\u795e\u7ecf\u8282\u6362\u5143\u540e\u652f\u914d\u80c3\uff0c\u6291\u5236\u5206\u6ccc\u548c\u8815\u52a8\uff0c\u589e\u5f3a\u5e7d\u95e8\u5f20\u529b\uff0c\u6536\u7f29\u8840\u7ba1\u3002\n*\u6765\u6e90\uff1a\u5c40\u90e8\u89e3\u5256\u5b66*\n\n**\u526f\u4ea4\u611f\u795e\u7ecf**\uff1a\u8282\u524d\u7ea4\u7ef4\u6765\u81ea\u8ff7\u8d70\u795e\u7ecf\u80cc\u6838\uff0c\u7ecf\u8ff7\u8d70\u795e\u7ecf\u524d\u3001\u540e\u5e72\u5206\u51fa\u809d\u652f\u3001\u8179\u8154\u652f\u53ca\u80c3\u524d\u3001\u540e\u652f\uff0c\u4fc3\u8fdb\u80c3\u9178\u5206\u6ccc\u548c\u80c3\u8fd0\u52a8\u3002\n*\u6765\u6e90\uff1a\u5c40\u90e8\u89e3\u5256\u5b66*\n\n**\u795e\u7ecf\u672b\u68a2**\uff1a\u795e\u7ecf\u7ea4\u7ef4\u7684\u672b\u7aef\u90e8\u5206\uff0c\u5206\u5e03\u4e8e\u5168\u8eab\u5404\u79cd\u7ec4\u7ec7\u5668\u5b98\u5185\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66*\n\n**\u5782\u4f53**\uff1a\u4f4d\u4e8e\u4e0b\u4e18\u8111\u4e0b\u65b9\u7684\u5185\u5206\u6ccc\u817a\uff0c\u5206\u4e3a\u817a\u5782\u4f53\u548c\u795e\u7ecf\u5782\u4f53\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66*\n\n**\u810a\u9ad3\u7684\u53d1\u751f**\uff1a\u810a\u9ad3\u5728\u80da\u80ce\u53d1\u80b2\u8fc7\u7a0b\u4e2d\u7684\u5f62\u6210\u8fc7\u7a0b\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66*\n\n**\u591a\u6781\u795e\u7ecf\u5143**\uff1a\u5177\u6709\u4e00\u4e2a\u8f74\u7a81\u548c\u591a\u4e2a\u6811\u7a81\u7684\u795e\u7ecf\u5143\u7c7b\u578b\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66*\n\n**\u611f\u53d7\u5668**\uff1a\u76f8\u5f53\u4e8e\u6362\u80fd\u5668\uff0c\u53ef\u63a5\u53d7\u5185\u3001\u5916\u73af\u5883\u53d8\u5316\u7684\u523a\u6fc0\u5e76\u8f6c\u53d8\u4e3a\u795e\u7ecf\u653e\u7535\u4fe1\u53f7\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**\u5e73\u8861\u611f\u89c9**\uff1a\u5bf9\u673a\u4f53\u5e73\u8861\u72b6\u6001\u7684 u77e5\u5185\u8d28\u7f51\u5e94\u6fc0\u4ecb\u5bfc\u7684\u708e\u75c7\u901a\u8def\u53ca\u7ec6\u80de\u51cb\u4ea1\u901a\u8def\u7684\u6539\u53d8\uff0c\u4e0e\u7ec6\u80de\u7684\u751f\u957f\u3001\u5206\u5316\u3001\u5b58\u6d3b\u53ca\u51cb\u4ea1\u6709\u5bc6\u5207\u8054\u7cfb\uff0c\u5e76\u5728\u4ee3\u8c22\u6027\u75be\u75c5\u53d1\u751f\u53d1\u5c55\u8fc7\u7a0b\u4e2d\u8d77\u91cd\u8981\u4f5c\u7528\u3002\n\n\u503c\u5f97\u6307\u51fa\u7684\u662f\uff0c\u635f\u4f24\u4e0e\u6297\u635f\u4f24\u4e4b\u95f4\u65e0\u4e25\u683c\u754c\u9650\uff0c\u53ef\u76f8\u4e92\u8f6c\u5316\u3002\u4f8b\u5982\uff0c\u5728\u4e25\u91cd\u5931\u8840\u6027\u4f11\u514b\u65e9\u671f\uff0c\u5c0f\u52a8\u8109\u3001\u5fae\u52a8\u8109\u6536\u7f29\u6709\u52a9\u4e8e\u52a8\u8109\u8840\u538b\u7684\u7ef4\u6301\uff0c\u4f46\u82e5\u6536\u7f29\u65f6\u95f4\u8fc7\u4e45\uff0c\u5c31\u4f1a\u52a0\u91cd\u7ec4\u7ec7\u5668\u5b98\u7684\u7f3a\u8840\u3001\u7f3a\u6c27\u635f\u4f24\u548c\u529f\u80fd\u969c\u788d\u3002\u7531\u4e8e\u4e0d\u540c\u75be\u75c5\u4e2d\u635f\u4f24\u4e0e\u6297\u635f\u4f24\u53cd\u5e94\u7684\u5dee\u5f02\uff0c\u6784\u6210\u4e86\u5404\u79cd\u75be\u75c5\u7684\u4e0d\u540c\u7279\u5f81\u3002\u5728\u75be\u75c5\u7684\u9632\u6cbb\u4e2d\uff0c\u5e94\u5c3d\u91cf\u652f\u6301\u548c\u52a0\u5f3a\u6297\u635f\u4f24\u53cd\u5e94\uff0c\u51cf\u8f7b\u548c\u6d88\u9664\u635f\u4f24\u53cd\u5e94\u3002\n\n\uff08\u4e09\uff09\u2002 \u56e0\u679c\u4ea4\u66ff\n\n\u56e0\u679c\u4ea4\u66ff\u6307\u75be\u75c5\u53d1\u751f\u53d1\u5c55\u8fc7\u7a0b\u4e2d\uff0c\u7531\u539f\u59cb\u75c5\u56e0\u4f5c\u7528\u4e8e\u673a\u4f53\u6240\u4ea7\u751f\u7684\u7ed3\u679c\u53c8\u53ef\u4f5c\u4e3a\u75c5\u56e0\uff0c\u5f15\u8d77\u65b0\u7684\n\n\u53ef\u5f15\u8d77\u5fc3\u6392\u8840\u91cf\u51cf\u5c11\uff0c\u8fdb\u800c\u5bfc\u81f4\u8840\u538b\u4e0b\u964d\uff08\u679c\uff09\uff1b\u540e\u8005\uff08\u56e0\uff09\u523a\u6fc0\u4ea4\u611f\u795e\u7ecf\u5174\u594b\uff0c\u91ca\u653e\u513f\u8336\u915a\u80fa\uff0c\u5f15\u8d77\u5fae\u8840\u7ba1\u6536\u7f29\uff0c\u7ec4\u7ec7\u7f3a\u6c27\uff08\u679c\uff09\u3002\u6301\u7eed\u7684\u7ec4\u7ec7\u7f3a\u6c27\uff08\u56e0\uff09\u5bfc\u81f4\u7ec4\u7ec7\u9178\u4e2d\u6bd2\uff0c\u8fdb\u800c\u51fa\u73b0\u6bdb\u7ec6\u8840\u7ba1\u5927\u91cf\u5f00\u653e\uff0c\u5bfc\u81f4\u5fae\u5faa\u73af\u6de4\u8840\uff08\u679c\uff09\u3002\u540e\u8005\u53c8\u53ef\u4f5c\u4e3a\u65b0\u7684\u539f\u56e0\u7ee7\u7eed\u5bfc\u81f4\u6076\u6027\u5faa\u73af\u800c\u52a0\u91cd\u7ec4\u7ec7\u635f\u4f24\u3002\n\n\u7531\u4e8e\u539f\u56e0\u548c\u7ed3\u679c\u7684\u76f8\u4e92\u8f6c\u5316\u548c\u4ea4\u66ff\uff0c\u6709\u4e9b\u75be\u75c5\u4e00\u65e6\u53d1\u751f\uff08\u5982\u653e\u5c04\u6027\u635f\u4f24\u6216\u4e8c\u6c27\u5316\u7845\u5f15\u8d77\u7684\u80ba\u7ea4\u7ef4\u5316\uff09\uff0c\u6216\u8fdb\u5c55\u5230\u4e00\u5b9a\u7a0b\u5ea6\uff08\u5982\u94fe\u7403\u83cc\u53cd\u590d\u611f\u67d3\u5f15\u8d77\u7684\u6162\u6027\u80be\u5c0f\u7403\u80be\u708e\u6216\u7531\u9ad8\u8840\u538b\u5f15\u8d77\u7684\u6162\u6027\u80be\u75c5\u7b49\uff09\uff0c\u5373\u4f7f\u539f\u59cb\u75c5\u56e0\u5df2\u4e0d\u5b58\u5728\uff0c\u901a\u8fc7\u56e0\u679c\u4ea4\u66ff\u89c4\u5f8b\u4ecd\u53ef\u63a8\u52a8\u75be\u75c5\u7684\u8fdb\u5c55\u3002\u56e0\u6b64\uff0c\u4f5c\u4e3a\u533b\u52a1\u5de5\u4f5c\u8005\uff0c\u63ed\u793a\u4e0d\u540c\u75be\u75c5\u4e2d\u56e0\u679c\u4ea4\u66ff\u7684\u5185\u5728\u673a\u5236\u3001\u53ca\u65f6\u53d1\u73b0\u5e76\u6253\u65ad\u8fd9\u79cd\u6076\u6027\u5faa\u73af\uff0c\u4fbf\u53ef\u4f7f\u75be\u75c5\u671d\u7740\u6709\u5229\u4e8e\u673a\u4f53\u5065\u5eb7\u7684\u65b9\u5411\u53d1\u5c55\u3002\n\n\u503c\u5f97\u6307\u51fa\u7684\u662f\uff0c\u75be\u75c5\u53d1\u751f\u53d1\u5c55\u8fc7\u7a0b\u4e2d\u867d\u7136\u5b58\u5728\u56e0\u679c\u8f6c\u5316\uff0c\u4f46\u5e76\u4e0d\u662f\u6240\u6709\u73af\u8282\u90fd\u540c\u7b49\u91cd\u8981\u3002\u5176\u4e2d\uff0c\u6709\u7684\u73af\u8282\u8d77\u51b3\u5b9a\u6027\u4f5c\u7528\uff0c\u4e3a\u5176\u4ed6\u73af\u8282\u7684\u53d1\u751f\u53d1\u5c55\u6240\u5fc5\u9700\uff0c\u8be5\u73af\u8282\u88ab\u79f0\u4e3a\u53d1\u75c5\u7684\u4e3b\u5bfc\u73af\u8282\u3002\u4f8b\u5982\uff0c\u7532\u72b6\u817a\u529f\u80fd\u4ea2\u8fdb\u5e38\u5f15\u8d77\u5fc3\u5f8b\u5931\u5e38\uff0c\u800c\u5fc3\u5f8b\u5931\u5e38\u5f80\u5f80\u53c8\u4f1a\u5f15\u8d77\u5fc3\u7ede\u75db\u3001\u5fc3\u808c\u6897\u6b7b\u751a\u81f3\u5fc3\u529b\u8870\u7aed\u3002\u7136\u800c\uff0c\u8fd9\u4e9b\u5fc3\u810f\u75c5\u53d8\u7684\u6700\u6839\u672c\u539f\u56e0\u662f\u8fc7\u91cf\u7532\u72b6\u817a\u6fc0\u7d20\u5bf9\u5fc3\u808c\u4ee3\u8c22\u3001\u8840\u6d41\u52a8\u529b\u5b66\u53ca\u795e\u7ecf\u5185\u5206\u6ccc\uff08\u5982\u4ea4\u611f\u200a-\u200a\u80be\u4e0a\u817a\u9ad3\u8d28\u7cfb\u7edf\u3001\u80be\u7d20\u200a-\u200a\u8840\u7ba1\u7d27\u5f20\u7d20\u200a-\u200a\u919b\u56fa\u916e\u7cfb\u7edf\uff09\u7684\u4e0d\u5229\u5f71\u54cd\u3002\u56e0\u6b64\uff0c\u7532\u72b6\u817a\u529f\u80fd\u4ea2\u8fdb\u662f\u75be\u75c5\u7684\u4e3b\u5bfc\u73af\u8282\uff0c\u6cbb\u7597\u65f6\u5e94\u9488\u5bf9\u7532\u72b6\u817a\u529f\u80fd\u4ea2\u8fdb\u3002\u53ef\u89c1\uff0c\u4e86\u89e3\u75be\u75c5\u53d1\u5c55\u7684\u4e3b\u5bfc\u73af\u8282\uff0c\u5bf9\u8bca\u65ad\u548c\u6cbb\u7597\u75be\u75c5\u5177\u6709\u91cd\u8981\u610f\u4e49\u3002\n\n\uff08\u56db\uff09\u2002 \u5c40\u90e8\u548c\u6574\u4f53\n\n\u591a\u6570\u75be\u75c5\u90fd\u6709\u5c40\u90e8\u8868\u73b0\u548c\u5168\u8eab\u53cd\u5e94\uff0c\u4e00\u65b9\u9762\u5c40\u90e8\u75c5\u53d8\u53ef\u4ee5\u901a\u8fc7\u795e\u7ecf\u4f53\u6db2\u9014\u5f84\u5f15\u8d77\u6574\u4f53\u53cd\u5e94\uff0c\u53e6\u4e00\u65b9\u9762\u673a\u4f53\u7684\u5168\u8eab\u529f\u80fd\u72b6\u6001\u4e5f\u53ef\u5f71\u54cd\u5c40\u90e8\u75c5\u53d8\u7684\u53d1\u5c55\u3002\u6240\u4ee5\u5728\u75be\u75c5\u8fdb\u7a0b\u4e2d\uff0c\u5c40\u90e8\u548c\u6574\u4f53\u76f8\u4e92\u5f71\u54cd\uff0c\u76f8\u4e92\u5236\u7ea6\u3002\u4f8b\u5982\uff0c\u6bdb\u56ca\u708e\uff08\u75c8\u3001\u7596\uff09\u53ef\u5f15\u8d77\u5c40\u90e8\u5145\u8840\u3001\u6c34\u80bf\u7b49\u708e\u6027\u53cd\u5e94\uff0c\u8fd8\u53ef\u901a\u8fc7\u795e\u7ecf\u4f53\u6db2\u9014\u5f84\u5f15\u8d77\u767d\u7ec6\u80de\u8ba1\u6570\u5347\u9ad8\u3001\u53d1\u70ed\u3001\u5bd2\u6218\u7b49\u5168\u8eab \n\u5355\u5c42\u7acb\u65b9\u4e0a\u76ae\u80be\u5c0f\u7ba1\u3001\u7532\u72b6\u817a\u6ee4\u6ce1\u7b49\n\n\u5355\u5c42\u67f1\u72b6\u4e0a\u76ae\u80c3\u3001\u80a0\u3001\u80c6\u56ca\u548c\u5b50\u5bab\u7b49\u8154\u9762\n\n\u5047\u590d\u5c42\u7ea4\u6bdb\u67f1\u72b6\u4e0a\u76ae\u547c\u5438\u9053\u7b49\u8154\u9762\n\n\u590d\u5c42\u4e0a\u76ae\u590d\u5c42\u6241\u5e73\u4e0a\u76ae\u672a\u89d2\u5316\uff1a\u53e3\u8154\u5927\u90e8\u3001\u98df\u7ba1\u548c\u9634\u9053\u7b49\u8154\u9762\u89d2\u5316\uff1a\u76ae\u80a4\u8868\u76ae\n\n\u590d\u5c42\u67f1\u72b6\u4e0a\u76ae\u7751\u7ed3\u819c\u3001\u7537\u6027\u5c3f\u9053\u8154\u9762\u7b49\n\n\u53d8\u79fb\u4e0a\u76ae\u80be\u76cf\u3001\u80be\u76c2\u3001\u8f93\u5c3f\u7ba1\u548c\u8180\u80f1\u7b49\u8154\u9762\n1.\u2002 \u5355\u5c42\u6241\u5e73\u4e0a\u76ae\uff08simple squamous epithelium\uff09 \u53c8\u79f0\u5355\u5c42\u9cde\u72b6\u4e0a\u76ae\uff0c\u7531\u4e00\u5c42\u6241\u5e73\u7ec6\u80de\u7ec4\u6210\u3002\u4ece\u4e0a\u76ae\u8868\u9762\u89c2\u5bdf\uff0c\u7ec6\u80de\u5448\u4e0d\u89c4\u5219\u5f62\u6216\u591a\u8fb9\u5f62\uff0c\u6838\u4e3a\u692d\u5706\u5f62\uff0c\u4f4d\u4e8e\u7ec6\u80de\u4e2d\u592e\uff1b\u7ec6\u80de\u8fb9\u7f18\u5448\u952f\u9f7f\u72b6\u6216\u6ce2\u6d6a\u72b6\uff0c\u4e92\u76f8\u5d4c\u5408\uff08\u56fe2-1\uff09\u3002\u4ece\u5782\u76f4\u5207\u9762\u89c2\u5bdf\uff0c\u7ec6\u80de\u6241\u8584\uff0c\u7ec6\u80de\u8d28\u5c11\uff0c\u53ea\u6709\u542b\u6838\u7684\u90e8\u5206\u7565\u539a\u3002\u886c\u8d34\u5728\u5fc3\u810f\u3001\u8840\u7ba1\u548c\u6dcb\u5df4\u7ba1\u8154\u9762\u7684\u5355\u5c42\u6241\u5e73\u4e0a\u76ae\u79f0\u5185\u76ae\uff08endothelium\uff09\uff0c\u5176\u8868\u9762\u5149\u6ed1\uff0c\u6709\u5229\u4e8e\u8840\u6db2\u548c\u6dcb\u5df4\u7684\u6d41\u52a8\uff0c\u4e5f\u6709\u5229\u4e8e\u5185\u76ae\u7ec6\u80de\u8fdb\u884c\u7269\u8d28\u4ea4\u6362\uff1b\u5206\u5e03\u5728\u80f8\u819c\u3001\u8179\u819c\u548c\u5fc3\u5305\u819c\u8868\u9762\u7684\u5355\u5c42\u6241\u5e73\u4e0a\u76ae\u79f0...\n\n---\n\n# \u5185\u5206\u6ccc\u4e0e\u751f\u6b96\n\n\u672c\u7ae0\u6db5\u76d6\u7cd6\u76ae\u8d28\u6fc0\u7d20\u3001\u919b\u56fa\u916e\u3001\u80f0\u5c9b\u7d20\u3001\u7532\u72b6\u65c1\u817a\u6fc0\u7d20\u3001\u964d\u9499\u7d20\u3001\u9ad8\u7cd6\u8840\u75c7\u7b49\u6838\u5fc3\u77e5\u8bc6\u70b9\uff0c\u6574\u5408\u81ea5\u672c\u6559\u6750\u76f8\u5173\u5185\u5bb9\u3002\n\n## \u6838\u5fc3\u6982\u5ff5\u4e0e\u5b9a\u4e49\n\n**\u7cd6\u76ae\u8d28\u6fc0\u7d20**\uff1a\u7531\u80be\u4e0a\u817a\u76ae\u8d28\u5206\u6ccc\u7684\u6fc0\u7d20\uff0c\u5728\u5e94\u6fc0\u53cd\u5e94\u4e2d\u53d1\u6325\u5141\u8bb8\u4f5c\u7528\uff0c\u7ef4\u6301\u8840\u538b\u3001\u8840\u7cd6\u548c\u8102\u80aa\u52a8\u5458\uff0c\u5e76\u5177\u6709\u6297\u708e\u548c\u7ec6\u80de\u4fdd\u62a4\u4f5c\u7528\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66\u3001\u751f\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u919b\u56fa\u916e**\uff1a\u4e00\u79cd\u80be\u4e0a\u817a\u76ae\u8d28\u6fc0\u7d20\uff0c\u901a\u8fc7\u523a\u6fc0\u96c6\u5408\u7ba1\u6ccc\u6c22\u7ec6\u80de\u7684H+-ATP\u9176\u4fc3\u8fdbH+\u6392\u6ccc\uff0c\u5e76\u4fddNa+\u3001\u6392K+\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u80f0\u5c9b\u7d20**\uff1a\u7531\u80f0\u5c9b\u03b2\u7ec6\u80de\u4ea7\u751f\uff0c\u534a\u8870\u671f5~15\u5206\u949f\uff0c\u662f\u4f53\u5185\u552f\u4e00\u964d\u4f4e\u8840\u7cd6\u7684\u6fc0\u7d20\uff0c\u4e5f\u662f\u552f\u4e00\u540c\u65f6\u4fc3\u8fdb\u7cd6\u539f\u3001\u8102\u80aa\u548c\u86cb\u767d\u8d28\u5408\u6210\u7684\u6fc0\u7d20\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66\u3001\u751f\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u7532\u72b6\u65c1\u817a\u6fc0\u7d20**\uff1a\u7531\u7532\u72b6\u65c1\u817a\u4e3b\u7ec6\u80de\u5408\u6210\u5e76\u5206\u6ccc\u7684\u4e00\u79cd\u5355\u94fe\u591a\u80bd\u6fc0\u7d20\uff0c\u5177\u6709\u5347\u9ad8\u8840\u9499\u3001\u964d\u4f4e\u8840\u78f7\u548c\u9178\u5316\u8840\u6db2\u7b49\u4f5c\u7528\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66\u3001\u751f\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u964d\u9499\u7d20**\uff1a\u7531\u7532\u72b6\u817a\u6ee4\u6ce1\u65c1\u7ec6\u80de\u5206\u6ccc\u7684\u4e00\u79cd\u5355\u94fe\u591a\u80bd\u7c7b\u6fc0\u7d20\uff0c\u8840\u9499\u5347\u9ad8\u523a\u6fc0\u5176\u5206\u6ccc\uff0c\u8840\u9499\u964d\u4f4e\u6291\u5236\u5176\u5206\u6ccc\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66\u3001\u751f\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u9ad8\u7cd6\u8840\u75c7**\uff1a\u5e38\u89c1\u4e8e\u80f0\u5c9b\u7d20\u8d28\u6216\u91cf\u7684\u7f3a\u9677\u3001\u80f0\u5c9b\u7d20\u62b5\u6297\u3001\u80f0\u5c9b\u7d20\u62ee\u6297\u6fc0\u7d20\u5206\u6ccc\u5931\u8c03\u7b49\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u7532\u72b6\u817a\u529f\u80fd\u4ea2\u8fdb**\uff1a\u4e00\u79cd\u5185\u5206\u6ccc\u75be\u75c5\uff0c\u53ef\u5bfc\u81f4\u5fc3\u810f\u8212\u7f29\u6d3b\u52a8\u4e0d\u534f\u8c03\uff0c\u5f15\u8d77\u5fc3\u6392\u8840\u91cf\u4e0b\u964d\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u7532\u72b6\u817a**\uff1a\u4f4d\u4e8e\u9888\u90e8\u524d\u65b9\u7684\u5185\u5206\u6ccc\u817a\u4f53\uff0c\u53ef\u968f\u541e\u54bd\u4e0a\u4e0b\u79fb\u52a8\u3002\n*\u6765\u6e90\uff1a\u5c40\u90e8\u89e3\u5256\u5b66\u3001\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66*\n\n**\u80be\u4e0a\u817a**\uff1a\u4f4d\u4e8e\u80be\u7684\u4e0a\u65b9\uff0c\u9694\u758f\u677e\u7ed3\u7f14\u7ec4\u7ec7\u4e0e\u80be\u76f8\u90bb\uff0c\u662f\u8179\u819c\u540e\u95f4\u9699\u5185\u7684\u5185\u5206\u6ccc\u817a\u4f53\u3002\n*\u6765\u6e90\uff1a\u5c40\u90e8\u89e3\u5256\u5b66\u3001\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66*\n\n**\u5185\u5206\u6ccc\u7cfb\u7edf**\uff1a\u5185\u5206\u6ccc\u7cfb\u7edf\u7531\u5185\u5206\u6ccc\u817a\u548c\u6563\u5728\u7684\u5185\u5206\u6ccc\u7ec6\u80de\u7ec4\u6210\uff0c\u8c03\u8282\u673a\u4f53\u529f\u80fd\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66\u3001\u751f\u7406\u5b66*\n\n**\u751f\u6b96**\uff1a\u673a\u4f53\u7e41\u6b96\u540e\u4ee3\u3001\u5ef6\u7eed\u79cd\u7cfb\u7684\u4e00\u79cd\u7279\u5f81\u6027\u6d3b\u52a8\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**\u5f25\u6f2b\u6027\u975e\u6bd2\u6027\u7532\u72b6\u817a\u80bf**\uff1a\u7532\u72b6\u817a\u5f25\u6f2b\u6027\u80bf\u5927\uff0c\u4e0d\u4f34\u6709\u7532\u72b6\u817a\u529f\u80fd\u4ea2\u8fdb\uff0c\u5c5e\u4e8e\u7532\u72b6\u817a\u75be\u75c5\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66*\n\n**\u4fc3\u7532\u72b6\u817a\u6fc0\u7d20**\uff1a\u817a\u5782\u4f53\u5206\u6ccc\u7684\u6fc0\u7d20\uff0c\u7f29\u5199TSH\uff0c\u53d7\u7532\u72b6\u817a\u6fc0\u7d20\u53cd\u9988\u8c03\u8282\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**cAMP**\uff1a\u73af\u78f7\u9178\u817a\u82f7\uff0c\u4f5c\u4e3a\u7b2c\u4e8c\u4fe1\u4f7f\uff0c\u80fd\u4fc3\u8fdb\u7ebf\u7c92\u4f53Ca2+\u8f6c\u5165\u80de\u8d28\uff0c\u53c2\u4e0e\u7532\u72b6\u65c1\u817a\u6fc0\u7d20\u7684\u4fe1\u53f7\u8f6c\u5bfc\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u677e\u679c\u4f53**\uff1a\u4f4d\u4e8e\u95f4\u8111\u4e0a\u65b9\u7684\u5185\u5206\u6ccc\u817a\uff0c\u5206\u6ccc\u892a\u9ed1\u7d20\u8c03\u8282\u751f\u7269\u8282\u5f8b\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66\u3001\u751f\u7406\u5b66*\n\n**\u7532\u72b6\u817a\u6fc0\u7d20**\uff1a\u7531\u7532\u72b6\u817a\u5206\u6ccc\u7684\u6fc0\u7d20\uff0c\u5305\u62ecT3\u3001T4\uff0c\u53c2\u4e0e\u53cd\u9988\u8c03\u8282\u5185\u7a33\u6001\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u5176\u4ed6\u56e0\u7d20**\uff1a\u975e\u9057\u4f20\u56e0\u7d20\u5728SLE\u53d1\u75c5\u4e2d\u7684\u4f5c\u7528\uff0c\u5305\u62ec\u836f\u7269\u3001\u6fc0\u7d20\u548c\u7d2b\u5916\u7ebf\u7b49\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u5b50\u5bab**\uff1a\u5973\u6027\u751f\u6b96\u5668\u5b98\uff0c\u4f4d\u4e8e\u76c6\u8154\uff0c\u662f\u5b55\u80b2\u80ce\u513f\u7684\u573a\u6240\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66*\n\n**\u7532\u72b6\u817a\u529f\u80fd\u7684\u8c03\u8282**\uff1a\u4e0b\u4e18\u8111-\u5782\u4f53-\u7532\u72b6\u817a\u8f74\u901a\u8fc7\u53cd\u9988\u673a\u5236\u8c03\u8282\u7532\u72b6\u817a\u6fc0\u7d20\u5206\u6ccc\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**\u6fc0\u7d20**\uff1a\u7531\u5185\u5206\u6ccc\u7ec6\u80de\u6216\u5185\u5206\u6ccc\u817a\u5206\u6ccc\u7684\u5316\u5b66\u7269\u8d28\uff0c\u5982\u7532\u72b6\u817a\u6fc0\u7d20\u3001\u80f0\u5c9b\u7d20\u3001\u7cd6\u76ae\u8d28\u6fc0\u7d20\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**\u4e0b\u4e18\u8111-\u5782\u4f53\u53ca\u677e\u679c\u4f53\u5185\u5206\u6ccc**\uff1a\u4e0b\u4e18\u8111\u3001\u5782\u4f53\u548c\u677e\u679c\u4f53\u5171\u540c\u6784\u6210\u7684\u5185\u5206\u6ccc\u7cfb\u7edf\uff0c\u8c03\u8282\u591a\u79cd\u751f\u7406\u529f\u80fd\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**\u4e0b\u4e18\u8111-\u817a\u5782\u4f53\u7cfb\u7edf\u5185\u5206\u6ccc**\uff1a\u4e0b\u4e18\u8111\u901a\u8fc7\u91ca\u653e\u6fc0\u7d20\u8c03\u8282\u817a\u5782\u4f53\u5206\u6ccc\uff0c\u6784\u6210\u4e0b\u4e18\u8111-\u817a\u5782\u4f53\u8f74\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**\u65e0\u6027\u751f\u6b96**\uff1a\u4e0d\u7ecf\u8fc7\u4e24\u6027\u751f\u6b96\u7ec6\u80de\u7ed3\u5408\uff0c\u7531\u6bcd\u4f53\u76f4\u63a5\u4ea7\u751f\u65b0\u4e2a\u4f53\u7684\u751f\u6b96\u65b9\u5f0f\uff0c\u5982\u5206\u88c2\u751f\u6b96\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**\u80be\u4e0a\u817a\u76ae\u8d28\u529f\u80fd\u4ea2\u8fdb**\uff1a\u80be\u4e0a\u817a\u76ae\u8d28\u5206\u6ccc\u8fc7\u591a\u6fc0\u7d20\u5bfc\u81f4\u7684\u529f\u80fd\u5f02\u5e38\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66*\n\n**\u751f\u7406\u6027\u589e\u751f**\uff1a\u6839\u636e\u6027\u8d28\u5206\u7c7b\u7684\u4e00\u79cd\u589e\u751f\uff0c\u5305\u62ec\u4ee3\u507f\u6027\u589e\u751f\u548c\u5185\u5206\u6ccc\u6027\u589e\u751f\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66*\n\n**\u4fc3\u7532\u72b6\u817a\u6fc0\u7d20\u91ca\u653e\u6fc0\u7d20**\uff1a\u4e0b\u4e18\u8111\u5206\u6ccc\u7684\u6fc0\u7d20\uff0c\u7f29\u5199TRH\uff0c\u53d7\u7532\u72b6\u817a\u6fc0\u7d20\u53cd\u9988\u8c03\u8282\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u751f\u957f\u6fc0\u7d20**\uff1a\u4e00\u79cd\u6fc0\u7d20\uff0c\u4e0e\u53d7\u4f53\u7ed3\u5408\u540e\u6fc0\u6d3bJAK-STAT\u9014\u5f84\uff0c\u8c03\u8282\u673a\u4f53\u751f\u957f\u548c\u53d1\u80b2\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u7cd6\u76ae\u8d28\u6fc0\u7d20\u53d7\u4f53**\uff1a\u4f4d\u4e8e\u80de\u8d28\uff0c\u4e0e\u70ed\u4f11\u514b\u86cb\u767d\u7ed3\u5408\u5b58\u5728\uff0c\u5904\u4e8e\u975e\u6d3b\u5316\u72b6\u6001\uff1b\u914d\u4f53\u7ed3\u5408\u540eHSP\u89e3\u79bb\uff0c\u66b4\u9732DNA\u7ed3\u5408\u533a\uff0c\u53d7\u4f53\u4e8c\u805a\u5316\u5e76\u79fb\u5165\u6838\u5185\u4e0eHRE\u7ed3\u5408\u8c03\u8282\u57fa\u56e0\u8f6c\u5f55\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u4fc3\u80be\u4e0a\u817a\u76ae\u8d28\u6fc0\u7d20\u91ca\u653e\u6fc0\u7d20**\uff1a\u7531\u4e0b\u4e18\u8111\u5ba4\u65c1\u6838\u5206\u6ccc\u7684\u6fc0\u7d20\uff0c\u8c03\u63a7\u817a\u5782\u4f53\u91ca\u653eACTH\uff0c\u662fHPAC\u7cfb\u7edf\u6fc0\u6d3b\u7684\u5173\u952e\u73af\u8282\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u819c\u8054\u86cb\u767dA1**\uff1a\u4e00\u79cd\u9499\u4f9d\u8d56\u6027\u78f7\u8102\u7ed3\u5408\u86cb\u767d\uff0c\u7cd6\u76ae\u8d28\u6fc0\u7d20\u53d1\u6325\u89e3\u70ed\u4f5c\u7528\u4f9d\u8d56\u4e8e\u5176\u5728\u8111\u5185\u7684\u91ca\u653e\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66  \u2190 \u524d\u7f6e\uff1a\u7cd6\u76ae\u8d28\u6fc0\u7d20*\n\n**CRH**\uff1a\u4fc3\u80be\u4e0a\u817a\u76ae\u8d28\u6fc0\u7d20\u91ca\u653e\u6fc0\u7d20\uff0c\u53d1\u70ed\u65f6\u7531PGE\u8bf1\u5bfc\u5206\u6ccc\uff0c\u5f15\u8d77\u4ea4\u611f\u5174\u594b\u548c\u5fc3\u7387\u52a0\u5feb\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n## \u539f\u6587\u7cbe\u8bfb\n\n### \u7cd6\u76ae\u8d28\u6fc0\u7d20 \u2014 \u9009\u81ea\u300a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66\u300b\n\n...\u7834\u9aa8\u7ec6\u80de\u7684\u6d3b\u52a8\uff0c\u5f71\u54cd\u9aa8\u7684\u751f\u957f\u901f\u5ea6\u548c\u9aa8\u7684\u5851\u5f62\uff0c\u5728\u9aa8\u7684\u91cd\u5efa\u4e2d\u53d1\u6325\u91cd\u8981\u4f5c\u7528\u3002\u82e5\u7ef4\u751f\u7d20A \u4e25\u91cd\u7f3a\u4e4f\uff0c\u9aa8\u7684\u91cd\u5438\u6536\u548c\u91cd\u5efa\u8ddf\u4e0d\u4e0a\u9aa8\u7684\u5f62\u6210\uff0c\u5f15\u8d77\u9aa8\u7684\u7578\u5f62\u53d1\u80b2\uff0c\u4e5f\u53ef\u5f71\u54cd\u9aba\u677f\u8f6f\u9aa8\u7ec6\u80de\u7684\u53d1\u80b2\uff0c\u5bfc\u81f4\u957f\u9aa8\u751f\u957f\u8fdf\u7f13\u3002\u7ef4\u751f\u7d20C \u53ef\u5f71\u54cd\u9aa8\u7956\u7ec6\u80de\u7684\u5206\u88c2\u589e\u6b96\uff0c\u5e76\u53ef\u5f71\u54cd\u6210\u9aa8\u7ec6\u80de\u5408\u6210\u80f6\u539f\u7ea4\u7ef4\u4e0e\u57fa\u8d28\uff0c\u4e25\u91cd\u7f3a\u4e4f\u53ef\u5bfc\u81f4\u9aa8\u5e72\u5bc6\u8d28\u9aa8\u53d8\u8584\u53d8\u8106\uff0c\u9aa8\u6298\u540e\u6108\u5408\u7f13\u6162\u3002\n2. \u6fc0\u7d20 \u751f\u957f\u6fc0\u7d20\u548c\u7532\u72b6\u817a\u6fc0\u7d20\u53ef\u4fc3\u8fdb\u9aba\u677f\u8f6f\u9aa8\u7ec6\u80de\u7684\u751f\u957f\uff0c\u4fc3\u8fdb\u8f6f\u9aa8\u66ff\u6362\u4e3a\u9aa8\u3002\u82e5\u751f\u957f\u53d1\u80b2\u671f\u8fd9\u4e24\u79cd\u6fc0\u7d20\u5206\u6ccc\u8fc7\u5c11\uff0c\u53ef\u5206\u522b\u5bfc\u81f4\u4f8f\u5112\u75c7\u548c\u5446\u5c0f\u75c5\uff1b\u513f\u7ae5\u671f\u751f\u957f\u6fc0\u7d20\u5206\u6ccc\u8fc7\u591a\uff0c\u53ef\u5bfc\u81f4\u5de8\u4eba\u75c7\uff0c\u6210\u5e74\u671f\u5219\u53ef\u81f4\u80a2\u7aef\u80a5\u5927\u75c7\u3002\u7532\u72b6\u65c1\u817a\u6fc0\u7d20\u6fc0\u6d3b\u9aa8\u7ec6\u80de\u548c\u7834\u9aa8\u7ec6\u80de\u7684\u6eb6\u9aa8\u4f5c\u7528\uff0c\u91ca\u653e\u9aa8\u9499\u5165\u8840\uff0c\u4f7f\u8840\u9499\u5347\u9ad8\uff1b\u964d\u9499\u7d20\u53ef\u6291\u5236\u9aa8\u76d0\u6eb6\u89e3\uff0c\u5e76\u523a\u6fc0\u9aa8\u7956\u7ec6\u80de\u5206\u5316\u4e3a\u6210\u9aa8\u7ec6\u80de\uff0c\u4fc3\u8fdb\u6210\u9aa8\u800c\u4f7f\u8840\u9499\u5165\u9aa8\u3002\u96cc\u6fc0\u7d20\u548c\u96c4\u6fc0\u7d20\u90fd\u80fd\u4fc3\u8fdb\u6210\u9aa8\u7ec6\u80de\u7684\u6d3b\u52a8\uff0c\u6709\u5229\u4e8e\u9aa8\u7684\u751f\u957f\u548c\u6210\u719f\u3002\u96cc\u6fc0\u7d20\u4e0d\u8db3\u53ef\u81f4\u6210\u9aa8\u7ec6\u80de\u6d3b\u8dc3\u5ea6\u964d\u4f4e\u3001\u7834\u9aa8\u7ec6\u80de\u6d3b\u52a8\u76f8\u5bf9\u589e\u5f3a\uff0c\u6545\u53ef\u5bfc\u81f4\u9aa8\u9499\u6d41\u5931\uff0c\u5f62\u6210\u9aa8\u8d28\u758f\u677e\u3002\u7cd6\u76ae\u8d28\u6fc0\u7d20\u53ef\u6291\u5236\u5c0f\u80a0\u5bf9\u9499\u7684\u5438\u6536\u548c\u80be\u5c0f\u7ba1\u5bf9\u9499\u7684\u91cd\u5438\u6536\uff0c\u5bf9\u9aa8\u751f\u957f\u53d1\u80b2\u4e5f\u6709\u5f71\u54cd\u3002\n3. \u7ec6\u80de\u56e0\u5b50\u662f\u7531\u7ec6\u80de\u5206\u6ccc\u7684\u4e00\u7c7b\u4f4e\u5206\u5b50\u91cf\u53ef\u6eb6\u6027\u86cb\u767d\u6216\u591a\u80bd\uff0c\u5177\u6709\u5e7f\u6cdb\u7684\u751f\u7269\u5b66\u6d3b\u6027\u3002\u9aa8\u5185\u5b58\u5728\u7684\u751f\u7269\u6d3b\u6027\u7269\u8d28\uff0c\u5982\u751f\u957f\u56e0\u5b50\u548c\u7ec6\u80de\u56e0\u5b50\u7b49\uff0c\u4e00\u822c\u8ba4\u4e3a\u6765\u81ea\u6210\u9aa8\u7ec6\u80de\u7684\u5206\u6ccc\uff0c\u4f46\u4e5f\u53ef\u6765\u81ea\u9aa8\u5916\u7ec4\u7ec7\u3002\u8fd9\u4e9b\u7ec6\u80de\u56e0\u5b50\u53ef\u6fc0\u6d3b\u6216\u6291\u5236\u6210\u9aa8\u7ec6\u80de\u4e0e\u7834\u9aa8\u7ec6\u80de\uff0c\u4e0e\u9aa8\u7684\u53d1\u751f\u3001\u751f\u957f\u548c\u91cd\u5efa\u5bc6\u5207\u76f8\u5173\u3002\n4. \u5e94\u529b\u4f5c\u7528 \u5e94\u529b\u662f\u7ed3\u6784\u5bf9\u5916\u90e8\u52a0\u8f7d\u7684\u8d1f\u8377\u6240\u4ea7\u751f\u7684\u5185\u90e8\u62b5\u6297\u529b\uff0c\u4f7f\u7269\u4f53\u56e0\u8d1f\u8377\u9020\u6210\u7684\u53d8\u5f62\u5f97\u4ee5\u6062\u590d\u5230\u53d8\u5f62\u524d\u7684\u72b6\u6001\u3002\u9aa8\u7684\u751f\u957f\u548c\u91cd\u5efa\u7686\u4e0e\u9aa8\u7684\u53d7\u529b\u72b6\u6001\u5bc6\u5207\u76f8\u5173\u3002\u5b9e\u9a8c\u8868\u660e\uff0c\u9aa8\u5904\u4e8e\u751f\u7406\u8303\u56f4\u5185\u7684\u9ad8\u5e94\u529b\u4f5c\u7528\u4e0b\uff0c\u4ee5\u9aa8\u5f62\u6210\u4e3a\u4e3b\uff1b\u4f4e\u5e94\u529b\u6761\u4ef6\u4e0b\u4ee5\u9aa8\u5438\u6536\u4e3a\u4e3b\uff0c\u957f\u671f\u7684\u4f4e\u5e94\u529b\u53ef\u9020\u6210\u9aa8\u8d28\u758f\u677e\uff0c\u5982\n\n\u4f5c\u7528\u3002\n\n\u4e94\u3001\u2002 \u5173\u8282\n\n\u5173\u8282\u5206\u4e3a\u52a8\u5173\u8282\u548c\u4e0d\u52a8\u5173\u8282\u3002\u52a8\u5173\u8282\u4e3b\u8981\u662f\u6ed1\u819c\u5173\u8282\uff0c\u5373\u4e00\u822c\u6240\u79f0\u7684\u5173\u8282\uff0c\u5206\u5e03\u5e7f\u6cdb\uff0c\u6d3b\u52a8\u5ea6\u5927\uff0c\u5176\u57fa\u672c\u6784\u6210\u5305\u62ec\u5173\u8282\u8f6f\u9aa8\u3001\u5173\u8282\u56ca\u548c\u5173\u8282\u8154\u3002\n\n1. \u5173\u8282\u8f6f\u9aa8\uff08articular cartilage\uff09 \u4e3a\u88ab\u8986\u4e8e\u9aa8\u7aef\u5173\u8282\u9762\u7684\u8584\u5c42\u900f\u660e\u8f6f\u9aa8\uff0c\u5177\u6709\u4e00\u5b9a\u7684\u5f39\u6027\uff0c\u8868\u9762\u5149\u6ed1\uff0c\u6709\u5229\u4e8e\u5173\u8282\u8fd0\u52a8\u3002\u5173\u8282\u8f6f\u9aa8\u4e0e\u4e00\u822c\u7684\u900f\u660e\u8f6f\u9aa8\u6709\u4e00\u5b9a\u7684\u5dee\u5f02\u3002\u4e00\u662f\u540c\u6e90\u7ec6\u80de\u7fa4\u5448\u5355\u884c\u7eb5\u5411\u6392\u5217\uff0c\u65b9\u5411\u4e0e\u8868\u9762\u5782\u76f4\uff1b\u4e8c\u662f\u8f6f\u9aa8\u6df1\u90e8\u4e0e\u9aa8\u7ec4\u7ec7\u76f8\u8fde\uff0c\u6b64\u5904\u7684\u8f6f\u9aa8\u57fa\u8d28\u9499\u5316\uff1b\u4e09\u662f\u57fa\u8d28\u4e2d\u7684\u80f6\u539f\u539f\u7ea4\u7ef4\u5448\u62f1\u5f62\u8d70\u5411\uff0c\u65e2\u6709\u52a0\u56fa\u4f5c\u7528\uff0c\u4e5f\u4e3a\u8f6f\u9aa8\u63d0\u4f9b\u8f83\u5927\u7684\u5e94\u529b\u652f\u6301\uff0c\u4f7f\u5173\u8282\u8f6f\u9aa8\u5177\u6709\u8f83\u5927\u7684\u6297\u538b\u6027\u548c\u4e00\u5b9a\u7684\u5f39\u6027\uff08\u56fe4-14\uff09\u3002\n\n\u56fe4-14\u2003 \u5173\u8282\u8f6f\u9aa8\u7ed3\u6784\u793a\u610f\u56fe\n\n2. \u5173\u8282\u56ca\uff08articular capsule\uff09 \u662f\u5c01\u95ed\u5173\u8282\u8154\u7684\u7ea4\u7ef4\u6027\u7ed3\u7f14\u7ec4\u7ec7\u6784\u6210\u7684\u56ca\u72b6\u7ed3\u6784\u3002\u5173\u8282\u56ca\u5206\u5185\u3001\u5916\u4e24\u5c42\uff0c\u5916\u5c42\u4e3a\u81f4\u5bc6\u7ed3\u7f14\u7ec4\u7ec7\uff0c\u4e0e\u9aa8\u5916\u819c\u8fde\u7eed\uff0c\u53ef\u7ef4\u6301\u5173\u8282\u7684\u7a33\u5b9a\uff1b\u5185\u5c42\u8f83\u758f\u677e\uff0c\u5185\u8868\u9762\u5149\u6ed1\uff0c\u79f0\u4e3a\u6ed1\u819c\uff08synovial membrane\uff09\uff0c\u53ef\u5411\u5173\u8282\u8154\u5185\u7a81\u51fa\u5f62\u6210\u6ed1\u819c\u76b1\u895e\u6216\u7ed2\u6bdb\u3002\u6ed1\u819c\u5185\u5c42\u5e38\u88ab\u89861\uff5e4 \u5c42\u6241\u5e73\u6216\u7acb\u65b9\u5f62\u7684\u4e0a\u76ae\u6837\u7ed3\u7f14\u7ec4\u7ec7\u7ec6\u80de\uff0c\u79f0\u6ed1\u819c\u7ec6\u80de\uff08synovial cell\uff09\u3002\u7535\u955c\u4e0b\uff0c\u6ed1\u819c\u7ec6\u80de\u5206\u4e3a\u4e24\u79cd\uff0c\u4e00\u79cd\u4f3c\u5de8\u566c\u7ec6\u80de...\n\n### \u919b\u56fa\u916e \u2014 \u9009\u81ea\u300a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66\u300b\n\n...\u9178\u6027\u7ec6\u80de\uff0c\u5e76\u968f\u5e74\u9f84\u589e\u957f\u800c\u589e\n\n\u591a\u3002\u7ec6\u80de\u5355\u4e2a\u6216\u6210\u7fa4\u5b58\u5728\u4e8e\u4e3b\u7ec6\u80de\u4e4b\u95f4\u3002\u55dc\u9178\u6027\u7ec6\u80de\u6bd4\u4e3b\u7ec6\u80de\u5927\uff0c\u6838\u8f83\u5c0f\uff0c\u67d3\u8272\u6df1\uff0c\u7ec6\u80de\u8d28\u5448\u5f3a\u55dc\u9178\u6027\u67d3\u8272\uff1b\u7535\u955c\u4e0b\uff0c\u5176\u7ec6\u80de\u8d28\u542b\u4e30\u5bcc\u7684\u7ebf\u7c92\u4f53\u3002\u6b64\u7ec6\u80de\u7684\u529f\u80fd\u4e0d\u660e\u3002\n\n\u4e09\u3001\u2002 \u80be\u4e0a\u817a\n\n\u80be\u4e0a\u817a\uff08adrenal gland\uff09\u8868\u9762\u5305\u4ee5\u7ed3\u7f14\u7ec4\u7ec7\u88ab\u819c\uff0c\u5c11\u91cf\u7ed3\u7f14\u7ec4\u7ec7\u4f34\u968f\u8840\u7ba1\u548c\u795e\u7ecf\u4f38\u5165\u817a\u5b9e\u8d28\u5185\u3002\u80be\u4e0a\u817a\u5b9e\u8d28\u7531\u5468\u8fb9\u7684\u76ae\u8d28\u548c\u4e2d\u592e\u7684\u9ad3\u8d28\u4e24\u90e8\u5206\u6784\u6210\uff08\u56fe13-5\uff09\u3002\n\n\u56fe13-5\u2003 \u80be\u4e0a\u817a\u5149\u955c\u56fe\n\n\uff08\u4e00\uff09\u2002 \u76ae\u8d28\n\n\u76ae\u8d28\u7ea6\u5360\u80be\u4e0a\u817a\u4f53\u79ef\u768480%\uff0c\u7531\u76ae\u8d28\u7ec6\u80de\u3001\u8840\u7aa6\u548c\u5c11\u91cf\u7ed3\u7f14\u7ec4\u7ec7\u7ec4\u6210\u3002\u6839\u636e\u76ae\u8d28\u7ec6\u80de\u7684\u5f62\u6001\u548c\u6392\u5217\u7279\u5f81\uff0c\u53ef\u5c06\u76ae\u8d28\u5206\u4e3a3 \u4e2a\u5e26\uff0c\u5373\u7403\u72b6\u5e26\u3001\u675f\u72b6\u5e26\u548c\u7f51\u72b6\u5e26\uff0c\u4e09\u8005\u95f4\u65e0\u660e\u663e\u754c\u9650\uff08\u56fe13-5\uff09\u3002\n1.\u2002 \u7403\u72b6\u5e26\uff08zona glomerulosa\uff09 \u4f4d\u4e8e\u88ab\u819c\u4e0b\u65b9\uff0c\u8f83\u8584\u3002\u7ec6\u80de\u805a\u96c6\u6210\u8bb8\u591a\u7403\u56e2\uff0c\u7ec6\u80de\u8f83\u5c0f\uff0c\u5448\u9525\u5f62\uff0c\u6838\u5c0f\u67d3\u8272\u6df1\uff0c\u7ec6\u80de\u8d28\u8f83\u5c11\uff0c\u542b\u5c11\u91cf\u8102\u6ef4\u3002\u7403\u72b6\u5e26\u7ec6\u80de\u5206\u6ccc\u76d0\u76ae\u8d28\u6fc0\u7d20\uff08mineralocorticoid\uff09\uff0c\u4e3b\u8981\u662f\u919b\u56fa\u916e\uff08aldosterone\uff09\uff0c\u80fd\u4fc3\u8fdb\u80be\u8fdc\u66f2\u5c0f\u7ba1\u548c\u96c6\u5408\u7ba1\u91cd\u5438\u6536Na + \u53ca\u6392\u51faK +\uff0c\u540c\u65f6\u4e5f\u523a\u6fc0\u80c3\u9ecf\u819c\u5438\u6536Na +\uff0c\u4f7f\u8840Na + \u6d53\u5ea6\u5347\u9ad8\uff0cK + \u6d53\u5ea6\u964d\u4f4e\uff0c\u7ef4\u6301\u8840\u5bb9\u91cf\u4e8e\u6b63\u5e38\u6c34\u5e73\u3002\n\n2. \u675f\u72b6\u5e26\uff08zona fasciculata\uff09 \u662f\u76ae\u8d28\u4e2d\u6700\u539a\u7684\u90e8\u5206\u3002\u675f\u72b6\u5e26\u7ec6\u80de\u8f83\u5927\uff0c\u5448\u591a\u8fb9\u5f62\uff0c\u6392\u5217\u6210\u5355\u884c\u6216\n\n\u6545\u7ec6\u80de\u8d28\u5448\u6ce1\u6cab\u72b6\u6216\u7a7a\u6ce1\u72b6\u800c\u67d3\u8272\u6d45\u3002\u675f\u72b6\u5e26\u7ec6\u80de\u5206\u6ccc\u7cd6\u76ae\u8d28\u6fc0\u7d20\uff08glucocorticoid\uff09\uff0c\u4e3b\u8981\u4e3a\u76ae\u8d28\u9187\uff08cortisol\uff09\u3002\u7cd6\u76ae\u8d28\u6fc0\u7d20\u53ef\u4fc3\u4f7f\u86cb\u767d\u8d28\u53ca\u8102\u80aa\u5206\n\n\u89e3\u5e76\u8f6c\u53d8\u6210\u7cd6\uff0c\u8fd8\u6709\u6291\u5236\u514d\u75ab\u5e94\u7b54\u53ca\u6297\u708e\u75c7\u7b49\n\n\u4f5c\u7528\u3002\n\n3. \u7f51\u72b6\u5e26\uff08zona reticularis\uff09\u4f4d\u4e8e\u76ae\u8d28\n\n\u6700\u5185\u5c42\uff0c\u7ec6\u80de\u7d22\u76f8\u4e92\u543b\u5408\u6210\u7f51\u3002\u7f51\u72b6\u5e26\u7ec6\u80de\u8f83\n\n\u5c0f\uff0c\u6838\u5c0f\u3001\u7740\u8272\u6df1\uff0c
