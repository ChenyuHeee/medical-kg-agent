<script>
const mdContent = "# \u533b\u5b66\u77e5\u8bc6\u6574\u5408\u6559\u6750\n\n> \u7531 Knowledge Nexus \u81ea\u52a8\u751f\u6210\uff0c\u6574\u5408 7 \u672c\u533b\u5b66\u6559\u6750\u7cbe\u534e\u5185\u5bb9\uff0c\u53bb\u91cd\u63d0\u7eaf\u4e3a\u4e00\u4efd\u7cfb\u7edf\u5316\u6559\u6750\u3002\n\n**\u6765\u6e90\u6559\u6750**\uff1a\u5c40\u90e8\u89e3\u5256\u5b66\u3001\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66\u3001\u751f\u7406\u5b66\u3001\u533b\u5b66\u5fae\u751f\u7269\u5b66\u3001\u75c5\u7406\u5b66\u3001\u4f20\u67d3\u75c5\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66\n**\u8986\u76d6\u77e5\u8bc6\u70b9**\uff1a5098\u3000|\u3000**\u5173\u7cfb\u8fb9**\uff1a5872\n\n---\n\n## \u4f7f\u7528\u8bf4\u660e\n\n\u672c\u6587\u6863\u662f AI \u81ea\u52a8\u751f\u6210\u7684\u533b\u5b66\u77e5\u8bc6\u6574\u5408\u6559\u6750\u3002\u6bcf\u4e2a\u7ae0\u8282\u56f4\u7ed5\u4e00\u4e2a\u5b66\u79d1\u4e3b\u9898\uff0c\n\u4ece\u591a\u672c\u6559\u6750\u4e2d\u63d0\u53d6\u76f8\u5173\u77e5\u8bc6\u6bb5\u843d\uff0c\u53bb\u91cd\u5408\u5e76\u540e\u5f62\u6210\u7cfb\u7edf\u5316\u5185\u5bb9\u3002\n\u5404\u77e5\u8bc6\u70b9\u4e4b\u95f4\u6807\u6ce8\u4e86\u524d\u7f6e\u4f9d\u8d56\uff08\u2192 \u9700\u5148\u5b66\uff09\u548c\u5e76\u5217\u5173\u7cfb\uff08\u2248 \u76f8\u5173\u6982\u5ff5\uff09\u3002\n\n---\n\n# \u7ec6\u80de\u4e0e\u7ec4\u7ec7\n\n\u672c\u7ae0\u6db5\u76d6\u5fc3\u529f\u80fd\u4e0d\u5168\u3001\u7ec6\u80de\u5206\u5316\u3001\u52a8\u4f5c\u7535\u4f4d\u3001\u9ad8\u6e17\u6027\u8131\u6c34\u3001\u9759\u606f\u7535\u4f4d\u3001\u5de8\u566c\u7ec6\u80de\u7b49\u6838\u5fc3\u77e5\u8bc6\u70b9\uff0c\u6574\u5408\u81ea7\u672c\u6559\u6750\u76f8\u5173\u5185\u5bb9\u3002\n\n## \u6838\u5fc3\u6982\u5ff5\u4e0e\u5b9a\u4e49\n\n**\u5fc3\u529f\u80fd\u4e0d\u5168**\uff1a\u5fc3\u808c\u7ec6\u80de\u53d7\u7275\u62c9\u800c\u5408\u6210\u91ca\u653eBNP/NT-proBNP\u5165\u8840\uff0c\u8840\u6d46\u542b\u91cf\u5347\u9ad8\u5e76\u4e0e\u5fc3\u529f\u80fd\u5206\u7ea7\u6b63\u76f8\u5173\u7684\u75c5\u7406\u72b6\u6001\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u7ec6\u80de\u5206\u5316**\uff1a\u4ece\u4e13\u4e1a\u5316\u7a0b\u5ea6\u4f4e\u7684\u7ec6\u80de\u7c7b\u578b\u5411\u4e13\u4e1a\u5316\u7a0b\u5ea6\u9ad8\u7684\u7ec6\u80de\u7c7b\u578b\u8f6c\u53d8\u7684\u8fc7\u7a0b\uff0c\u5f62\u6210\u7279\u5b9a\u5f62\u6001\u3001\u7ed3\u6784\u548c\u751f\u7406\u529f\u80fd\u7684\u5b50\u4ee3\u7ec6\u80de\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66  \u2190 \u524d\u7f6e\uff1a\u7ec6\u80de\u547d\u8fd0\u51b3\u5b9a*\n\n**\u52a8\u4f5c\u7535\u4f4d**\uff1a\u7ec6\u80de\u53d1\u751f\u7535\u6d3b\u52a8\u65f6\u819c\u7535\u4f4d\u7684\u5feb\u901f\u53ef\u9006\u53d8\u5316\uff0c\u4ee5\u94a0\u6cf5\u5efa\u7acb\u7684Na+\u548cK+\u8de8\u819c\u6d53\u5ea6\u68af\u5ea6\u4e3a\u57fa\u7840\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66  \u2190 \u524d\u7f6e\uff1a\u9759\u606f\u7535\u4f4d*\n\n**\u9ad8\u6e17\u6027\u8131\u6c34**\uff1a\u5931\u6c34\u591a\u4e8e\u5931\u94a0\uff0c\u8840\u6e05\u94a0\u6d53\u5ea6>150mmol/L\uff0c\u8840\u6d46\u6e17\u900f\u538b>310mOsm/(kg\u00b7H2O)\uff0c\u7ec6\u80de\u5916\u6db2\u548c\u7ec6\u80de\u5185\u6db2\u5747\u51cf\u5c11\uff0c\u53c8\u79f0\u4f4e\u5bb9\u91cf\u6027\u9ad8\u94a0\u8840\u75c7\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u9759\u606f\u7535\u4f4d**\uff1a\u7ec6\u80de\u672a\u53d7\u523a\u6fc0\u65f6\u819c\u5185\u5916\u7684\u7535\u4f4d\u5dee\uff0c\u4e3b\u8981\u53d7\u7ec6\u80de\u5185\u3001\u5916\u6db2K+\u6d53\u5ea6\u6bd4\u503c\u548c\u819c\u5bf9K+\u901a\u900f\u6027\u5f71\u54cd\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66  \u2190 \u524d\u7f6e\uff1a\u52a8\u4f5c\u7535\u4f4d*\n\n**\u5de8\u566c\u7ec6\u80de**\uff1a\u7531\u5355\u6838\u7ec6\u80de\u7a7f\u51fa\u8840\u7ba1\u540e\u5206\u5316\u5f62\u6210\u7684\u7ec8\u672b\u7ec6\u80de\uff0c\u5177\u6709\u5f3a\u5927\u541e\u566c\u80fd\u529b\u548c\u6297\u539f\u5448\u9012\u529f\u80fd\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66\u3001\u751f\u7406\u5b66\u3001\u533b\u5b66\u5fae\u751f\u7269\u5b66*\n\n**\u7ec6\u80de**\uff1a\u6784\u6210\u4eba\u4f53\u6700\u57fa\u672c\u7684\u7ed3\u6784\u548c\u529f\u80fd\u5355\u4f4d\uff0c\u5355\u7ec6\u80de\u751f\u7269\u4f53\u7684\u5168\u90e8\u751f\u547d\u6d3b\u52a8\u53d1\u751f\u5728\u4e00\u4e2a\u7ec6\u80de\u5185\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66\u3001\u751f\u7406\u5b66  \u2190 \u524d\u7f6e\uff1a\u5668\u5b98 \u2192 \u6574\u4f53*\n\n**\u7ec6\u80de\u5916\u6db2**\uff1a\u7ec6\u80de\u5916\u6db2\u4e2d\u9633\u79bb\u5b50\u4e3b\u8981\u662fNa+\uff0c\u9634\u79bb\u5b50\u4e3b\u8981\u662fCl-\uff0c\u7ec4\u7ec7\u95f4\u6db2\u548c\u8840\u6d46\u7684\u7535\u89e3\u8d28\u6210\u5206\u5927\u81f4\u76f8\u7b49\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66  \u2190 \u524d\u7f6e\uff1a\u7ec6\u80de\u819c*\n\n**\u7ec6\u80de\u589e\u6b96**\uff1a\u7ec6\u80de\u589e\u6b96\u662f\u7ec4\u7ec7\u4fee\u590d\u548c\u518d\u751f\u7684\u5173\u952e\u6b65\u9aa4\uff0c\u673a\u4f53\u521b\u4f24\u6108\u5408\u3001\u7ec4\u7ec7\u518d\u751f\u3001\u75c5\u7406\u7ec4\u7ec7\u4fee\u590d\u7b49\u90fd\u8981\u4f9d\u8d56\u7ec6\u80de\u589e\u6b96\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u7ec6\u80de\u5916\u57fa\u8d28**\uff1a\u7ec6\u80de\u4e4b\u95f4\u975e\u7ec6\u80de\u5f62\u6001\u7684\u7269\u8d28\uff0c\u7531\u7ec6\u80de\u4ea7\u751f\uff0c\u53c2\u4e0e\u6784\u6210\u7ec6\u80de\u751f\u5b58\u7684\u5fae\u73af\u5883\uff0c\u8d77\u652f\u6301\u3001\u8054\u7cfb\u3001\u8425\u517b\u548c\u4fdd\u62a4\u7ec6\u80de\u7684\u4f5c\u7528\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66\u3001\u751f\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u4e0a\u76ae\u7ec4\u7ec7**\uff1a\u7531\u5927\u91cf\u5f62\u6001\u89c4\u5219\u3001\u6392\u5217\u5bc6\u96c6\u7684\u4e0a\u76ae\u7ec6\u80de\u548c\u6781\u5c11\u91cf\u7684\u7ec6\u80de\u5916\u57fa\u8d28\u7ec4\u6210\uff0c\u5177\u6709\u6781\u6027\uff0c\u57fa\u5e95\u9762\u9644\u7740\u4e8e\u57fa\u819c\uff0c\u65e0\u8840\u7ba1\uff0c\u6709\u4e30\u5bcc\u611f\u89c9\u795e\u7ecf\u672b\u68a2\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66*\n\n**\u4f53\u6db2\u8c03\u8282**\uff1a\u4f53\u5185\u4ea7\u751f\u7684\u67d0\u4e9b\u7279\u6b8a\u7684\u5316\u5b66\u7269\u8d28\uff0c\u901a\u8fc7\u4f53\u6db2\u9014\u5f84\u5230\u8fbe\u5e76\u4f5c\u7528\u4e8e\u9776\u7ec6\u80de\u800c\u5f71\u54cd\u5176\u751f\u7406\u6d3b\u52a8\u7684\u4e00\u79cd\u8c03\u8282\u65b9\u5f0f\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**\u7ec4\u7ec7\u6027\u7f3a\u6c27**\uff1a\u5728\u7ec4\u7ec7\u4f9b\u6c27\u6b63\u5e38\u7684\u60c5\u51b5\u4e0b\uff0c\u56e0\u7ec4\u7ec7\u3001\u7ec6\u80de\u6c27\u5229\u7528\u969c\u788d\uff0c\u5f15\u8d77ATP\u751f\u6210\u51cf\u5c11\u7684\u73b0\u8c61\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u795e\u7ecf\u80f6\u8d28\u7ec6\u80de**\uff1a\u5206\u5e03\u5728\u89c6\u7f51\u819c\u4e2d\u7684\u652f\u6301\u7ec6\u80de\uff0c\u5305\u62ec\u653e\u5c04\u72b6\u80f6\u8d28\u7ec6\u80de\u3001\u661f\u5f62\u80f6\u8d28\u7ec6\u80de\u548c\u5c0f\u80f6\u8d28\u7ec6\u80de\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66\u3001\u751f\u7406\u5b66*\n\n**\u5185\u73af\u5883**\uff1a\u7ec6\u80de\u5916\u6db2\u6784\u6210\u7684\u4eba\u4f53\u5185\u73af\u5883\uff0c\u662f\u6c9f\u901a\u7ec4\u7ec7\u7ec6\u80de\u4e4b\u95f4\u4ee5\u53ca\u673a\u4f53\u4e0e\u5916\u754c\u73af\u5883\u4e4b\u95f4\u7684\u5a92\u4ecb\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u7ec6\u80de\u6b7b\u4ea1**\uff1a\u7ec6\u80de\u505c\u6b62\u529f\u80fd\u6d3b\u52a8\u7684\u8fc7\u7a0b\uff0c\u53ef\u56e0\u5404\u79cd\u539f\u56e0\u4ee5\u4e0d\u540c\u65b9\u5f0f\u53d1\u751f\uff0c\u6b63\u5e38\u7ec4\u7ec7\u4e2d\u5b58\u5728\uff0c\u4e5f\u53c2\u4e0e\u75be\u75c5\u53d1\u751f\u53d1\u5c55\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66  \u2190 \u524d\u7f6e\uff1a\u79bb\u5b50\u5931\u8861*\n\n**\u5e15\u91d1\u68ee\u75c5**\uff1a\u6700\u5e38\u89c1\u7684\u795e\u7ecf\u9000\u884c\u6027\u75be\u75c5\u4e4b\u4e00\uff0c\u795e\u7ecf\u7cfb\u7edf\u4e0d\u540c\u7ec6\u80de\u7684\u8870\u8001\u662f\u5176\u53d1\u75c5\u57fa\u7840\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u7ec6\u80de\u5468\u671f**\uff1a\u7ec6\u80de\u4ece\u524d\u4e00\u6b21\u5206\u88c2\u7ed3\u675f\u5230\u4e0b\u4e00\u6b21\u5206\u88c2\u5b8c\u6210\u7684\u52a8\u6001\u8fc7\u7a0b\uff0c\u5206\u4e3aG1\u671f\u3001S\u671f\u3001G2\u671f\u53caM\u671f\u56db\u4e2a\u8fde\u7eed\u65f6\u6bb5\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u8870\u8001**\uff1a\u673a\u4f53\u4ece\u6784\u6210\u7269\u8d28\u3001\u7ec4\u7ec7\u5f62\u6001\u7ed3\u6784\u7684\u6539\u53d8\u5230\u751f\u7406\u529f\u80fd\u9010\u6e10\u9000\u5316\u4e27\u5931\u7684\u8fc7\u7a0b\uff0c\u4e5f\u662f\u673a\u4f53\u5bf9\u73af\u5883\u7684\u9002\u5e94\u80fd\u529b\u8fdb\u884c\u6027\u964d\u4f4e\u3001\u9010\u6e10\u8d8b\u5411\u6b7b\u4ea1\u7684\u73b0\u8c61\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u78b3\u9178\u9150\u9176**\uff1a\u80be\u5c0f\u7ba1\u7ec6\u80de\u5185\u5bcc\u542b\u7684\u9176\uff0c\u50ac\u5316H2O\u548cCO2\u751f\u6210H2CO3\uff0c\u8fdb\u800c\u89e3\u79bb\u51faH+\u548cHCO3-\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66  \u2190 \u524d\u7f6e\uff1a\u4e2d\u67a2\u5316\u5b66\u611f\u53d7\u5668*\n\n**\u7ec6\u80de\u819c**\uff1a\u5206\u9694\u7ec6\u80de\u8d28\u4e0e\u7ec6\u80de\u5468\u56f4\u73af\u5883\u7684\u4e00\u5c42\u819c\u7ed3\u6784\uff0c\u539a\u5ea67\uff5e8nm\uff0c\u4e3b\u8981\u7531\u8102\u8d28\u3001\u86cb\u767d\u8d28\u53ca\u5c11\u91cf\u7cd6\u7c7b\u7ec4\u6210\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66\u3001\u533b\u5b66\u5fae\u751f\u7269\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u81ea\u566c**\uff1a\u7ec6\u80de\u5185\u53cc\u5c42\u819c\u7ed3\u6784\u5305\u88f9\u80de\u8d28\u6210\u5206\u6216\u5916\u6765\u5f02\u7269\u5f62\u6210\u81ea\u566c\u4f53\uff0c\u4e0e\u6eb6\u9176\u4f53\u878d\u5408\u540e\u964d\u89e3\u5185\u5bb9\u7269\u7684\u8fc7\u7a0b\u3002\n*\u6765\u6e90\uff1a\u533b\u5b66\u5fae\u751f\u7269\u5b66\u3001\u75c5\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u6ee4\u6ce1\u65c1\u7ec6\u80de**\uff1a\u6ee4\u6ce1\u65c1\u7ec6\u80de\u662f\u7532\u72b6\u817a\u5185\u7684\u4e00\u79cd\u5185\u5206\u6ccc\u7ec6\u80de\uff0c\u5206\u6ccc\u964d\u9499\u7d20\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u76f8\u5dee\u663e\u5fae\u955c**\uff1a\u53ef\u5c06\u6d3b\u7ec6\u80de\u4e0d\u540c\u539a\u5ea6\u53ca\u7ec6\u80de\u5185\u5404\u79cd\u7ed3\u6784\u5bf9\u5149\u4ea7\u751f\u7684\u4e0d\u540c\u6298\u5c04\u8f6c\u6362\u4e3a\u5149\u5bc6\u5ea6\u5dee\u5f02\uff0c\u4f7f\u955c\u4e0b\u7ed3\u6784\u53cd\u5dee\u660e\u663e\u3001\u5f71\u50cf\u6e05\u6670\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66\u3001\u533b\u5b66\u5fae\u751f\u7269\u5b66*\n\n**\u5668\u5b98**\uff1a\u5728\u80da\u80ce\u53d1\u80b2\u65e9\u671f\u7531\u51e0\u79cd\u4e0d\u540c\u7ec4\u7ec7\u53d1\u80b2\u5206\u5316\u548c\u6709\u673a\u7ed3\u5408\u5f62\u6210\uff0c\u5728\u673a\u4f53\u5185\u6267\u884c\u6bd4\u7ec4\u7ec7\u66f4\u590d\u6742\u7684\u751f\u7406\u529f\u80fd\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66\u3001\u751f\u7406\u5b66*\n\n**\u7ec4\u7ec7\u5b66**\uff1a\u7814\u7a76\u6b63\u5e38\u673a\u4f53\u5fae\u7ec6\u7ed3\u6784\u53ca\u5176\u76f8\u5173\u529f\u80fd\u7684\u5b66\u79d1\uff0c\u7814\u7a76\u5185\u5bb9\u5305\u62ec\u7ec6\u80de\u3001\u7ec4\u7ec7\u3001\u5668\u5b98\u548c\u7cfb\u7edf\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66*\n\n**\u795e\u7ecf\u7ec4\u7ec7**\uff1a\u56db\u79cd\u57fa\u672c\u7ec4\u7ec7\u4e4b\u4e00\uff0c\u5728\u673a\u4f53\u4e2d\u6709\u4e00\u5b9a\u7684\u5206\u5e03\u89c4\u5f8b\uff0c\u6267\u884c\u4e00\u5b9a\u7684\u751f\u7406\u529f\u80fd\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66*\n\n**\u81ea\u8eab\u8c03\u8282**\uff1a\u67d0\u4e9b\u7ec6\u80de\u6216\u7ec4\u7ec7\u5668\u5b98\u51ed\u501f\u672c\u8eab\u5185\u5728\u7279\u6027\uff0c\u4e0d\u4f9d\u8d56\u795e\u7ecf\u548c\u4f53\u6db2\u8c03\u8282\uff0c\u5bf9\u5185\u73af\u5883\u53d8\u5316\u4ea7\u751f\u7279\u5b9a\u9002\u5e94\u6027\u53cd\u5e94\u7684\u8fc7\u7a0b\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**\u7535\u538b\u95e8\u63a7\u901a\u9053**\uff1a\u901a\u9053\u86cb\u767d\u5206\u5b50\u5185\u5e26\u7535\u5316\u5b66\u57fa\u56e2\u79fb\u52a8\u5f15\u8d77\u6784\u8c61\u53d8\u5316\u548c\u95f8\u95e8\u5f00\u653e\uff0c\u5982\u795e\u7ecf\u7ec6\u80de\u8f74\u7a81\u819c\u4e2d\u7684\u7535\u538b\u95e8\u63a7\u94a0\u901a\u9053\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**\u58c1\u78f7\u58c1\u9178**\uff1a\u78f7\u58c1\u9178\u7684\u4e00\u79cd\uff0c\u4e00\u7aef\u901a\u8fc7\u78f7\u8102\u4e0e\u80bd\u805a\u7cd6\u4e0a\u7684\u80de\u58c1\u9178\u5171\u4ef7\u7ed3\u5408\uff0c\u53e6\u4e00\u7aef\u4f38\u51fa\u7ec6\u80de\u58c1\u6e38\u79bb\u4e8e\u5916\u3002\n*\u6765\u6e90\uff1a\u533b\u5b66\u5fae\u751f\u7269\u5b66*\n\n**\u6025\u6027\u65e9\u5e7c\u7c92\u7ec6\u80de\u767d\u8840\u75c5**\uff1a95%\u5b58\u5728\u67d3\u8272\u4f53\u6613\u4f4dt(15;17)\uff0c\u5bfc\u81f4PML\u57fa\u56e0\u4e0eRARA\u57fa\u56e0\u4ea4\u4e92\u6613\u4f4d\uff0c\u8868\u8fbePML-RAR\u03b1\u86cb\u767d\uff0c\u9020\u6210\u9020\u8840\u7ec6\u80de\u5206\u5316\u53d7\u963b\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**TNF**\uff1a\u4e00\u79cd\u7ec6\u80de\u56e0\u5b50\uff0cHIV\u611f\u67d3\u540e\u589e\u591a\uff0c\u901a\u8fc7\u4e0eTNF\u53d7\u4f53\u7ed3\u5408\u542f\u52a8\u6b7b\u4ea1\u53d7\u4f53\u901a\u8def\u8bf1\u5bfc\u7ec6\u80de\u51cb\u4ea1\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u7ec6\u80de\u5185\u6db2**\uff1a\u4f4e\u6e17\u6027\u8131\u6c34\u65f6\u6c34\u5411\u7ec6\u80de\u5185\u8f6c\u79fb\uff0c\u5f15\u8d77\u7ec6\u80de\u80bf\u80c0\uff0c\u53ef\u5bfc\u81f4\u7ec6\u80de\u529f\u80fd\u548c\u4ee3\u8c22\u969c\u788d\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**AQP3**\uff1a\u6c34\u901a\u9053\u86cb\u767d3\uff0c\u5b58\u5728\u4e8e\u96c6\u5408\u7ba1\u4e3b\u7ec6\u80de\u57fa\u5e95\u819c\uff0c\u53c2\u4e0e\u6c34\u8f6c\u8fd0\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b6 4e0e\u80da\u80ce\u5b66*\n\n**\u80da\u6ce1**\uff1a\u53d7\u7cbe\u5375\u7ecf\u8fc7\u5375\u88c2\u5f62\u6210\u7684\u56ca\u6ce1\u72b6\u7ed3\u6784\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66  \u2190 \u524d\u7f6e\uff1a\u690d\u5165*\n\n**\u5375\u88c2**\uff1a\u53d7\u7cbe\u5375\u65e9\u671f\u8fdb\u884c\u7684\u5feb\u901f\u6709\u4e1d\u5206\u88c2\u8fc7\u7a0b\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66  \u2190 \u524d\u7f6e\uff1a\u80da\u6ce1*\n\n**\u690d\u5165**\uff1a\u80da\u6ce1\u57cb\u5165\u5b50\u5bab\u5185\u819c\u7684\u8fc7\u7a0b\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66  \u2190 \u524d\u7f6e\uff1a\u80da\u6ce1*\n\n**\u80ce\u819c**\uff1a\u80ce\u819c\u662f\u80da\u80ce\u53d1\u80b2\u8fc7\u7a0b\u4e2d\u5f62\u6210\u7684\u9644\u5c5e\u7ed3\u6784\uff0c\u5305\u62ec\u7ed2\u6bdb\u819c\u3001\u7f8a\u819c\u3001\u5375\u9ec4\u56ca\u3001\u5c3f\u56ca\u548c\u8110\u5e26\u7b49\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66*\n\n**\u80ce\u76d8**\uff1a\u80ce\u76d8\u662f\u80ce\u513f\u4e0e\u6bcd\u4f53\u4e4b\u95f4\u8fdb\u884c\u7269\u8d28\u4ea4\u6362\u7684\u91cd\u8981\u5668\u5b98\uff0c\u7531\u80ce\u513f\u7684\u4e1b\u5bc6\u7ed2\u6bdb\u819c\u548c\u6bcd\u4f53\u7684\u57fa\u8715\u819c\u5171\u540c\u7ec4\u6210\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66*\n\n**\u5927\u8111\u76ae\u8d28\u7684\u7ec4\u7ec7\u53d1\u751f**\uff1a\u5927\u8111\u76ae\u8d28\u4ece\u795e\u7ecf\u4e0a\u76ae\u7ec6\u80de\u5206\u5316\u5f62\u6210\u7684\u8fc7\u7a0b\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66*\n\n**\u808c\u7ec6\u80de**\uff1a\u6784\u6210\u808c\u7ec4\u7ec7\u7684\u7ec6\u80de\uff0c\u5f62\u6001\u7ec6\u957f\uff0c\u542b\u6709\u5927\u91cf\u7eb5\u884c\u808c\u4e1d\uff0c\u662f\u6536\u7f29\u7684\u7269\u8d28\u57fa\u7840\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66*\n\n**HE\u67d3\u8272**\uff1a\u82cf\u6728\u7cbe-\u4f0a\u7ea2\u67d3\u8272\uff0c\u662f\u6700\u5e38\u7528\u7684\u7ec4\u7ec7\u5b66\u67d3\u8272\u65b9\u6cd5\uff0c\u82cf\u6728\u7cbe\u5c06\u7ec6\u80de\u6838\u67d3\u6210\u84dd\u7d2b\u8272\uff0c\u4f0a\u7ea2\u5c06\u7ec6\u80de\u8d28\u67d3\u6210\u7ea2\u8272\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66*\n\n**\u55dc\u78b1\u6027**\uff1a\u5bf9\u78b1\u6027\u67d3\u6599\u4eb2\u548c\u529b\u5f3a\u7684\u7279\u6027\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66*\n\n**\u57fa\u672c\u7ec4\u7ec7**\uff1a\u5305\u62ec\u4e0a\u76ae\u7ec4\u7ec7\u3001\u7ed3\u7f14\u7ec4\u7ec7\u3001\u808c\u7ec4\u7ec7\u548c\u795e\u7ecf\u7ec4\u7ec7\u56db\u79cd\uff0c\u662f\u7ec4\u7ec7\u7684\u57fa\u672c\u5206\u7c7b\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66*\n\n**\u808c\u7ec4\u7ec7**\uff1a\u56db\u79cd\u57fa\u672c\u7ec4\u7ec7\u4e4b\u4e00\uff0c\u5728\u673a\u4f53\u4e2d\u6709\u4e00\u5b9a\u7684\u5206\u5e03\u89c4\u5f8b\uff0c\u6267\u884c\u4e00\u5b9a\u7684\u751f\u7406\u529f\u80fd\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66*\n\n**\u5355\u6838\u7ec6\u80de**\uff1a\u8840\u6db2\u4e2d\u7684\u4e00\u79cd\u767d\u7ec6\u80de\uff0c\u53ef\u7a7f\u51fa\u8840\u7ba1\u5e76\u5206\u5316\u4e3a\u5de8\u566c\u7ec6\u80de\u7b49\u541e\u566c\u7ec6\u80de\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66  \u2190 \u524d\u7f6e\uff1a\u5de8\u566c\u7ec6\u80de*\n\n**\u65bd\u4e07\u7ec6\u80de**\uff1a\u5468\u56f4\u795e\u7ecf\u7ea4\u7ef4\u5916\u7684\u7ec6\u80de\uff0c\u635f\u4f24\u540e\u589e\u6b96\u5f62\u6210\u7ec6\u80de\u6865\u548c\u7ec6\u80de\u7d22\uff0c\u5f15\u5bfc\u8f74\u7a81\u518d\u751f\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66*\n\n**\u80f8\u817a**\uff1a\u4e2d\u67a2\u6dcb\u5df4\u5668\u5b98\u4e4b\u4e00\uff0c\u662fT\u6dcb\u5df4\u7ec6\u80de\u53d1\u80b2\u548c\u6210\u719f\u7684\u4e3b\u8981\u573a\u6240\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66*\n\n**\u80f8\u817a\u5c0f\u53f6**\uff1a\u80f8\u817a\u5b9e\u8d28\u88ab\u5c0f\u53f6\u95f4\u9694\u5206\u9694\u6210\u7684\u4e0d\u5b8c\u5168\u5206\u79bb\u7684\u7ed3\u6784\u5355\u4f4d\uff0c\u5305\u542b\u76ae\u8d28\u548c\u9ad3\u8d28\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66*\n\n**\u653e\u5c04\u72b6\u80f6\u8d28\u7ec6\u80de**\uff1a\u53c8\u79f0\u7c73\u52d2\u7ec6\u80de\uff0c\u4e3a\u89c6\u7f51\u819c\u7279\u6709\u7684\u80f6\u8d28\u7ec6\u80de\uff0c\u72ed\u957f\u5f62\uff0c\u8d2f\u7a7f\u795e\u7ecf\u5c42\uff0c\u5177\u6709\u8425\u517b\u3001\u652f\u6301\u3001\u7edd\u7f18\u548c\u4fdd\u62a4\u4f5c\u7528\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66*\n\n**\u8de8\u7ec6\u80de\u819c\u7684\u7269\u8d28\u8f6c\u8fd0**\uff1a\u7ec6\u80de\u819c\u9009\u62e9\u6027\u5730\u8fdb\u884c\u7269\u8d28\u8f6c\u8fd0\u4ee5\u6ee1\u8db3\u7ec6\u80de\u6b63\u5e38\u751f\u547d\u6d3b\u52a8\u7684\u8fc7\u7a0b\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**\u7ea2\u7ec6\u80de\u751f\u7406**\uff1a\u7814\u7a76\u7ea2\u7ec6\u80de\u7684\u751f\u6210\u3001\u7ed3\u6784\u3001\u529f\u80fd\u53ca\u5176\u8c03\u8282\u7684\u751f\u7406\u5b66\u5185\u5bb9\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**\u7ec4\u7ec7\u6362\u6c14**\uff1a\u7ec4\u7ec7\u7ec6\u80de\u4e0e\u6bdb\u7ec6\u8840\u7ba1\u8840\u6db2\u4e4b\u95f4\u7684\u6c14\u4f53\u4ea4\u6362\u8fc7\u7a0b\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**\u523a\u6fc0**\uff1a\u673a\u4f53\u6216\u7ec6\u80de\u63a5\u53d7\u7684\u73af\u5883\u53d8\u5316\uff0c\u5f15\u8d77\u53cd\u5e94\u7684\u6761\u4ef6\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**\u53cd\u5e94**\uff1a\u673a\u4f53\u6216\u7ec6\u80de\u63a5\u53d7\u523a\u6fc0\u540e\u8868\u73b0\u51fa\u7684\u6d3b\u52a8\u53d8\u5316\u5f62\u5f0f\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66  \u2190 \u524d\u7f6e\uff1a\u523a\u6fc0*\n\n**\u5fae\u89c2\u7814\u7a76**\uff1a\u4ece\u5206\u5b50\u3001\u7ec6\u80de\u7b49\u5fae\u89c2\u5c42\u6b21\u8fdb\u884c\u7684\u7814\u7a76\uff0c\u9700\u4e0e\u5b8f\u89c2\u7814\u7a76\u7ed3\u5408\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**\u79bb\u5b50\u901a\u9053**\uff1a\u7ec6\u80de\u819c\u4e2d\u5b58\u5728\u7684\u5141\u8bb8\u7279\u5b9a\u79bb\u5b50\u987a\u6d53\u5ea6\u68af\u5ea6\u8de8\u819c\u8f6c\u8fd0\u7684\u86cb\u767d\u8d28\u901a\u9053\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**\u94a0-\u94be\u6cf5**\uff1a\u54fa\u4e73\u52a8\u7269\u7ec6\u80de\u819c\u4e2d\u666e\u904d\u5b58\u5728\u7684\u79bb\u5b50\u6cf5\uff0c\u7531\u03b1\u548c\u03b2\u4e24\u4e2a\u4e9a\u5355\u4f4d\u7ec4\u6210\uff0c\u5177\u6709\u94a0-\u94be\u4f9d\u8d56\u5f0fATP\u9176\u6d3b\u6027\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**E1\u6784\u8c61**\uff1a\u03b1\u4e9a\u5355\u4f4d\u4e0eATP\u7ed3\u5408\u65f6\u7684\u6784\u8c61\uff0c\u5bf9K+\u4eb2\u548c\u529b\u8f83\u4f4e\u800c\u5bf9Na+\u4eb2\u548c\u529b\u8f83\u9ad8\uff0c\u4f7fK+\u91ca\u653e\u5230\u7ec6\u80de\u5185\u5e76\u4e0eNa+\u7ed3\u5408\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**\u8d28\u5b50\u6cf5**\uff1a\u4eba\u4f53\u5185\u6709\u4e24\u79cd\u91cd\u8981\u7684\u8d28\u5b50\u6cf5\uff0c\u5305\u62ec\u80c3\u817a\u58c1\u7ec6\u80de\u548c\u80be\u810f\u96c6\u5408\u7ba1\u95f0\u7ec6\u80de\u9876\u7aef\u819c\u4e0a\u7684H+,K+-ATP\u9176\u4ee5\u53ca\u5206\u5e03\u4e8e\u5404\u79cd\u7ec6\u80de\u5668\u819c\u4e2d\u7684\u8d28\u5b50\u6cf5\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**\u5165\u80de**\uff1a\u7ec6\u80de\u5916\u5927\u5206\u5b50\u7269\u8d28\u6216\u7269\u8d28\u56e2\u5757\u88ab\u7ec6\u80de\u819c\u5305\u88f9\u540e\u4ee5\u56ca\u6ce1\u5f62\u5f0f\u8fdb\u5165\u7ec6\u80de\u7684\u8fc7\u7a0b\uff0c\u4e5f\u79f0\u5185\u5316\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**\u8de8\u819c\u4fe1\u53f7\u8f6c\u5bfc**\uff1a\u751f\u7269\u6d3b\u6027\u7269\u8d28\u901a\u8fc7\u53d7\u4f53\u6216\u79bb\u5b50\u901a\u9053\u7684\u4f5c\u7528\u800c\u6fc0\u6d3b\u6216\u6291\u5236\u7ec6\u80de\u529f\u80fd\u7684\u8fc7\u7a0b\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**\u5185\u5411\u7535\u6d41**\uff1a\u5e26\u6b63\u7535\u79bb\u5b50\u6d41\u5165\u7ec6\u80de\u5f62\u6210\u7684\u7535\u6d41\uff0c\u5728\u56fe\u4e2d\u8868\u73b0\u4e3a\u5411\u4e0b\u7684\u7535\u6d41\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**\u9020\u8840\u5e72\u7ec6\u80de**\uff1a\u813e\u96c6\u843d\ 98\u5e93\u3001\u865a\u62df\u4eff\u771f\u548c\u4eba\u5de5\u667a\u80fd\u7b49\u6df1\u5ea6\u878d\u5408\u7684\u7acb\u4f53\u5316\u6559\u6750\u683c\u5c40\u3002\u8fd9\u5957\u6559\u6750\u4e3a\u6211\u56fd\u5343\u767e\u4e07\u533b\u5b66\u751f\u7684\u57f9\u517b\u548c\u6210\u624d\u63d0\u4f9b\u4e86\u6839\u672c\u4fdd\u969c\uff0c\u4e3a\u6211\u56fd\u57f9\u517b\u4e86\u4e00\u4ee3\u53c8\u4e00\u4ee3\u9ad8\u6c34\u5e73\u3001\u9ad8\u7d20\u8d28\u7684\u5408\u683c\u533b\u5b66\u4eba\u624d\uff0c\u4e3a\u63a8\u52a8\u6211\u56fd\u533b\u7597\u536b\u751f\u4e8b\u4e1a\u7684\u6539\u9769\u548c\u53d1\u5c55\u4f5c\u51fa\u4e86\u5386\u53f2\u6027\u5de8\u5927\u8d21\u732e\uff0c\u5e76\u901a\u8fc7\u6559\u6750\u7684\u521b\u65b0\u5efa\u8bbe\u548c\u9ad8\u8d28\u91cf\u53d1\u5c55\uff0c\u63a8\u52a8\u4e86\u6211\u56fd\u9ad8\u7b49\u533b\u5b66\u672c\u79d1\u6559\u80b2\u7684\u6539\u9769\u548c\u53d1\u5c55\uff0c\u4fc3\u8fdb\u4e86\u6211\u56fd\u533b\u836f\u5b66\u76f8\u5173\u5b66\u79d1\u6216\u9886\u57df\u7684\u6559\u6750\u5efa\u8bbe\u548c\u6559\u80b2\u53d1\u5c55\uff0c\u8d70\u51fa\u4e86\u4e00\u6761\u9002\u5408\u4e2d\u56fd\u533b\u836f\u5b66\u6559\u80b2\u548c\u536b\u751f\u4e8b\u4e1a\u53d1\u5c55\u5b9e\u9645\u7684\u5177\u6709\u4e2d\u56fd\u7279\u8272\u533b\u836f\u5b66\u6559\u6750\u5efa\u8bbe\u548c\u53d1\u5c55\u7684\u9053\u8def\uff0c\u521b\u5efa\u4e86\u4e2d\u56fd\u7279\u8272\u533b\u836f\u5b66\u6559\u80b2\u6559\u6750\u5efa\u8bbe\u6a21\u5f0f\u3002\u8001\u4e00\u8f88\u533b\u5b66\u6559\u80b2\u5bb6\u548c\u79d1\u5b66\u5bb6\u4eec\u4eb2\u5207\u5730\u79f0\u8fd9\u5957\u6559\u6750\u662f\u4e2d\u56fd\u533b\u5b66\u6559\u80b2\u7684\u201c\u5e72\u7ec6\u80de\u201d\u6559\u6750\u3002\n\n\u672c\u5957\u7b2c\u5341\u8f6e\u6559\u6750\u4fee\u8ba2\u542f\u52a8\u4e4b\u65f6\uff0c\u6b63\u662f\u5168\u515a\u4e0a\u4e0b\u6df1\u5165\u5b66\u4e60\u8d2f\u5f7b\u515a\u7684\u4e8c\u5341\u5927\u7cbe\u795e\u4e4b\u9645\u3002\u515a\u7684\u4e8c\u5341\u5927\u62a5\u544a\u9996\u6b21\u63d0\u51fa\u8981\u201c\u52a0\u5f3a\u6559\u6750\u5efa\u8bbe\u548c\u7ba1\u7406\u201d\uff0c\u8868\u660e\u4e86\u6559\u6750\u5efa\u8bbe\u662f\u56fd\u5bb6\u4e8b\u6743\u7684\u91cd\u8981\u5c5e\u6027\uff0c\u4f53\u73b0\u4e86\u4ee5\u4e60\u8fd1\u5e73\u540c\u5fd7\u4e3a\u6838\u5fc3\u7684\u515a\u4e2d\u592e\u5bf9\u6559\u6750\u5de5\u4f5c\u7684\u9ad8\u5ea6\u91cd\u89c6\u548c\u5bf9\u201c\u5c3a\u5bf8\u8bfe\u672c\u3001\u56fd\u4e4b\u5927\u8005\u201d\u7684\u6bb7\u5207\u671f\u671b\u3002\u7b2c\u5341\u8f6e\u6559\u6750\u7684\u4fee\u8ba2\u59cb\u7ec8\u575a\u6301\u5c06\u8d2f\u5f7b\u843d\u5b9e\u4e60\u8fd1\u5e73\u65b0\u65f6\u4ee3\u4e2d\u56fd\u7279\u8272\u793e\u4f1a\u4e3b\u4e49\u601d\u60f3\u548c\u515a\u7684\u4e8c\u5341\u5927\u7cbe\u795e\u8fdb\u6559\u6750\u4f5c\u4e3a\u9996\u8981\u4efb\u52a1\u3002\u540c\u65f6\u4ee5\u9ad8\u5ea6\u7684\u653f\u6cbb\u8d23\u4efb\u611f\u3001\u4f7f\u547d\u611f\u548c\u7d27\u8feb\u611f\uff0c\u4e0e\u5168\u4f53\u6559\u6750\u7f16\u8005\u5171\u540c\u628a\u6253\u9020\u7cbe\u54c1\u843d\u5b9e\u5230\u6bcf\u4e00\u672c\u6559\u6750\u3001\u6bcf\u4e00\u5e45\u63d2\u56fe\u3001\u6bcf\u4e00\u4e2a\u77e5\u8bc6\u70b9\uff0c\u4e0e\u5168\u56fd\u9662\u6821\u5171\u540c\u5c06\u6559\u6750\u5ba1\u6838\u628a\u5173\u8d2f\u7a7f\u5230\u7f16\u3001\u5ba1\u3001\u51fa\u3001\u4fee\u3001\u9009\u3001\u7528\u7684\u6bcf\u4e00\u4e2a\u73af\u8282\u3002\n\n\u672c\u8f6e\u6559\u6750\u4fee\u8ba2\u5168\u9762\u8d2f\u5f7b\u515a\u7684\u6559\u80b2\u65b9\u9488\uff0c\u5168\u9762\u8d2f\u5f7b\u843d\u5b9e\u5168\u56fd\u9ad8\u6821\u601d\u60f3\u653f\u6cbb\u5de5\u4f5c\u4f1a\u8bae\u7cbe\u795e\u3001\u5168\u56fd\u533b\u5b66\u6559\u80b2\u6539\u9769\u53d1\u5c55\u5de5\u4f5c\u4f1a\u8bae\u7cbe\u795e\u3001\u9996\u5c4a\u5168\u56fd\u6559\u6750\u5de5\u4f5c\u4f1a\u8bae\u7cbe\u795e\uff0c\u4ee5\u53ca\u300a\u56fd\u52a1\u9662\u529e\u516c\u5385\u5173\u4e8e\u6df1\u5316\u533b\u6559\u534f\u540c\u8fdb\u4e00\u6b65\u63a8\u8fdb\u533b\u5b66\u6559\u80b2\u6539\u9769\u4e0e\u53d1\u5c55\u7684\u610f\u89c1\u300b\uff08\u56fd\u529e\u53d1\u30142017\u301563 \u53f7\uff09\u4e0e\u300a\u56fd\u52a1\u9662\u529e\u516c\u5385\u5173\u4e8e\u52a0\u5feb\u533b\u5b66\u6559\u80b2\u521b\u65b0\u53d1\u5c55\u7684\u6307\u5bfc\u610f\u89c1\u300b\uff08\u56fd\u529e\u53d1\u30142020\u301534 \u53f7\uff09\u5bf9\u6df1\u5316\u533b\u5b66\u6559\u80b2\u673a\u5236\u4f53\u5236\u6539\u9769\u7684\u8981\u6c42\u3002\u8ba4\u771f\u8d2f\u5f7b\u6267\u884c\u300a\u666e\u901a\u9ad8\u7b49\u5b66\u6821\u6559\u6750\u7ba1\u7406\u529e\u6cd5\u300b\uff0c\u52a0\u5f3a\u6559\u6750\u5efa\u8bbe\u548c\u7ba1\u7406\uff0c\u63a8\u8fdb\u6559\u80b2\u6570\u5b57\u5316\uff0c\u901a\u8fc7\u7b2c\u5341\u8f6e\u89c4\u5212\u6559\u6750\u7684\u5168\u9762\u4fee\u8ba2\uff0c\u6253\u9020\u65b0\u4e00\u8f6e\u9ad8\u8d28\u91cf\u65b0\u5f62\u6001\u6559\u6750\uff0c\u4e0d\u65ad\u62d3\u5c55\u65b0\u9886\u57df\u3001\u5efa\u8bbe\u65b0\u8d5b\u9053\u3001\u6fc0\u53d1\u65b0\u52a8\u80fd\u3001\u5f62\u6210\u65b0\u4f18\u52bf\u3002\n\n\u5176\u4fee\u8ba2\u548c\u7f16\u5199\u7279\u70b9\u5982\u4e0b\uff1a\n\n1. \u575a\u6301\u6559\u6750\u7acb\u5fb7\u6811\u4eba\u8bfe\u7a0b\u601d\u653f\u2003 \u8ba4\u771f\u8d2f\u5f7b\u843d\u5b9e\u6559\u80b2\u90e8\u300a\u9ad8\u7b49\u5b66\u6821\u8bfe\u7a0b\u601d\u653f\u5efa\u8bbe\u6307\u5bfc\u7eb2\u8981\u300b\uff0c\u4ee5\u6559\u6750\u601d\u653f\u660e\u786e\u57f9\u517b\u4ec0\u4e48\u4eba\u3001\u600e\u6837\u57f9\u517b\u4eba\u3001\u4e3a\u8c01\u57f9\u517b\u4eba\u7684\u6839\u672c\u95ee\u9898\uff0c\u843d\u5b9e\u7acb\u5fb7\u6811\u4eba\u7684\u6839\u672c\u4efb\u52a1\uff0c\u79ef\u6781\u63a8\u8fdb\u4e60\u8fd1\u5e73\u65b0\u65f6\u4ee3\u4e2d\u56fd\u7279\u8272\u793e\u4f1a\u4e3b\u4e49\u601d\u60f3\u8fdb\u6559\u6750\u8fdb\u8bfe\u5802\u8fdb\u5934\u8111\uff0c\u575a\u6301\u4e0d\u61c8\u7528\u4e60\u8fd1\u5e73\u65b0\u65f6\u4ee3\u4e2d\u56fd\u7279\u8272\u793e\u4f1a\u4e3b\u4e49\u601d\u60f3\u94f8\u9b42\u80b2\u4eba\u3002\u5728\u533b\u5b66\u6559\u6750\u4e2d\u6ce8\u91cd\u52a0\u5f3a\u533b\u5fb7\u533b\u98ce\u6559\u80b2\uff0c\u7740\u529b\u57f9\u517b\u5b66\u751f\u201c\u656c\u4f51\u751f\u547d\u3001\u6551\u6b7b\u6276\u4f24\u3001\u7518\u4e8e\u5949\u732e\u3001\u5927\u7231\u65e0\u7586\u201d\u7684\u533b\u8005\u7cbe\u795e\uff0c\u6ce8\u91cd\u52a0\u5f3a\u533b\u8005\u4ec1\u5fc3\u6559\u80b2\uff0c\u5728\u57f9\u517b\u7cbe\u6e5b\u533b\u672f\u7684\u540c\u65f6\uff0c\u6559\u80b2\u5f15\u5bfc\u5b66\u751f\u59cb\u7ec8\u628a\u4eba\u6c11\u7fa4\u4f17\u751f\u547d\u5b89\u5168\u548c\u8eab\u4f53\u5065\u5eb7\u653e\u5728\u9996\u4f4d\uff0c...\n\n### \u7ec6\u80de\u5916\u6db2 \u2014 \u9009\u81ea\u300a\u751f\u7406\u5b66\u300b\n\n...\u6311\u6218\uff0c\u8003\u9a8c\u7740\u4eba\u7c7b\u7406\u6027\u53d1\u5c55\u7684\u667a\u6167\u3002\n\n\u4e94\u3001\u2002 \u8870\u8001\n\n\u751f\u547d\u5468\u671f\u4e2d\u6709\u4e00\u4e2a\u968f\u7740\u65f6\u95f4\u7684\u8fdb\u5c55\u800c\u8868\u73b0\u51fa\u7ed3\u6784\u9000\u884c\u6027\u6539\u53d8\u548c\u529f\u80fd\u6d3b\u52a8\u4e0d\u65ad\u8870\u9000\u7684\u73b0\u8c61\uff0c\u8fd9\u4e2a\u8fc7\u7a0b\u6cdb\u79f0\u4e3a\u8870\u8001\uff08aging\uff09\u3002\u4eba\u4f53\u968f\u7740\u5e74\u9f84\u7684\u589e\u957f\uff0c\u5404\u5668\u5b98\u7cfb\u7edf\u53ca\u5176\u7ec4\u7ec7\u7ec6\u80de\u529f\u80fd\u4f1a\u51fa\u73b0\u9000\u884c\u6027\u53d8\u5316\u6216\u8870\u9000\uff0c\u5bf9\u5185\u3001\u5916\u73af\u5883\u9002\u5e94\u80fd\u529b\u9010\u6e10\u51cf\u5f31\uff0c\u5177\u6709\u5168\u8eab\u6027\u3001\u8fdb\u884c\u6027\u3001\u5185\u5728\u6027\u548c\u8870\u9000\u6027\u7684\u7279\u70b9\uff08\u89c1\u7b2c\u5341\u4e09\u7ae0\uff09\u3002\n\n\u7b2c\u56db\u8282\u2003 |\u2003 \u673a\u4f53\u7684\u5185\u73af\u5883\u3001\u7a33\u6001\u548c\u751f\u7269\u8282\u5f8b\n\n\u4e00\u3001\u2002 \u673a\u4f53\u7684\u5185\u73af\u5883\n\n\u751f\u7406\u5b66\u5c06\u673a\u4f53\u751f\u5b58\u7684\u5916\u754c\u73af\u5883\u79f0\u4e3a\u5916\u73af\u5883\uff08external environment\uff09\uff0c\u5305\u62ec\u81ea\u7136\u73af\u5883\u548c\u793e\u4f1a\u73af\u5883\u3002\u4f53\u5185\u5404\u79cd\u7ec4\u7ec7\u7ec6\u80de\u76f4\u63a5\u63a5\u89e6\u5e76\u8d56\u4ee5\u751f\u5b58\u7684\u73af\u5883\u79f0\u4e3a\u5185\u73af\u5883\uff08internal environment\uff09\u3002\u4eba\u4f53\u5185\u7684\u6db2\u4f53\u603b\u79f0\u4e3a\u4f53\u6db2\uff08body fluid\uff09\uff0c\u7ea6\u5360\u4f53\u91cd\u768460%\u3002\u4f53\u6db2\u53ef\u5206\u4e3a\u4e24\u90e8\u5206\uff1a\u7ea62/3 \u7684\u4f53\u6db2\u5206\u5e03\u5728\u7ec6\u80de\u5185\uff0c\u79f0\u4e3a\u7ec6\u80de\u5185\u6db2\uff08intracellular fluid\uff09\uff1b\u5176\u4f59\u76841/3 \u5206\u5e03\u5728\u7ec6\u80de\u5916\uff0c\u79f0\u4e3a\u7ec6\u80de\u5916\u6db2\uff08extracellular fluid\uff09\uff0c\u5305\u62ec\u8840\u6d46\u3001\u7ec4\u7ec7\u6db2\u3001\u6dcb\u5df4\u6db2\u548c\u8111\u810a\u6db2\u7b49\u3002\u7531\u4e8e\u4f53\u5185\u7ec6\u80de\u76f4\u63a5\u63a5\u89e6\u548c\u751f\u5b58\u7684\u73af\u5883\u5c31\u662f\u7ec6\u80de\u5916\u6db2\uff0c\u6240\u4ee5\u751f\u7406\u5b66\u4e2d\u901a\u5e38\u628a\u7ec6\u80de\u5916\u6db2\u79f0\u4e3a\u5185\u73af\u5883\u3002\u4f53\u5185\u6709\u4e9b\u6db2\u4f53\uff0c\u5982\u80c3\u5185\u3001\u80a0\u9053\u5185\u3001\u6c57\u817a\u7ba1\u5185\u3001\u5c3f\u9053\u5185\u3001\u8180\u80f1\u5185\u7684\u6db2\u4f53\uff0c\u90fd\u662f\u4e0e\u5916\u73af\u5883\u8fde\u901a\u7684\uff0c\u6240\u4ee5\u4e0d\u5c5e\u4e8e\u5185\u73af\u5883\u7684\u8303\u7574\u3002\n\n\u7ec6\u80de\u5916\u6db2\u542b\u6709\u5404\u79cd\u65e0\u673a\u76d0\uff08\u5982\u94a0\u3001\u6c2f\u3001\u94be\u3001\u9499\u3001\u9541\u3001\u78b3\u9178\u6c22\u76d0\u7b49\uff09\u548c\u7ec6\u80de\u5fc5\u9700\u7684\u8425\u517b\u7269\u8d28\uff08\u5982\u7cd6\u3001\u6c28\u57fa\u9178\u3001\u8102\u80aa\u9178\u7b49\uff09\uff0c\u8fd8\u542b\u6709\u6c27\u3001\u4e8c\u6c27\u5316\u78b3\u53ca\u7ec6\u80de\u4ee3\u8c22\u4ea7\u7269\u3002\u6b63\u5e38\u7ec6\u80de\u901a\u8fc7\u7ec6\u80de\u819c\u8fdb\u884c\u7ec6\u80de\u5185\u6db2\u548c\u7ec6\u80de\u5916\u6db2\u4e4b\u95f4\u7684\u7269\u8d28\u4ea4\u6362\uff0c\u4ee5\u7ef4\u6301\u7ec6\u80de\u751f\u547d\u6d3b\u52a8\u7684\u8fdb\u884c\u3002\n\n\u4e8c\u3001\u2002 \u5185\u73af\u5883\u7684\u7a33\u6001\n\n\u5185\u73af\u5883\u7684\u7a33\u6001\uff08homeostasis\uff09\u662f\u6307\u5185\u73af\u5883\u7684\u7406\u5316\u6027\u8d28\uff0c\u5982\u6e29\u5ea6\u3001\u9178\u78b1\u5ea6\u3001\u6e17\u900f\u538b\u548c\u5404\u79cd\u6db2\u4f53\u6210\u5206$\u7684\u76f8\u5bf9\u6052\u5b9a\u72b6\u6001\u3002\u65e9\u57281857 \u5e74\uff0c\u6cd5\u56fd\u751f\u7406\u5b66\u5bb6\u514b\u52b3\u5fb7\u00b7\u4f2f\u7eb3\u5fb7\uff08Claude Bernard\uff09\u5c31\u63d0\u51fa\u4e86\u5185\u73af\u5883\u7684$\u6982\u5ff5\uff0c\u4ed6\u89c2\u5bdf\u5230\u5c3d\u7ba1\u673a\u4f53\u6240\u5904\u7684\u5916\u73af\u5883\u53ef\u6709\u5f88\u5927\u53d8\u5316\uff0c\u4f46\u7ec6\u80de\u5916\u6db2\u7684\u7406\u5316\u6027\u8d28\u53d8\u52a8\u5374\u975e\u5e38\u5c0f\u3002\u56e0\u6b64\u4ed6\u6307\u51fa\uff1a\u5185\u73af\u5883\u7684\u76f8\u5bf9\u7a33\u5b9a\u662f\u673a\u4f53\u80fd\u81ea\u7531\u548c\u72ec\u7acb\u751f\u5b58\u7684\u9996\u8981\u6761\u4ef6\u3002\u8fd9\u4e2a\u89c2\u70b9\u5bf9\u540e\u6765\u7a33\u6001\u6982\u5ff5\u7684\u63d0\u51fa\u5177\u6709\u91cd\u8981\u7684\u610f\u4e49\u30021926 \u5e74\uff0c\u7f8e\u56fd\u751f\u7406\u5b66\u5bb6\u574e\u519c\uff08Walter B. Cannon\uff09\u5c06\u5e0c\u814a\u8bed\u7684homeo \u4e0estasis \u5408\u6210homeostasis \u4e00\u8bcd\u7528\u6765\u8868\u8ff0\u7a33\u6001\u8fd9\u4e00\u751f\u7406\u5b66\u7684\u91cd\u8981\u6982\u5ff5\u3002\u8fd9\u79cd\u8868\u8ff0\u63ed\u793a\u4e86\u751f\u547d\u6d3b\u52a8\u7684\u6b63\u5e38\u8fdb\u884c\u6709\u8d56\u4e8e\u5185\u73af\u5883\u76f8\u5bf9\u7a33\u5b9a\u7684\u5185\u5728\u89c4\u5f8b\u3002\u5185\u73af\u5883\u7684\u7a33\u6001\u5e76\u4e0d\u662f\u9759\u6b62\u4e0d\u53d8\u7684\u56fa\u5b9a\u72b6\u6001\uff0c\u800c\u662f\u5404\u79cd\u7406\u5316\u56e0\u7d20\u5728\u5404\u79cd\u751f\u7406\u6d3b\u52a8\u7684\u8c03\u8282\u4e0b\u5c40\u9650\u4e8e\u4e00\u5b9a\u8303\u56f4\u5185\u7684\u53d8\u52a8\u6240\u8fbe\u5230\u52a8\u6001\u5e73\u8861\u7684\u4e00\u79cd\u76f8\u5bf9\u6052\u5b9a\u7684\u72b6\u6001\u3002\u7a33\u6001\u7684\u7ef4\u6301\u662f\u673a\u4f53\u81ea\u6211\u8c03\u8282\u7684\u7ed3\u679c\u3002\u5728\u6b63\u5e38\u60c5\u51b5\u4e0b\uff0c\u7531\u7ec6\u80de\u4ee3\u8c22\u5f15\u8d77\u7684\u8425\u517b\u7269\u8d28\u6d88\u8017\u548c\u4ee3\u8c22\u4ea7\u7269\u7684\u4ea7\u751f\uff0c\u6216\u5916\u754c\u73af\u5883\u53d8\u5316\u5982\u9ad8\u6e29\u3001\u4e25\u5bd2\u3001\u4f4e\u6c27\u4ee5\u53ca\u5455\u5410\u6216\u8179\u6cfb\u7b49\u90fd\u4f1a\u5bfc\u81f4\u7ec6\u80de\u5916\u6db2\u7406\u5316\u6027\u8d28\u7684\u53d8\u5316\uff0c\u4ece\u800c\u5e72\u6270\u7a33\u6001\u3002\u4f46\u673a\u4f53\u53ef\u901a\u8fc7\u591a\u4e2a\u7cfb\u7edf\u548c\u5668\u5b98\u7684\u6d3b\u52a8\u4ee5\u53ca\u8d1f\u53cd\u9988\u63a7\u5236\u7cfb\u7edf\uff0c\u4f7f\u906d\u53d7\u5e72\u6270\u7684\u5185\u73af\u5883\u53ca\u65f6\u5f97\u5230\u6062\u590d\uff0c\u5e76\u901a\u8fc7\u4e0e\u5916\u73af\u5883\u7684\u7269\u8d28\u548c\u80fd\u91cf\u7684\u4ea4\u6362\uff0c...\n\n---\n\n# \u8840\u6db2\u4e0e\u514d\u75ab\n\n\u672c\u7ae0\u6db5\u76d6\u6076\u6027\u80bf\u7624\u3001\u9ad8\u8840\u7cd6\u3001IL-1\u3001\u514d\u75ab\u5e94\u7b54\u3001\u81ea\u8eab\u514d\u75ab\u6027\u75be\u75c5\u3001\u514d\u75ab\u7b49\u6838\u5fc3\u77e5\u8bc6\u70b9\uff0c\u6574\u5408\u81ea7\u672c\u6559\u6750\u76f8\u5173\u5185\u5bb9\u3002\n\n## \u6838\u5fc3\u6982\u5ff5\u4e0e\u5b9a\u4e49\n\n**\u6076\u6027\u80bf\u7624**\uff1aDIC \u7684\u5e38\u89c1\u75c5\u56e0\u4e4b\u4e00\uff0c\u5305\u62ec\u5404\u79cd\u5b9e\u4f53\u7624\u3001\u8840\u6db2/\u6dcb\u5df4\u80bf\u7624\u5982\u6025\u6027\u65e9\u5e7c\u7c92\u7ec6\u80de\u767d\u8840\u75c5\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u9ad8\u8840\u7cd6**\uff1a\u8840\u7cd6\u6d53\u5ea6\u5f02\u5e38\u5347\u9ad8\u7684\u75c5\u7406\u72b6\u6001\uff0c\u53ef\u5bfc\u81f4\u795e\u7ecf\u7cfb\u7edf\u548c\u514d\u75ab\u7cfb\u7edf\u75c5\u53d8\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**IL-1**\uff1a\u767d\u7ec6\u80de\u4ecb\u7d201\uff0c\u53ef\u523a\u6fc0\u4ea7\u751fCRP\u3001\u8840\u6e05\u6dc0\u7c89\u6837\u86cb\u767dA\u548c\u8865\u4f53C3\u7b49\u6025\u6027\u671f\u53cd\u5e94\u86cb\u767d\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u514d\u75ab\u5e94\u7b54**\uff1a\u813e\u5bf9\u8840\u6db2\u4e2d\u7684\u75c5\u539f\u4f53\u5982\u7ec6\u83cc\u3001\u759f\u539f\u866b\u7b49\u6297\u539f\u7269\u8d28\u4ea7\u751f\u514d\u75ab\u53cd\u5e94\uff0c\u8868\u73b0\u4e3a\u6dcb\u5df4\u5c0f\u7ed3\u589e\u591a\u3001\u6d46\u7ec6\u80de\u589e\u52a0\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66\u3001\u4f20\u67d3\u75c5\u5b66  \u2190 \u524d\u7f6e\uff1a\u521d\u59cbT\u7ec6\u80de \u2192 \u521d\u59cbB\u7ec6\u80de*\n\n**\u81ea\u8eab\u514d\u75ab\u6027\u75be\u75c5**\uff1a\u673a\u4f53\u5bf9\u81ea\u8eab\u6297\u539f\u53d1\u751f\u514d\u75ab\u53cd\u5e94\u5bfc\u81f4\u81ea\u8eab\u7ec4\u7ec7\u635f\u4f24\u7684\u75be\u75c5\uff0c\u5982\u7cfb\u7edf\u6027\u7ea2\u6591\u72fc\u75ae\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66  \u2190 \u524d\u7f6e\uff1a\u514d\u75ab\u529f\u80fd\u5931\u8c03*\n\n**\u514d\u75ab**\uff1a\u673a\u4f53\u514d\u75ab\u7cfb\u7edf\u8bc6\u522b\u201c\u81ea\u5df1\u201d\u548c\u201c\u975e\u5df1\u201d\uff0c\u5bf9\u81ea\u8eab\u6210\u5206\u5929\u7136\u8010\u53d7\uff0c\u5bf9\u975e\u5df1\u5f02\u7269\u4ea7\u751f\u514d\u75ab\u5e94\u7b54\u4ee5\u7ef4\u6301\u751f\u7406\u5e73\u8861\u7684\u80fd\u529b\u3002\n*\u6765\u6e90\uff1a\u533b\u5b66\u5fae\u751f\u7269\u5b66\u3001\u75c5\u7406\u5b66\u3001\u4f20\u67d3\u75c5\u5b66*\n\n**\u8840\u5c0f\u677f**\uff1a\u901a\u8fc7\u9ecf\u9644\u3001\u805a\u96c6\u3001\u91ca\u653e\u3001\u6536\u7f29\u53ca\u5438\u9644\u7b49\u751f\u7406\u7279\u6027\u53d1\u6325\u6b62\u8840\u548c\u51dd\u8840\u4f5c\u7528\u7684\u8840\u7ec6\u80de\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**C\u53cd\u5e94\u86cb\u767d**\uff1aC\u53cd\u5e94\u86cb\u767d\uff08CRP\uff09\u662f\u708e\u75c7\u751f\u7269\u6807\u5fd7\u7269\uff0c\u5728\u8840\u6db2\u5faa\u73af\u4e2d\u7684\u6d53\u5ea6\u968f\u5e74\u9f84\u589e\u957f\u800c\u589e\u52a0\u3002\n*\u6765\u6e90\uff1a\u533b\u5b66\u5fae\u751f\u7269\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u975e\u7279\u5f02\u6027\u514d\u75ab**\uff1a\u4eba\u7c7b\u5728\u957f\u671f\u8fdb\u5316\u4e2d\u5f62\u6210\u7684\u3001\u53ef\u9057\u4f20\u7684\u7efc\u5408\u6027\u9632\u5fa1\u80fd\u529b\uff0c\u5305\u62ec\u76ae\u80a4\u9ecf\u819c\u5c4f\u969c\u3001\u80c3\u9178\u6740\u83cc\u3001\u4f53\u6db2\u6eb6\u83cc\u3001\u7ec6\u80de\u541e\u566c\u7b49\u3002\n*\u6765\u6e90\uff1a\u4f20\u67d3\u75c5\u5b66*\n\n**\u7279\u5f02\u6027\u514d\u75ab**\uff1a\u7531\u4e8b\u5148\u5b58\u5728\u4e8e\u4f53\u5185\u7684\u7279\u5f02\u6027\u4f53\u6db2\u514d\u75ab\u4e0e\u7ec6\u80de\u514d\u75ab\u7269\u8d28\uff08\u514d\u75ab\u7403\u86cb\u767d\u4e0e\u7ec6\u80de\u56e0\u5b50\uff09\u6e05\u9664\u76f8\u5e94\u75c5\u539f\u4f53\u7684\u514d\u75ab\u5e94\u7b54\u3002\n*\u6765\u6e90\uff1a\u4f20\u67d3\u75c5\u5b66*\n\n**\u7ec6\u80de\u514d\u75ab**\uff1a\u81f4\u654fT\u6dcb\u5df4\u7ec6\u80de\u4e0e\u76f8\u5e94\u6297\u539f\u518d\u6b21\u76f8\u9047\u65f6\uff0c\u901a\u8fc7\u7ec6\u80de\u6bd2\u6027\u6dcb\u5df4\u56e0\u5b50\u6765\u6740\u4f24\u75c5\u539f\u4f53\u53ca\u5176\u6240\u5bc4\u751f\u7684\u7ec6\u80de\uff0c\u5bf9\u7ec6\u80de\u5185\u5bc4\u751f\u75c5\u539f\u4f53\u7684\u6e05\u9664\u8d77\u91cd\u8981\u4f5c\u7528\u3002\n*\u6765\u6e90\uff1a\u4f20\u67d3\u75c5\u5b66*\n\n**T\u7ec6\u80de**\uff1a\u514d\u75ab\u7ec6\u80de\uff0c\u5176\u4e0a\u7684PD-1\u4e0e\u80bf\u7624\u7ec6\u80dePD-L1\u7ed3\u5408\u540e\u5931\u80fd\u8017\u7aed\uff0c\u5bfc\u81f4\u514d\u75ab\u9003\u9038\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u8840\u6db2\u7f13\u51b2\u7cfb\u7edf**\uff1a\u673a\u4f53\u7ef4\u6301\u9178\u78b1\u7a33\u6001\u7684\u7b2c\u4e00\u9053\u9632\u7ebf\uff0c\u53cd\u5e94\u8fc5\u901f\uff0c\u5c06\u5f3a\u9178\u6216\u5f3a\u78b1\u4e2d\u548c\u8f6c\u53d8\u6210\u5f31\u9178\u6216\u5f31\u78b1\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u7ea2\u7ec6\u80de**\uff1a\u8840\u6db2\u4e2d\u7684\u4e00\u79cd\u6709\u5f62\u6210\u5206\uff0c\u4e3b\u8981\u529f\u80fd\u662f\u8fd0\u8f93\u6c27\u6c14\u548c\u4e8c\u6c27\u5316\u78b3\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u6297\u4f53**\uff1a\u7531\u6d46\u7ec6\u80de\u4ea7\u751f\u7684\u514d\u75ab\u7403\u86cb\u767d\uff0c\u80fd\u4e0e\u76f8\u5e94\u6297\u539f\u7ed3\u5408\uff0c\u5305\u62ec\u6297\u6bd2\u7d20\u3001\u6297\u83cc\u6027\u6297\u4f53\u3001\u4e2d\u548c\u6297\u4f53\u53ca\u8c03\u7406\u7d20\u7b49\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66\u3001\u4f20\u67d3\u75c5\u5b66  \u2190 \u524d\u7f6e\uff1a\u514d\u75ab\u7ec4\u7ec7\u5316\u5b66*\n\n**PD-1**\uff1a\u4e00\u79cd\u5728T\u7ec6\u80de\u8868\u9762\u8868\u8fbe\u7684\u53d7\u4f53\uff0c\u4e0ePD-L1\u7ed3\u5408\u540e\u6291\u5236T\u7ec6\u80de\u6d3b\u6027\uff0c\u53c2\u4e0e\u514d\u75ab\u8d1f\u5411\u8c03\u8282\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**IgG**\uff1a\u5206\u5b50\u91cf\u8f83\u5c0f\u7684\u514d\u75ab\u7403\u86cb\u767d\uff0c\u80fd\u901a\u8fc7\u80ce\u76d8\uff0c\u662fABO\u7cfb\u7edf\u7684\u514d\u75ab\u6297\u4f53\u7c7b\u578b\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66\u3001\u4f20\u67d3\u75c5\u5b66*\n\n**\u8d85\u6297\u539f**\uff1a\u4e00\u7c7b\u80fd\u76f4\u63a5\u4e0eTCR\u7ed3\u5408\u5e76\u6fc0\u6d3b\u5927\u91cfT\u7ec6\u80de\u7684\u6297\u539f\uff0c\u5982\u91d1\u9ec4\u8272\u8461\u8404\u7403\u83cc\u80a0\u6bd2\u7d20\n*\u6765\u6e90\uff1a\u533b\u5b66\u5fae\u751f\u7269\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**5-\u7f9f\u8272\u80fa**\uff1a\u8840\u5c0f\u677f\u91ca\u653e\u53cd\u5e94\u4e2d\u4ea7\u751f\u7684\u7269\u8d28\uff0c\u5177\u6709\u5f15\u8d77\u8840\u5c0f\u677f\u805a\u96c6\u548c\u6536\u7f29\u8840\u7ba1\u7684\u4f5c\u7528\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u80c3\u5de6\u6dcb\u5df4\u7ed3**\uff1a\u6cbf\u80c3\u5de6\u8840\u7ba1\u6392\u5217\uff0c\u6536\u7eb3\u80c3\u5c0f\u5f2f\u4fa7\u76f8\u5e94\u533a\u57df\u6dcb\u5df4\uff0c\u6ce8\u5165\u8179\u8154\u6dcb\u5df4\u7ed3\u3002\n*\u6765\u6e90\uff1a\u5c40\u90e8\u89e3\u5256\u5b66*\n\n**\u6dcb\u5df4\u7ec4\u7ec7**\uff1a\u5206\u4e3a\u5f25\u6563\u6dcb\u5df4\u7ec4\u7ec7\u548c\u6dcb\u5df4\u5c0f\u7ed3\u4e24\u79cd\u7c7b\u578b\uff0c\u662f\u514d\u75ab\u7cfb\u7edf\u7684\u91cd\u8981\u7ec4\u6210\u90e8\u5206\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66*\n\n**\u6dcb\u5df4\u5668\u5b98**\uff1a\u5206\u4e3a\u4e2d\u67a2\u6dcb\u5df4\u5668\u5b98\u548c\u5468\u56f4\u6dcb\u5df4\u5668\u5b98\uff0c\u662f\u514d\u75ab\u7cfb\u7edf\u7684\u91cd\u8981\u7ec4\u6210\u90e8\u5206\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66*\n\n**B \u6dcb\u5df4\u7ec6\u80de**\uff1a\u4ee5\u5206\u6ccc\u6297\u4f53\u8fdb\u5165\u4f53\u6db2\u6267\u884c\u514d\u75ab\u529f\u80fd\u7684\u6dcb\u5df4\u7ec6\u80de\uff0c\u4ecb\u5bfc\u4f53\u6db2\u514d\u75ab\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66*\n\n**\u813e**\uff1a\u6e05\u9664\u8870\u8001\u7ea2\u7ec6\u80de\u548c\u8840\u5c0f\u677f\u7684\u4e3b\u8981\u5668\u5b98\uff0c\u5bf9\u8840\u6e90\u6027\u6297\u539f\u4ea7\u751f\u514d\u75ab\u5e94\u7b54\uff0c\u5e76\u5728\u80da\u80ce\u671f\u53ca\u67d0\u4e9b\u75c5\u7406\u72b6\u6001\u4e0b\u5177\u6709\u9020\u8840\u529f\u80fd\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66*\n\n**\u81ea\u8eab\u514d\u75ab\u75c5**\uff1a\u673a\u4f53\u4ea7\u751f\u7684\u81ea\u8eab\u6297\u4f53\u6216\u81f4\u654f\u6dcb\u5df4\u7ec6\u80de\u7834\u574f\u81ea\u8eab\u7ec4\u7ec7\u548c\u7ec6\u80de\uff0c\u5bfc\u81f4\u5668\u5b98\u529f\u80fd\u969c\u788d\u7684\u539f\u53d1\u6027\u514d\u75ab\u6027\u75be\u75c5\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66  \u2190 \u524d\u7f6e\uff1a\u514d\u75ab\u8010\u53d7*\n\n**\u975e\u970d\u5947\u91d1\u6dcb\u5df4\u7624**\uff1a\u6dcb\u5df4\u7ec4\u7ec7\u80bf\u7624\u7684\u4e00\u79cd\u7c7b\u578b\uff0c\u4e0e\u970d\u5947\u91d1\u6dcb\u5df4\u7624\u5e76\u5217\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66*\n\n**\u514d\u75ab\u56e0\u7d20**\uff1a\u5305\u62ec\u8d85\u654f\u53cd\u5e94\u3001\u81ea\u8eab\u6297\u539f\u5f15\u8d77\u7684\u7ec4\u7ec7\u635f\u4f24\u3001\u514d\u75ab\u7f3a\u9677\u75c5\u7b49\uff0c\u53ef\u5bfc\u81f4\u7ec6\u80de\u548c\u7ec4\u7ec7\u635f\u4f24\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66*\n\n**C3a**\uff1a\u8865\u4f53\u7cfb\u7edf\u6fc0\u6d3b\u540e\u4ea7\u751f\u7684\u708e\u75c7\u4ecb\u8d28\uff0c\u80fd\u5f15\u8d77\u8840\u7ba1\u6269\u5f20\u3001\u589e\u52a0\u8840\u7ba1\u901a\u900f\u6027\uff0c\u5e76\u8d8b\u5316\u767d\u7ec6\u80de\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66*\n\n**\u514d\u75ab\u8010\u53d7**\uff1a\u673a\u4f53\u5bf9\u67d0\u79cd\u7279\u5b9a\u6297\u539f\u4e0d\u4ea7\u751f\u514d\u75ab\u5e94\u7b54\u7684\u72b6\u6001\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66*\n\n**SLE**\uff1a\u7cfb\u7edf\u6027\u7ea2\u6591\u72fc\u75ae\uff0c\u4e00\u79cd\u81ea\u8eab\u514d\u75ab\u6027\u75be\u75c5\uff0c\u5176\u7ec4\u7ec7\u635f\u4f24\u4e0e\u81ea\u8eab\u6297\u4f53\u548c\u514d\u75ab\u590d\u5408\u7269\u6709\u5173\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66  \u2190 \u524d\u7f6e\uff1a\u514d\u75ab\u56e0\u7d20 \u2192 HLA-DR2*\n\n**\u7ec6\u80de\u4ecb\u5bfc\u7684\u514d\u75ab\u5e94\u7b54**\uff1a\u901a\u8fc7\u514d\u75ab\u6d3b\u6027\u7ec6\u80de\u653b\u51fb\u9776\u6297\u539f\u7684\u514d\u75ab\u65b9\u5f0f\uff0c\u53c2\u4e0e\u79fb\u690d\u6392\u65a5\u53cd\u5e94\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66*\n\n**\u4f53\u6db2\u514d\u75ab**\uff1a\u81f4\u654fB\u6dcb\u5df4\u7ec6\u80de\u53d7\u6297\u539f\u523a\u6fc0\u540e\u8f6c\u5316\u4e3a\u6d46\u7ec6\u80de\u5e76\u4ea7\u751f\u6297\u4f53\uff0c\u6297\u4f53\u4f5c\u7528\u4e8e\u7ec6\u80de\u5916\u5fae\u751f\u7269\uff0c\u4fc3\u8fdb\u7ec6\u80de\u541e\u566c\u529f\u80fd\u3001\u6e05\u9664\u75c5\u539f\u4f53\u3002\n*\u6765\u6e90\uff1a\u4f20\u67d3\u75c5\u5b66*\n\n**\u514d\u75ab\u7403\u86cb\u767d**\uff1a\u6297\u4f53\u7684\u5316\u5b66\u540d\u79f0\uff0c\u5206\u4e3aIgG\u3001IgA\u3001IgM\u3001IgD\u548cIgE\u4e94\u7c7b\uff0c\u5404\u5177\u4e0d\u540c\u529f\u80fd\u3002\n*\u6765\u6e90\uff1a\u4f20\u67d3\u75c5\u5b66*\n\n**\u6f5c\u4f0f\u671f**\uff1a\u4ece\u75c5\u539f\u4f53\u4fb5\u5165\u673a\u4f53\u8d77\uff0c\u81f3\u5f00\u59cb\u51fa\u73b0\u4e34\u5e8a\u75c7\u72b6\u4e3a\u6b62\u7684\u65f6\u671f\uff0c\u5176\u957f\u77ed\u4e0e\u75c5\u539f\u4f53\u79cd\u7c7b\u3001\u6570\u91cf\u3001\u6bd2\u529b\u53ca\u673a\u4f53\u514d\u75ab\u529f\u80fd\u6709\u5173\u3002\n*\u6765\u6e90\uff1a\u4f20\u67d3\u75c5\u5b66*\n\n**\u514d\u75ab\u6027\u53d d\ufffd\ufffd37\u4e8c\u3001\t \u514d\u75ab\u6027\u53d7\u4f53\u5f02\u5e38\u4e0e\u75be\u75c5\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd37\u4e09\u3001\t \u7ee7\u53d1\u6027\u53d7\u4f53\u5f02\u5e38\u4e0e\u75be\u75c5\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd38\u7b2c\u56db\u8282\t \u53d7\u4f53\u540e\u4fe1\u53f7\u8f6c\u5bfc\u6210\u5206\u5f02\u5e38\u4e0e\u75be\u75c5\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd...\n\n### \u9ad8\u8840\u7cd6 \u2014 \u9009\u81ea\u300a\u75c5\u7406\u751f\u7406\u5b66\u300b\n\n...\u8fdb\u7a0b\uff0c\u75be\u75c5\u53ef\u5206\u4e3a\u6025\u6027\u3001\u4e9a\u6025\u6027\u6216\u6162\u6027\u75be\u75c5\u3002\u6025\u6027\u75be\u75c5\u662f\u4e00\u7c7b\u53d1\u75c5\u6025\u5267\u3001\u75c5\u60c5\u53d8\u5316\u5feb\u3001\u75c7\u72b6\u8f83\u91cd\u7684\u75be\u75c5\u3002\u6162\u6027\u75be\u75c5\u5219\u662f\u4e00\u4e2a\u6301\u7eed\u7684\u3001\u957f\u671f\u7684\u8fc7\u7a0b\uff0c\u6162\u6027\u75be\u75c5\u53ef\u4ee5\u4fdd\u6301\u957f\u671f\u7a33\u5b9a\uff0c\u4e5f\u53ef\u4ee5\u8868\u73b0\u4e3a\u75c5\u60c5\u52a0\u91cd\u6216\u7f13\u89e3\u3002\u5f53\u524d\uff0c\u5e38\u89c1\u7684\u6162\u6027\u975e\u4f20\u67d3\u6027\u75be\u75c5\uff08noninfectious chronic disease\uff0cNCD\uff0c\u7b80\u79f0\u6162\u75c5\uff09\u4e3b\u8981\u6307\u5fc3\u8111\u8840\u7ba1\u75be\u75c5\u3001\u6076\u6027\u80bf\u7624\u3001\u7cd6\u5c3f\u75c5\u3001\u6162\u6027\u963b\u585e\u6027\u80ba\u75be\u75c5\u3001\u7cbe\u795e\u5fc3\u7406\u6027\u75be\u75c5\u7b49\u3002\u75be\n\n\u5e8f\u3002\u76ee\u524d\uff0c\u6211\u56fd\u6162\u75c5\u53d1\u75c5\u4eba\u6570\u5feb\u901f\u4e0a\u5347\u3002\u5728\u5168\u6b7b\u56e0\u6784\u6210\u4e2d\uff0c\u91cd\u5927\u6162\u75c5\uff0c\u5305\u62ec\u6076\u6027\u80bf\u7624\u3001\u5fc3\u8111\u8840\u7ba1\u75be\u75c5\u3001\u9ad8\u8840\u538b\u3001\u7cd6\u5c3f\u75c5\u3001\u6162\u6027\u963b\u585e\u6027\u80ba\u75be\u75c5\u7b49\uff0c\u5bfc\u81f4\u7684\u6b7b\u4ea1\u4eba\u6570\u5df2\u5360\u5168\u6b7b\u4ea1\u4eba\u6570\u768486.6%\u3002\u4e9a\u6025\u6027\u75be\u75c5\u5728\u75c5\u7a0b\u8fdb\u5c55\u65b9\u9762\u5219\u662f\u4ecb\u4e8e\u6025\u6027\u548c\u6162\u6027\u4e4b\u95f4\uff0c\u5982\u4e59\u578b\u809d\u708e\u7b49\u4f20\u67d3\u6027\u75be\u75c5\u7684\u75c5\u7a0b\u8303\u56f4\u53ef\u4ee5\u4ece\u4e34\u5e8a\u524d / \u6f5c\u4f0f\u9636\u6bb5\u4e00\u76f4\u5230\u6301\u7eed\u6027\u6162\u6027\u611f\u67d3\u9636\u6bb5\u3002\n\n\u7efc\u5408\u5f81\uff08syndrome\uff09\u662f\u4e00\u7ec4\u5177\u6709\u7279\u5b9a\u75be\u75c5\u72b6\u6001\u7279\u5f81\u7684\u75c7\u72b6\u548c\u4f53\u5f81\uff0c\u5982\u4ee3\u8c22\u7efc\u5408\u5f81\uff08metabolic syndrome\uff09\u6709\u80a5\u80d6\u3001\u9ad8\u8840\u7cd6\u3001\u9ad8\u8840\u538b\u3001\u8840\u8102\u5f02\u5e38\u3001\u9ad8\u5c3f\u9178\u7b49\u8868\u73b0\uff1b\u5168\u8eab\u708e\u75c7\u53cd\u5e94\u7efc\u5408\u5f81\uff08systemic inflammatory response syndrome\uff0cSIRS\uff09\u6709\u4f53\u6e29\u5f02\u5e38\u3001\u5916\u5468\u767d\u7ec6\u80de\u8ba1\u6570\u6216\u6bd4\u4f8b\u5f02\u5e38\u3001\u547c\u5438\u9891\u7387\u4e0e\u5fc3\u7387\u52a0\u5feb\u3001\u8fc7\u5ea6\u708e\u75c7\u53cd\u5e94\u3001\u9ad8\u4ee3\u8c22\u548c\u9ad8\u5faa\u73af\u52a8\u529b\u72b6\u6001\u8868\u73b0\uff1b\u9a6c\u65b9\u7efc\u5408\u5f81\uff08Marfan syndrome\uff09\u5219\u662f\u4e00\u79cd\u4ee5\u7ed3\u7f14\u7ec4\u7ec7\u7f3a\u9677\u4e3a\u7279\u70b9\uff0c\u8868\u73b0\u4e3a\u5468\u56f4\u7ed3\u7f14\u7ec4\u7ec7\u8425\u517b\u4e0d\u826f\u3001\u9aa8\u9abc\u5f02\u5e38\u3001\u773c\u5185\u75be\u75c5\u548c\u5fc3\u8840\u7ba1\u5f02\u5e38\u7684\u9057\u4f20\u6027\u75be\u75c5\u3002\u5e76\u53d1\u75c7\uff08complication\uff09\u662f\u6307\u4e00\u79cd\u75be\u75c5\u5728\u53d1\u5c55\u8fc7\u7a0b\u4e2d\u5f15\u8d77\u7684\u53e6\u4e00\u79cd\u75be\u75c5\u6216\u75c5\u7406\u8fc7\u7a0b\uff0c\u5b83\u53ef\u80fd\u662f\u75be\u75c5\u7684\u81ea\u8eab\u8fdb\u5c55\u4e0e\u6076\u5316\uff0c\u6216\u8005\u662f\u6cbb\u7597\u7684\u4e0d\u826f\u540e\u679c\uff0c\u5982\u7cd6\u5c3f\u75c5\u53ef\u5f15\u8d77\u5927\u8840\u7ba1\u3001\u5fae\u8840\u7ba1\u53d7\u635f\u5e76\u5371\u53ca\u5fc3\u3001\u8111\u3001\u80be\u3001\u5468\u56f4\u795e\u7ecf\u3001\u773c\u7b49\u3002\u636e\u4e16\u754c\u536b\u751f\u7ec4\u7ec7\u7edf\u8ba1\uff0c\u7cd6\u5c3f\u75c5\u5e76\u53d1\u75c7\u9ad8\u8fbe100 \u591a\u79cd\uff0c\u662f\u76ee\u524d\u5df2\u77e5\u5e76\u53d1\u75c7\u6700\u591a\u7684\u4e00\u79cd\u75be\u75c5\u3002\n\n\u7b2c\u4e8c\u8282\u2002 |\u2002 \u75c5\u56e0\u5b66\u57fa\u7840\n\n\u4e00\u3001\u2002 \u75be\u75c5\u53d1\u751f\u7684\u539f\u56e0\n\n\u75be\u75c5\u53d1\u751f\u7684\u539f\u56e0\uff08\u5373\u75c5\u56e0\uff09\u662f\u6307\u5f15\u8d77\u75be\u75c5\u5fc5\u4e0d\u53ef\u5c11\u7684\u3001\u5e76\u8d4b\u4e88\u75be\u75c5\u7279\u5f81\u6027\u6216\u51b3\u5b9a\u75be\u75c5\u7279\u5f02\u6027\u7684\u56e0\u7d20\u3002\u75be\u75c5\u5982\u4f20\u67d3\u6027\u75be\u75c5\u548c\u5355\u57fa\u56e0\u9057\u4f20\u75c5\u53ef\u80fd\u7531\u5355\u4e00\u75c5\u56e0\u51b3\u5b9a\uff0c\u800c\u5927\u591a\u6570\u6162\u75c5\u5219\u662f\u591a\u4e2a\u56e0\u7d20\u5171\u540c\u4f5c\u7528\u7684\u7ed3\u679c\u3002\u75c5\u56e0\u79cd\u7c7b\u7e41\u591a\uff0c\u4e3b\u8981\u5305\u62ec\u5982\u4e0b\u51e0\u7c7b\u3002\n\n\uff08\u4e00\uff09\u2002 \u611f\u67d3\u6027\u751f\u7269\u56e0\u7d20\n\n\u73b0\u5df2\u53d1\u73b0\u5bf9\u4eba\u7c7b\u6709\u81f4\u75c5\u4f5c\u7528\u7684\u751f\u7269\u56e0\u5b50\u6709500 \u591a\u79cd\uff0c\u4e3b\u8981\u5305\u62ec\u81f4\u75c5\u6027\u5fae\u751f\u7269\uff08\u5982\u75c5\u6bd2\u3001\u7ec6\u83cc\u3001\u652f\u539f\u4f53\u3001\u8863\u539f\u4f53\u3001\u7acb\u514b\u6b21\u4f53\u3001\u87ba\u65cb\u4f53\u3001\u771f\u83cc\u7b49\uff09\u548c\u5bc4\u751f\u866b\uff08\u5982\u539f\u866b\u3001\u8815\u866b\u3001\u8282\u80a2\u52a8\u7269\u7b49\uff09\u3002\u8fd9\u7c7b\u75c5\u56e0\u5f15\u8d77\u5404\u79cd\u611f\u67d3\u6027\u75be\u75c5\uff0c\u5176\u81f4\u75c5\u6027\u53d6\u51b3\u4e8e\u75c5\u539f\u4f53\u4fb5\u5165\u7684\u6570\u91cf\u3001\u6bd2\u6027\uff08toxicity\uff09\u53ca\u4fb5\u88ad\u529b\uff08invasiveness\uff09\uff0c\u4ea6\u4e0e\u673a\u4f53\u672c\u8eab\u7684\u9632\u5fa1\u53ca\u62b5\u6297\u529b\u5f3a\u5f31\u6709\u5173\u3002\u5176\u4e2d\uff0c\u7531\u5404\u79cd\u75c5\u539f\u4f53\u5f15\u8d77\u7684\uff0c\u80fd\u5728\u4eba\u4e0e\u4eba\u3001\u52a8\u7269\u4e0e\u52a8\u7269\u6216\u4eba\u4e0e\u52a8\u7269\u4e4b\u95f4\u76f8\u4e92\u4f20\u64ad\u7684\u4e00\u7c7b\u75be\u75c5\u79f0\u4e3a\u4f20\u67d3\u6027\u75be\u75c5\u3002\u751f\u7269\u81f4\u75c5\u56e0\u7d20\u7684\u4f5c\u7528\u7279\u70b9\u662f\uff1a\u2460 \u75c5\u539f\u4f53\u6709\u7279\u5b9a\u7684\u5165\u4fb5\u95e8\u6237\u548c\u5b9a\u4f4d\u3002\u4f8b\u5982\uff0c\u7532\u578b\u809d\u708e\u75c5\u6bd2\u53ef\u4ece\u6d88\u5316\u9053\u5165\u8840\uff0c\u7ecf\u95e8\u9759\u8109\u5230\u809d\uff0c\u5728\u809d\u7ec6\u80de\u5185\u5bc4\u751f\u548c\u7e41\u6b96\u5e76\u81f4\u75c5\u3002\u2461 \u75c5\u539f\u4f53\u5fc5\u987b\u4e0e\u88ab\u4fb5\u4e2a\u4f53\u76f8\u4e92\u4f5c\u7528\u624d\u80fd\u5f15\u8d77\u75be\u75c5\u3002\u4f8b\u5982\uff0c\u7531\u7532\u578b\u6d41...\n\n### \u514d\u75ab\u5e94\u7b54 \u2014 \u9009\u81ea\u300a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66\u300b\n\n...\u548c\u4f2a\u8db3\u5185\u6709\u8f83\u591a\u5fae\u4e1d\u548c\u5fae\u7ba1\uff0c\u53c2\u4e0e\u7ec6\u80de\u8fd0\u52a8\u548c\u541e\u566c\uff08\u56fe3-5\uff0c\u56fe3-6\uff09\u3002\n\n\u56fe3-2\u2003 \u758f\u677e\u7ed3\u7f14\u7ec4\u7ec7\u5149\u955c\u56fe\n1. \u7ea4\u7ef4\u7ec6\u80de\uff1b2. \u6210\u7ea4\u7ef4\u7ec6\u80de\uff1b3. \u5de8\u566c\u7ec6\u80de\u3002\n\n\u56fe3-3\u2003 \u758f\u677e\u7ed3\u7f14\u7ec4\u7ec7\uff08\u9f20\u80a0\u7cfb\u819c\u94fa\u7247\uff09\u5149\u955c\u56fe\uff08\u8179\u8154\u6ce8\u5c04\u53f0\u76fc\u84dd\uff0c\u919b\u590d\u7ea2\u4e0e\u5076\u6c2e\u7130\u7ea2\u67d3\u8272\uff09\n1. \u5de8\u566c\u7ec6\u80de\uff1b2. \u80a5\u5927\u7ec6\u80de\uff1b3. \u80f6\u539f\u7ea4\u7ef4\uff1b4. \u5f39\u6027\u7ea4\u7ef4\u3002\n\n\u56fe3-4\u2003 \u6210\u7ea4\u7ef4\u7ec6\u80de\u4e0e\u7ea4\u7ef4\u7ec6\u80de\u8d85\u5fae\u7ed3\u6784\u6a21\u5f0f\u56fe\n\n\u56fe3-5\u2003 \u5de8\u566c\u7ec6\u80de\u8d85\u5fae\u7ed3\u6784\u7acb\u4f53\u6a21\u5f0f\u56fe\n\n\u758f\u677e\u7ed3\u7f14\u7ec4\u7ec7\u5185\u5904\u4e8e\u529f\u80fd\u9759\u6b62\u72b6\u6001\u7684\u5de8\u566c\u7ec6\u80de\u79f0\u4e3a\u7ec4\u7ec7\u7ec6\u80de\uff08histocyte\uff09\uff0c\u5f53\u53d7\u7ec6\u83cc\u4ea7\u7269\u3001\u708e\u75c7\u53d8\u6027\u86cb\u767d\u7b49\u7269\u8d28\u523a\u6fc0\u540e\uff0c\u7ec6\u80de\u4f38\u51fa\u4f2a\u8db3\uff0c\u6cbf\u8fd9\u4e9b\u5316\u5b66\u7269\u8d28\u7684\u6d53\u5ea6\u68af\u5ea6\u671d\u6d53\u5ea6\u9ad8\u7684\u90e8\u4f4d\u5b9a\u5411\u79fb\u52a8\uff0c\u805a\u96c6\u5230\u4ea7\u751f\u548c\u91ca\u653e\u8fd9\u4e9b\u5316\u5b66\u7269\u8d28\u7684\u90e8\u4f4d\uff0c\u56e0\u800c\u88ab\u79f0\u4e3a\u6e38\u8d70\u7684\u6d3b\u5316\u7ec6\u80de\u3002\u7ec6\u80de\u7684\u8fd9\u79cd\u7279\u6027\u79f0\u8d8b\u5316\u6027\uff08chemotaxis\uff09\uff0c\u800c\u8fd9\u7c7b\u5316\u5b66\u7269\u8d28\u79f0\u8d8b\u5316\u56e0\u5b50\uff08chemokine\uff09\u3002\u8d8b\u5316\u6027\u662f\u5de8\u566c\u7ec6\u80de\u53d1\u6325\u529f\u80fd\u7684\u524d\u63d0\u3002\u5de8\u566c\u7ec6\u80de\u884c\u4f7f\u591a\u79cd\u529f\u80fd\uff0c\u53c2\u4e0e\u514d\u75ab\u5e94\u7b54\u3002\n\n\uff081\uff09 \u541e\u566c\u4f5c\u7528\uff08phagocytosis\uff09\uff1a\u53ef\u5206\u4e3a\u7279\u5f02\u6027\u541e\u566c\u4f5c\u7528\u548c\u975e\u7279\u5f02\u6027\u541e\u566c\u4f5c\u7528\u3002\u7279\u5f02\u6027\u541e\u566c\u4f5c\u7528\u7684\n\n\uff08\u5982\u7ec6\u83cc\u3001\u75c5\u6bd2\u548c\u5f02\u4f53\u7ec6\u80de\u7b49\uff09\uff0c\u7136\u540e\uff0c\u5de8\u566c\u7ec6\u80de\u901a\u8fc7\u5176\u8868\u9762\u7684\u53d7\u4f53\u4e0e\u8bc6\u522b\u56e0\u5b50\u7279\u5f02\u6027\u7ed3\u5408\uff0c\u4ece\u800c\u95f4\u63a5\u9ecf\u9644\u88ab\u541e\u566c\u7269\uff0c\u542f\u52a8\u541e\u566c\u8fc7\u7a0b\u3002\u975e\u7279\u5f02\u6027\u541e\u566c\u4f5c\u7528\u5219\u65e0\u9700\u8bc6\u522b\u56e0\u5b50\u7684\u4e2d\u4ecb\uff0c\u5de8\u566c\u7ec6\u80de\u76f4\u63a5\u9ecf\u9644\u78b3\u7c92\u3001\u7c89\u5c18\u3001\u8870\u8001\u6b7b\u4ea1\u7684\u81ea\u4f53\u7ec6\u80de\u548c\u67d0\u4e9b\u7ec6\u83cc\u7b49\uff0c\u8fdb\u800c\u541e\u566c\u3002\u541e\u566c\u8f83\u5927\u5f02\u7269\u65f6\uff0c\u591a\u4e2a\u5de8\u566c\u7ec6\u80de\u5e38\u878d\u5408\u5f62\u6210\u591a\u6838\u5de8\u7ec6\u80de\uff08multinuclear giant cell\uff09\u3002\u5de8\u566c\u7ec6\u80de\u9ecf\u9644\u88ab\u541e\u566c\u7269\u540e\uff0c\u4f38\u51fa\u4f2a\u8db3\u5c06\u5176\u5305\u56f4\uff0c\u6444\u5165\u7ec6\u80de\u8d28\u5185\u5f62\u6210\u541e\u566c\u4f53\u6216\u541e\u996e\u6ce1\u3002\u541e\u56fe3-6\u2003 \u813e\u5185\u5de8\u566c\u7ec6\u80de\u7535\u955c\u56fe\n1. \u7ec6\u80de\u6838\uff1b2. \u6eb6\u9176\u4f53\uff1b3. \u541e\u566c\u7684\u8870\u8001\u7ea2\u7ec6\u80de\u3002\n\n\u566c\u4f53\u6216\u541e\u996e\u6ce1\u4e0e\u6eb6\u9176\u4f53\u878d\u5408\uff0c\u88ab\u6eb6\u9176\u4f53\u9176\u5206\u89e3\uff0c\u53ef\u964d\u89e3\u4ea7\u7269\u8fdb\u5165\u7ec6\u80de\u8d28\u540e\u518d\u5229\u7528\uff0c\u800c\u4e0d\u53ef\u5206\u89e3\u7684\u7269\u8d28\u6784\u6210\u6b8b\u4f59\u4f53\uff08\u56fe3-7\uff09\u3002\n\n\u56fe3-7\u2003 \u5de8\u566c\u7ec6\u80de\u7279\u5f02\u6027\u541e\u566c\u8fc7\u7a0b\u793a\u610f\u56fe\n\n\uff082\uff09 \u6297\u539f\u5448\u9012\u4f5c\u7528\uff1a\u6297\u539f\uff08antigen\uff09\u5305\u62ec\u86cb\u767d\u8d28\u3001\u591a\u80bd\u3001\u591a\u7cd6\u7b49\u751f\u7269\u5206\u5b50\u3002\u7531\u8fd9\u4e9b\u5206\u5b50\u6784\u6210\u7684\u7ec6\u80de\u3001\u7ec6\u80de\u5916\u57fa\u8d28\u3001\u7ec6\u83cc\u3001\u75c5\u6bd2\u7b49\u90fd\u542b\u6709\u5927\u91cf\u6297\u539f\u3002\u6bcf\u4e00\u4e2a\u4f53\u7684\u514d\u75ab\u7cfb\u7edf\u80fd\u591f\u8bc6\u522b\u81ea\u8eab\u6297\u539f\u548c\u5916\u6765\u6297\u539f\uff0c\u4e3b\u8981\u5bf9\u5916\u6765\u6297\u539f\uff08\u5982\u7ec6\u83cc\u3001\u75c5\u6bd2\u7b49\uff09\u4ee5\u53ca\u8868\u9762\u6297\u539f\u53d1\u751f\u53d8\n\n\u5f02\u7684\u81ea\u8eab\u7ec6\u80de\uff08\u5982\u80bf\u7624\u7ec6\u80de\u548c\u75c5\u6bd2\u611f\u67d3\u7ec6\u80de\uff09\u53d1\u52a8\u653b\n\n\u51fb\u3002\u5de8\u566c\u7ec6\u80de\u541e\u566c\u4e86\u6297\u539f\u7269\u8d28\uff0c\u5728\u6eb6\u9176\u4f53\u5185\u8fdb\u884c\u5206\u89e3\n\n\u65f6\uff0c\u80fd\u591f\u4fdd\u7559\u6700\u5177\u7279\u5f81\u6027\u7684\u5206\u5b50\u57fa\u56e2\uff0c\u4e0e\u5de8\u566c\u7ec6\u80de\u81ea\n\n\u8eab\u7684\u4e3b\u8981\u7ec4\u7ec7\u76f8\u5bb9\u6027\u590d\u5408\u4f53\uff08major histocompatibility\n\ncomplex\uff0cMHC\uff09\u7ed3\u5408\uff0c\u5f62\u6210\u6297\u539f\u80bd-MHC \u5206\u5b50\u590d\u5408\u7269\uff0c\u5448\n\n\u9012\u5230\u7ec6\u80de\u8868\u9762\uff08\u56fe3-8\uff09\u3002\u5f53T \u6dcb\u5df4\u7ec6\u80de\u63a5\u89e6\u5230\u6297\u539f\u80bd\u540e\uff0c\n\n\u4fbf\u88ab\u6fc0\u6d3b\uff0c\u542f\u52a8\u514d\u75ab\u5e94\u7b54\u673a\u5236\u3002\u56e0\u6b64\uff0c\u5de8\u566c\u7ec6\u80de\u4e3a\u673a\u4f53\n\n\u4e3b\u8981\u7684\u6297\u539f\u5448\u9012\u7ec6\u80de\uff08antigen presenting cell\uff0cAPC\uff09\u3002\n\n\uff083\uff09 \u5206\u6ccc\u529f\u80fd\uff1a\u5de8\u566c\u7ec6\u80de\u6709\u6d3b\u8dc3\u7684\u5206\u6ccc\u529f\u80fd\uff0c\u80fd\u5408\n\n\u6210\u548c\u5206\u6ccc\u4e0a\u767e\u79cd\u751f\u7269\u6d3b\u6027\u7269\u8d28\uff0c\u5305\u62ec\u6eb6\u83cc\u9176\u3001\u8865\u4f53\u3001\u591a...\n\n### \u81ea\u8eab\u514d\u75ab\u6027\u75be\u75c5 \u2014 \u9009\u81ea\u300a\u75c5\u7406\u751f\u7406\u5b66\u300b\n\n...\u5242\u3001\u91cd\u91d1\u5c5e\u7b49\uff0c\u670d\u7528\u67d0\u4e9b\u836f\u7269\uff0c\u67d3\u4e0a\u67d0\u4e9b\u75c5\u83cc\u6216\u8fc7\u91cf\u66b4\u9732\u5728\u5404\u79cd\u5c04\u7ebf\u4e0b\u7b49\u5148\u5929\u56e0\u7d20\u5f15\u8d77\u7684\u75be\u75c5\u79f0\u4e3a\u5148\u5929\u6027\u75be\u75c5\uff08congenital disease\uff09\u3002\u5148\u5929\u6027\u75be\u75c5\u53ef\u4ee5\u662f\u9057\u4f20\u7684\uff0c\u5982\u591a\u6307 / \u8dbe\u3001\u5507\u88c2\u7b49\uff0c\u4f46\u6709\u4e9b\u5148\u5929\u6027\u75be\u75c5\u4e0d\u5c5e\u4e8e\u9057\u4f20\u6027\u75be\u75c5\uff0c\u5982\u5148\u5929\u6027\u5fc3\u810f\u75c5\uff0c\u901a\u5e38\u5a74\u513f\u5728\u51fa\u751f\u65f6\u5c31\u5df2\u60a3\u75c5\uff0c\u4e0e\u6bcd\u4eb2\u598a\u5a20\u65e9\u671f\u60a3\u98ce\u75b9\u3001\u8368\u9ebb\u75b9\u6216\u5176\u4ed6\u75c5\u6bd2\u611f\u67d3\u6027\u75be\u75c5\u6709\u5173\u3002\n\n\uff08\u4e94\uff09\u2002 \u514d\u75ab\u56e0\u7d20\n\n\u514d\u75ab\u53cd\u5e94\u8fc7\u5f3a\u3001\u514d\u75ab\u7f3a\u9677\u6216\u81ea\u8eab\u514d\u75ab\u53cd\u5e94\u7b49\u514d\u75ab\u56e0\u7d20\u5747\u53ef\u5bf9\u673a\u4f53\u9020\u6210\u5f71\u54cd\u3002\u5982\u673a\u4f53\u5bf9\u5f02\u79cd\u8840\u6e05\u86cb\u767d\uff08\u7834\u4f24\u98ce\u6297\u6bd2\u7d20\uff09\u3001\u9752\u9709\u7d20\u7b49\u8fc7\u654f\u53ef\u5bfc\u81f4\u8fc7\u654f\u6027\u4f11\u514b\uff1b\u67d0\u4e9b\u82b1\u7c89\u6216\u98df\u7269\u53ef\u5f15\u8d77\u652f\u6c14\u7ba1\u54ee\u5598\u3001\u8368\u9ebb\u75b9\u7b49\u53d8\u6001\u53cd\u5e94\u6027\u75be\u75c5\u3002\u4eba\u7c7b\u514d\u75ab\u7f3a\u9677\u75c5\u6bd2\uff08human immunodeficiency virus\uff0cHIV\uff09\u611f\u67d3\u53ef\u7834\u574fT\u6dcb\u5df4\u7ec6\u80de\uff0c\u5bfc\u81f4\u83b7\u5f97\u6027\u514d\u75ab\u7f3a\u9677\u7efc\u5408\u5f81\uff08acquired immune deficiency syndrome\uff0cAIDS\uff09\u3002\u5f53\u673a\u4f53\u5bf9\u81ea\u8eab\u6297\u539f\u53d1\u751f\u514d\u75ab\u53cd\u5e94\u65f6\uff0c\u53ef\u5bfc\u81f4\u81ea\u8eab\u7ec4\u7ec7\u635f\u4f24\u6216\u81ea\u8eab\u514d\u75ab\u6027\u75be\u75c5\uff08autoimmune disease\uff09\uff0c\u5982\u7cfb\u7edf\u6027\u7ea2\u6591\u72fc\u75ae\u3001\u7c7b\u98ce\u6e7f\u5173\u8282\u708e\u7b49\u3002\u9664\u4e86\u8fd9\u4e9b\u514d\u75ab\u6027\u75be\u75c5\u5916\uff0c\u514d\u75ab\u56e0\u7d20\u5728\u591a\u79cd\u6162\u75c5\u5982\u80bf\u7624\u7684\u53d1\u75c5\u4e2d\u53d1\u6325\u91cd\u8981\u4f5c\u7528\u3002\uff08\u516d\uff09\u2002 \u8425\u517b\u56e0\u7d20\n\n\u7ef4\u6301\u751f\u547d\u6d3b\u52a8\u5fc5\u9700\u7684\u7269\u8d28\u5982\u7cd6\u3001\u8102\u80aa\u3001\u86cb\u767d\u8d28\u3001\u7ef4\u751f\u7d20\u3001\u65e0\u673a\u76d0\u3001\u5fae\u91cf\u5143\u7d20\uff08\u5982\u6c1f\u3001\u7852\u3001\u950c\u3001\u7898\u7b49\uff09\u4ee5\u53ca\n\n\u91cf\u53c8\u53ef\u5bfc\u81f4\u80a5\u80d6\u6216\u9ad8\u8102\u8840\u75c7\u7b49\uff1b\u7ef4\u751f\u7d20D \u7f3a\u4e4f\u53ef\u81f4\u4f5d\u507b\u75c5\uff0c\u800c\u6444\u53d6\u8fc7\u91cf\u53c8\u53ef\u5bfc\u81f4\u4e2d\u6bd2\u3002\n\n\uff08\u4e03\uff09\u2002 \u5fc3\u7406\u548c\u793e\u4f1a\u56e0\u7d20\n\n\u957f\u671f\u7684\u7d27\u5f20\u5de5\u4f5c\u3001\u4e0d\u826f\u7684\u4eba\u9645\u5173\u7cfb\uff0c\u6050\u60e7\u3001\u7126\u8651\u3001\u60b2\u4f24\u3001\u6124\u6012\u7b49\u60c5\u7eea\u53cd\u5e94\uff0c\u4ee5\u53ca\u81ea\u7136\u707e\u5bb3\u3001\u751f\u6d3b\u4e8b\u4ef6\u7684\u7a81\u7136\u6253\u51fb\u7b49\u5fc3\u7406\u548c\u793e\u4f1a\u56e0\u7d20\u4e0d\u4f46\u53ef\u5f15\u8d77\u7cbe\u795e\u969c\u788d\u6027\u75be\u75c5\uff08\u5982\u6291\u90c1\u7b49\uff09\uff0c\u8fd8\u53ef\u901a\u8fc7\u7cbe\u795e\u5fc3\u7406\u4f5c\u7528\u5bfc\u81f4\u673a\u4f53\u529f\u80fd\u3001\u4ee3\u8c22\u7d0a\u4e71\u53ca\u5f62\u6001\u7ed3\u6784\u53d8\u5316\uff0c\u5982\u9ad8\u8840\u538b\u3001\u51a0\u5fc3\u75c5\u7b49\u7684\u53d1\u751f\u53d1\u5c55\u90fd\u4e0e\u7cbe\u795e\u5fc3\u7406\u56e0\u7d20\u5bc6\u5207\u76f8\u5173\u3002\n\n\u9700\u8981\u6307\u51fa\u7684\u662f\uff0c\u4eba\u4e0e\u81ea\u7136\u7684\u5173\u7cfb\u662f\u4eba\u7c7b\u793e\u4f1a\u6700\u57fa\u672c\u7684\u5173\u7cfb\u3002\u81ea\u7136\u754c\u662f\u4eba\u7c7b\u793e\u4f1a\u4ea7\u751f\u3001\u5b58\u5728\u548c\u53d1\u5c55\u7684\u57fa\u7840\u548c\u524d\u63d0\uff0c\u4eba\u7c7b\u53ef\u4ee5\u901a\u8fc7\u793e\u4f1a\u5b9e\u8df5\u6d3b\u52a8\u6709\u76ee\u7684\u5730\u5229\u7528\u81ea\u7136\u3001\u6539\u9020\u81ea\u7136\uff0c\u4f46\u4eba\u7c7b\u5f52\u6839\u5230\u5e95\u662f\u81ea\u7136\u7684\u4e00\u90e8\u5206\uff0c\u4eba\u7c7b\u4e0d\u80fd\u76f2\u76ee\u5730\u51cc\u9a7e\u4e8e\u81ea\u7136\u4e4b\u4e0a\uff0c\u5176\u884c\u4e3a\u65b9\u5f0f\u5fc5\u987b\u7b26\u5408\u81ea\u7136\u89c4\u5f8b\u3002\u81ea\u7136\u8d44\u6e90\u7684\u8fc7\u5ea6\u5f00\u53d1\uff0c\u201c\u4e09\u5e9f\u201d\uff08\u5e9f\u6c34\u3001\u5e9f\u6c14\u3001\u5e9f\u6e23\uff09\u5904\u7406\u4e0d\u5584\u9020\u6210\u7684\u751f\u6001\u5e73\u8861\u7834\u574f\uff0c\u5927\u6c14\u3001\u6c34\u548c\u571f\u58e4\u6c61\u67d3\uff0c\u4eba\u7c7b\u751f\u6d3b\u65b9\u5f0f\u7684\u6539\u53d8\u7b49\u5df2\u6210\u4e3a\u5371\u5bb3\u4eba\u7c7b\u5065\u5eb7\uff0c\u5bfc\u81f4\u75be\u75c5\u53d1\u751f\u7684\u91cd\u8981\u56e0\u7d20\u3002\u6b64\u5916\uff0c\u4eba\u3001\u52a8\u7269\u548c\u98df\u54c1\u7684\u5feb\u901f\u6d41\u901a\uff0c\u751f\u6d3b\u65b9\u5f0f\u548c\u8425\u517b\u6761\u4ef6\u7684\u6539\u53d8\uff0c\u751f\u6001\u73af\u5883\u7684\u6539\u53d8\u4e5f\u7ed9\u75c5\u6bd2\u7b49\u75c5\u539f\u5fae\u751f\u7269\u63d0\u4f9b\u4e86\u5927\u91cf\u7684\u201c\u6ea2\u51fa\u201d\u673a\u4f1a\u3002\u636e\u4f30\u8ba1\uff0c70% \u4ee5\u4e0a\u7684\u65b0\u53d1\u6216\u518d\u53d1\u4f20\u67d3\u75c5\u4e0e\u91ce\u751f\u52a8\u7269\u6709\u5173\u6216\u8005\u6765\u6e90\u4e8e\u91ce\u751f\u52a8\u7269\u3002\u56e0\u6b64\uff0c\u4fdd\u62a4\u81ea\u7136\u73af\u5883\uff0c\u5b9e\u8df5\u201c\u4eba\u4e0e\u81ea\u7136\u548c\u8c10\u5171\u751f\u201d\u7684\u7406\u5ff5\u5bf9\u4e8e\u7ef4\u62a4\u4eba\u7c7b\u5065\u5eb7\uff0c\u51cf\u5c11\u75be\u75c5\u7684\u53d1\u751f\u6781\u5176\u91cd\u8981\u3002\n\n\u4e8c\u3001\u2002 \u75be\u75c5\u53d1\u751f\u7684\u6761\u4ef6\n\n\u67d0\u4e9b\u75be\u75c5\u7684\u53d1\u751f\u9664\u75c5\u56e0\u5916\uff0c\u8fd8\u9700\u8981\u4e00\u4e9b\u81f4\u75c5\u6761\u4ef6\u7684\u53c2\u4e0e\u3002\u6240\u8c13\u81f4\u75c5\u6761\u4ef6\u662f\u6307\u80fd\u591f\u4fc3\u8fdb\u6216\u51cf\u7f13\u75be\u75c5\u53d1\u751f\u7684\u67d0\u79cd\u673a\u4f53\u72b6\u6001\u3001\u81ea\u7136\u73af\u5883\u6216\u793e\u4f1a\u56e0\u7d20\u3002\u6761\u4ef6\u672c\u8eab\u5e76\u4e0d\u5f15\u8d77\u75be\u75c5\uff0c\u4f46\u53ef\u5f71\u54cd\u75c5\u56e0\u5bf9\u673a\u4f53\u7684\u4f5c\u7528\u3002\u4f8b\u5982\uff0c\u7ed3\u6838\u5206\u679d\u6746\u83cc\u662f\u5f15\u8d77\u7ed3\u6838\u75c5\u7684\u75c5\u56e0\uff0c\u4f46\u5bf9\u4e8e\u751f\u6d3b\u6761\u4ef6\u548c\u751f\u6d3b\u4e60\u60ef\u826f...\n\n### \u514d\u75ab \u2014 \u9009\u81ea\u300a\u533b\u5b66\u5fae\u751f\u7269\u5b66\u300b\n\n...\u56fe\u50cf\u5185\u5bb9\u3002\u529b\u4e89\u4ee5\u6559\u6750\u7684\u6570\u5b57\u5316\u5f00\u53d1\u4e0e\u4f7f\u7528\uff0c\u5168\u65b9\u4f4d\u670d\u52a1\u9662\u6821\u6559\u5b66\uff0c\u6301\u7eed\u63a8\u52a8\u6559\u80b2\u6570\u5b57\u5316\u8f6c\u578b\u3002\n\n\u7b2c\u5341\u8f6e\u6559\u6750\u5171\u670956 \u79cd\uff0c\u5747\u4e3a\u56fd\u5bb6\u536b\u751f\u5065\u5eb7\u59d4\u5458\u4f1a\u201c\u5341\u56db\u4e94\u201d\u89c4\u5212\u6559\u6750\u3002\u5168\u5957\u6559\u6750\u5c06\u4e8e2024 \u5e74\u79cb\u5b63\u51fa\u7248\u53d1\u884c\uff0c\u6570\u5b57\u5185\u5bb9\u548c\u7535\u5b50\u6559\u6750\u4e5f\u5c06\u540c\u6b65\u4e0a\u7ebf\u3002\u5e0c\u671b\u5168\u56fd\u5e7f\u5927\u9662\u6821\u5728\u4f7f\u7528\u8fc7\u7a0b\u4e2d\u80fd\u591f\u591a\u63d0\u4f9b\u5b9d\u8d35\u610f\u89c1\uff0c\u53cd\u9988\u4f7f\u7528\u4fe1\u606f\uff0c\u4ee5\u9010\u6b65\u4fee\u6539\u548c\u5b8c\u5584\u6559\u6750\u5185\u5bb9\uff0c\u63d0\u9ad8\u6559\u6750\u8d28\u91cf\uff0c\u4e3a\u7b2c\u5341\u4e00\u8f6e\u6559\u6750\u7684\u4fee\u8ba2\u5de5\u4f5c\u5efa\u8a00\u732e\u7b56\u3002\n\n\u674e\u3000\u51e1\n\n\u5409\u6797\u5927\u5b66\u5065\u5eb7\u7814\u7a76\u9662\u9662\u957f\u3001\u6559\u6388\u3001\u535a\u58eb\u7814\u7a76\u751f\u5bfc\u5e08\u3002\u6df1\u8015\u9ad8\u7b49\u533b\u5b66\u6559\u80b2\u6559\u5b66\u3001\u533b\u5b66\u5fae\u751f\u7269\u5b66\u4e13\u4e1a\u53ca\u79d1\u7814\u7b49\u9886\u57df42 \u5e74\u5e76\u6536\u83b7\u4e86\u8bf8\u591a\u6210\u679c\u3002\u56fd\u52a1\u9662\u653f\u5e9c\u7279\u6b8a\u6d25\u8d34\u83b7\u5f97\u8005\uff0c\u957f\u6625\u5e02\u52b3\u52a8\u6a21\u8303\uff0c\u957f\u6625\u5e02\u4e09\u516b\u7ea2\u65d7\u624b\u6807\u5175\uff0c\u7701\u7ea7\u4f18\u79c0\u5171\u4ea7\u515a\u5458\uff0c\u7701\u7ea7\u4f18\u79c0\u6559\u5b66\u56e2\u961f\u8d1f\u8d23\u4eba\uff0c\u7701\u7ea7\u6559\u5b66\u540d\u5e08\uff0c\u767d\u6c42\u6069\u7cbe\u795e\u7279\u6b8a\u8d21\u732e\u5956\u7b49\u83b7\u5f97\u8005\u3002\u6559\u80b2\u90e8\u9ad8\u7b49\u5b66\u6821\u57fa\u7840\u533b\u5b66\u6559\u5b66\u6307\u5bfc\u59d4\u5458\u4f1a\u548c\u5065\u5eb7\u6559\u5b66\u6307\u5bfc\u59d4\u5458\u4f1a\u59d4\u5458\uff0c\u4e2d\u56fd\u5fae\u751f\u7269\u5b66\u4f1a\u4e34\u5e8a\u5fae\u751f\u7269\u5b66\u4e13\u59d4\u4f1a\u4e3b\u4efb\u59d4\u5458\uff0c\u5409\u6797\u7701\u533b\u5b66\u6559\u5b66\u6307\u5bfc\u59d4\u5458\u4f1a\u4e3b\u4efb\uff0c\u4e2d\u534e\u533b\u5b66\u4f1a\u5fae\u751f\u7269\u5b66\u4e0e\u514d\u75ab\u5b66\u5206\u4f1a\u5e38\u52a1\u59d4\u5458\u3002\u4eba\u6c11\u536b\u751f\u51fa\u7248\u793e\u51fa\u7248\u7684\u300a\u533b\u5b66\u5fae\u751f\u7269\u5b66\u300b\u7b2c7\u30018\u30019 \u7248\u4e3b\u7f16\u3002\u83b7\u9996\u5c4a\u5168\u56fd\u6559\u6750\u5efa\u8bbe\u5956\u5168\u56fd\u4f18\u79c0\u6559\u6750\uff08\u9ad8\u7b49\u6559\u80b2\u7c7b\uff09\u4e00\u7b49\u5956\u3001\u4e2d\u534e\u533b\u5b66\u79d1\u6280\u5956\u3001\u7701\u79d1\u6280\u8fdb\u6b65\u5956\u4e00\u7b49\u5956\u3001\u7701\u7ea7\u6559\u5b66\u6210\u679c\u5956\u4e00\u7b49\u5956\u591a\u9879\uff0c\u57f9\u517b\u9ad8\u5c42\u6b21\u533b\u5b66\u7855\u535a\u7814\u7a76\u751f130 \u4f59\u540d\u3002\n\n\u5f90\u5fd7\u51ef\n\n\u7a7a\u519b\u519b\u533b\u5927\u5b66\u6559\u6388\u3001\u535a\u58eb\u7814\u7a76\u751f\u5bfc\u5e08\uff0c\u5168\u519b\u75c5\u539f\u5fae\u751f\u7269\u9632\u6cbb\u57fa\u7840\u91cd\u70b9\u5b9e\u9a8c\u5ba4\u4e3b\u4efb\u3002\u66fe\u4efb\u4e2d\u56fd\u5fae\u751f\u7269\u5b66\u4f1a\u526f\u7406\u4e8b\u957f\u3001\u4e2d\u534e\u533b\u5b66\u4f1a\u75c5\u6bd2\u5b66\u5206\u4f1a\u526f\u4e3b\u4efb\u59d4\u5458\u3001\u5168\u519b\u533b\u5b66\u79d1\u5b66\u6280\u672f\u59d4\u5458\u4f1a\u5e38\u52a1\u59d4\u5458\u3002\u4e3b\u6301\u56fd\u5bb6\u79d1\u6280\u91cd\u5927\u4e13\u98794 \u9879\uff0c\u56fd\u5bb6973 \u8bfe\u98981 \u9879\uff0c863 \u8bfe\u98985 \u9879\uff0c\u56fd\u5bb6\u81ea\u7136\u79d1\u5b66\u57fa\u91d1\u8bfe\u98987 \u9879\uff0c\u519b\u961f\u91cd\u5927\u548c\u91cd\u70b9\u8bfe\u98984 \u9879\u3002\u4e3b\u7f16\u56fd\u5bb6\u7ea7\u89c4\u5212\u6559\u6750\u548c\u4e13\u845712 \u90e8\uff0c\u66fe\u62c5\u4efb\u4eba\u6c11\u536b\u751f\u51fa\u7248\u793e\u51fa\u7248\u7684\u300a\u533b\u5b66\u5fae\u751f\u7269\u5b66\u300b\u7b2c8\u30019 \u7248\u4e3b\u7f16\u3002\u83b7\u9996\u5c4a\u5168\u56fd\u6559\u6750\u5efa\u8bbe\u5956\u5168\u56fd\u4f18\u79c0\u6559\u6750\uff08\u9ad8\u7b49\u6559\u80b2\u7c7b\uff09\u4e00\u7b49\u5956\uff0c\u56fd\u5bb6\u79d1\u6280\u8fdb\u6b65\u5956\u4e8c\u7b49\u5956\u3001\u4e09\u7b49\u5956\u54041 \u9879\uff0c\u9655\u897f\u7701\u79d1\u6280\u6210\u679c\u5956\u4e00\u7b49\u59562 \u9879\uff0c\u519b\u961f\u79d1\u6280\u8fdb\u6b65\u5956\u4e8c\u7b49\u59566 \u9879\uff0c\u519b\u961f\u6559\u5b66\u6210\u679c\u5956\u4e8c\u7b49\u59561 \u9879\u3002\u83b7\u201c\u5168\u56fd\u4e2d\u9752\u5e74\u533b\u5b66\u79d1\u6280\u4e4b\u661f\u201d\u201c\u4e2d\u56fd\u4eba\u6c11\u89e3\u653e\u519b\u9662\u6821\u80b2\u624d\u5956\u91d1\u5956\u201d\u201c\u9655\u897f\u7701\u6559\u5b66\u540d\u5e08\u201d\u7b49\u8363\u8a89\u3002\n\n\u90ed\u6653\u594e\n\n\u4e0a\u6d77\u4ea4\u901a\u5927\u5b66\u4e8c\u7ea7\u6559\u6388\uff0c\u56fd\u5bb6\u7ea7\u6559\u5b66\u540d\u5e08\uff0c\u5168\u56fd\u6559\u80b2\u79d1\u7814\u5148\u8fdb\u5de5\u4f5c\u8005\uff0c\u5168\u56fd\u4f18\u79c0\u6559\u5e08\uff0c\u4e2d\u56fd\u5fae\u751f\u7269\u5b66\u4f1a\u533b\u5b66\u5fae\u751f\u7269\u5b66\u4e0e\u514d\u75ab\u5b66\u4e13\u4e1a\u59d4\u5458\u4f1a\u4e3b\u4efb\u59d4\u5458\uff0c\u4e2d\u56fd\u5168\u5065\u5eb7\u7814\u7a76\u7f51\u7edc\uff08\u8054\u76df\uff09\u79d8\u4e66\u957f\u3002\u73b0\u4efbGlobal Medical Education \u4e3b\u7f16\uff0c\u56fd\u5bb6\u70ed\u5e26\u75c5\u7814\u7a76\u4e2d\u5fc3\u526f\u4e3b\u4efb\uff1b\u4e0a\u6d77\u4ea4\u901a\u5927\u5b66\u5168\u7403\u533b\u5b66\u6559\u80b2\u7814\u7a76\u4e2d\u5fc3\u4e3b\u4efb\u3001\u81f4\u8fdc\u5b66\u9662\u533b\u5b66\u65b9\u5411\u4e3b\u4efb\u3002\n\n\u4ece\u4e8b\u6559\u5b66\u5de5\u4f5c38 \u5e74\u3002\u73b0\u4efb\u6559\u80b2\u90e8\u57fa\u7840\u533b\u5b66\u6838\u5fc3\u5b9e\u8df5\u4e0e\u521b\u65b0\u7814\u7a76\u865a\u62df\u6559\u7814\u5ba4\u8d1f\u8d23\u4eba\uff0c\u6559\u8
