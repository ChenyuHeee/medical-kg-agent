\u6570\u75c5\u6bd2\u6027\u4f20\u67d3\u75c5\u4e2d\uff08\u5982\u810a\u9ad3\u7070\u8d28\u708e\u548c\u6d41\u884c\u6027\u4e59\u578b\u8111\u708e\uff09\uff0c\u9690\u6027\u611f\u67d3\u662f\u6700\u5e38\u89c1\u7684\u8868\u73b0\uff0c\u5176\u6570\u91cf\u5e38\u8fdc\u8fdc\u8d85\u8fc7\u663e\u6027\u611f\u67d3\uff0810 \u500d\u4ee5\u4e0a\uff09\u3002\u9690\u6027\u611f\u67d3\u8fc7\u7a0b\u7ed3\u675f\u4ee5\u540e\uff0c\u5927\u591a\u6570\u4eba\u83b7\u5f97\u4e0d\u540c\u7a0b\u5ea6\u7684\u7279\u5f02\u6027\u514d\u75ab\uff0c\u75c5\u539f\u4f53\u88ab\u6e05\u9664\u3002\u5c11\u6570\u4eba\u53ef\u8f6c\u53d8\u4e3a\u75c5\u539f\u643a\u5e26\u72b6\u6001\uff0c\u75c5\u539f\u4f53\u6301\u7eed\u5b58\u5728\u4e8e\u4f53\u5185\uff0c\u6210\u4e3a\u65e0\u75c7\u72b6\u643a\u5e26\u8005\uff08asymptomatic carrier\uff09\uff0c\u5982\u4f24\u5bd2\u6c99\u95e8\u83cc\u3001\u5fd7\u8d3a\u83cc\u548c\u4e59\u578b\u809d\u708e\u75c5\u6bd2\u611f\u67d3\u7b49\u3002\u9690\u6027\u611f\u67d3\u5728\u4f20\u67d3\u75c5\u6d41\u884c\u671f\u95f4\uff0c\u5bf9\u9632\u6b62\u6d41\u884c\u7684\u6269\u6563\u6709\u79ef\u6781\u610f\u4e49\uff0c\u56e0\u4e3a\u9690\u6027\u611f\u67d3\u8005\u7684\u589e\u591a\uff0c\u4eba\u7fa4\u5bf9\u67d0\u4e00\u79cd\u4f20\u67d3\u75c5\u7684\u6613\u611f\u6027\u5c31\u964d\u4f4e\uff0c\u8be5\u79cd\u4f20\u67d3\u75c5\u7684\u53d1\u75c5\u7387\u5c31\u4e0b\u964d\u3002\u4f46\u53e6\u4e00\u65b9\u9762\uff0c\u9690\u6027\u611f\u67d3\u8005\u4e5f\u53ef\u80fd\u5904\u4e8e\u75c5\u539f\u643a\u5e26\u72b6\u6001\uff0c\u5728\u4f20\u67d3\u75c5\u6d41\u884c\u671f\u95f4\u6210\u4e3a\u91cd\u8981\u7684\u4f20\u67d3\u6e90\u3002\n\n\uff08\u4e09\uff09\u2002 \u663e\u6027\u611f\u67d3\n\n\u663e\u6027\u611f\u67d3\uff08overt infection\uff09\u53c8\u79f0\u4e34\u5e8a\u611f\u67d3\uff08clinical infection\uff09\uff0c\u662f\u6307\u75c5\u539f\u4f53\u4fb5\u5165\u673a\u4f53\u540e\uff0c\u4e0d\u4f46\u8bf1\u5bfc\u673a\u4f53\u53d1\u751f\u514d\u75ab\u5e94\u7b54\uff0c\u800c\u4e14\uff0c\u901a\u8fc7\u75c5\u539f\u4f53\u672c\u8eab\u7684\u4f5c\u7528\u6216\u673a\u4f53\u7684\u53d8\u6001\u53cd\u5e94\uff0c\u5bfc\u81f4\u7ec4\u7ec7\u635f\u4f24\uff0c\u5f15\u8d77\u75c5\u7406\u6539\u53d8\u548c\u4e34\u5e8a\u8868\u73b0\u3002\u5728\u5927\u591a\u6570\u4f20\u67d3\u75c5\u4e2d\uff0c\u663e\u6027\u611f\u67d3\u53ea\u5360\u5168\u90e8\u53d7\u611f\u67d3\u8005\u7684\u5c0f\u90e8\u5206\uff0c\u597d\u6bd4\u6d77\u4e0a\u51b0\u5c71\u9732\u51fa\u6c34\u9762\u7684\u4e00\u4e2a\u5c0f\u5c16\u5cf0\u3002\u4f46\u5728\u5c11\u6570\u4f20\u67d3\u75c5\u4e2d\uff0c\u5982\u9ebb\u75b9\u3001\u6c34\u75d8\u7b49\uff0c\u5927\u591a\u6570\u611f\u67d3\u8005\u8868\u73b0\u4e3a\u663e\u6027\u611f\u67d3\u3002\u5728\u540c\u4e00\u79cd\u4f20\u67d3\u75c5\uff0c\u7531\u4e8e\u75c5\u539f\u4f53\u81f4\u75c5\u529b\u4e0e\u673a\u4f53\u6297\u75c5\u80fd\u529b\u7684\u5dee\u5f02\uff0c\u663e\u6027\u8fc7\u7a0b\u53c8\u53ef\u5448\u73b0\u8f7b\u3001\u91cd\u578b\uff0c\u4e0e\u6025\u3001\u6162\u6027\u7b49\u5404\u79cd\u7c7b\u578b\u3002\u6709\u4e9b\u4f20\u67d3\u75c5\u5728\u663e\u6027\u611f\u67d3\u8fc7\u7a0b\u7ed3\u675f\u540e\uff0c\u75c5\u539f\u4f53\u53ef\u88ab\u6e05\u9664\uff0c\u611f\u67d3\u8005\u53ef...\n\n### \u7279\u5f02\u6027\u514d\u75ab \u2014 \u9009\u81ea\u300a\u4f20\u67d3\u75c5\u5b66\u300b\n\n...ection\uff09\u4ee5\u53ca\u8bca\u7597\u8fc7\u7a0b\u4e2d\u6216\u56e0\u533b\u7597\u5668\u68b0\u6d88\u6bd2\u4e0d\u4e25\u800c\u53d1\u751f\u7684\u533b\u6e90\u6027\u611f\u67d3\uff08iatrogenic infection\uff09\u7b49\u3002\u533b\u9662\u611f\u67d3\u5305\u62ec\u5728\u4f4f\u9662\u671f\u95f4\u53d1\u751f\u7684\u611f\u67d3\u548c\u5728\u533b\u9662\u5185\u83b7\u5f97\u4f46\u5728\u51fa\u9662\u540e\u53d1\u751f\u7684\u611f\u67d3\uff0c\u4f46\u4e0d\u5305\u62ec\u5165\u9662\u524d\u5df2\u5f00\u59cb\u6216\u5165\u9662\u65f6\u5df2\u5b58\u5728\u7684\u611f\u67d3\uff0c\u540e\u8005\u79f0\u4e3a\u793e\u533a\u83b7\u5f97\u6027\u611f\u67d3\uff08community acquired infection\uff09\uff0c\u6307\u7684\u662f\u5728\u533b\u9662\u5916\u7f79\u60a3\u7684\u611f\u67d3\uff0c\u5305\u62ec\u5177\u6709\u660e\u786e\u6f5c\u4f0f\u671f\u800c\u5728\u5165\u9662\u540e\u5e73\u5747\u6f5c\u4f0f\u671f\u5185\u53d1\u75c5\u7684\u611f\u67d3\u3002\n\n\u4e8c\u3001\u2002 \u611f\u67d3\u8fc7\u7a0b\u7684\u8868\u73b0\n\n\u75c5\u539f\u4f53\u901a\u8fc7\u5404\u79cd\u9014\u5f84\u8fdb\u5165\u673a\u4f53\u540e\u5c31\u5f00\u59cb\u4e86\u611f\u67d3\u7684\u8fc7\u7a0b\u3002\u5728\u4e00\u5b9a\u7684\u73af\u5883\u6761\u4ef6\u5f71\u54cd\u4e0b\uff0c\u6839\u636e\u673a\u4f53\u9632\n\n\uff08\u4e00\uff09\u2002 \u75c5\u539f\u4f53\u88ab\u6e05\u9664\n\n\u75c5\u539f\u4f53\u88ab\u6e05\u9664\uff08elimination of pathogen\uff09\u662f\u901a\u8fc7\u4ee5\u4e0b\u4e24\u79cd\u673a\u5236\u6765\u5b9e\u73b0\u7684\u3002\u75c5\u539f\u4f53\u8fdb\u5165\u673a\u4f53\u540e\uff0c\u9996\u5148\u53ef\u88ab\u673a\u4f53\u975e\u7279\u5f02\u6027\u9632\u5fa1\u80fd\u529b\u6240\u6e05\u9664\uff0c\u8fd9\u79cd\u9632\u5fa1\u80fd\u529b\u6709\u76ae\u80a4\u548c\u9ecf\u819c\u7684\u5c4f\u969c\u4f5c\u7528\u3001\u80c3\u9178\u7684\u6740\u83cc\u4f5c\u7528\u3001\u6b63\u5e38\u4f53\u6db2\u7684\u6eb6\u83cc\u4f5c\u7528\u3001\u7ec4\u7ec7\u5185\u7ec6\u80de\u7684\u541e\u566c\u4f5c\u7528\u7b49\u3002\u8fd9\u4e9b\u7efc\u5408\u6027\u7684\u80fd\u529b\u5c31\u662f\u6240\u8c13\u673a\u4f53\u7684\u975e\u7279\u5f02\u6027\u514d\u75ab\uff0c\u662f\u4eba\u7c7b\u5728\u957f\u671f\u8fdb\u5316\u8fc7\u7a0b\u4e2d\uff0c\u4e0d\u65ad\u4e0e\u75c5\u539f\u751f\u7269\u6597\u4e89\u800c\u9010\u6e10\u5f62\u6210\u7684\uff0c\u5e76\u53ef\u9057\u4f20\u7ed9\u540e\u4ee3\u3002\u540c\u65f6\uff0c\u4ea6\u53ef\u7531\u4e8b\u5148\u5b58\u5728\u4e8e\u4f53\u5185\u7684\u7279\u5f02\u6027\u4f53\u6db2\u514d\u75ab\u4e0e\u7ec6\u80de\u514d\u75ab\u7269\u8d28\uff08\u7279\u5f02\u6027\u514d\u75ab\u7403\u86cb\u767d\u4e0e\u7ec6\u80de\u56e0\u5b50\uff09\u5c06\u76f8\u5e94\u7684\u75c5\u539f\u4f53\u6e05\u9664\u3002\uff08\u4e8c\uff09\u2002 \u9690\u6027\u611f\u67d3\n\n\u9690\u6027\u611f\u67d3\uff08covert infection\uff09\u53c8\u79f0\u4e9a\u4e34\u5e8a\u611f\u67d3\uff08sub-clinical infection\uff09\uff0c\u662f\u6307\u75c5\u539f\u4f53\u4fb5\u5165\u673a\u4f53\u540e\uff0c\u4ec5\u8bf1\u5bfc\u673a\u4f53\u4ea7\u751f\u7279\u5f02\u6027\u514d\u75ab\u5e94\u7b54\uff0c\u800c\u4e0d\u5f15\u8d77\u6216\u53ea\u5f15\u8d77\u8f7b\u5fae\u7684\u7ec4\u7ec7\u635f\u4f24\uff0c\u56e0\u800c\u5728\u4e34\u5e8a\u4e0a\u4e0d\u663e\u51fa\u4efb\u4f55\u75c7\u72b6\u3001\u4f53\u5f81\u751a\u81f3\u751f\u5316\u6539\u53d8\uff0c\u53ea\u80fd\u901a\u8fc7\u514d\u75ab\u5b66\u68c0\u67e5\u624d\u80fd\u53d1\u73b0\u3002\u5728\u5927\u591a\u6570\u75c5\u6bd2\u6027\u4f20\u67d3\u75c5\u4e2d\uff08\u5982\u810a\u9ad3\u7070\u8d28\u708e\u548c\u6d41\u884c\u6027\u4e59\u578b\u8111\u708e\uff09\uff0c\u9690\u6027\u611f\u67d3\u662f\u6700\u5e38\u89c1\u7684\u8868\u73b0\uff0c\u5176\u6570\u91cf\u5e38\u8fdc\u8fdc\u8d85\u8fc7\u663e\u6027\u611f\u67d3\uff0810 \u500d\u4ee5\u4e0a\uff09\u3002\u9690\u6027\u611f\u67d3\u8fc7\u7a0b\u7ed3\u675f\u4ee5\u540e\uff0c\u5927\u591a\u6570\u4eba\u83b7\u5f97\u4e0d\u540c\u7a0b\u5ea6\u7684\u7279\u5f02\u6027\u514d\u75ab\uff0c\u75c5\u539f\u4f53\u88ab\u6e05\u9664\u3002\u5c11\u6570\u4eba\u53ef\u8f6c\u53d8\u4e3a\u75c5\u539f\u643a\u5e26\u72b6\u6001\uff0c\u75c5\u539f\u4f53\u6301\u7eed\u5b58\u5728\u4e8e\u4f53\u5185\uff0c\u6210\u4e3a\u65e0\u75c7\u72b6\u643a\u5e26\u8005\uff08asymptomatic carrier\uff09\uff0c\u5982\u4f24\u5bd2\u6c99\u95e8\u83cc\u3001\u5fd7\u8d3a\u83cc\u548c\u4e59\u578b\u809d\u708e\u75c5\u6bd2\u611f\u67d3\u7b49\u3002\u9690\u6027\u611f\u67d3\u5728\u4f20\u67d3\u75c5\u6d41\u884c\u671f\u95f4\uff0c\u5bf9\u9632\u6b62\u6d41\u884c\u7684\u6269\u6563\u6709\u79ef\u6781\u610f\u4e49\uff0c\u56e0\u4e3a\u9690\u6027\u611f\u67d3\u8005\u7684\u589e\u591a\uff0c\u4eba\u7fa4\u5bf9\u67d0\u4e00\u79cd\u4f20\u67d3\u75c5\u7684\u6613\u611f\u6027\u5c31\u964d\u4f4e\uff0c\u8be5\u79cd\u4f20\u67d3\u75c5\u7684\u53d1\u75c5\u7387\u5c31\u4e0b\u964d\u3002\u4f46\u53e6\u4e00\u65b9\u9762\uff0c\u9690\u6027\u611f\u67d3\u8005\u4e5f\u53ef\u80fd\u5904\u4e8e\u75c5\u539f\u643a\u5e26\u72b6\u6001\uff0c\u5728\u4f20\u67d3\u75c5\u6d41\u884c\u671f\u95f4\u6210\u4e3a\u91cd\u8981\u7684\u4f20\u67d3\u6e90\u3002\n\n\uff08\u4e09\uff09\u2002 \u663e\u6027\u611f\u67d3\n\n\u663e\u6027\u611f\u67d3\uff08overt infection\uff09\u53c8\u79f0\u4e34\u5e8a\u611f\u67d3\uff08clinical infection\uff09\uff0c\u662f\u6307\u75c5\u539f\u4f53\u4fb5\u5165\u673a\u4f53\u540e\uff0c\u4e0d\u4f46\u8bf1\u5bfc\u673a\u4f53\u53d1\u751f\u514d\u75ab\u5e94\u7b54\uff0c\u800c\u4e14\uff0c\u901a\u8fc7\u75c5\u539f\u4f53\u672c\u8eab\u7684\u4f5c\u7528\u6216\u673a\u4f53\u7684\u53d8\u6001\u53cd\u5e94\uff0c\u5bfc\u81f4\u7ec4\u7ec7\u635f\u4f24\uff0c\u5f15\u8d77\u75c5\u7406\u6539\u53d8\u548c\u4e34\u5e8a\u8868\u73b0\u3002\u5728\u5927\u591a\u6570\u4f20\u67d3\u75c5\u4e2d\uff0c\u663e\u6027\u611f\u67d3\u53ea\u5360\u5168\u90e8\u53d7\u611f\u67d3\u8005\u7684\u5c0f\u90e8\u5206\uff0c\u597d\u6bd4\u6d77\u4e0a\u51b0\u5c71\u9732\u51fa\u6c34\u9762\u7684\u4e00\u4e2a\u5c0f\u5c16\u5cf0\u3002\u4f46\u5728\u5c11\u6570\u4f20\u67d3\u75c5\u4e2d\uff0c\u5982\u9ebb\u75b9\u3001\u6c34\u75d8\u7b49\uff0c\u5927\u591a\u6570\u611f\u67d3\u8005\u8868\u73b0\u4e3a\u663e\u6027\u611f\u67d3\u3002\u5728\u540c\u4e00\u79cd\u4f20\u67d3\u75c5\uff0c\u7531\u4e8e\u75c5\u539f\u4f53\u81f4\u75c5\u529b\u4e0e\u673a\u4f53\u6297\u75c5\u80fd\u529b\u7684\u5dee\u5f02\uff0c\u663e\u6027\u8fc7\u7a0b\u53c8\u53ef\u5448\u73b0\u8f7b\u3001\u91cd\u578b\uff0c\u4e0e\u6025\u3001\u6162\u6027\u7b49\u5404\u79cd\u7c7b\u578b\u3002\u6709\u4e9b\u4f20\u67d3\u75c5\u5728\u663e\u6027\u611f\u67d3\u8fc7\u7a0b\u7ed3\u675f\u540e\uff0c\u75c5\u539f\u4f53\u53ef\u88ab\u6e05\u9664\uff0c\u611f\u67d3\u8005\u53ef\u83b7...\n\n---\n\n# \u5faa\u73af\u7cfb\u7edf\n\n\u672c\u7ae0\u6db5\u76d6\u751f\u7406\u5b66\u3001\u9ad8\u8840\u538b\u3001\u513f\u8336\u915a\u80fa\u3001\u52a8\u8109\u7ca5\u6837\u786c\u5316\u3001\u8840\u6813\u5f62\u6210\u3001G\u86cb\u767d\u8026\u8054\u53d7\u4f53\u7b49\u6838\u5fc3\u77e5\u8bc6\u70b9\uff0c\u6574\u5408\u81ea7\u672c\u6559\u6750\u76f8\u5173\u5185\u5bb9\u3002\n\n## \u6838\u5fc3\u6982\u5ff5\u4e0e\u5b9a\u4e49\n\n**\u751f\u7406\u5b66**\uff1a\u7814\u7a76\u4eba\u4f53\u529f\u80fd\u6d3b\u52a8\u7684\u79d1\u5b66\uff0c\u5efa\u7acb\u5728\u89c2\u5bdf\u548c\u5b9e\u9a8c\u57fa\u7840\u4e0a\uff0c\u901a\u8fc7\u89c2\u5bdf\u548c\u5b9e\u9a8c\u8ba4\u8bc6\u751f\u547d\u73b0\u8c61\u7684\u5185\u5728\u6d3b\u52a8\u89c4\u5f8b\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66\u3001\u75c5\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66  \u2190 \u524d\u7f6e\uff1a\u8840\u6db2\u5faa\u73af*\n\n**\u9ad8\u8840\u538b**\uff1a\u4f4e\u9541\u8840\u75c7\u65f6\u6613\u4f34\u53d1\u7684\u8840\u538b\u5347\u9ad8\uff0c\u4e3b\u8981\u56e0\u8840\u7ba1\u5e73\u6ed1\u808c\u7ec6\u80de\u5185\u9499\u542b\u91cf\u589e\u9ad8\u81f4\u8840\u7ba1\u6536\u7f29\u3001\u5916\u5468\u963b\u529b\u589e\u5927\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u513f\u8336\u915a\u80fa**\uff1a\u7531\u4ea4\u611f-\u80be\u4e0a\u817a\u9ad3\u8d28\u7cfb\u7edf\u91ca\u653e\uff0c\u6fc0\u6d3b\u5fc3\u808c\u03b2-\u80be\u4e0a\u817a\u7d20\u53d7\u4f53\uff0c\u63d0\u9ad8\u80de\u8d28Ca2+\u6d53\u5ea6\uff0c\u589e\u5f3a\u5fc3\u808c\u6536\u7f29\u529b\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u52a8\u8109\u7ca5\u6837\u786c\u5316**\uff1a\u4e00\u79cd\u4ee5\u52a8\u8109\u58c1\u5185\u6591\u5757\u5f62\u6210\u548c\u6269\u5f20\u4e3a\u7279\u5f81\u7684\u75be\u75c5\uff0c\u6d89\u53ca\u5e73\u6ed1\u808c\u589e\u6b96\u3001\u5185\u76ae\u7ec6\u80de\u529f\u80fd\u4e0b\u964d\u548c\u708e\u75c7\u53cd\u5e94\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u8840\u6813\u5f62\u6210**\uff1a\u8840\u6db2\u5728\u6d3b\u4f53\u5fc3\u810f\u6216\u8840\u7ba1\u5185\u53d1\u751f\u51dd\u96c6\uff0c\u5f62\u6210\u75c5\u7406\u6027\u56fa\u4f53\u56e2\u5757\u7684\u8fc7\u7a0b\uff0c\u53ef\u5f15\u8d77\u8840\u7ba1\u5835\u585e\u548c\u7ec4\u7ec7\u7f3a\u8840\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66\u3001\u75c5\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66  \u2190 \u524d\u7f6e\uff1a\u6591\u5757\u7834\u88c2*\n\n**G\u86cb\u767d\u8026\u8054\u53d7\u4f53**\uff1aGPCR\u662f\u819c\u53d7\u4f53\u4e2d\u6700\u5927\u7684\u5bb6\u65cf\uff0c\u7531\u5f62\u62107\u4e2a\u8de8\u819c\u533a\u6bb5\u7684\u5355\u6761\u591a\u80bd\u94fe\u6784\u6210\uff0c\u6fc0\u6d3b\u540e\u901a\u8fc7\u6539\u53d8\u6784\u8c61\u7ed3\u5408\u5e76\u6fc0\u6d3bG\u86cb\u767d\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u8840\u6d46\u6e17\u900f\u538b**\uff1a\u8840\u6d46\u4e2d\u6eb6\u8d28\u9897\u7c92\u5bf9\u6c34\u7684\u5438\u5f15\u80fd\u529b\uff0c\u9ad8\u6e17\u6027\u8131\u6c34\u65f6>310mOsm/(kg\u00b7H2O)\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u751f\u7269\u8282\u5f8b**\uff1a\u751f\u7269\u4f53\u7ecf\u5386\u73af\u5883\u9009\u62e9\u548c\u957f\u671f\u53d8\u5316\u5f62\u6210\u7684\uff0c\u7528\u4e8e\u9884\u6d4b\u65f6\u95f4\u53d8\u5316\u3001\u53ca\u65f6\u8c03\u6574\u751f\u7406\u7a33\u6001\u7684\u5185\u5728\u8c03\u8282\u673a\u5236\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66  \u2190 \u524d\u7f6e\uff1a\u751f\u7269\u949f\u57fa\u56e0*\n\n**\u5faa\u73af\u6027\u7f3a\u6c27**\uff1a\u56e0\u5faa\u73af\u969c\u788d\u5bfc\u81f4\u7684\u7f3a\u6c27\uff0c\u52a8\u8109\u8840\u6c27\u5206\u538b\u3001\u5bb9\u91cf\u3001\u542b\u91cf\u548c\u9971\u548c\u5ea6\u6b63\u5e38\uff0c\u52a8-\u9759\u8109\u8840\u6c27\u542b\u91cf\u5dee\u589e\u5927\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u5fc3\u6392\u8840\u91cf**\uff1a\u5fc3\u810f\u6bcf\u5206\u949f\u6cf5\u51fa\u7684\u8840\u91cf\uff0c\u7f3a\u6c27\u65f6\u53ef\u901a\u8fc7\u5fc3\u7387\u52a0\u5feb\u548c\u5fc3\u808c\u6536\u7f29\u529b\u589e\u5f3a\u800c\u589e\u52a0\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66  \u2190 \u524d\u7f6e\uff1a\u5fc3\u810f \u2192 \u5fc3\u808c\u6536\u7f29\u529b*\n\n**\u5fc3\u5ba4\u91cd\u5851**\uff1a\u5fc3\u5ba4\u91cd\u5851\u5e38\u89c1\u4e8e\u6162\u6027\u5fc3\u529f\u80fd\u4e0d\u5168\uff0c\u65e9\u671f\u589e\u52a0\u5fc3\u810f\u6cf5\u8840\u529f\u80fd\uff0c\u6700\u7ec8\u8d70\u5411\u5931\u4ee3\u507f\uff0c\u5305\u62ec\u5fc3\u808c\u7ec6\u80de\u548c\u975e\u5fc3\u808c\u7ec6\u80de\u53ca\u7ec6\u80de\u5916\u57fa\u8d28\u7684\u53d8\u5316\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u5fc3\u808c\u708e**\uff1a\u4e00\u79cd\u5fc3\u808c\u75c5\u53d8\uff0c\u53ef\u5bfc\u81f4\u5fc3\u810f\u8212\u7f29\u6d3b\u52a8\u4e0d\u534f\u8c03\uff0c\u5f15\u8d77\u5fc3\u6392\u8840\u91cf\u4e0b\u964d\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66\u3001\u4f20\u67d3\u75c5\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u5174\u594b\u6027**\uff1a\u5fc3\u808c\u7ec6\u80de\u5bf9\u523a\u6fc0\u4ea7\u751f\u53cd\u5e94\u7684\u80fd\u529b\uff0c\u9ad8\u94be\u8840\u75c7\u65f6\u5148\u589e\u9ad8\u540e\u964d\u4f4e\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u524d\u8d1f\u8377**\uff1a\u5fc3\u808c\u7ea4\u7ef4\u521d\u957f\u5ea6\uff0c\u5373\u5fc3\u5ba4\u8212\u5f20\u672b\u671f\u5bb9\u79ef\uff0c\u5f71\u54cd\u5fc3\u808c\u6536\u7f29\u529b\u548c\u6bcf\u640f\u8f93\u51fa\u91cf\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u6bcf\u640f\u8f93\u51fa\u91cf**\uff1a\u4e00\u4fa7\u5fc3\u5ba4\u4e00\u6b21\u5fc3\u810f\u640f\u52a8\u6240\u5c04\u51fa\u7684\u8840\u6db2\u91cf\uff0c\u6b63\u5e38\u6210\u4eba\u5b89\u9759\u65f6\u7ea670ml\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66  \u2190 \u524d\u7f6e\uff1a\u524d\u8d1f\u8377 \u2192 \u5fc3\u5ba4\u8212\u5f20\u671f\u672b\u5bb9\u79ef*\n\n**\u9002\u5e94\u6027**\uff1a\u751f\u547d\u6d3b\u52a8\u7684\u57fa\u672c\u7279\u5f81\u4e4b\u4e00\uff0c\u6307\u673a\u4f53\u6839\u636e\u73af\u5883\u53d8\u5316\u8c03\u6574\u81ea\u8eab\u529f\u80fd\u7684\u80fd\u529b\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**\u8870\u8001**\uff1a\u751f\u547d\u5468\u671f\u4e2d\u968f\u65f6\u95f4\u8fdb\u5c55\u8868\u73b0\u51fa\u7684\u7ed3\u6784\u9000\u884c\u6027\u6539\u53d8\u548c\u529f\u80fd\u6d3b\u52a8\u4e0d\u65ad\u8870\u9000\u7684\u8fc7\u7a0b\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**Gs\u5bb6\u65cf**\uff1a\u6839\u636e\u03b1\u4e9a\u5355\u4f4d\u57fa\u56e0\u5e8f\u5217\u540c\u6e90\u6027\u5206\u7c7b\u7684G\u86cb\u767d\u7c7b\u578b\u4e4b\u4e00\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**\u5fae\u5faa\u73af\u969c\u788d**\uff1a\u4f11\u514b\u6240\u81f4\u7684\u8840\u6d41\u7f13\u6162\u3001\u8840\u6db2\u9ecf\u6ede\u5ea6\u589e\u9ad8\u3001\u8840\u6db2\u6de4\u6ede\u7b49\u72b6\u6001\uff0c\u53ef\u4fc3\u8fdbDIC\u53d1\u751f\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u5fc3\u808c\u6536\u7f29\u6027**\uff1a\u5fc3\u808c\u7ec6\u80de\u5728\u5174\u594b\u540e\u4ea7\u751f\u6536\u7f29\u7684\u80fd\u529b\uff0c\u53d7\u7ec6\u80de\u5916K+\u5bf9Ca2+\u5185\u6d41\u7684\u5f71\u54cd\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66  \u2190 \u524d\u7f6e\uff1a\u6bcf\u640f\u8f93\u51fa\u91cf*\n\n**\u5fc3\u808c\u6897\u6b7b**\uff1a\u5fc3\u808c\u7f3a\u8840\u574f\u6b7b\uff0c\u5bfc\u81f4\u5fc3\u810f\u5404\u90e8\u5206\u8212\u7f29\u6d3b\u52a8\u534f\u8c03\u6027\u7834\u574f\uff0c\u5fc3\u6392\u8840\u91cf\u4e0b\u964d\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u52a8-\u9759\u8109\u8840\u6c27\u542b\u91cf\u5dee**\uff1a\u5faa\u73af\u969c\u788d\u4f7f\u8840\u6db2\u6d41\u7ecf\u7ec4\u7ec7\u6bdb\u7ec6\u8840\u7ba1\u65f6\u95f4\u5ef6\u957f\uff0c\u7ec6\u80de\u4ece\u5355\u4f4d\u5bb9\u91cf\u8840\u6db2\u4e2d\u6444\u6c27\u91cf\u589e\u591a\uff0c\u9759\u8109\u8840\u6c27\u542b\u91cf\u4e0b\u964d\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u5fc3\u810f**\uff1a\u9ad8\u8017\u6c27\u5668\u5b98\uff0c\u5fc3\u808c\u7ec6\u80de\u4ece\u52a8\u8109\u8840\u4e2d\u6444\u53d675%\u7684\u6c27\uff0c\u51a0\u72b6\u52a8\u9759\u8109\u8840\u6c27\u542b\u91cf\u5dee\u53ef\u8fbe14ml/dl\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u51a0\u5fc3\u75c5**\uff1a\u4f4e\u9541\u8840\u75c7\u5728\u51a0\u5fc3\u75c5\u7684\u53d1\u751f\u53d1\u5c55\u4e2d\u8d77\u4e00\u5b9a\u4f5c\u7528\uff0c\u673a\u5236\u5305\u62ec\u5fc3\u808c\u7ec6\u80de\u4ee3\u8c22\u969c\u788d\u548c\u51a0\u72b6\u52a8\u8109\u75c9\u631b\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66\u3001\u75c5\u7406\u751f\ 01\u4f20\u5bfc\u6027\u548c\u6536\u7f29\u6027\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u5faa\u73af\u7cfb\u7edf**\uff1a\u529f\u80fd\u76f8\u5173\u7684\u5668\u5b98\u7ec4\u6210\u7684\u7cfb\u7edf\u4e4b\u4e00\uff0c\u6267\u884c\u5faa\u73af\u529f\u80fd\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66\u3001\u751f\u7406\u5b66*\n\n**\u9888\u52a8\u8109\u4f53**\uff1a\u4f4d\u4e8e\u9888\u52a8\u8109\u5206\u53c9\u5904\u7684\u5316\u5b66\u611f\u53d7\u5668\uff0c\u53ef\u611f\u53d7PaO2\u964d\u4f4e\u5e76\u53cd\u5c04\u6027\u5174\u594b\u547c\u5438\u4e2d\u67a2\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u4e3b\u52a8\u8109\u4f53**\uff1a\u4f4d\u4e8e\u4e3b\u52a8\u8109\u5f13\u9644\u8fd1\u7684\u5316\u5b66\u611f\u53d7\u5668\uff0c\u53ef\u611f\u53d7PaO2\u964d\u4f4e\u5e76\u53cd\u5c04\u6027\u5174\u594b\u547c\u5438\u4e2d\u67a2\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u5fae\u9759\u8109**\uff1a\u5fae\u5faa\u73af\u4e2d\u7684\u5c0f\u9759\u8109\uff0c\u5176\u80f6\u4f53\u6e17\u900f\u538b\u4e0b\u964d\u53c2\u4e0e\u6c34\u80bf\u5f62\u6210\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66  \u2190 \u524d\u7f6e\uff1a\u6bdb\u7ec6\u8840\u7ba1*\n\n**\u5438\u70df**\uff1a\u4e00\u79cd\u53ef\u5bfc\u81f4\u8840\u7ba1\u5185\u76ae\u635f\u4f24\uff0c\u4fc3\u8fdb\u52a8\u8109\u7ca5\u6837\u786c\u5316\u53d1\u751f\u7684\u5371\u9669\u56e0\u7d20\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66\u3001\u75c5\u7406\u5b66*\n\n**\u8840\u7ba1\u5185\u76ae\u635f\u4f24**\uff1aMODS\u53d1\u751f\u53d1\u5c55\u673a\u5236\u4e4b\u4e00\uff0c\u6307\u8840\u7ba1\u5185\u76ae\u7ec6\u80de\u53d7\u635f\u5bfc\u81f4\u5fae\u5faa\u73af\u969c\u788d\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u5fc3\u810f\u6cf5\u8840\u529f\u80fd\u7684\u50a8\u5907**\uff1a\u5fc3\u810f\u5728\u9700\u8981\u65f6\u589e\u52a0\u5fc3\u8f93\u51fa\u91cf\u7684\u80fd\u529b\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u836f\u7406\u5b66**\uff1a\u7814\u7a76\u836f\u7269\u4f5c\u7528\u53ca\u673a\u5236\u7684\u57fa\u7840\u533b\u5b66\u5b66\u79d1\uff0c\u5176\u7814\u7a76\u5efa\u7acb\u5728\u751f\u7406\u5b66\u57fa\u7840\u4e0a\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66\u3001\u4f20\u67d3\u75c5\u5b66  \u2190 \u524d\u7f6e\uff1a\u4eba\u4f53\u751f\u7406\u5b66*\n\n**\u7ec6\u808c\u4e1d**\uff1a\u4e0e\u7c97\u808c\u4e1d\u5e73\u884c\u6392\u5217\uff0c\u4e3b\u8981\u7531\u808c\u52a8\u86cb\u767d\u6784\u6210\uff0c\u5728\u808c\u8282\u4e2d\u53c2\u4e0e\u6ed1\u884c\u8fc7\u7a0b\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u80f6\u4f53\u6e17\u900f\u538b**\uff1a\u7531\u8840\u6d46\u4e2d\u86cb\u767d\u8d28\u5f62\u6210\u7684\u6e17\u900f\u538b\uff0c\u6570\u503c\u8f83\u4f4e\uff0c\u4e3b\u8981\u7531\u767d\u86cb\u767d\u8d21\u732e\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u767d\u86cb\u767d**\uff1a\u5206\u5b50\u91cf\u8f83\u5c0f\u7684\u8840\u6d46\u86cb\u767d\uff0c\u56e0\u6570\u91cf\u591a\uff0c\u8d21\u732e\u80f6\u4f53\u6e17\u900f\u538b\u768475%\uff5e80%\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u5c04\u8840\u5206\u6570**\uff1a\u6bcf\u640f\u8f93\u51fa\u91cf\u5360\u5fc3\u5ba4\u8212\u5f20\u672b\u5bb9\u79ef\u7684\u767e\u5206\u6bd4\uff0c\u662f\u53cd\u6620\u5fc3\u808c\u6536\u7f29\u80fd\u529b\u7684\u6307\u6807\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66  \u2190 \u524d\u7f6e\uff1a\u6bcf\u640f\u8f93\u51fa\u91cf \u2192 \u5fc3\u5ba4\u8212\u5f20\u671f\u672b\u5bb9\u79ef*\n\n**\u4e3b\u52a8\u8109\u74e3\u5173\u95ed\u4e0d\u5168**\uff1a\u4e3b\u52a8\u8109\u74e3\u5173\u95ed\u4e0d\u5168\u662f\u5bfc\u81f4\u79bb\u5fc3\u6027\u80a5\u5927\u7684\u5e38\u89c1\u539f\u56e0\u4e4b\u4e00\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u5fc3\u5305\u708e**\uff1a\u6d41\u611f\u5f15\u8d77\u7684\u5fc3\u810f\u635f\u4f24\u8868\u73b0\u4e4b\u4e00\uff0c\u5e38\u4f34\u968f\u5fc3\u808c\u708e\u51fa\u73b0\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66\u3001\u4f20\u67d3\u75c5\u5b66*\n\n**\u5fc3\u8eab\u75be\u75c5**\uff1a\u4e0e\u793e\u4f1a\u5fc3\u7406\u56e0\u7d20\u6709\u6781\u5176\u5bc6\u5207\u5173\u7cfb\u7684\u75be\u75c5\uff0c\u5982\u51a0\u72b6\u52a8\u8109\u7ca5\u6837\u786c\u5316\u6027\u5fc3\u810f\u75c5\u3001\u539f\u53d1\u6027\u9ad8\u8840\u538b\u7b49\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u524d\u5217\u817a\u7d20**\uff1a\u80be\u5185\u4ea7\u751f\u7684\u5177\u6709\u6269\u5f20\u8840\u7ba1\u4f5c\u7528\u7684\u7269\u8d28\uff0c\u6025\u6027\u80be\u8870\u65f6\u4ea7\u751f\u51cf\u5c11\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u6d45\u52a8\u8109**\uff1a\u6d45\u7b4b\u819c\u5185\u4e00\u822c\u7ec6\u5c0f\u4e0d\u660e\u663e\u7684\u52a8\u8109\uff0c\u4f46\u8179\u80a1\u6c9f\u533a\u4e09\u6761\u6d45\u52a8\u8109\u4f4d\u7f6e\u6052\u5b9a\u3001\u6613\u4e8e\u8fa8\u8ba4\u3002\n*\u6765\u6e90\uff1a\u5c40\u90e8\u89e3\u5256\u5b66*\n\n**\u6d45\u9759\u8109**\uff1a\u6d45\u7b4b\u819c\u5185\u6570\u91cf\u8f83\u591a\u3001\u660e\u663e\uff0c\u4e0d\u4e0e\u52a8\u8109\u4f34\u884c\uff0c\u76f8\u4e92\u543b\u5408\u5e76\u4e0e\u6df1\u9759\u8109\u76f8\u4ea4\u901a\u7684\u9759\u8109\u3002\n*\u6765\u6e90\uff1a\u5c40\u90e8\u89e3\u5256\u5b66*\n\n**\u8840\u7ba1\u795e\u7ecf\u9798**\uff1a\u6df1\u7b4b\u819c\u5728\u5934\u9888\u548c\u56db\u80a2\u7684\u4e00\u4e9b\u90e8\u4f4d\u5f62\u6210\u7684\u7ed3\u6784\uff0c\u5305\u88f9\u8840\u7ba1\u548c\u795e\u7ecf\u3002\n*\u6765\u6e90\uff1a\u5c40\u90e8\u89e3\u5256\u5b66*\n\n**\u9762\u9759\u8109**\uff1a\u8d77\u81ea\u5185\u7726\u9759\u8109\uff0c\u4f34\u884c\u4e8e\u9762\u52a8\u8109\u540e\u65b9\uff0c\u4f4d\u7f6e\u8f83\u6d45\uff0c\u7ecf\u773c\u9759\u8109\u4e0e\u6d77\u7ef5\u7aa6\u76f8\u4ea4\u901a\u3002\n*\u6765\u6e90\uff1a\u5c40\u90e8\u89e3\u5256\u5b66*\n\n**\u9888\u5916\u52a8\u8109**\uff1a\u7eb5\u884c\u7a7f\u7ecf\u816e\u817a\u7684\u52a8\u8109\uff0c\u4f4d\u4e8e\u9762\u795e\u7ecf\u548c\u4e0b\u988c\u540e\u9759\u8109\u6df1\u9762\u3002\n*\u6765\u6e90\uff1a\u5c40\u90e8\u89e3\u5256\u5b66*\n\n**\u80f8\u5ed3\u5185\u52a8\u8109**\uff1a\u8d34\u7b2c1~6\u808b\u8f6f\u9aa8\u540e\u9762\uff0c\u6cbf\u80f8\u9aa8\u5916\u4fa7\u7f18\u5916\u4fa7\u7ea61.5cm\u4e0b\u884c\uff0c\u81f3\u7b2c6\u808b\u95f4\u9699\u5206\u4e3a\u808c\u8188\u52a8\u8109\u548c\u8179\u58c1\u4e0a\u52a8\u8109\u7684\u8840\u7ba1\u3002\n*\u6765\u6e90\uff1a\u5c40\u90e8\u89e3\u5256\u5b66*\n\n**\u8179\u58c1\u4e0a\u52a8\u8109**\uff1a\u53d1\u81ea\u80f8\u5ed3\u5185\u52a8\u8109\uff0c\u4e0b\u884c\u4e8e\u8179\u76f4\u808c\u5185\uff0c\u81f3\u8110\u5e73\u9762\u9644\u8fd1\u4e0e\u8179\u58c1\u4e0b\u52a8\u8109\u543b\u5408\u3002\n*\u6765\u6e90\uff1a\u5c40\u90e8\u89e3\u5256\u5b66*\n\n**\u808b\u95f4\u540e\u52a8\u8109**\uff1a\u8d77\u81ea\u80f8\u4e3b\u52a8\u8109\u7684\u4e0b5\u5bf9\u52a8\u8109\uff0c\u6cbf\u808b\u95f4\u9699\u524d\u884c\u4e8e\u8179\u5185\u659c\u808c\u548c\u8179\u6a2a\u808c\u4e4b\u95f4\uff0c\u5206\u5e03\u81f3\u8179\u524d\u5916\u4fa7\u58c1\u6df1\u5c42\u3002\n*\u6765\u6e90\uff1a\u5c40\u90e8\u89e3\u5256\u5b66*\n\n**\u809d\u95e8\u9759\u8109**\uff1a\u5728\u809d\u6a2a\u6c9f\u5185\u7a0d\u504f\u53f3\u5904\u5206\u6210\u5de6\u652f\u548c\u53f3\u652f\uff0c\u662fGlisson\u7cfb\u7edf\u7684\u4e3b\u8981\u7ed3\u6784\u4e4b\u4e00\u3002\n*\u6765\u6e90\uff1a\u5c40\u90e8\u89e3\u5256\u5b66*\n\n**\u809d\u95e8**\uff1a\u5373\u6a2a\u6c9f\uff0c\u662f\u809d\u5de6\u3001\u53f3\u7ba1\uff0c\u809d\u95e8\u9759\u8109\u5de6\u3001\u53f3\u652f\uff0c\u809d\u56fa\u6709\u52a8\u8109\u5de6\u3001\u53f3\u652f\u7b49\u51fa\u5165\u809d\u810f\u7684\u90e8\u4f4d\u3002\n*\u6765\u6e90\uff1a\u5c40\u90e8\u89e3\u5256\u5b66*\n\n**\u9ac2\u5916\u8840\u7ba1**\uff1a\u4f4d\u4e8e\u5c0f\u9aa8\u76c6\u4e0a\u53e3\u5904\uff0c\u53f3\u8f93\u5c3f\u7ba1\u8de8\u8d8a\u5176\u524d\u65b9\u8fdb\u5165\u76c6\u8154\u3002\n*\u6765\u6e90\uff1a\u5c40\u90e8\u89e3\u5256\u5b66*\n\n**\u5c0f\u52a8\u8109**\uff1a\u52a8\u8109\u7684\u4e00\u79cd\uff0c\u7ba1\u5f84\u8f83\u5c0f\uff0c\u7ba1\u58c1\u7ed3\u6784\u5305\u62ec\u5185\u819c\u3001\u4e2d\u819c\u548c\u5916\u819c\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66*\n\n**\u5fae\u52a8\u8109**\uff1a\u8fde\u63a5\u5c0f\u52a8\u8109\u4e0e\u6bdb\u7ec6\u8840\u7ba1\u7684\u7ec6\u5c0f\u8840\u7ba1\uff0c\u53c2\u4e0e\u8840\u6d41\u8c03\u8282\u3002\n*\u6765\u6e90\uff1a\u7ec4\u7ec7\u5b66\u4e0e\u80da\u80ce\u5b66  \u2190 \u524d\u7f6e\uff1a\u6bdb\u7ec6\u8840\u7ba1*\n\n**\u673a\u4f53\u751f\u7406\u529f\u80fd\u7684\u8c03\u8282**\uff1a\u673a\u4f53\u901a\u8fc7\u8c03\u8282\u673a\u5236\u7ef4\u6301\u5185\u73af\u5883\u7a33\u6001\u7684\u8fc7\u7a0b\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**\u5fc3\u808c\u7ec6\u80de\u7684\u8de8\u819c\u7535\u4f4d**\uff1a\u5fc3\u808c\u7ec6\u80de\u5728\u9759\u606f\u548c\u5174\u594b\u65f6\u819c\u5185\u5916\u7684\u7535\u4f4d\u5dee\u53ca\u5176\u53d8\u5316\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**\u524d\u5ead\u5668\u5b98**\uff1a\u524d\u5ead\u5668\u5b98\u7684\u611f\u53d7\u88c5\u7f6e\u548c\u9002\u5b9c\u523a\u6fc0\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**\u7cfb\u7edf**\uff1a\u7531\u529f\u80fd\u76f8\u5173\u7684\u5668\u5b98\u7ec4\u6210\uff0c\u5404\u53f8\u5176\u804c\uff0c\u4e92\u76f8\u8054\u7cfb\uff0c\u6784\u6210\u673a\u4f53\u751f\u547d\u6d3b\u52a8\u7684\u6709\u673a\u6574\u4f53\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**\u4eba\u4f53\u751f\u7406\u5b66**\uff1a\u7814\u7a76\u4eba\u4f53\u529f\u80fd\u6d3b\u52a8\u53ca\u5176\u89c4\u5f8b\u7684\u79d1\u5b66\uff0c\u662f\u8fde\u63a5\u57fa\u7840\u548c\u4e34\u5e8a\u5b66\u79d1\u7684\u91cd\u8981\u6865\u6881\u5b66\u79d1\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**\u5a01\u5ec9\u00b7\u54c8\u7ef4**\uff1a\u82f1\u56fd\u533b\u751f\uff0c\u901a\u8fc7\u52a8\u7269\u5b9e\u9a8c\u53d1\u73b0\u8840\u6db2\u5faa\u73af\uff0c\u521b\u7acb\u5b9e\u9a8c\u533b\u5b66\uff0c\u5f00\u542f\u751f\u7406\u5b9e\u9a8c\u79d1\u5b66\u65b0\u7eaa\u5143\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**\u8d1f\u53cd\u9988\u63a7\u5236\u7cfb\u7edf**\uff1a\u901a\u8fc7\u68c0\u6d4b\u8f93\u51fa\u53d8\u91cf\u7684\u504f\u5dee\u5e76\u53cd\u5411\u8c03\u8282\u4ee5\u7ef4\u6301\u7a33\u6001\u7684\u63a7\u5236\u7cfb\u7edf\uff0c\u5b58\u5728\u6ede\u540e\u548c\u77eb\u6789\u8fc7\u6b63\u73b0\u8c61\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**\u9608\u4e0b\u523a\u6fc0**\uff1a\u523a\u6fc0\u5f3a\u5ea6\u4f4e\u4e8e\u9608\u503c\u7684\u523a\u6fc0\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**\u53cd\u9988\u63a7\u5236\u7cfb\u7edf**\uff1a\u7531\u6bd4\u8f83\u5668\u3001\u63a7\u5236\u90e8\u5206\u3001\u53d7\u63a7\u90e8\u5206\u53ca\u68c0\u6d4b\u88c5\u7f6e\u7ec4\u6210\u7684\u95ed\u73af\u7cfb\u7edf\uff0c\u901a\u8fc7\u53cd\u9988\u4fe1\u606f\u8c03\u6574\u53d7\u63a7\u90e8\u5206\u6d3b\u52a8\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**\u524d\u9988\u63a7\u5236\u7cfb\u7edf**\uff1a\u5229\u7528\u8f93\u5165\u6216\u6270\u52a8\u4fe1\u53f7\uff08\u524d\u9988\u4fe1\u53f7\uff09\u7684\u76f4\u63a5\u63a7\u5236\u4f5c\u7528\u6784\u6210\u7684\u5f00\u73af\u63a7\u5236\u7cfb\u7edf\uff0c\u4f7f\u673a\u4f53\u5728\u53d7\u63a7\u90e8\u5206\u51fa\u73b0\u504f\u5dee\u524d\u505a\u51fa\u9002\u5e94\u6027\u53cd\u5e94\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**timeless\u57fa\u56e0**\uff1a\u5728\u679c\u8747\u4e2d\u53d1\u73b0\u7684\u4e0e\u751f\u7269\u8282\u5f8b\u76f8\u5173\u7684\u57fa\u56e0\u4e4b\u4e00\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**\u6b63\u53cd\u9988\u63a7\u5236\u7cfb\u7edf**\uff1a\u6765\u81ea\u53d7\u63a7\u90e8\u5206\u7684\u8f93\u51fa\u4fe1\u606f\u53cd\u9988\u8c03\u6574\u63a7\u5236\u90e8\u5206\u7684\u6d3b\u52a8\uff0c\u4f7f\u53d7\u63a7\u90e8\u5206\u6d3b\u52a8\u5411\u539f\u5148\u6d3b\u52a8\u76f8\u540c\u65b9\u5411\u6539\u53d8\u7684\u95ed\u73af\u63a7\u5236\u7cfb\u7edf\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**\u7cfb\u7edf\u5c42\u9762**\uff1a\u751f\u7406\u5b66\u7814\u7a76\u7684\u4e2d\ ff1a\u751f\u7406\u5b66*\n\n**\u53bb\u6781\u5316**\uff1a\u819c\u7535\u4f4d\u5411\u6b63\u503c\u65b9\u5411\u53d8\u5316\u7684\u8fc7\u7a0b\uff0c\u5982\u4ece-70mV\u53d8\u4e3a-10mV\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**\u5fc3\u5ba4\u8212\u5f20\u671f\u672b\u5bb9\u79ef**\uff1a\u5fc3\u5ba4\u5728\u8212\u5f20\u672b\u671f\u5bb9\u7eb3\u7684\u8840\u91cf\uff0c\u6b63\u5e38\u6210\u4eba\u7ea6125ml\uff0c\u5f71\u54cd\u5fc3\u5ba4\u521d\u957f\u5ea6\u548c\u6536\u7f29\u529b\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66*\n\n**\u6813\u585e**\uff1a\u5faa\u73af\u8840\u6db2\u4e2d\u51fa\u73b0\u4e0d\u6eb6\u4e8e\u8840\u6db2\u7684\u5f02\u5e38\u7269\u8d28\uff0c\u968f\u8840\u6d41\u8fd0\u884c\u963b\u585e\u8840\u7ba1\u8154\u7684\u73b0\u8c61\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66*\n\n**\u5145\u8840**\uff1a\u56e0\u52a8\u8109\u8f93\u5165\u8840\u91cf\u589e\u591a\u5bfc\u81f4\u5c40\u90e8\u7ec4\u7ec7\u6216\u5668\u5b98\u8840\u7ba1\u5185\u8840\u6db2\u542b\u91cf\u589e\u591a\u7684\u72b6\u6001\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66*\n\n**\u5b64\u7acb\u6027\u5fc3\u808c\u708e**\uff1a\u4e00\u79cd\u5fc3\u808c\u708e\u7c7b\u578b\uff0c\u72ec\u7acb\u53d1\u751f\uff0c\u4e0d\u4f34\u5176\u4ed6\u5fc3\u810f\u75c5\u53d8\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66*\n\n**\u623f\u95f4\u9694\u7f3a\u635f**\uff1a\u4e00\u79cd\u5148\u5929\u6027\u5fc3\u810f\u75c5\uff0c\u6307\u623f\u95f4\u9694\u5b58\u5728\u7f3a\u635f\u5bfc\u81f4\u5de6\u53f3\u5fc3\u623f\u5f02\u5e38\u5206\u6d41\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66*\n\n**\u7f13\u6fc0\u80bd**\uff1a\u7531\u6fc0\u80bd\u539f\u9176\u4f5c\u7528\u4e8e\u6fc0\u80bd\u539f\u751f\u6210\u7684\u8840\u6d46\u708e\u75c7\u4ecb\u8d28\uff0c\u53ef\u6269\u5f20\u7ec6\u52a8\u8109\u3001\u589e\u52a0\u8840\u7ba1\u901a\u900f\u6027\u5e76\u5f15\u8d77\u75bc\u75db\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66*\n\n**\u8840\u7ba1\u58c1\u7ed3\u6784\u5f02\u5e38\u6216\u635f\u4f24**\uff1a\u5148\u5929\u6027/\u9057\u4f20\u6027\u6216\u83b7\u5f97\u6027\u56e0\u7d20\u4f5c\u7528\u4e0b\uff0c\u8840\u7ba1\u58c1\u7ed3\u6784\u5f02\u5e38\u6 6591\u5757\u5185\u8fd8\u4f1a\u805a\u96c6\u708e\u6027\u7ec6\u80de\uff0c\u5b83\u4eec\u91ca\u653e\u7684\u5316\u5b66\u7269\u8d28\u4f1a\u4fc3\u8fdb\u5e73\u6ed1\u808c\u7ea4\u7ef4\u3001\u95f4\u8d28\u7ec6\u80de\u7b49\u7ec6\u80de\u7684\u589e\u6b96\uff0c\u5bfc\u81f4\u52a8\u8109\u5185\u819c\u548c\u4e2d\u819c\u53d8\u539a\u3002\n\n\u52a8\u8109\u7ca5\u6837\u786c\u5316\u901a\u5e38\u5f00\u59cb\u4e8e\u5438\u70df\u3001\u9ad8\u8840\u538b\u7b49\u5371\u9669\u56e0\u7d20\u5bf9\u8840\u7ba1\u5185\u76ae\u7684\u635f\u4f24\uff0c\u56e0\u6b64\uff0c\u5065\u5eb7\u7684\u751f\u6d3b\u65b9\u5f0f\u5bf9\u4e8e\u9884\u9632\u52a8\u8109\u7ca5\u6837\u786c\u5316\u975e\u5e38\u91cd\u8981\u3002\u5b83\u4f1a\u5bfc\u81f4\u8840\u7ba1\u8154\u660e\u663e\u72ed\u7a84\uff0c\u5f53\u6591\u5757\u7834\u88c2\u65f6\u8fd8\u53ef\u5f15\u53d1\u8840\u6813\u5f62\u6210\uff0c\u4ece\u800c\u5bfc\u81f4\u8840\u7ba1\u6025\u6027\u95ed\u585e\uff0c\u8fd9\u662f\u7f3a\u8840\u6027\u8111\u5352\u4e2d\u3001\u51a0\u5fc3\u75c5\u548c\u5916\u5468\u52a8\u8109\u75be\u75c5\u7684\u4e3b\u8981\u75c5\u7406\u8fc7\u7a0b\u3002\u56e0\u6b64\uff0c\u901a\u8fc7\u4f7f\u7528\u8c03\u8102\u836f\u7269\u3001\u6297\u8840\u5c0f\u677f\u836f\u7269\u7b49\u65b9\u6cd5\u53ef\u4ee5\u5ef6\u7f13\u52a8\u8109\u7ca5\u6837\u786c\u5316\u7684\u8fdb\u5c55\u3002\n\n\u672c\u7ae0\u6570\u5b57\u8d44\u6e90\n\n\u514d\u75ab\u7cfb\u7edf\uff08immune system\uff09\u7531\u6dcb\u5df4\u5668\u5b98\u3001\u6dcb\u5df4\u7ec4\u7ec7\u3001\u514d\u75ab\u7ec6\u80de\u548c\u514d\u75ab\u6d3b\u6027\u5206\u5b50\u6784\u6210\u3002\u6dcb\u5df4\u5668\u5b98\u5305\u62ec\u4e2d\u67a2\u6dcb\u5df4\u5668\u5b98\uff08\u80f8\u817a\u548c\u9aa8\u9ad3\uff09\u548c\u5468\u56f4\u6dcb\u5df4\u5668\u5b98\uff08\u6dcb\u5df4\u7ed3\u3001\u813e\u548c\u6241\u6843\u4f53\u7b49\uff09\u3002\u6dcb\u5df4\u7ec4\u7ec7\u662f\u5468\u56f4\u6dcb\u5df4\u5668\u5b98\u7684\u4e3b\u8981\u6210\u5206\uff0c\u4ea6\u5e7f\u6cdb\u5206\u5e03\u4e8e\u6d88\u5316\u7ba1\u548c\u547c\u5438\u9053\u7b49\u5904\u3002\u514d\u75ab\u7ec6\u80de\u5305\u62ec\u6dcb\u5df4\u7ec6\u80de\u3001\u6297\u539f\u5448\u9012\u7ec6\u80de\u3001\u7c92\u7ec6\u80de\u548c\u80a5\u5927\u7ec6\u80de\u7b49\uff0c\u5b83\u4eec\u6216\u805a\u96c6\u4e8e\u6dcb\u5df4\u7ec4\u7ec7\u4e2d\uff0c\u6216\u6563\u5728\u4e8e\u8840\u6db2\u3001\u6dcb\u5df4\u53ca\u5176\u4ed6\u7ec4\u7ec7\u5185\u3002\u514d\u75ab\u6d3b\u6027\u5206\u5b50\u5305\u62ec\u514d\u75ab\u7403\u86cb\u767d\u3001\u8865\u4f53\u3001\u7ec6\u80de\u56e0\u5b50\u7b49\u3002\u4ee5\u4e0a\u6210\u5206\u901a\u8fc7\u8840\u6db2\u5faa\u73af\u548c\u6dcb\u5df4\u5faa\u73af\u76f8\u4e92\u8054\u7cfb\u548c\u6d41\u901a\uff0c\u4f7f\u514d\u75ab\u7cfb\u7edf\u5f62\u6210\u4e00\u4e2a\u7edf\u4e00\u7684\u6574\u4f53\u3002\n\n\u514d\u75ab\u7cfb\u7edf\u4e3b\u8981\u67093 \u5927\u529f\u80fd\u3002\u2460\u514d\u75ab\u9632\u5fa1\uff1a\u8bc6\u522b\u548c\u6e05\u9664\u5916\u6e90\u7684\u75c5\u539f\u5fae\u751f\u7269\uff0c\u5305\u62ec\u7ec6\u83cc\u3001\u75c5\u6bd2\u3001\u771f\u83cc\u548c\u5bc4\u751f\u866b\u7b49\u3002\u2461\u514d\u75ab\u76d1\u89c6\uff1a\u8bc6\u522b\u548c\u6e05\u9664\u4f53\u5185\u7a81\u53d8\u7684\u80bf\u7624\u7ec6\u80de\u548c\u75c5\u6bd2\u611f\u67d3\u7ec6\u80de\u3002\u2462\u514d\u75ab\u81ea\u7a33\uff1a\u8bc6\u522b\u548c\u6e05\u9664\u4f53\u5185\u8870\u8001\u3001\u51cb\u4ea1\u3001\u574f\u6b7b\u7684\u7ec6\u80de\u548c\u514d\u75ab\u590d\u5408\u7269\uff0c\u7ef4\u6301\u5185\u73af\u5883\u7684\u7a33\u5b9a\u3002\n\n\u514d\u75ab\u7cfb\u7edf\u7684\u672c\u8d28\u7279\u5f81\u662f\u8bc6\u522b\u201c\u81ea\u6211\u201d\u548c\u201c\u975e\u6211\u201d\uff0c\u5176\u5206\u5b50\u57fa\u7840\u662f\uff1a\u2460\u673a\u4f53\u7ec6\u80de\u8868\u9762\u90fd\u6709\u4e3b\u8981\u7ec4\u7ec7\u76f8\u5bb9\u6027\u590d\u5408\u5206\u5b50\uff08major histocompatibility complex molecules\uff09\uff0c\u7b80\u79f0MHC \u5206\u5b50\u3002MHC \u5206\u5b50\u5177\u6709\u79cd\u5c5e\u7279\u5f02\u6027\u548c\u4e2a\u4f53\u7279\u5f02\u6027\uff0c\u5373\u4e0d\u540c\u4e2a\u4f53\uff08\u5355\u5375\u53cc\u80ce\u8005\u9664\u5916\uff09\u7684MHC \u5206\u5b50\u5177\u6709\u4e00\u5b9a\u5dee\u522b\uff0c\u800c\u540c\u4e00\u4e2a\u4f53\u7684MHC \u5206\u5b50\u76f8\u540c\uff0c\u56e0\u6b64\uff0cMHC \u5206\u5b50\u6210\u4e3a\u81ea\u8eab\u7ec6\u80de\u7684\u6807\u5fd7\uff0c\u662f\u4ecb\u5bfc\u79fb\u690d\u514d\u75ab\u6392\u65a5\u53cd\u5e94\u7684\u4e3b\u8981\u6297\u539f\uff0c\u4e5f\u662f\u4e34\u5e8a\u4f5c\u4e3a\u4eb2\u5b50\u9274\u5b9a\u548c\u6cd5\u533b\u5b66\u9274\u5b9a\u7684\u4e2a\u4f53\u9057\u4f20\u201c\u6807\u7b7e\u201d\u3002MHC \u5206\u5b50\u53c8\u5206\u4e3a\u2160\u3001\u2161\u3001\u2162\u7c7b\u3002MHC-\u2160\u7c7b\u5206\u5b50\u5206\u5e03\u4e8e\u4e2a\u4f53\u6240\u6709\u6709\u6838\u7ec6\u80de\u8868\u9762\uff0c\u4e3b\u8981\u53c2\u4e0e\u5185\u6e90\u6027\u6297\u539f\u5448\u9012\uff1bMHC-\u2161\u7c7b\u5206\u5b50\u4ec5\u5206\u5e03\u4e8eB ...\n\n### \u513f\u8336\u915a\u80fa \u2014 \u9009\u81ea\u300a\u75c5\u7406\u751f\u7406\u5b66\u300b\n\n...\u80fd\u969c\u788d\u3002\u635f\u4f24\u4e0e\u6297\u635f\u4f24\u53cd\u5e94\u540c\u6837\u53d1\u751f\u5728\u7ec6\u80de\u6c34\u5e73\u4e0a\u3002\u4f8b\u5982\uff0c\u9002\u5b9c\u7684\u5185\u8d28\u7f51\u5e94\u6fc0\u6709\u5229\u4e8e\u7ec6\u80de\u5185\u7a33\u6001\u7684\u7ef4\u6301\uff0c\u7136\u800c\uff0c\u5f53\u7ec6\u80de\u906d\u9047\u635f\u4f24\u540e\u5f15\u53d1\u8fc7\u5ea6\u7684\u5185\u8d28\u7f51\u5e94\u6fc0\uff0c\u5219\u53ef\u5bfc\u81f4\u7ec6\u80de\u4ee3\u8c22\u969c\u788d\uff1b\u76ee\u524d\u5df2\u77e5\u5185\u8d28\u7f51\u5e94\u6fc0\u4ecb\u5bfc\u7684\u708e\u75c7\u901a\u8def\u53ca\u7ec6\u80de\u51cb\u4ea1\u901a\u8def\u7684\u6539\u53d8\uff0c\u4e0e\u7ec6\u80de\u7684\u751f\u957f\u3001\u5206\u5316\u3001\u5b58\u6d3b\u53ca\u51cb\u4ea1\u6709\u5bc6\u5207\u8054\u7cfb\uff0c\u5e76\u5728\u4ee3\u8c22\u6027\u75be\u75c5\u53d1\u751f\u53d1\u5c55\u8fc7\u7a0b\u4e2d\u8d77\u91cd\u8981\u4f5c\u7528\u3002\n\n\u503c\u5f97\u6307\u51fa\u7684\u662f\uff0c\u635f\u4f24\u4e0e\u6297\u635f\u4f24\u4e4b\u95f4\u65e0\u4e25\u683c\u754c\u9650\uff0c\u53ef\u76f8\u4e92\u8f6c\u5316\u3002\u4f8b\u5982\uff0c\u5728\u4e25\u91cd\u5931\u8840\u6027\u4f11\u514b\u65e9\u671f\uff0c\u5c0f\u52a8\u8109\u3001\u5fae\u52a8\u8109\u6536\u7f29\u6709\u52a9\u4e8e\u52a8\u8109\u8840\u538b\u7684\u7ef4\u6301\uff0c\u4f46\u82e5\u6536\u7f29\u65f6\u95f4\u8fc7\u4e45\uff0c\u5c31\u4f1a\u52a0\u91cd\u7ec4\u7ec7\u5668\u5b98\u7684\u7f3a\u8840\u3001\u7f3a\u6c27\u635f\u4f24\u548c\u529f\u80fd\u969c\u788d\u3002\u7531\u4e8e\u4e0d\u540c\u75be\u75c5\u4e2d\u635f\u4f24\u4e0e\u6297\u635f\u4f24\u53cd\u5e94\u7684\u5dee\u5f02\uff0c\u6784\u6210\u4e86\u5404\u79cd\u75be\u75c5\u7684\u4e0d\u540c\u7279\u5f81\u3002\u5728\u75be\u75c5\u7684\u9632\u6cbb\u4e2d\uff0c\u5e94\u5c3d\u91cf\u652f\u6301\u548c\u52a0\u5f3a\u6297\u635f\u4f24\u53cd\u5e94\uff0c\u51cf\u8f7b\u548c\u6d88\u9664\u635f\u4f24\u53cd\u5e94\u3002\n\n\uff08\u4e09\uff09\u2002 \u56e0\u679c\u4ea4\u66ff\n\n\u56e0\u679c\u4ea4\u66ff\u6307\u75be\u75c5\u53d1\u751f\u53d1\u5c55\u8fc7\u7a0b\u4e2d\uff0c\u7531\u539f\u59cb\u75c5\u56e0\u4f5c\u7528\u4e8e\u673a\u4f53\u6240\u4ea7\u751f\u7684\u7ed3\u679c\u53c8\u53ef\u4f5c\u4e3a\u75c5\u56e0\uff0c\u5f15\u8d77\u65b0\u7684\n\n\u53ef\u5f15\u8d77\u5fc3\u6392\u8840\u91cf\u51cf\u5c11\uff0c\u8fdb\u800c\u5bfc\u81f4\u8840\u538b\u4e0b\u964d\uff08\u679c\uff09\uff1b\u540e\u8005\uff08\u56e0\uff09\u523a\u6fc0\u4ea4\u611f\u795e\u7ecf\u5174\u594b\uff0c\u91ca\u653e\u513f\u8336\u915a\u80fa\uff0c\u5f15\u8d77\u5fae\u8840\u7ba1\u6536\u7f29\uff0c\u7ec4\u7ec7\u7f3a\u6c27\uff08\u679c\uff09\u3002\u6301\u7eed\u7684\u7ec4\u7ec7\u7f3a\u6c27\uff08\u56e0\uff09\u5bfc\u81f4\u7ec4\u7ec7\u9178\u4e2d\u6bd2\uff0c\u8fdb\u800c\u51fa\u73b0\u6bdb\u7ec6\u8840\u7ba1\u5927\u91cf\u5f00\u653e\uff0c\u5bfc\u81f4\u5fae\u5faa\u73af\u6de4\u8840\uff08\u679c\uff09\u3002\u540e\u8005\u53c8\u53ef\u4f5c\u4e3a\u65b0\u7684\u539f\u56e0\u7ee7\u7eed\u5bfc\u81f4\u6076\u6027\u5faa\u73af\u800c\u52a0\u91cd\u7ec4\u7ec7\u635f\u4f24\u3002\n\n\u7531\u4e8e\u539f\u56e0\u548c\u7ed3\u679c\u7684\u76f8\u4e92\u8f6c\u5316\u548c\u4ea4\u66ff\uff0c\u6709\u4e9b\u75be\u75c5\u4e00\u65e6\u53d1\u751f\uff08\u5982\u653e\u5c04\u6027\u635f\u4f24\u6216\u4e8c\u6c27\u5316\u7845\u5f15\u8d77\u7684\u80ba\u7ea4\u7ef4\u5316\uff09\uff0c\u6216\u8fdb\u5c55\u5230\u4e00\u5b9a\u7a0b\u5ea6\uff08\u5982\u94fe\u7403\u83cc\u53cd\u590d\u611f\u67d3\u5f15\u8d77\u7684\u6162\u6027\u80be\u5c0f\u7403\u80be\u708e\u6216\u7531\u9ad8\u8840\u538b\u5f15\u8d77\u7684\u6162\u6027\u80be\u75c5\u7b49\uff09\uff0c\u5373\u4f7f\u539f\u59cb\u75c5\u56e0\u5df2\u4e0d\u5b58\u5728\uff0c\u901a\u8fc7\u56e0\u679c\u4ea4\u66ff\u89c4\u5f8b\u4ecd\u53ef\u63a8\u52a8\u75be\u75c5\u7684\u8fdb\u5c55\u3002\u56e0\u6b64\uff0c\u4f5c\u4e3a\u533b\u52a1\u5de5\u4f5c\u8005\uff0c\u63ed\u793a\u4e0d\u540c\u75be\u75c5\u4e2d\u56e0\u679c\u4ea4\u66ff\u7684\u5185\u5728\u673a\u5236\u3001\u53ca\u65f6\u53d1\u73b0\u5e76\u6253\u65ad\u8fd9\u79cd\u6076\u6027\u5faa\u73af\uff0c\u4fbf\u53ef\u4f7f\u75be\u75c5\u671d\u7740\u6709\u5229\u4e8e\u673a\u4f53\u5065\u5eb7\u7684\u65b9\u5411\u53d1\u5c55\u3002\n\n\u503c\u5f97\u6307\u51fa\u7684\u662f\uff0c\u75be\u75c5\u53d1\u751f\u53d1\u5c55\u8fc7\u7a0b\u4e2d\u867d\u7136\u5b58\u5728\u56e0\u679c\u8f6c\u5316\uff0c\u4f46\u5e76\u4e0d\u662f\u6240\u6709\u73af\u8282\u90fd\u540c\u7b49\u91cd\u8981\u3002\u5176\u4e2d\uff0c\u6709\u7684\u73af\u8282\u8d77\u51b3\u5b9a\u6027\u4f5c\u7528\uff0c\u4e3a\u5176\u4ed6\u73af\u8282\u7684\u53d1\u751f\u53d1\u5c55\u6240\u5fc5\u9700\uff0c\u8be5\u73af\u8282\u88ab\u79f0\u4e3a\u53d1\u75c5\u7684\u4e3b\u5bfc\u73af\u8282\u3002\u4f8b\u5982\uff0c\u7532\u72b6\u817a\u529f\u80fd\u4ea2\u8fdb\u5e38\u5f15\u8d77\u5fc3\u5f8b\u5931\u5e38\uff0c\u800c\u5fc3\u5f8b\u5931\u5e38\u5f80\u5f80\u53c8\u4f1a\u5f15\u8d77\u5fc3\u7ede\u75db\u3001\u5fc3\u808c\u6897\u6b7b\u751a\u81f3\u5fc3\u529b\u8870\u7aed\u3002\u7136\u800c\uff0c\u8fd9\u4e9b\u5fc3\u810f\u75c5\u53d8\u7684\u6700\u6839\u672c\u539f\u56e0\u662f\u8fc7\u91cf\u7532\u72b6\u817a\u6fc0\u7d20\u5bf9\u5fc3\u808c\u4ee3\u8c22\u3001\u8840\u6d41\u52a8\u529b\u5b66\u53ca\u795e\u7ecf\u5185\u5206\u6ccc\uff08\u5982\u4ea4\u611f\u200a-\u200a\u80be\u4e0a\u817a\u9ad3\u8d28\u7cfb\u7edf\u3001\u80be\u7d20\u200a-\u200a\u8840\u7ba1\u7d27\u5f20\u7d20\u200a-\u200a\u919b\u56fa\u916e\u7cfb\u7edf\uff09\u7684\u4e0d\u5229\u5f71\u54cd\u3002\u56e0\u6b64\uff0c\u7532\u72b6\u817a\u529f\u80fd\u4ea2\u8fdb\u662f\u75be\u75c5\u7684\u4e3b\u5bfc\u73af\u8282\uff0c\u6cbb\u7597\u65f6\u5e94\u9488\u5bf9\u7532\u72b6\u817a\u529f\u80fd\u4ea2\u8fdb\u3002\u53ef\u89c1\uff0c\u4e86\u89e3\u75be\u75c5\u53d1\u5c55\u7684\u4e3b\u5bfc\u73af\u8282\uff0c\u5bf9\u8bca\u65ad\u548c\u6cbb\u7597\u75be\u75c5\u5177\u6709\u91cd\u8981\u610f\u4e49\u3002\n\n\uff08\u56db\uff09\u2002 \u5c40\u90e8\u548c\u6574\u4f53\n\n\u591a\u6570\u75be\u75c5\u90fd\u6709\u5c40\u90e8\u8868\u73b0\u548c\u5168\u8eab\u53cd\u5e94\uff0c\u4e00\u65b9\u9762\u5c40\u90e8\u75c5\u53d8\u53ef\u4ee5\u901a\u8fc7\u795e\u7ecf\u4f53\u6db2\u9014\u5f84\u5f15\u8d77\u6574\u4f53\u53cd\u5e94\uff0c\u53e6\u4e00\u65b9\u9762\u673a\u4f53\u7684\u5168\u8eab\u529f\u80fd\u72b6\u6001\u4e5f\u53ef\u5f71\u54cd\u5c40\u90e8\u75c5\u53d8\u7684\u53d1\u5c55\u3002\u6240\u4ee5\u5728\u75be\u75c5\u8fdb\u7a0b\u4e2d\uff0c\u5c40\u90e8\u548c\u6574\u4f53\u76f8\u4e92\u5f71\u54cd\uff0c\u76f8\u4e92\u5236\u7ea6\u3002\u4f8b\u5982\uff0c\u6bdb\u56ca\u708e\uff08\u75c8\u3001\u7596\uff09\u53ef\u5f15\u8d77\u5c40\u90e8\u5145\u8840\u3001\u6c34\u80bf\u7b49\u708e\u6027\u53cd\u5e94\uff0c\u8fd8\u53ef\u901a\u8fc7\u795e\u7ecf\u4f53\u6db2\u9014\u5f84\u5f15\u8d77\u767d\u7ec6\u80de\u8ba1\u6570\u5347\u9ad8\u3001\u53d1\u70ed\u3001\u5bd2\u6218\u7b49\u5168\u8eab\u6027\u8868\u73b0\u3002\u5982\u679c\u4f53\u8d28\u5f3a\u58ee\u3001\u8eab\u4f53\u529f\u80fd\u72b6\u6001\u826f\u597d\uff0c\u52a0\u4ee5\u9002\u5f53\u7684\u6297\u708e\u6cbb\u7597\uff0c\u5c40\u90e8\u75c8\u3001\u7596\u53ef\u5f88\u5feb\u75ca\u6108\uff1b\u53cd\u4e4b\uff0c\u4e5f\u53ef\u5f15\u8d77\u5168\u8eab\u6027\u611f\u67d3\uff0c\u4e25\u91cd\u65f6\u53ef\u5f15\u8d77\u8113\u6bd2\u75c7\u7b49\u4e25\u91cd\u540e\u679c\u3002\u518d\u5982\uff0c\u5c40$\u90e8\u80f0\u5c9b\u03b2\u7ec6\u80de\u5185\u5206\u6ccc\u7f3a\u9677\u5bfc\u81f4\u4f53\u5185\u80f0\u5c9b\u7d20\u51cf\u5c11\uff0c\u8fdb\u800c\u5bfc\u81f4\u5168\u8eab\u591a\u4e2a...\n\n### \u52a8\u8109\u7ca5\u6837\u786c\u5316 \u2014 \u9009\u81ea\u300a\u75c5\u7406 \u7ca5\u6837\u786c\u5316\u975e\u5e38\u91cd\u8981\u3002\u5b83\u4f1a\u5bfc\u81f4\u8840\u7ba1\u8154\u660e\u663e\u72ed\u7a84\uff0c\u5f53\u6591\u5757\u7834\u88c2\u65f6\u8fd8\u53ef\u5f15\u53d1\u8840\u6813\u5f62\u6210\uff0c\u4ece\u800c\u5bfc\u81f4\u8840\u7ba1\u6025\u6027\u95ed\u585e\uff0c\u8fd9\u662f\u7f3a\u8840\u6027\u8111\u5352\u4e2d\u3001\u51a0\u5fc3\u75c5\u548c\u5916\u5468\u52a8\u8109\u75be\u75c5\u7684\u4e3b\u8981\u75c5\u7406\u8fc7\u7a0b\u3002\u56e0\u6b64\uff0c\u901a\u8fc7\u4f7f\u7528\u8c03\u8102\u836f\u7269\u3001\u6297\u8840\u5c0f\u677f\u836f\u7269\u7b49\u65b9\u6cd5\u53ef\u4ee5\u5ef6\u7f13\u52a8\u8109\u7ca5\u6837\u786c\u5316\u7684\u8fdb\u5c55\u3002\n\n\u672c\u7ae0\u6570\u5b57\u8d44\u6e90\n\n\u514d\u75ab\u7cfb\u7edf\uff08immune system\uff09\u7531\u6dcb\u5df4\u5668\u5b98\u3001\u6dcb\u5df4\u7ec4\u7ec7\u3001\u514d\u75ab\u7ec6\u80de\u548c\u514d\u75ab\u6d3b\u6027\u5206\u5b50\u6784\u6210\u3002\u6dcb\u5df4\u5668\u5b98\u5305\u62ec\u4e2d\u67a2\u6dcb\u5df4\u5668\u5b98\uff08\u80f8\u817a\u548c\u9aa8\u9ad3\uff09\u548c\u5468\u56f4\u6dcb\u5df4\u5668\u5b98\uff08\u6dcb\u5df4\u7ed3\u3001\u813e\u548c\u6241\u6843\u4f53\u7b49\uff09\u3002\u6dcb\u5df4\u7ec4\u7ec7\u662f\u5468\u56f4\u6dcb\u5df4\u5668\u5b98\u7684\u4e3b\u8981\u6210\u5206\uff0c\u4ea6\u5e7f\u6cdb\u5206\u5e03\u4e8e\u6d88\u5316\u7ba1\u548c\u547c\u5438\u9053\u7b49\u5904\u3002\u514d\u75ab\u7ec6\u80de\u5305\u62ec\u6dcb\u5df4\u7ec6\u80de\u3001\u6297\u539f\u5448\u9012\u7ec6\u80de\u3001\u7c92\u7ec6\u80de\u548c\u80a5\u5927\u7ec6\u80de\u7b49\uff0c\u5b83\u4eec\u6216\u805a\u96c6\u4e8e\u6dcb\u5df4\u7ec4\u7ec7\u4e2d\uff0c\u6216\u6563\u5728\u4e8e\u8840\u6db2\u3001\u6dcb\u5df4\u53ca\u5176\u4ed6\u7ec4\u7ec7\u5185\u3002\u514d\u75ab\u6d3b\u6027\u5206\u5b50\u5305\u62ec\u514d\u75ab\u7403\u86cb\u767d\u3001\u8865\u4f53\u3001\u7ec6\u80de\u56e0\u5b50\u7b49\u3002\u4ee5\u4e0a\u6210\u5206\u901a\u8fc7\u8840\u6db2\u5faa\u73af\u548c\u6dcb\u5df4\u5faa\u73af\u76f8\u4e92\u8054\u7cfb\u548c\u6d41\u901a\uff0c\u4f7f\u514d\u75ab\u7cfb\u7edf\u5f62\u6210\u4e00\u4e2a\u7ed u4e3a37\u2103\u65f6\uff09\u3002\u5f53\u6e29\u5ea6\u4e0d\u53d8\u65f6\uff0c\u5168\u8840\u7684\u9ecf\u5ea6\u548c\u8840\u6d46$\u7684\u9ecf\u5ea6\u5206\u522b\u4e3b\u8981\u51b3\u5b9a\u4e8e\u8840\u7ec6\u80de\u6bd4\u5bb9\u7684\u9ad8\u4f4e\u548c\u8840\u6d46\u86cb\u767d\u542b\u91cf\u7684\u591a\u5c11\u3002\u5168\u8840\u7684\u9ecf\u5ea6\u8fd8\u53d7\u8840\u6d41\u5207\u7387\u7684\u5f71\u54cd\uff08\u89c1\u7b2c\u56db\u7ae0\uff09\u3002\u8840\u6db2\u9ecf\u6ede\u5ea6\u662f\u5f62\u6210\u8840\u6d41\u963b\u529b\u7684\u91cd\u8981\u56e0\u7d20\u4e4b\u4e00\u3002\n\n\uff08\u4e09\uff09\u2003 \u8840\u6d46\u6e17\u900f\u538b\n\n\u5f53\u4e0d\u540c\u6d53\u5ea6\u7684\u6eb6\u6db2\u88ab\u534a\u900f\u819c\u5206\u9694\u65f6\uff0c\u4f4e\u6d53\u5ea6\u4fa7\u6eb6\u6db2\u4e2d\u7684\u6c34\u5206\u5b50\u5c06\u5728\u4e24\u4fa7\u6e17\u900f\u538b\u5dee\u7684\u9a71\u52a8\u4e0b\u901a\u8fc7\u534a\u900f\u819c\u8fdb\u5165\u9ad8\u6d53\u5ea6\u4fa7\u7684\u6eb6\u6db2\u4e2d\uff0c\u8fd9\u4e00\u73b0\u8c61\u79f0\u4e3a\u6e17\u900f\uff08osmosis\uff09\u3002\u6eb6\u6db2\u6e17\u900f\u538b\uff08osmotic pressure\uff09\u7684\u9ad8\u4f4e\u53d6\u51b3\u4e8e\u5355\u4f4d\u4f53\u79ef\u6eb6\u6db2\u4e2d\u6eb6\u8d28\u9897\u7c92\uff08\u5206\u5b50\u6216\u79bb\u5b50\uff09\u6570\u76ee\u7684\u591a\u5c11\uff0c\u800c\u4e0e\u6eb6\u8d28\u7684\u79cd\u7c7b\u548c\u9897\u7c92\u7684\u5927\u5c0f\u65e0\u5173\u3002\u8fd9\u79cd\u73b0\u8c61\u88ab\u547d\u540d\u4e3a\u8303\u6258\u592b\u5b9a\u5f8b\uff08van\u2019t Hoff\u2019 s law\uff09\uff0c\u8377\u5170\u79d1\u5b66\u5bb6\u8303\u6258\u592b\u7531\u4e8e\u53d1\u73b0\u6eb6\u6db2\u4e2d\u7684\u5316\u5b66\u52a8\u529b\u5b66\u6cd5\u5219\u548c\u6e17\u900f\u538b\u89c4\u5f8b\u4e8e1901 \u5e74\u6210\u4e3a\u7b2c\u4e00\u4f4d\u8bfa\u8d1d\u5c14\u5316\u5b66\u5956\u7684\u83b7\u5f97\u8005\u3002\u8840\u6d46\u6e17\u900f\u6d53\u5ea6\u7ea6\u4e3a300mmol/L\uff0c\u5373\u4ea7\u751f$\u7ea6300mOsm/\uff08kg\u00b7H$2O\uff09\u7684\u6e17\u900f\u538b\uff0c\u76f8\u5f53\u4e8e770kPa \u62165 790mmHg\u3002\u8840\u6d46\u7684\u6e17\u900f\u538b\u4e3b\u8981\u67 9ad810mmHg\uff0c\u8840\u6d46HCO3-\u4ec5\u589e\u9ad80.7~1mmol/L\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u547c\u5438\u6027\u78b1\u4e2d\u6bd2**\uff1a\u80ba\u901a\u6c14\u8fc7\u5ea6\u5f15\u8d77\u7684PaCO2\u964d\u4f4e\u3001pH\u5347\u9ad8\uff0c\u4ee5\u8840\u6d46H2CO3\u6d53\u5ea6\u539f\u53d1\u6027\u51cf\u5c11\u4e3a\u7279\u5f81\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u547c\u5438\u6027\u9178\u4e2d\u6bd2**\uff1aPaCO2\u589e\u9ad8\u3001pH\u964d\u4f4e\u7684\u9178\u78b1\u5e73\u8861\u7d0a\u4e71\uff0c\u5bf9\u673a\u4f53\u5f71\u54cd\u5305\u62ec\u5fc3\u5f8b\u5931\u5e38\u3001\u5fc3\u808c\u6536\u7f29\u529b\u51cf\u5f31\u7b49\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66  \u2190 \u524d\u7f6e\uff1aPaCO2 \u2192 \u80ba\u901a\u6c14\u969c\u788d*\n\n**AB**\uff1a\u5b9e\u9645\u78b3\u9178\u6c22\u76d0\uff0c\u547c\u5438\u6027\u9178\u4e2d\u6bd2\u65f6\u5347\u9ad8\u4e14\u5927\u4e8eSB\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**ATP**\uff1a\u7ec6\u83cc\u4ee3\u8c22\u4e2d\u4ea7\u751f\u7684\u80fd\u91cf\u5206\u5b50\uff0cEMP\u9014\u5f84\u4ea7\u751f2\u5206\u5b50\uff0c\u9700\u6c27\u547c\u5438\u4ea7\u751f32\u5206\u5b50\u3002\n*\u6765\u6e90\uff1a\u751f\u7406\u5b66\u3001\u533b\u5b66\u5fae\u751f\u7269\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u6025\u6027\u547c\u5438\u7a98\u8feb\u7efc\u5408\u5f81**\uff1a\u4f4e\u8840\u7cd6\u660f\u8ff7\u65f6\u5206\u6ccc\u7269\u6216\u5f02\u7269\u8bef\u5438\u5165\u6c14\u7ba1\u53ef\u80fd\u8bf1\u53d1\u7684\u4e25\u91cd\u547c\u5438\u7cfb\u7edf\u5e76\u53d1\u75c7\u3002\n*\u6765\u6e90\uff1a\u4f20\u67d3\u75c5\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u4e25\u91cd\u6025\u6027\u547c\u5438\u7efc\u5408\u5f81**\uff1a\u4e00\u79cd\u4e0e\u7f3a\u6c27\u76f8\u5173\u7684\u75be\u75c5\uff0c\u662f\u7f3a\u6c27\u7684\u5e38\u89c1\u539f\u56e0\u4e4b\u4e00\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u5b66\u3001\u4f20\u67d3\u75c5\u5b66\u3001\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u6162\u6027\u963b\u585e\u6027\u80ba\u75be\u75c5**\uff1a\u4e3b\u8981\u4fb5 u7406\u5b66*\n\n**\u4f4e\u6c27\u8840\u75c7**\uff1a\u5438\u5165\u6c14\u6c27\u5206\u538b\u8fc7\u4f4e\u6216\u80ba\u75be\u75c5\u5bfc\u81f4\u7684\u8840\u6c27\u964d\u4f4e\uff0c\u53ef\u523a\u6fc0\u80ba\u8fc7\u5ea6\u901a\u6c14\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66  \u2190 \u524d\u7f6e\uff1aPaO2 \u2192 \u80ba\u901a\u6c14\u8fc7\u5ea6*\n\n**\u6025\u6027\u547c\u5438\u6027\u78b1\u4e2d\u6bd2**\uff1aPaCO2\u4e0b\u964d\u540e\u77ed\u65f6\u95f4\u5185pH\u5347\u9ad8\uff0c\u5e38\u89c1\u4e8e\u4eba\u5de5\u547c\u5438\u5668\u4f7f\u7528\u4e0d\u5f53\u3001\u9ad8\u70ed\u548c\u4f4e\u6c27\u8840\u75c7\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u6162\u6027\u547c\u5438\u6027\u78b1\u4e2d\u6bd2**\uff1a\u4f4e\u78b3\u9178\u8840\u75c7\u6301\u7eed\u5b58\u5728\uff0c\u80be\u810f\u4ee3\u507f\u8c03\u8282\u53d1\u6325\u4f5c\u7528\uff0c\u8840\u6d46HCO3-\u4ee3\u507f\u6027\u964d\u4f4e\u7684\u9178\u78b1\u5e73\u8861\u7d0a\u4e71\u72b6\u6001\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u8840\u7ea2\u86cb\u767d\u6c27\u89e3\u79bb\u66f2\u7ebf\u5de6\u79fb**\uff1a\u8840\u6db2pH\u5347\u9ad8\u4f7f\u8840\u7ea2\u86cb\u767d\u4e0eO2\u4eb2\u548c\u529b\u589e\u5f3a\uff0c\u6c27\u89e3\u79bb\u66f2\u7ebf\u5de6\u79fb\uff0c\u7ec4\u7ec7\u4f9b\u6c27\u4e0d\u8db3\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u547c\u5438\u6027\u9178\u4e2d\u6bd2\u5408\u5e76\u4ee3\u8c22\u6027\u78b1\u4e2d\u6bd2**\uff1a\u6162\u6027\u547c\u5438\u6027\u9178\u4e2d\u6bd2\u57fa\u7840\u4e0a\u56e0\u5455\u5410\u6216\u5229\u5c3f\u5242\u5bfc\u81f4\u4ee3\u8c22\u6027\u78b1\u4e2d\u6bd2\u7684\u6df7\u5408\u578b\u9178\u78b1\u7d0a\u4e71\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u52a8\u8109\u8840\u6c27\u5206\u538b**\uff1a\u52a8\u8109\u8840\u4e2d\u7684\u6c27\u5206\u538b\uff0c\u6b63\u5e38\u7ea6\u4e3a100mmHg\uff0c\u53d6\u51b3\u4e8e\u5438\u5165\u6c14\u7684\u6c27\u5206\u538b\u548c\u80ba\u7684\u901a\u6c14\u4e0e\u5f25\u6563\u529f\u80fd\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u6c27\u89e3\u79bb\u66f2\u7ebf**\uff1a\u8868\u793a\u8840\u7ea2\u86cb\u767d\u6c27\u9971\u548c\u5ea6\u4e0e\u8840\u6c27\u5206\u538b\u5173\u7cfb\u7684S\u5f62\u66f2\u7ebf\uff0c\u53d7pH\u3001\u6e29\u5ea6\u3001CO2\u5206\u538b\u548c2,3-DPG\u7b49\u56e0\u7d20\u5f71\u54cd\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u4f4e\u6c27\u901a\u6c14\u53cd\u5e94**\uff1aPaO2\u964d\u4f4e\u523a\u6fc0\u9888\u52a8\u8109\u4f53\u548c\u4e3b\u52a8\u8109\u4f53\u5316\u5b66\u611f\u53d7\u5668\uff0c\u53cd\u5c04\u6027\u5174\u594b\u547c\u5438\u4e2d\u67a2\uff0c\u4f7f\u547c\u5438\u52a0\u6df1\u52a0\u5feb\u3001\u80ba\u901a\u6c14\u91cf\u589e\u52a0\u7684\u53cd\u5e94\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u9ad8\u539f\u80ba\u6c34\u80bf**\uff1a\u5c11\u6570\u4eba\u4ece\u5e73\u539f\u5feb\u901f\u8fdb\u51652500m\u4ee5\u4e0a\u9ad8\u539f\u65f6\uff0c\u56e0\u4f4e\u538b\u7f3a\u6c27\u800c\u53d1\u751f\u7684\u4e00\u79cd\u9ad8\u539f\u7279\u53d1\u6027\u75be\u75c5\uff0c\u8868\u73b0\u4e3a\u547c\u5438\u56f0\u96be\u3001\u53d1\u7ec0\u3001\u54b3\u6ce1\u6cab\u75f0\u7b49\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66  \u2190 \u524d\u7f6e\uff1a\u7f3a\u6c27*\n\n**\u6c27\u7597**\uff1a\u901a\u8fc7\u5438\u5165\u6c27\u5206\u538b\u8f83\u9ad8\u7684\u7a7a\u6c14\u6216\u7eaf\u6c27\u6cbb\u7597\u75be\u75c5\u7684\u65b9\u6cd5\uff0c\u662f\u6cbb\u7597\u7f3a\u6c27\u7684\u9996\u8981\u63aa\u65bd\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u53bb\u6c27\u8840\u7ea2\u86cb\u767d**\uff1a\u672a\u7ed3\u5408\u6c27\u7684\u8840\u7ea2\u86cb\u767d\uff0c\u5176\u4e2d\u592e\u5b54\u7a74\u5927\uff0c\u53ef\u7ed3\u54082,3-DPG\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u5fc3\u529f\u80fd\u2161\u7ea7**\uff1a\u9759\u606f\u65f6\u65e0\u75c7\u72b6\uff0c\u4f53\u529b\u6d3b\u52a8\u8f7b\u5ea6\u53d7\u9650\uff0c\u65e5\u5e38\u6d3b\u52a8\u53ef\u5f15\u8d77\u547c\u5438\u56f0\u96be\u3001\u75b2\u4e4f\u548c\u5fc3\u60b8\u7b49\u75c7\u72b6\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u80ba\u6c34\u80bf**\uff1a\u80ba\u5faa\u73af\u6de4\u8840\u4e25\u91cd\u65f6\u51fa\u73b0\u7684\u80ba\u6ce1\u548c\u95f4\u8d28\u6db2\u4f53\u589e\u591a\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n**\u5438\u6c14\u6027\u547c\u5438\u56f0\u96be**\uff1a\u5438\u6c14\u65f6\u6c14\u9053\u72ed\u7a84\u52a0\u91cd\u5bfc\u81f4\u7684\u547c\u5438\u56f0\u96be\uff0c\u5e38\u89c1\u4e8e\u4e2d\u592e\u6c14\u9053\u80f8\u5916\u963b\u585e\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66*\n\n## \u539f\u6587\u7cbe\u8bfb\n\n### \u7f3a\u6c27 \u2014 \u9009\u81ea\u300a\u75c5\u7406\u751f\u7406\u5b66\u300b\n\n...\u536b\u751f\u8ba1\u751f\u7a81\u51fa\u8d21\u732e\u4e2d\u9752\u5e74\u4e13\u5bb6\u79f0\u53f7\uff0c\u6559\u80b2\u90e8\u9ad8\u7b49\u5b66\u6821\u57fa\u7840\u533b\u5b66\u7c7b\u6559\u5b66\u6307\u5bfc\u59d4\u5458\u4f1a\u59d4\u5458\uff0c\u4e2d\u56fd\u75c5\u7406\u751f\u7406\u5b66\u4f1a\u5e38\u52a1\u7406\u4e8b\uff0c\u56fd\u9645\u52a8\u8109\u7ca5\u6837\u786c\u5316\u5b66\u4f1a\u4e2d\u56fd\u5206\u4f1a\u4e3b\u5e2d\uff0c\u300a\u4e2d\u56fd\u52a8\u8109\u786c\u5316\u6742\u5fd7\u300b\u4e3b\u7f16\uff0c\u5357\u534e\u5927\u5b66\u56fd\u5bb6\u4e00\u6d41\u4e13\u4e1a\u4e34\u5e8a\u533b\u5b66\u548c\u56fd\u5bb6\u4e00\u6d41\u8bfe\u7a0b\u201c\u75c5\u7406\u751f\u7406\u5b66\u201d\u8d1f\u8d23\u4eba\u3002\n\n\u4ece\u4e8b\u533b\u5b66\u6559\u80b2\u3001\u79d1\u7814\u5de5\u4f5c30 \u4f59\u5e74\uff0c\u5148\u540e\u4e3b\u6301\u56fd\u5bb6\u7ea7\u548c\u7701\u90e8\u7ea7\u7b49\u5404\u7c7b\u79d1\u7814\u8bfe\u989820 \u4f59\u9879\uff0c\u5728\u56fd\u5185\u5916\u77e5\u540d\u671f\u520a\u4e0a\u53d1\u8868\u8bba\u6587280 \u4f59\u7bc7\uff0c\u5176\u4e2d\uff0cSCI\u6536\u5f55160 \u4f59\u7bc7\u3002\u526f\u4e3b\u7f16\u3001\u4e3b\u7f16\u548c\u603b\u4e3b\u7f16\u5168\u56fd\u9ad8\u7b49\u533b\u5b66\u9662\u6821\u56fd\u5bb6\u7ea7\u7b49\u5404\u7c7b\u89c4\u5212\u6559\u675020 \u4f59\u90e8\uff0c\u83b7\u56fd\u5bb6\u7ea7\u6559\u5b66\u6210\u679c\u5956\u4e8c\u7b49\u59561 \u9879\uff0c\u83b7\u5168\u56fd\u9996\u5c4a\u6559\u6750\u5efa\u8bbe\u5956\u4f18\u79c0\u6559\u6750\u4e8c\u7b49\u5956\u548c\u5168\u56fd\u6559\u6750\u5efa\u8bbe\u5148\u8fdb\u4e2a\u4eba\u3002\u83b7\u7701\u90e8\u7ea7\u79d1\u6280\u6210\u679c\u5956\u548c\u6559\u5b66\u6210\u679c\u5956\u4e00\u7b49\u5956\u7b49\u5956\u52b16 \u9879\uff0c\u62c5\u4efb\u56fd\u9645\u53ca\u5168\u56fd\u5b66\u672f\u4f1a\u8bae\u4e3b\u5e2d\u591a\u6b21\u3002\n\n\u5218\u91d1\u4fdd\n\n\u7537\uff0c1965 \u5e742 \u6708\u751f\u4e8e\u6cb3\u5357\u7701\u3002\u73b0\u4efb\u5e7f\u5dde\u533b\u79d1\u5927\u5b66\u75c5\u7406\u751f\u7406\u5b66\u4e8c\u7ea7\u6559\u6388\uff0c\u535a\u58eb\u7814\u7a76\u751f\u5bfc\u5e08\uff1b\u4e2d\u56fd\u75c5\u7406\u751f\u7406\u5b66\u4f1a\u5e38\u52a1\u7406\u4e8b\uff0c\u4e2d\u56fd\u75c5\u7406\u751f\u7406\u5b66\u4f1a\u86cb\u767d\u8d28\u4fee\u9970\u4e0e\u75be\u75c5\u4e13\u4e1a\u59d4\u5458\u4f1a\u4e3b\u4efb\u59d4\u5458\uff0c\u7f3a\u6c27\u548c\u547c\u5438\u4e13\u4e1a\u59d4\u5458\u4f1a\u526f\u4e3b\u4efb\u59d4\u5458\uff0c\u4e2d\u56fd\u751f\u7406\u5b66\u4f1a\u547c\u5438\u751f\u7406\u4e13\u4e1a\u59d4\u5458\u4f1a\u4e3b\u4efb\u59d4\u5458\uff1b\u5e7f\u4e1c\u7701\u86cb\u767d\u8d28\u4fee\u9970\u4e0e\u964d\u89e3\u91cd\u70b9\u5b9e\u9a8c\u5ba4\u4e3b\u4efb\uff0c\u5e7f\u4e1c\u7701\u75c5\u7406\u751f\u7406\u5b66\u4f1a\u526f\u7406\u4e8b\u957f\u3002\u4ece\u4e8b\u75c5\u7406\u751f\u7406\u5b66\u6559\u5b66\u5de5\u4f5c36 \u5e74\u3002\u526f\u4e3b\u7f16\u201c\u5341\u4e09\u4e94\u201d\u89c4\u5212\u6559\u6750\u300a\u75c5\u7406\u751f\u7406\u5b66\u300b\uff08\u7b2c4 \u7248\uff09\uff0c\u83b7\u5e7f\u4e1c\u7701\u6559\u80b2\u6559\u5b66\u6210\u679c\u5956\u4e8c\u7b49\u5956\u3002\u957f\u671f\u4ece\u4e8b\u86cb\u767d\u8d28\u4fee\u9970\u4e0e\u964d\u89e3\u5173\u7cfb\u7684\u7814\u7a76\uff0c\u7814\u7a76\u6210\u679c\u83b7\u6559\u80b2\u90e8\u9ad8\u7b49\u5b66\u6821\u79d1\u5b66\u7814\u7a76\u4f18\u79c0\u6210\u679c\u5956\u81ea\u7136\u79d1\u5b66\u5956\u4e8c\u7b49\u5956\u7b49\u5956\u9879\uff0c\u53d1\u8868SCI \u8bba\u6587130 \u4f59\u7bc7\uff0c\u83b7\u53d1\u660e\u4e13\u52295 \u9879\u3002\n\n\u5f20\u2003 \u654f\n\n\u5973\uff0c1968 \u5e748 \u6708\u751f\u4e8e\u6cb3\u5317\u7701\u3002\u6559\u6388\uff0c\u535a\u58eb\u7814\u7a76\u751f\u5bfc\u5e08\uff0c\u73b0\u4efb\u6cb3\u5317\u533b\u79d1\u5927\u5b66\u6559\u52a1\u5904\u5904\u957f\uff0c\u4e3a\u7701\u7ea7\u91cd\u70b9\u5b66\u79d1\u7684\u5b66\u672f\u5e26\u5934\u4eba\uff0c\u56fd\u5bb6\u7ea7\u7ebf\u4e0a\u7ebf\u4e0b\u6df7\u5408\u5f0f\u201c\u91d1\u8bfe\u201d\u8d1f\u8d23\u4eba\u3002\u4eab\u53d7\u6cb3\u5317\u7701\u653f\u5e9c\u7279\u6b8a\u6d25\u8d34\u3001\u6cb3\u5317\u7701\u6559\u5b66\u540d\u5e08\u3001\u6cb3\u5317\u7701\u201c\u4e09\u4e09\u4e09\u4eba\u624d\u5de5\u7a0b\u201d\u7b2c\u4e8c\u5c42\u6b21\u4eba\u9009\u3002\u62c5\u4efb\u4e34\u5e8a\u533b\u5b66\u4e13\u4e1a\u8ba4\u8bc1\u4e13\u5bb6\u3001\u56fd\u5bb6\u533b\u5e08\u8d44\u683c\u8003\u8bd5\u4e34\u5e8a\u7c7b\u522b\u8bd5\u9898\u5f00\u53d1\u4e13\u5bb6\u59d4\u5458\u4f1a\u59d4\u5458\uff1b\u517c\u4efb\u4e2d\u56fd\u9ad8\u7b49\u6559\u80b2\u5b66\u4f1a\u533b\u5b66\u6559\u80b2\u4e13\u4e1a\u59d4\u5458\u4f1a\u7406\u4e8b\uff0c\u4e2d\u56fd\u75c5\u7406\u751f\u7406\u5b66\u4f1a\u6559\u5b66\u7814\u7a76\u4e13\u4e1a\u59d4\u5458\u4f1a\u59d4\u5458\u3002\u4ece\u4e8b\u6559\u5b66\u5de5\u4f5c30 \u5e74\u3002\u4f5c\u4e3a\u9879\u76ee\u8d1f\u8d23\u4eba\u4e3b\u6301\u6559\u5b66\u7814\u7a76\u4e0e\u6539\u9769\u8bfe\u98988 \u9879\uff0c\u53d1\u8868\u6559\u6539\u76f8\u5173\u8bba\u658710 \u7bc7\uff0c\u83b7\u7701\u7ea7\u4ee5\u4e0a\u6559\u5b66\u6210\u679c\u59563 \u9879\uff0c\u5176\u4e2d\u56fd\u5bb6\u7ea7\u6559\u5b66\u6210\u679c\u5956\u4e8c\u7b49\u59561 \u9879\uff08\u6392\u540d\u7b2c4\uff09\uff1b\u4e3b\u7f16\u53ca\u53c2\u7f16\u6559\u6750\u53ca\u6559\u5b66\u53c2\u8003\u4e666 \u90e8\u3002...\n\n### PaCO2 \u2014 \u9009\u81ea\u300a\u75c5\u7406\u751f\u7406\u5b66\u300b\n\n...\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd204\u4e09\u3001\t \u5faa\u73af\u7cfb\u7edf\u53d8\u5316\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd\ufffd d\u6291\u5236\u7ec6\u80de\u51cb\u4ea1\u800c\u5f15\u53d1\u767d\u8840\u75c5\u3002\u6b64\u5916\uff0c\u8868\u89c2\u9057\u4f20\u56e0\u7d20\uff08epigenetic factor\uff09\u5728\u75be\u75c5\u53d1\u751f\u53d1\u5c55\u4e2d\u7684\u4f5c\u7528\u8d8a\u6765\u8d8a\u53d7\u5230\u91cd\u89c6\u3002\n\n\u7531\u9057\u4f20\u7269\u8d28\u6216\u57fa\u56e0\uff08\u5305\u62ecDNA \u548cRNA\uff09\u7684\u53d8\u5f02\u5f15\u8d77\u7684\u4e00\u7c7b\u4ee5\u86cb\u767d\u8d28\u5f02\u5e38\u4e3a\u7279\u5f81\u7684\u75be\u75c5\u88ab\u79f0\u4e3a\u5206\u5b50\u75c5\uff08molecular disease\uff09\uff0c\u5982\u7531\u4e8e\u7f16\u7801\u8461\u8404\u7cd6\u200a-\u200a6\u200a-\u200a\u78f7\u9178\u8131\u6c22\u9176\u7684\u57fa\u56e0\u7f3a\u9677\u6240\u5f15\u8d77\u7684\u6eb6\u8840\u6027\u75be\u75c5\uff08\u5373\u8695$\u8c46\u75c5\uff09\u548c\u7531\u4e8e\u8840\u7ea2\u86cb\u767d\u57fa\u56e0\u7a81\u53d8\uff0c\u5bfc\u81f4\u5176\u5206\u5b50\u4e2d\u03b2\u73e0\u86cb\u767d\u80bd\u94fe\u6c28\u57fa\u7aef\u7b2c6 \u4f4d\u4eb2\u6c34\u6027\u8c37\u6c28\u9178\u88ab\u758f\u6c34\u6027$\u7f2c\u6c28\u9178\u53d6\u4ee3\uff0c\u5f62\u6210\u6eb6\u89e3\u5ea6\u4e0b\u964d\u7684\u8840\u7ea2\u86cb\u767dS \u7684\u9570\u72b6\u7ec6\u80de\u8d2b\u8840\u3002\u7531\u4e8e\u5df2\u77e5\u7684\u5206\u5b50\u75c5\u5927\u90e8\u5206\u7531\u57fa\u56e0\u53d8\u5f02\u5f15\u8d77\uff0c\u6709\u5b66\u8005\u63d0\u51fa\u57fa\u56e0\u75c5\uff08genopathy\uff09\u7684\u6982\u5ff5\uff0c\u5373\u7531\u57fa\u56e0\u672c\u8eab\u7a81\u53d8\u3001\u7f3a\u5931\u6216\u5176\u8868\u8fbe\u8c03\u63a7\u969c\u788d\u5f15\u8d77\u7684\u75be\u75c5\u3002\u7531\u5355\u4e2a\u81f4\u75c5\u57fa\u56e0\u53d8\u5f02\u5f15\u8d77\u7684\u75be\u75c5\u88ab\u79f0\u4e3a\u5355\u57fa\u56e0\u75c5\uff08monogenic disease\uff09\uff0c\u5982\u591a\u56ca\u80be\uff0c\u662f\u7531\u5e38\u67d3\u8272\u4f5316p13.3 \u533a\u57df\u86cb\u767d\u6fc0\u9176D\uff08protein kinase D\uff0cPKD\uff09\u7b49\u4f4d\u57fa\u56e0\u7f3a\u9677\u5f15\u8d77\u7684\u663e\u6027\u9057\u4f20\u75c5\u3002\u7531\u591a\u4e2a\u57fa\u56e0\u53d8\u5f02\u5f15\u8d77\u7684\u75be\u75c5\u88ab\u79f0\u4e3a\u591a\u57fa\u56e0\u75c5\uff08polygenic disease\uff09\uff0c\u5982\u9ad8\u8840\u538b\u3001\u51a0\u72b6\u52a8\u8109\u6027\u5fc3\u810f\u75c5\uff08\u51a0\u5fc3\u75c5\uff09\u7b49\u3002\u9057\u4f20\u56e0\u7d20\u6539\u53d8\u9664\u76f4\u63a5\u5f15\u8d77\u9057\u4f20\u6027\u75be\u75c5\u5916\uff0c\u4e5f\u53c2\u4e0e\u5176\u4ed6\u8bb8\u591a\u6162\u75c5\u5982\u80bf\u7624\u3001\u5fc3\u8840\u7ba1\u75be\u75c5\u7b49\u7684\u53d1\u75c5\u3002\u8fd9\u4e9b\u75be\u75c5\u901a\u5e38\u662f\u9057\u4f20\u56e0\u7d20\u548c\u73af\u5883\u56e0\u7d20\u4ea4\u4e92\u4f5c\u7528\u7684\u7ed3\u679c\u3002\u9057\u4f20\u6613\u611f\u6027\uff08genetic susceptibility\uff09\u6307\u4e0d\u540c\u4eba\u7fa4\u3001\u4e0d\u540c\u4e2a\u4f53\u7531\u4e8e\u9057\u4f20\u56e0\u7d20\u7684\u5dee\u5f02\uff0c\u5728\u5916\u754c\u73af\u5883\u56e0\u7d20\u4f5c\u7528\u4e0b\u5448\u73b0\u51fa\u6613\u60a3\u67d0\u79cd\u75be\u75c5\u7684\u503e\u5411\uff0c\u5982\u7cd6\u5c3f\u75c5\u80be\u75c5\uff08diabetic nephropathy\uff09\u7684\u53d1\u751f\u53d1\u5c55\u4e0e\u9057\u4f20\u6613\u611f\u6027\u5bc6\u5207\u76f8\u5173\uff0c\u6709\u4e9b\u7cd6\u5c3f\u75c5\u60a3\u8005\uff0820% ~ 25%\uff09\u4e0d\u8bba\u8840\u7cd6\u63a7$\u5236\u7a0b\u5ea6\uff0c\u60a3\u75c5\u591a\u5e74\u4e5f\u4e0d\u4f1a\u53d1\u751f\u7cd6\u5c3f\u75c5\u80be\u75c5\u3002\u76f8\u53cd\uff0c\u6709\u4e9b\u7cd6\u5c3f\u75c5\u60a3\u8005\uff08\u22645$%\uff09\u5373\u4f7f\u8840\u7cd6\u63a7\u5236\u826f\u597d\uff0c\u5728\u77ed\u671f\u5185\u4e5f\u53ef\u51fa\u73b0\u4e25\u91cd\u7684\u7cd6\u5c3f\u75c5\u5e76\u53d1\u75c7\u3002\n\n\uff08\u56db\uff09\u2002 \u5148\u5929\u56e0\u7d20\n\n\u6bcd\u4eb2\u5728\u598a...\n\n### ATP \u2014 \u9009\u81ea\u300a\u751f\u7406\u5b66\u300b\n\n...\u547c\u5438\u65f6\u80ba\u6bdb\u7ec6\u8840\u7ba1\u4e0e\u80ba\u6ce1\u4e4b\u95f4\u7684\u6c14\u4f53\u4ea4\u6362\uff09\uff1b\u6c34\u662f\u4e0d\u5e26\u7535\u8377\u7684\u6781\u6027\u5c0f\u5206\u5b50\uff0c\u4e5f\u80fd\u4ee5\u5355\u7eaf\u6269\u6563\u7684\u65b9\u5f0f\u901a\u8fc7\u7ec6\u80de\u819c\uff0c\u4f46\u8102\u8d28\u53cc\u5c42\u5bf9\u6c34\u7684\u901a\u900f\u6027\u5f88\u4f4e\uff0c\u6545\u901a\u5e38\u6269\u6563\u901f\u5ea6\u5f88\u6162\uff1b\u5206\u5b50\u8f83\u5927\u7684\u975e\u8102\u6eb6\u6027\u7269\u8d28\uff0c\u5982\u8461\u8404\u7cd6\u3001\u6c28\u57fa\u9178\u7b49\uff0c\u5f88\u96be\u76f4\u63a5\u901a\u8fc7\u819c\u8102\u8d28\u53cc\u5c42\uff1b\u5404\u79cd\u5e26\u7535\u79bb\u5b50\u7684\u76f4\u5f84\u5f88\u5c0f\uff0c\u5374\u4e5f\u4e0d\u80fd\u81ea\u7531\u901a\u8fc7\u819c\u8102\u8d28\u53cc\u5c42\u3002\n\n\u7269\u8d28\u7ecf\u5355\u7eaf\u6269\u6563\u8f6c\u8fd0\u7684\u901f\u7387\u4e3b\u8981\u53d6\u51b3\u4e8e\u88ab\u8f6c\u8fd0\u7269\u5728\u819c\u4e24\u4fa7\u7684\u6d53\u5ea6\u5dee\u548c\u819c\u5bf9\u8be5\u7269\u8d28\u7684\u901a\u900f\u6027\u3002\u6d53\u5ea6\u5dee\u8d8a\u5927\u3001\u901a\u900f\u6027\u8d8a\u9ad8\uff0c\u5219\u5355\u4f4d\u65f6\u95f4\u5185\u7269\u8d28\u6269\u6563\u7684\u91cf\u5c31\u8d8a\u591a\u3002\u53e6\u5916\uff0c\u7269\u8d28\u6240\u5728\u6eb6\u6db2\u7684\u6e29\u5ea6\u8d8a\u9ad8\u3001\u819c\u6709\u6548\u9762\u79ef\u8d8a\u5927\uff0c\u8f6c\u8fd0\u901f\u7387\u4e5f\u8d8a\u9ad8\u3002\n\n\uff08\u4e8c\uff09\u2003 \u6613\u5316\u6269\u6563\n\n\u6613\u5316\u6269\u6563\uff08facilitated diffusion\uff09\u662f\u6307\u975e\u8102\u6eb6\u6027\u7684\u5c0f\u5206\u5b50\u7269\u8d28\u6216\u5e26\u7535\u79bb\u5b50\u5728\u8de8\u819c\u86cb\u767d\u5e2e\u52a9\u4e0b\uff0c\u987a\u6d53\u5ea6\u68af\u5ea6\u548c / \u6216\u7535\u4f4d\u68af\u5ea6\u8fdb\u884c\u7684\u8de8\u819c\u8f6c\u8fd0\u3002\u6839\u636e\u8de8\u819c\u86cb\u767d\u53ca\u5176\u8f6c\u8fd0\u7269\u8d28\u7684\u4e0d\u540c\uff0c\u6613\u5316\u6269\u6563\u53ef\u5206\u4e3a\u7ecf\u901a\u9053\u7684\u6613\u5316\u6269\u6563\u548c\u7ecf\u8f7d\u4f53\u7684\u6613\u5316\u6269\u6563\u4e24\u79cd\u5f62\u5f0f\u3002\u4e24\u8005\u90fd\u5c5e\u4e8e\u88ab\u52a8\u8f6c\u8fd0\uff08passive transport\uff09\uff0c\u65e0\u987b\u6d88\u8017ATP\u3002\n\n1. \u7ecf\u901a\u9053\u7684\u6613\u5316\u6269\u6563 \u5404\u79cd\u5e26\u7535\u79bb\u5b50\u5728\u901a\u9053\u86cb\u767d\u7684\u4ecb\u5bfc\u4e0b\uff0c\u987a\u6d53\u5ea6\u68af\u5ea6\u548c / \u6216\u7535\u4f4d\u68af\u5ea6\u7684\u8de8\u819c\u8f6c\u8fd0\u79f0\u4e3a\u7ecf\u901a\u9053\u6613\u5316\u6269\u6563\uff08facilitated diffusion via channel\uff09\u3002\u7531\u4e8e\u7ecf\u901a\u9053\u8f6c\u8fd0\u7684\u7269\u8d28\u51e0\u4e4e\u90fd\u662f\u79bb\u5b50\uff0c\u56e0\u800c\u8fd9\u7c7b\u901a\u9053\u86cb\u767d\u4e5f\u79f0\u79bb\u5b50\u901a\u9053\uff08ion channel\uff09\u3002\u5982\u56fe2-3 \u6240\u793a\uff0c\u79bb\u5b50\u901a\u9053\u86cb\u767d\u8d2f\u7a7f\u8102\u8d28\u53cc\u5c42\uff0c\u4e2d\u592e\u6709\u4eb2\u6c34\u6027\u5b54\u9053\uff08pore canal\uff09\u3002\u5f53\u901a\u9053\u5904\u4e8e\u5173\u95ed\u72b6\u6001\u65f6\u6ca1\u6709\u79bb\u5b50\u901a\u8fc7\uff1b\u901a\u9053\u5f00\u653e\u65f6\u79bb\u5b50\u53ef\u7ecf\u5b54\u9053\u4ece\u819c\u7684\u9ad8\u6d53\u5ea6\u4e00\u4fa7\u5411\u4f4e\u6d53\u5ea6\u4e00\u4fa7\u6269\u6563\u3002\u79bb\u5b50\u901a\u8fc7\u65f6\u65e0\u987b\u4e0e\u901a\u9053\u86cb\u767d\u7ed3\u5408\uff0c\u80fd\u4ee5\u6781\u5feb\u7684\u901f\u5ea6\u8de8\u8fc7\u7ec6\u80de\u819c\u3002\u636e\u6d4b\u5b9a\uff0c\u901a\u9053\u5f00\u653e\u65f6\u79bb\u5b50\u8f6c\u8fd0\u901f\u7387\u53ef\u8fbe\u6bcf\u79d210 6\uff5e10 8 \u4e2a\u3002\n\n\u56fe2-3\u2003 \u79bb\u5b50\u7ecf\u901a\u9053\u6613\u5316\u6269\u6563\u793a\u610f\u56fe\n\n\u79bb\u5b50\u901a\u9053\u5177\u6709\u4e24\u4e2a\u91cd\u8981\u7684\u57fa\u672c\u7279\u5f81\u3002\n\n\uff081\uff09 \u79bb\u5b50\u9009\u62e9\u6027\uff1a\u79bb\u5b50\u9009\u62e9\u6027\uff08ion selectivity\uff09\u662f\u6307\u6bcf\u79cd\u901a\u9053\u53ea\u5bf9\u4e00\u79cd\u6216\u51e0\u79cd\u79bb\u5b50\u6709\u8f83\u9ad8\u7684\u901a\u900f\u80fd\u529b\uff0c\u800c\u5bf9\u5176\u4ed6\u79bb\u5b50\u7684\u901a\u900f\u6027\u5f88\u5c0f\u6216\u4e0d\u901a\u900f\u3002\u4f8b\u5982\uff0c\u94be\u901a\u9053\u5bf9K + \u7684\u901a\u900f\u6027\u8981\u6bd4Na + \u59271 000 \u500d\uff1b\u4e59\u9170\u80c6\u78b1\u80fd\u53d7\u4f53\u9633\u79bb\u5b50\u901a\u9053\u5bf9Na +\u3001K + \u9ad8\u5ea6\u901a\u900f\uff0c\u800c\u5bf9Cl - \u5219\u4e0d\u80fd\u901a\u900f\u3002\u636e\u6b64\uff0c\u53ef\u5c06\u901a\u9053\u5206\u4e3a\u94a0\u901a\u9053\u3001\u9499\u901a\u9053\u3001\u94be\u901a\u9053\u3001\u6c2f\u901a\u9053\u548c\u975e\u9009\u62e9\u6027\u9633\u79bb\u5b50\u901a\u9053\u7b49\u3002\u901a\u9053\u5bf9\u79bb\u5b50\u7684\u9009\u62e9\u6027\u53d6\u51b3\u4e8e\u5b54\u9053\u7684\u53e3\u5f84\u548c\u5e26\u7535\u72b6\u51b5\u7b49\u56e0\u7d20\uff0c\u5982\u9633\u79bb\u5b50\u901a\u9053\u7684\u5185\u58c1\u5e26\u8d1f\u7535\u8377\uff0c\u6545\u6709\u52a9\u4e8e\u9633\u79bb\u5b50\u901a\u8fc7\u800c\u963b\u788d\u9634\u79bb\u5b50\u901a\u8fc7\uff08\u56fe2-3\uff09\u3002\u6b64\u5916\uff0c\u901a\u9053\u7684$\u79bb\u5b50\u9009\u62e9\u6027\u8fd8\u4e0e\u901a\u9053\u7684\u5f62\u72b6\u3001\u5185\u58c1\u7684\u5316\u5b66\u7ed3\u6784\u4ee5\u53ca\u79bb\u5b50\u952e\u5206\u5e03\u7b49\u6709\u5173\u3002\u7f57\u5fb7\u91cc\u514b\u00b7\u9ea6\u91d1\u519c\uff08Roderick$ MacKinnon\uff09\u91c7\u7528\u86cb\u767d\u6676\u4f53\u7684X \u5c04\u7ebf\u884d\u5c04\u5206\u6790\u5b66\u6280\u672f\u89e3\u6790\u94be\u901a\u9053\u7684\u5206\u5b50\u7ed3\u6784\uff0c\u63ed\u793a\u4e86\u901a\u9053\u79bb\u5b50\u9009\u62e9\u6027\u7684\u7269\u7406\u57fa\u7840\u800c\u83b7\u5f97\u4e862003 \u5e74\u7684\u8bfa\u8d1d\u5c14\u5316\u5b66\u5956\u3002\n\n\uff082\uff09 \u95e8\u63a7\u7279\u6027\uff1a\u5927\u90e8\u5206\u901a\u9053\u86cb\u767d\u5206\u5b50\u5185\u90e8\u6709\u4e00\u4e9b\u53ef\u79fb\u52a8\u7684\u7ed3\u6784\u6216\u5316\u5b66\u57fa\u56e2\uff0c\u5728\u901a\u9053\u5f00\u53e3\u5904\u8d77\u95f8\u95e8\u4f5c\u7528\u3002\u8bb8\u591a\u56e0\u7d20\u53ef\u5f15\u8d77\u95f8\u95e8\u8fd0\u52a8\uff0c\u5bfc\u81f4\u901a\u9053\u7684\u5f00\u653e\u6216\u5173\u95ed\uff0c\u8fd9\u4e00\u8fc7\u7a0b\u79f0\u4e3a\u95e8\u63a7\uff08gating\uff09\u3002\u5728\u9759\u606f\u72b6\u6001\u4e0b\uff0c\u5927...\n\n### \u6025\u6027\u547c\u5438\u7a98\u8feb\u7efc\u5408\u5f81 \u2014 \u9009\u81ea\u300a\u4f20\u67d3\u75c5\u5b66\u300b\n\n...\u4f11\u514b\u53ca\u5f25\u6563\u6027\u8840\u7ba1\u5185\u51dd\u8840\u7b49\u73b0\u8c61\u3002\n\n\uff08\u4e09\uff09\u2002 \u514d\u75ab\u673a\u5236\n\n\u8bb8\u591a\u4f20\u67d3\u75c5\u7684\u53d1\u75c5\u673a\u5236\u4e0e\u514d\u75ab\u5e94\u7b54\u6709\u5173\u3002\u6709\u4e9b\u4f20\u67d3\u75c5\u80fd\u6291\u5236\u7ec6\u80de\u514d\u75ab\uff08\u5982\u9ebb\u75b9\uff09\u6216\u76f4\u63a5\u7834\u574fT \u6dcb\u5df4\u7ec6\u80de\uff08\u5982\u827e\u6ecb\u75c5\uff09\uff0c\u66f4\u591a\u7684\u75c5\u539f\u4f53\u5219\u901a\u8fc7\u53d8\u6001\u53cd\u5e94\u800c\u5bfc\u81f4\u7ec4\u7ec7\u635f\u4f24\uff0c\u5176\u4e2d\uff0c\u4ee5\u2162\u578b\uff08\u514d\u75ab\u590d\u5408\u7269\uff09\u53d8\u6001\u53cd\u5e94\uff08\u5982\u80be\u7efc\u5408\u5f81\u51fa\u8840\u70ed\uff09\u53ca\u2163\u578b\u53d8\u6001\uff08\u7ec6\u80de\u4ecb\u5bfc\uff09\u53cd\u5e94\uff08\u5982\u7ed3\u6838\u75c5\u53ca\u8840\u5438\u866b\u75c5\uff09\u6700\u4e3a\u5e38\u89c1\u3002\u8fd1\u5e74\u6709\u5b66\u8005\u6df1\u5165\u7814\u7a76\u4e86\u8d85\u5f3a\u514d\u75ab\u75c5\u7406\u53cd\u5e94\u53d1\u751f\u673a\u5236\uff0c\u63d0\u51fa\u4e86\u4e00\u4e9b\u65b0\u6982\u5ff5\uff0c\u5982\u8d85\u6297\u539f\uff08superantigen\uff0cSAg\uff09\u3001\u5168\u8eab\u708e\u75c7\u53cd\u5e94\u7efc\u5408\u5f81\uff08systemic inflammatory response syndrome\uff0cSIRS\uff09\u3001\u7ec6\u80de\u56e0\u5b50\u98ce\u66b4\uff08cytokine storm\uff09\u7b49\u3002\u7ec6\u80de\u56e0\u5b50\u98ce\u66b4\u662f\u6307\u75c5\u539f\u5fae\u751f\u7269\u611f\u67d3\u673a\u4f53\u540e\uff0c\u6fc0\u6d3b\u673a\u4f53\u514d\u75ab\u7cfb\u7edf\uff0c\u5927\u91cf\u5feb\u901f\u4ea7\u751f\u767d\u7ec6\u80de\u4ecb\u7d20\u2009-6\uff08interleukin-6\uff0cIL-6\uff09\u3001TNF-a\u3001IFN-$\u03b3\u7b49\u4fc3\u708e\u6027\u7ec6\u80de\u56e0\u5b50\uff0c\u53d1\u751f\u6781\u7aef\u7684\u514d\u75ab\u653b\u51fb\uff0c\u514d\u75ab\u7cfb\u7edf\u5931\u53bb\u63a7\u5236\uff0c$\u53ef\u5f15\u8d77\u6025\u6027\u547c\u5438\u7a98\u8feb\u7efc\u5408\u5f81\u548c\u591a\u5668\u5b98\u8870\u7aed\u3002\u7ec6\u80de\u56e0\u5b50\u98ce\u66b4\u662f\u4e00\u79cd\u6c42\u52a9\u4fe1\u53f7\uff0c\u76ee\u7684\u662f\u8ba9\u514d\u75ab\u7cfb\u7edf\u5728\u77ed\u65f6\u95f4\u5185\u706b\u529b\u5168\u5f00\u3002\u4f46\u8fd9\u662f\u4e00\u62db\u81ea\u6740\u5f0f\u7684\u653b\u51fb\uff0c\u5728\u6e05\u9664\u75c5\u6bd2\u7684\u540c\u65f6\uff0c\u4e25\u91cd\u635f\u4f24\u5bbf\u4e3b\uff0c\u7834\u574f\u8840\u7ba1\u58c1\uff0c\u5bfc\u81f4\u8840\u6d46\u6e17\u51fa\uff0c\u751a\u81f3\u51fa\u8840\uff0c\u5c06\u8840\u538b\u964d\u5230\u4e86\u5371\u9669\u7684\u6c34\u5e73\u3002\u7ec6\u80de\u56e0\u5b50\u98ce\u66b4\u662f\u8bb8\u591a\u75c5\u6bd2\u611f\u67d3\u6700\u540e\u9636\u6bb5\u7684\u593a\u547d\u6740\u624b\uff0c\u5982\u57c3\u535a\u62c9\u75c5\u6bd2\u611f\u67d3\u3001\u4eba\u611f\u67d3\u79bd\u6d41\u611f\u3001\u65b0\u51a0\u75c5\u6bd2\u611f\u67d3\u7b49\u3002\n\n\u4e09\u3001\u2002 \u91cd\u8981\u7684\u75c5\u7406\u751f\u7406\u53d8\u5316\n\n\uff08\u4e00\uff09\u2002 \u53d1\u70ed\n\n\u53d1\u70ed\uff08pyrexia\uff0cfever\uff09\u5e38\u89c1\u4e8e\u4f20\u67d3\u75c5\uff0c\u4f46\u5e76\u975e\u4f20\u67d3\u75c5\u6240\u7279\u6709\u3002\u5916\u6e90\u6027\u81f4\u70ed\u539f\uff08\u75c5\u539f\u4f53\u53ca\u5176\u4ea7\u7269\u3001\u514d\u75ab\u590d\u5408\u7269\u3001\u5f02\u6027\u86cb\u767d\u3001\u5927\u5206\u5b50\u5316\u5408\u7269\u6216\u836f\u7269\u7b49\uff09\u8fdb\u5165\u673a\u4f53\u540e\uff0c\u6fc0\u6d3b\u5355\u6838\u2009/\u2009\u5de8\u566c\u7ec6\u80de\u3001\u5185\u76ae\u7ec6\u80de\u548cB \u6dcb\u5df4\u7ec6\u80de\u7b49\uff0c\u4f7f\u540e\u8005\u91ca\u653e\u5185\u6e90\u6027\u81f4\u70ed\u539f\uff0c\u5982IL-1\u3001TNF\u3001IL-6 \u548cIFN \u7b49\u3002\u5185\u6e90\u6027\u81f4\u70ed\u539f\u901a\u8fc7\u8840\u6db2\u5faa\u73af\u523a\u6fc0\u4f53\u6e29\u8c03\u8282\u4e2d\u67a2\uff0c\u91ca\u653e\u524d\u5217\u817a\u7d20E2\uff08PGE2\uff09\u3002\u540e\u8005\u628a\u6052\u6e29\u70b9\u8c03\u9ad8\uff0c\u4f7f\u4ea7\u70ed\u8d85\u8fc7\u6563\u70ed\u800c\u5f15\u8d77\u4f53\u6e29\u4e0a\u5347\u3002\uff08\u4e8c\uff09\u2002 \u6025\u6027\u671f\u6539\u53d8\n\n\u611f\u67d3\u3001\u521b\u4f24\u3001\u708e\u75c7\u7b49\u8fc7\u7a0b\u6240\u5f15\u8d77\u7684\u4e00\u7cfb\u5217\u6025\u6027\u671f\u673a\u4f53\u5e94\u7b54\u79f0\u4e3a\u6025\u6027\u671f\u6539\u53d8\u3002\u5b83\u51fa\u73b0\u4e8e\u611f\u67d3\u53d1\u751f\u540e\u51e0\u5c0f\u65f6\u81f3\u51e0\u5929\uff0c\u4e3b\u8981\u7684\u6539\u53d8\u5982\u4e0b\u3002\n\n1. \u86cb\u767d\u4ee3\u8c22\u2003 \u809d\u810f\u5408\u6210\u4e00\u7cfb\u5217\u6025\u6027\u671f\u86cb\u767d\uff0c\u5176\u4e2dC \u53cd\u5e94\u86cb\u767d\uff08CRP\uff09\u662f\u6025\u6027\u611f\u67d3\u7684\u91cd\u8981\u6807\u5fd7\u3002\u7ea2\u7ec6\u80de\u6c89\u964d\u7387\u589e\u5feb\u4e5f\u662f\u8840\u6d46\u5185\u6025\u6027\u671f\u86cb\u767d\u6d53\u5ea6\u589e\u9ad8\u7684\u7ed3\u679c\u3002\u7cd6\u539f\u5f02\u751f\u4f5c\u7528\u52a0\u901f\u3001\u80fd\u91cf\u6d88\u8017\u3001\u808c\u8089\u86cb\u767d\u5206\u89e3\u589e\u591a\u3001\u8fdb\u98df\u51cf\u5c11\u7b49\u5747\u53ef\u5bfc\u81f4\u8d1f\u6c2e\u5e73\u8861\u4e0e\u6d88\u7626\u3002\n2. \u7cd6\u4ee3\u8c22\u2003 \u8461\u8404\u7cd6\u751f\u6210\u52a0\u901f\uff0c\u5bfc\u81f4\u8840\u7cd6\u5347\u9ad8\uff0c\u7cd6\u8010\u91cf\u77ed\u6682\u4e0b\u964d\uff0c\u8fd9\u4e0e\u7cd6\u539f\u5f02\u751f\u4f5c\u7528\u52a0\u901f\u53ca\u5185\u5206\u6ccc\u5f71\u54cd\u6709\u5173\u3002\u5728\u65b0\u751f\u513f\u53ca\u8425\u517b\u4e0d\u826f\u7684\u60a3\u8005\uff0c\u6216\u809d\u8870\u7aed\u60a3\u8005\uff0c\u7cd6\u539f\u5f02\u751f\u4f5c\u7528\u4e5f\u53ef\u51cf\u5f31\uff0c\u5bfc\u81f4\u8840\u7cd6\u4e0b\u964d\u30023.\u2002 \u6c34\u3001\u7535\u89e3\u8d28\u4ee3\u8c22\u2003 \u6025\u6027\u611f\u67d3\u65f6\uff0c\u6c2f\u5316\u94a0\u56e0\u51fa\u6c57\u3001\u5455\u5410\u6216\u8179\u6cfb\u800c\u4e22\u5931\uff0c\u52a0\u4e0a\u6297\u5229\u5c3f\u6fc0\u7d20\u5206\u6ccc\u589e\u52a0\u3001\u5c3f\u91cf\u51cf\u5c11\u3001\u6c34\u5206\u6f74\u7559\u800c\u5bfc\u81f4\u4f4e\u94a0\u8840\u75c7\uff0c\u81f3\u6062\u590d\u671f\u624d\u51fa\u73b0\u5229\u5c3f\u3002\u94be\u7684\u6444\u5165\u51cf\u5c11\u548c\u6392\u51fa\u589e\u52a0\u5bfc\u81f4\u94be\u7684\u8d1f\u5e73\n4. \u5185\u5206\u6ccc\u6539\u53d8\u2003 \u5728\u6025\u6027\u611f\u67d3\u65e9\u671f\uff0c\u968f\u7740\u53d1\u70ed\u5f00\u59cb\ .\n\n---\n\n# \u6d88\u5316\u4e0e\u4ee3\u8c22\n\n\u672c\u7ae0\u6db5\u76d6\u4ee3\u8c22\u6027\u78b1\u4e2d\u6bd2\u3001\u4ee3\u8c22\u6027\u9178\u4e2d\u6bd2\u3001\u80f0\u5c9b\u7d20\u62b5\u6297\u3001\u4ee3\u8c22\u7efc\u5408\u5f81\u3001\u5927\u80a0\u57c3\u5e0c\u83cc\u3001\u9ad8\u7518\u6cb9\u4e09\u916f\u8840\u75c7\u7b49\u6838\u5fc3\u77e5\u8bc6\u70b9\uff0c\u6574\u5408\u81ea7\u672c\u6559\u6750\u76f8\u5173\u5185\u5bb9\u3002\n\n## \u6838\u5fc3\u6982\u5ff5\u4e0e\u5b9a\u4e49\n\n**\u4ee3\u8c22\u6027\u78b1\u4e2d\u6bd2**\uff1a\u4e00\u79cd\u9178\u78b1\u5e73\u8861\u7d0a\u4e71\uff0c\u8868\u73b0\u4e3apH\u5347\u9ad8\uff0cAB\u3001SB\u53caBB\u5747\u5347\u9ad8\uff0cAB>SB\uff0cBE\u6b63\u503c\u52a0\u5927\uff0cPaCO2\u7ee7\u53d1\u6027\u5347\u9ad8\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66  \u2190 \u524d\u7f6e\uff1a\u80c3\u6db2\u4e22\u5931*\n\n**\u4ee3\u8c22\u6027\u9178\u4e2d\u6bd2**\uff1a\u4e00\u79cd\u56e0\u4f53\u5185\u9178\u6027\u7269\u8d28\u589e\u591a\u6216\u78b1\u6027\u7269\u8d28\u51cf\u5c11\u5bfc\u81f4\u7684\u9178\u78b1\u5e73\u8861\u7d0a\u4e71\uff0c\u8868\u73b0\u4e3a\u8840\u6d46HCO3-\u51cf\u5c11\u548cpH\u964d\u4f4e\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66  \u2190 \u524d\u7f6e\uff1a\u56fa\u5b9a\u9178\u589e\u591a*\n\n**\u80f0\u5c9b\u7d20\u62b5\u6297**\uff1a\u80f0\u5c9b\u7d20\u4f5c\u7528\u7684\u9776\u7ec4\u7ec7\u548c\u9776\u5668\u5b98\u5bf9\u80f0\u5c9b\u7d20\u751f\u7269\u4f5c\u7528\u7684\u654f\u611f\u6027\u964d\u4f4e\uff0c\u5f15\u8d77\u9ad8\u7cd6\u8840\u75c7\uff0c\u800c\u8840\u6db2\u4e2d\u80f0\u5c9b\u7d20\u542b\u91cf\u6b63\u5e38\u6216\u9ad8\u4e8e\u6b63\u5e38\u3002\n*\u6765\u6e90\uff1a\u75c5\u7406\u751f\u7406\u5b66  \u2190 \u524d\u7f6e\uff1a\u53d7\u4f53\u540e\u7f3a\u9677 \u2192 \u9ad8\u80f0\u5c9b\u7d20\u8840\u75c7*\n\n**\u4ee3\u8c22\u7efc\u5408\u5f81**\uff1a\u4e00\u7ec4\u7531\u9057\u4f20\u4e0e\u73af\u5883\u56e0\u7d20\u5171\u540c\u51b3\u5b9a\u7684\uff0c\u4ee5\u80f0\u5c9b\u7d20\u62b5\u6297\u4e3a\u5171\u540c\u75c5\u7406\u751f\u7406\u5b66\u57fa\u7840\uff0c\u4ee5\u591a\u
